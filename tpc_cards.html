<style>
:root{
  --blue:#1e90ff;--blue-dk:#0d6efd;--blue-pale:#e8f3ff;
  --yellow:#fffde7;--yellow-mid:#f5e642;
  --g50:#f9f9f9;--g100:#eeeeee;--g200:#cccccc;--g500:#888;--g800:#333;
  --black:#111;--white:#fff;
  --sans:'IBM Plex Sans',sans-serif;
  --serif:'IBM Plex Serif',serif;
  --mono:'IBM Plex Mono',monospace;
  --r:14px;--r-sm:8px;
  --sh-btn:0 4px 16px rgba(30,144,255,.35);
  --sh-card:0 6px 24px rgba(0,0,0,.09);
  --sh-card-h:0 12px 36px rgba(30,144,255,.16);
  --t:.22s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--g50);color:var(--black);min-height:100vh}

/* header */
.hdr{background:var(--black);color:var(--white);padding:.85rem 1.4rem;
  border-bottom:3px solid var(--blue);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.hdr h1{font-family:var(--mono);font-size:clamp(.82rem,2.4vw,1.05rem);font-weight:600;color:var(--white)}
.hdr h1 span{color:var(--blue)}
.hdr-links{display:flex;gap:.4rem;flex-wrap:wrap}

/* progress */
.prog{background:var(--g100);padding:.4rem 1.4rem;border-bottom:1px solid var(--g200)}
.prog-track{height:5px;background:var(--g200);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5bb8ff);border-radius:3px;transition:width .4s var(--t)}
.prog-txt{font-family:var(--mono);font-size:.68rem;color:var(--g500);margin-top:.22rem}

/* chapter strip */
.chstrip{background:var(--white);border-bottom:1px solid var(--g200);
  padding:.45rem 1.2rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.chstrip::-webkit-scrollbar{display:none}
.chbtn{font-family:var(--mono);font-size:.67rem;font-weight:600;letter-spacing:.05em;
  padding:.26rem .72rem;border-radius:30px;border:1.5px solid var(--g200);
  background:var(--white);color:var(--g500);cursor:pointer;margin-right:.35rem;transition:var(--t)}
.chbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
.chbtn.active{background:var(--blue);color:var(--white);border-color:var(--blue);
  box-shadow:0 2px 10px rgba(30,144,255,.35)}

/* stage */
.stage{min-height:calc(100vh - 210px);display:flex;align-items:flex-start;
  justify-content:center;padding:1.8rem 1rem 6rem}

/* card */
.pcard{background:var(--white);border-radius:var(--r);box-shadow:var(--sh-card);
  max-width:780px;width:100%;overflow:hidden;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);

.pcard:hover{box-shadow:var(--sh-card-h)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

  border:2px solid var(--blue);background:var(--white);color:var(--blue);

/* minimap */
.mmap{position:fixed;right:.7rem;top:50%;transform:translateY(-50%);

.mmdot{width:7px;height:7px;border-radius:50%;background:var(--g200);
  cursor:pointer;transition:var(--t);border:1px solid var(--g200)}
.mmdot.active{background:var(--blue);border-color:var(--blue);transform:scale(1.5)}
.mmdot:hover{background:var(--blue);transform:scale(1.4)}
@media(max-width:860px){.mmap{display:none}}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[
{id:"abs",ch:"Abstract",b:"b-abs",
 t:`Twin Primes $\\iff$ $|\\mathrm{Irr}(\\Delta(\\mathbb{Z}))| = \\infty$`,
 body:`<p>The <strong>Twin Prime Conjecture</strong> ‚Äî infinitely many primes $p$ with $p+2$ also prime ‚Äî has resisted proof for centuries.</p>
<p>We give an algebraic reformulation: twin primes index exactly the <em>irreducibles</em> of the anti-diagonal submonoid $N=\\Delta(\\mathbb{Z})\\subset(\\mathbb{Z}^2,\\otimes)$. A <a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank">Furstenberg-style topological argument</a> proves $|\\mathrm{Irr}(N)|=\\infty$ unconditionally.</p>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tpill">Twin Primes (Wikipedia)</a>
<a href="https://leanprover-community.github.io/" target="_blank" class="tpill">Lean 4</a>
<a href="https://en.wikipedia.org/wiki/Monoid" target="_blank" class="tpill">Monoid theory</a>
</div>`,lean:null},

{id:"d1.1",ch:"¬ß1 Algebra",b:"b-def",
 t:`Def 1.1 ‚Äî Weakly Saturated: $ab\\in N \\Rightarrow \\exists\\,a'b'\\in N$`,
 body:`<div class="mdisp">$$\\forall\\,a,b\\in M,\\quad a,b\\neq 1_M,\\quad ab\\in N\\implies\\exists\\,a',b'\\in N,\\;a',b'\\neq 1_N:a'b'=ab$$</div>
<p>Whenever a nontrivial product in $M$ lands in $N$, it admits a nontrivial factorization <em>within</em> $N$.</p>
<p><strong>Hierarchy:</strong> divisor-closed $\\Rightarrow$ saturated $\\Rightarrow$ weakly saturated. Our $N$ shows the last arrow is strict.</p>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L10`},

{id:"c1.5",ch:"¬ß1 Algebra",b:"b-cor",
 t:`Weakly Saturated $\\implies$ Irred$_M(n)\\iff$ Irred$_N(n)$`,
 body:`<div class="mdisp">$$n\\in N,\\;N\\text{ w.s.}\\implies \\bigl(n\\text{ irred. in }M\\iff n\\text{ irred. in }N\\bigr)$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p>$(\\Rightarrow)$: factorization in $N\\subseteq M$ trivial since $M$-irred. $(\\Leftarrow)$: $n=ab$ in $M$ with $ab\\in N$ gives nontrivial factorization in $N$ by WS. $\\square$</p></div>
<p class="mt-2"><strong>Example:</strong> In $(6\\mathbb{Z}+1,\\cdot)$: $7$ prime $\\Rightarrow$ irred. in $N$. $25=(-5)^2$ reducible in $M$ and in $N$.</p>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L20`},

{id:"d2.1",ch:"¬ß2 Ops",b:"b-def",
 t:`Def 2.1 ‚Äî $x\\mathbin{\\circledast}y=6xy+x+y$, $\\;x\\mathbin{\\star}y=-6xy+x+y$`,
 body:`<div class="mdisp">$$x\\mathbin{\\circledast}y:=6xy+x+y\\quad(\\texttt{mstar}),\\qquad x\\mathbin{\\star}y:=-6xy+x+y\\quad(\\texttt{sstar})$$
$$\\text{identity }=0\\text{ in both}$$</div>
<div class="cblk"><span class="kw">def</span> <span class="fn">mstar</span> (x y:‚Ñ§):‚Ñ§:=6*x*y+x+y
<span class="kw">def</span> <span class="fn">sstar</span> (x y:‚Ñ§):‚Ñ§:=-6*x*y+x+y</div>
<div class="cblk"> x    y    x‚äõy     x‚ãÜy
 1    1      8      -4
 2    3     41     -31
-1   -1      4      -8
 1   -1     -6       0  ‚Üê 1‚ãÜ(-1)=0=identity</div>`,
lean:`${GH}/TPC/Basic.lean#L15`},

{id:"p2.3",ch:"¬ß2 Ops",b:"b-prop",
 t:`Assoc + Comm $\\implies$ $(\\mathbb{Z},\\mathbin{\\circledast})$ and $(\\mathbb{Z},\\mathbin{\\star})$ are CommMonoids`,
 body:`<button class="btnprf" onclick="tp(this)">‚ñ∂ Show associativity</button>
<div class="prfbody" style="display:none"><p>$(x\\mathbin{\\circledast}y)\\mathbin{\\circledast}z=36xyz+6xz+6yz+6xy+x+y+z=x\\mathbin{\\circledast}(y\\mathbin{\\circledast}z)$. Identical for $\\mathbin{\\star}$ with sign flip. $\\square$</p></div>
<div class="cblk"><span class="kw">instance</span>:CommMonoid Nstar <span class="kw">where</span>
  mul_assoc:=mstar_assoc <span class="cm">-- by ring</span>
  mul_comm :=mstar_comm</div>`,
lean:`${GH}/TPC/Monoid.lean#L18`},

{id:"eta",ch:"¬ß2 Ops",b:"b-prop",
 t:`$\\eta(x)=-x\\implies N^*\\cong N^\\star$, so $\\;(-a)\\mathbin{\\star}(-b)=-(a\\mathbin{\\circledast}b)$`,
 body:`<div class="mdisp">$$\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)=(-x)\\mathbin{\\star}(-y)=\\eta(x)\\mathbin{\\star}\\eta(y)$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p>We verify $\\eta$ is a monoid homomorphism $N^*\\to N^\\star$. Compute:
$$\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)$$
$$\\eta(x)\\mathbin{\\star}\\eta(y)=(-x)\\mathbin{\\star}(-y)=-6(-x)(-y)+(-x)+(-y)=-6xy-x-y=-(6xy+x+y)$$
These are equal, so $\\eta$ respects the operations. Since $\\eta(0)=0$ (identity to identity) and $\\eta$ is its own inverse ($\\eta\\circ\\eta=\\mathrm{id}$), it is an isomorphism. $\\square$</p>
<div class="cblk"><span class="kw">def</span> Œ∑(x:‚Ñ§):‚Ñ§:=-x
<span class="kw">lemma</span> <span class="fn">Œ∑_mstar_sstar</span>(x y:‚Ñ§):Œ∑(x‚äõy)=Œ∑ x‚ãÜŒ∑ y:=<span class="kw">by</span> simp[Œ∑,mstar,sstar];ring</div></div>
<p><strong>Example:</strong> $\\eta(2\\mathbin{\\circledast}3)=\\eta(41)=-41=(-2)\\mathbin{\\star}(-3)$.</p>
<p>This identity is used in the weak saturation proof: $(-a)\\mathbin{\\star}(-c)=-(a\\mathbin{\\circledast}c)=-k$.</p>`,
lean:`${GH}/TPC/Basic.lean#L70`},

{id:"t2.6",ch:"¬ß2 Ops",b:"b-thm",
 t:`$\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies N^*\\cong(6\\mathbb{Z}+1,\\cdot)$`,
 body:`<div class="mdisp">$$\\phi(x)=6x+1,\\quad\\phi(x\\mathbin{\\circledast}y)=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$$\\psi(x)=6x-1,\\quad\\psi(x\\mathbin{\\star}y)=-[(6x-1)(6y-1)]=\\psi(x)\\bullet\\psi(y)$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>$\\phi$ is a homomorphism:</strong>
$$\\phi(x\\mathbin{\\circledast}y)=6(6xy+x+y)+1=36xy+6x+6y+1=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$\\phi(0)=1$ (identity to identity). $\\phi$ is injective since $6x+1=6y+1\\Rightarrow x=y$. The image is exactly $6\\mathbb{Z}+1$ since every $6k+1$ has $k$ as preimage.</p>
<p><strong>$\\psi$ is a homomorphism:</strong>
$$\\psi(x\\mathbin{\\star}y)=6(-6xy+x+y)-1=-36xy+6x+6y-1$$
$$\\psi(x)\\bullet\\psi(y)=-[(6x-1)(6y-1)]=-(36xy-6x-6y+1)=-36xy+6x+6y-1$$
These are equal. $\\psi(0)=-1$ and $(-1)\\bullet(-1)=-1$ confirms identity. $\\square$</p>
<div class="cblk"><span class="kw">def</span> œÜ(x:‚Ñ§):‚Ñ§:=6*x+1
<span class="kw">lemma</span> <span class="fn">œÜ_mul</span>(x y:‚Ñ§):œÜ(x‚äõy)=œÜ x*œÜ y:=<span class="kw">by</span> simp[œÜ,mstar];ring</div></div>
<p><strong>Example:</strong> $\\phi(2\\mathbin{\\circledast}3)=\\phi(41)=247=13\\times19=\\phi(2)\\phi(3)$.</p>`,
lean:`${GH}/TPC/Basic.lean#L55`},

{id:"l2.8",ch:"¬ß2 Ops",b:"b-lem",
 t:`$(6u+1)(6v+1)=1$ has no solution with $u,v\\neq0$ ‚Äî No Zero Divisors`,
 body:`<div class="mdisp">$$u,v\\neq0\\implies u\\mathbin{\\circledast}v\\neq0\\text{ and }u\\mathbin{\\star}v\\neq0$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p>$u\\mathbin{\\circledast}v=0\\iff(6u+1)(6v+1)=1$. In $\\mathbb{Z}$ this forces $6u+1=\\pm1$, so $u=0$ or $u=-1/3\\notin\\mathbb{Z}$. $\\square$</p></div>
<p><strong>Key use:</strong> forces $a,c\\neq0$ from $a\\mathbin{\\circledast}c=k\\neq0$ in the weak saturation proof.</p>`,
lean:`${GH}/TPC/Basic.lean#L90`},

{id:"d3.1",ch:"¬ß3 Anti-Diag",b:"b-def",
 t:`Def 3.1 ‚Äî $\\Delta(\\mathbb{Z})=\\{(x,-x)\\}$, $\\;\\Delta(x)\\otimes\\Delta(y)=\\Delta(x\\mathbin{\\circledast}y)$`,
 body:`<div class="mdisp">$$N:=\\Delta(\\mathbb{Z})=\\{(x,-x):x\\in\\mathbb{Z}\\}\\subset(\\mathbb{Z}^2,\\otimes)$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show $N$ is a submonoid</button>
<div class="prfbody" style="display:none"><p><strong>Closure:</strong> $(x,-x)\\otimes(y,-y)=(x\\mathbin{\\circledast}y,\\;(-x)\\mathbin{\\star}(-y))$. By the involution $\\eta$: $(-x)\\mathbin{\\star}(-y)=-(x\\mathbin{\\circledast}y)$. So the result is $(x\\mathbin{\\circledast}y,\\,-(x\\mathbin{\\circledast}y))\\in N$.</p>
<p><strong>Identity:</strong> $(0,0)=(0,-0)\\in N$. $\\square$</p>
<div class="cblk"><span class="kw">def</span> AntiDiag:Set(‚Ñ§√ó‚Ñ§):={p|p.2=-p.1}
<span class="kw">def</span> Œî(x:‚Ñ§):‚Ñ§√ó‚Ñ§:=(x,-x)
<span class="kw">lemma</span> <span class="fn">Œî_otimes</span>(x y:‚Ñ§):Œî x‚äóŒî y=Œî(x‚äõy):=<span class="kw">by</span> simp[Œî,otimes,neg_sstar_neg]</div></div>
<p><strong>Example:</strong> $(1,-1)\\otimes(2,-2)=(1\\mathbin{\\circledast}2,-(1\\mathbin{\\circledast}2))=(15,-15)\\in N$.</p>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L10`},

{id:"cx",ch:"¬ß4 Weak Sat",b:"b-ex",
 t:`$(1,0)\\otimes(1,-8)=(8,-8)\\in N$ but $(1,0)\\notin N$ ‚Äî NOT Saturated`,
 body:`<div class="mdisp">$$a=(1,0),\\;b=(1,-8):\\quad(1\\mathbin{\\circledast}1,\\;0\\mathbin{\\star}(-8))=(8,-8)\\in N$$</div>
<p>$(1,0)\\notin N$ since $0\\neq-1$. Saturation fails.</p>
<div class="cblk"><span class="kw">theorem</span> <span class="fn">antiDiag_not_saturated</span>:
  ‚àÉ a b:‚Ñ§√ó‚Ñ§, a‚àâAntiDiag‚àßb‚àâAntiDiag‚àßa‚äób‚ààAntiDiag:=<span class="kw">by</span>
  refine‚ü®(1,0),(1,-8),?_,?_,?_‚ü© <span class="cm">-- norm_num closes all three</span></div>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L80`},

{id:"t4.1",ch:"¬ß4 Weak Sat",b:"b-thm",
 t:`$a\\mathbin{\\circledast}c=k\\neq0$ + Lemma 2.8 $\\implies$ $\\Delta(\\mathbb{Z})$ is Weakly Saturated`,
 body:`<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p>$a\\mathbin{\\circledast}c=k\\neq0$ gives $a,c\\neq0$ by Lemma 2.8. Set $a'=(a,-a)$, $c'=(c,-c)\\in N$. Then $(a,-a)\\otimes(c,-c)=(k,-(k))=(k,-k)$. $\\blacksquare$</p></div>
<p><strong>Lift:</strong> $(1,0)\\otimes(1,-8)=(8,-8)$ lifts to $(1,-1)\\otimes(1,-1)=(8,-8)$ inside $N$.</p>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L45`},

{id:"t5.1",ch:"¬ß5 Irred",b:"b-thm",
 t:`$\\phi(x)\\in\\pm\\mathbb{P}$ and $\\psi(x)\\in\\pm\\mathbb{P}$ $\\iff$ $(x,-x)\\in\\mathrm{Irr}(N)$`,
 body:`<div class="mdisp">$$(x,-x)\\in\\mathrm{Irr}(N)\\iff 6x+1\\in\\pm\\mathbb{P}\\text{ and }6x-1\\in\\pm\\mathbb{P}\\iff(6x-1,6x+1)\\text{ twin prime}$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>($\\Rightarrow$):</strong> Suppose $(x,-x)$ is irreducible in $N$. Under $\\phi$, this maps to $6x+1$ in $(6\\mathbb{Z}+1,\\cdot)$. By Corollary 1.5, irreducibility in $N$ is equivalent to irreducibility in $M$, and $\\phi$ transfers irreducibility to primality in $\\mathbb{Z}$. So $6x+1\\in\\pm\\mathbb{P}$. Similarly, under $\\psi$, $6x-1\\in\\pm\\mathbb{P}$.</p>
<p><strong>($\\Leftarrow$):</strong> If both $6x+1$ and $6x-1$ are $\\pm$primes, then $\\phi(x)$ is irreducible in $(6\\mathbb{Z}+1,\\cdot)$ and $\\psi(x)$ is irreducible in $(6\\mathbb{Z}-1,\\bullet)$. Pulling back through the isomorphisms, $(x,-x)$ admits no nontrivial factorization in $N$. $\\square$</p></div>
<div class="cblk"> x   6x-1  6x+1  Irred?  Twin pair
 1      5     7    YES    (5,7)
 2     11    13    YES    (11,13)
 4     23    25     NO    25=5¬≤
 5     29    31    YES    (29,31)
10     59    61    YES    (59,61)</div>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L95`},

{id:"d6.1",ch:"¬ß6 Norm",b:"b-def",
 t:`Def 6.1 ‚Äî Norm $|(x,-x)|:=\\phi(x)^2=(6x+1)^2$`,
 body:`<div class="mdisp">$$|(x,-x)|:=(6x+1)^2=\\phi(x)^2$$</div>
<div class="cblk"><span class="kw">def</span> norm(x:‚Ñ§):‚Ñ§:=(6*x+1)^2
<span class="kw">lemma</span> <span class="fn">norm_eq_œÜ_sq</span>(x:‚Ñ§):norm x=œÜ x^2</div>
<div class="cblk"> x    œÜ(x)   |(x,-x)|  Irred?
 0       1          1  identity
 1       7         49  YES
 2      13        169  YES
 4      25        625  NO
 5      31        961  YES
-1      -5         25  YES</div>`,
lean:`${GH}/TPC/Norm.lean#L12`},

{id:"n56",ch:"¬ß6 Norm",b:"b-prop",
 t:`$\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies$ N5: $|x\\otimes y|=|x||y|$ and N6: strict descent`,
 body:`<div class="mdisp">$$\\textbf{N5:}\\quad|(x,-x)\\otimes(y,-y)|=|(x,-x)|\\cdot|(y,-y)|$$
$$\\textbf{N6:}\\quad(x,-x)=(a,-a)\\otimes(b,-b),\\;a,b\\neq0\\implies|(a,-a)|,|(b,-b)|<|(x,-x)|$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>N5 (multiplicativity):</strong>
$$|(x,-x)\\otimes(y,-y)|=|(x\\mathbin{\\circledast}y,\\,-(x\\mathbin{\\circledast}y))|=\\phi(x\\mathbin{\\circledast}y)^2=(\\phi(x)\\phi(y))^2=\\phi(x)^2\\phi(y)^2=|(x,-x)|\\cdot|(y,-y)|$$
This is a single <code>ring</code> computation in Lean.</p>
<p><strong>N6 (strict descent):</strong> Let $x=a\\mathbin{\\circledast}b$ with $a,b\\neq0$. Then $\\phi(a),\\phi(b)\\neq1$ (since $a,b\\neq0$ implies $6a+1,6b+1\\neq1$). So $|\\phi(a)|,|\\phi(b)|\\geq5$. Then:
$$|(a,-a)|=\\phi(a)^2\\leq\\phi(a)^2<\\phi(a)^2\\phi(b)^2=|(x,-x)|$$
since $\\phi(b)^2\\geq25>1$. Likewise for $|(b,-b)|$. $\\square$</p></div>
<p><strong>N6 example:</strong> $(4,-4)=(-1,1)\\otimes(-1,1)$, norm $625=25\\times25$. Both $25&lt;625$.</p>`,
lean:`${GH}/TPC/Norm.lean#L50`},

{id:"t7.2",ch:"¬ß7 Divisibility",b:"b-thm",
 t:`N5+N6+Weak Sat. $\\implies$ $\\forall n\\in N\\;\\exists q\\in\\mathrm{Irr}(N):q\\mid_{\\otimes}n$`,
 body:`<button class="btnprf" onclick="tp(this)">‚ñ∂ Induction proof</button>
<div class="prfbody" style="display:none"><p>Induct on $|(k,-k)|$. Irred: done. Reducible in $N$: $(k,-k)=(a,-a)\\otimes(b,-b)$, so $|(a,-a)|&lt;|(k,-k)|$ by N6; apply IH to $(a,-a)$. Reducible in $M$ only: use weak saturation first. $\\blacksquare$</p></div>
<p><strong>Example:</strong> $(14,-14)$: $\\phi(14)=85=5\\times17$. Lift: $(14,-14)=(-1,1)\\otimes(-3,3)$ with $(-1,1)\\in\\mathrm{Irr}(N)$.</p>`,
lean:`${GH}/TPC/Norm.lean#L90`},

{id:"d8.1",ch:"¬ß8 Topology",b:"b-def",
 t:`Def 8.1 ‚Äî $U_{a,b,c}=\\{(a+cz,\\,b-cz)\\}$, anti-diagonal APs`,
 body:`<div class="mdisp">$$U_{a,b,c}=\\{(a+cz,\\;b-cz):z\\in\\mathbb{Z}\\},\\quad c\\neq0$$</div>
<div class="cblk"><span class="kw">def</span> U(a b c:‚Ñ§):Set(‚Ñ§√ó‚Ñ§):=
  {p|‚àÉz:‚Ñ§, p=(a+c*z, b-c*z)}</div>
<p>$U_{1,-1,7}=\\{\\ldots,(-6,6),(1,-1),(8,-8),(15,-15),\\ldots\\}$</p>
<p>$N\\cap U_{a,b,c}$: empty if $c\\nmid a+b$, else infinite AP in $N$.</p>
<p><strong>Consequence:</strong> No singleton of $N$ is open.</p>`,
lean:`${GH}/TPC/Topology.lean#L18`},

{id:"t8.3",ch:"¬ß8 Topology",b:"b-thm",
 t:`CRT $\\implies$ $\\{U_{a,b,c}\\}$ is a basis and each $U_{a,b,c}$ is clopen`,
 body:`<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof sketch</button>
<div class="prfbody" style="display:none"><p><strong>B1:</strong> $(x,y)\\in U_{x,y,1}$. <strong>B2:</strong> intersection reduces to CRT giving $U_{x^*,a+b-x^*,\\mathrm{lcm}(c,c')}$. <strong>Clopen:</strong> complement is $\\bigcup_{k=1}^{|c|-1}U_{a+k,b-k,c}$. $\\square$</p></div>
<p><strong>Example:</strong> $U_{1,-1,7}\\cap U_{8,-8,5}$: $x\\equiv1\\pmod7$, $x\\equiv8\\pmod5$ gives $x^*=43$, intersection $=U_{43,-43,35}$.</p>
<p><strong>Key:</strong> $N\\cap U_{a,b,c}$ is infinite or empty $\\Rightarrow$ no singleton is open.</p>`,
lean:`${GH}/TPC/Topology.lean#L75`},

{id:"t8.9",ch:"¬ß8 Topology",b:"b-thm",
 t:`$\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies L_p$ homeomorphism $\\implies$ $q\\otimes N$ closed`,
 body:`<div class="mdisp">$$p\\otimes N=V_{p_1,\\,6p_1+1}\\text{ (clopen)}, \\quad L_p\\text{ homeomorphism}\\implies p\\otimes C\\text{ closed for closed }C$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>Continuity of $L_p$:</strong> Let $p=(p_1,-p_1)$. For $(x,-x)\\in U_{a,-a,c}\\cap N$, we have $x=a+cz$. Then:
$$p_1\\mathbin{\\circledast}x=6p_1x+p_1+x=6p_1(a+cz)+p_1+a+cz=(6p_1a+p_1+a)+c(6p_1+1)z=p_1\\mathbin{\\circledast}a+\\phi(p_1)cz$$
So $L_p$ maps $U_{a,-a,c}\\cap N$ into $U_{p_1\\circledast a,\\,-(p_1\\circledast a),\\,\\phi(p_1)c}$, hence is continuous.</p>
<p><strong>Injectivity:</strong> $p_1\\mathbin{\\circledast}x=p_1\\mathbin{\\circledast}y$ implies $\\phi(p_1)\\phi(x)=\\phi(p_1)\\phi(y)$. Since $p_1\\neq0$, $\\phi(p_1)\\neq\\pm1$ is nonzero, giving $\\phi(x)=\\phi(y)$, hence $x=y$.</p>
<p><strong>Cosets closed:</strong> $q\\otimes N=L_q(N)$ is the image of a closed set under a homeomorphism onto its image, hence closed. $\\square$</p></div>
<p><strong>Example ($p_1=1$):</strong> $L_{(1,-1)}$ maps $N$ onto $V_{1,7}=\\{(1+7n,-(1+7n))\\}$, step $7=\\phi(1)$.</p>`,
lean:`${GH}/TPC/Topology.lean#L155`},

{id:"t9.1",ch:"¬ß9 Main",b:"b-thm",
 t:`Covering + Closed Cosets + No Open Singletons $\\implies$ $|\\mathrm{Irr}(N)|=\\infty$`,
 body:`<div class="mdisp">$$N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in\\mathrm{Irr}(N)}q\\otimes N$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>Covering:</strong> For any $(k,-k)\\neq(0,0)$ in $N$, Theorem 7.2 gives an irreducible $q\\in\\mathrm{Irr}(N)$ with $q\\mid_{\\otimes}(k,-k)$, so $(k,-k)\\in q\\otimes N$. Thus $N\\setminus\\{(0,0)\\}\\subseteq\\bigcup_{q}q\\otimes N$.</p>
<p><strong>Contradiction:</strong> Suppose $\\mathrm{Irr}(N)$ is finite. Each coset $q\\otimes N$ is closed (Thm 8.9). A finite union of closed sets is closed, so $N\\setminus\\{(0,0)\\}$ is closed, making $\\{(0,0)\\}$ open in $N$. But every nonempty open set in $N$ contains a basic open set $N\\cap U_{a,b,c}$, which is infinite (Thm 8.3). A singleton cannot be open. <strong>Contradiction.</strong> $\\blacksquare$</p>
<div class="cblk"><span class="kw">theorem</span> <span class="fn">infinitely_many_irred</span>:
  {q:‚Ñ§|Irred q}.Infinite</div></div>
<p>This is <a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank">Furstenberg's argument</a> verbatim.</p>`,
lean:`${GH}/TPC/Main.lean#L60`},

{id:"c9.3",ch:"¬ß9 Main",b:"b-cor",
 t:`Thm 5.1 + Thm 9.1 $\\implies$ Infinitely Many Twin Prime Pairs`,
 body:`<div class="mdisp">$$\\boxed{\\bigl|\\{x\\in\\mathbb{Z}:6x-1\\in\\pm\\mathbb{P}\\text{ and }6x+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty}$$</div>
<button class="btnprf" onclick="tp(this)">‚ñ∂ Show proof</button>
<div class="prfbody" style="display:none"><p>By Theorem 5.1, $(x,-x)\\in\\mathrm{Irr}(N)$ if and only if $6x+1$ and $6x-1$ are both $\\pm$prime, i.e., $(6x-1,6x+1)$ is a twin prime pair. By Theorem 9.1, $|\\mathrm{Irr}(N)|=\\infty$. Combining these two results: there are infinitely many $x\\in\\mathbb{Z}$ with $6x\\pm1\\in\\pm\\mathbb{P}$, giving infinitely many twin prime pairs. $\\blacksquare$</p></div>
<div class="mdisp">$$\\phi,\\psi\\text{ isom.}\\to\\text{Weak sat.}\\to\\text{Irred equiv.}\\to\\text{Norm}\\to\\text{Covering}\\to U_{a,b,c}\\to\\text{Cosets closed}\\to\\mathbf{TPC}$$</div>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime_conjecture" target="_blank" class="tpill">Twin Prime Conjecture</a>
<a href="${GH}/TPC/Main.lean" target="_blank" class="tpill"><i class="bi bi-code-slash"></i> Main.lean</a>
<a href="${GH}/PAPER.md" target="_blank" class="tpill"><i class="bi bi-file-text"></i> PAPER.md</a>
<a href="https://leanprover-community.github.io/mathlib4_docs/" target="_blank" class="tpill">Mathlib4 docs</a>
</div>`}
];

const chapters=[...new Set(cards.map(c=>c.ch))];
let cur=0;

function render(){
  const c=cards[cur];
  const src=c.lean?`<a href="${c.lean}" target="_blank" class="srclink ms-auto"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  document.getElementById("mc").innerHTML=`
    <div class="ctop">
      <div class="badge-row">
        <span class="tbadge ${c.b}">${c.b.replace("b-","")}</span>
        <span style="font-family:var(--mono);font-size:.62rem;color:#555">${cur+1}/${cards.length}</span>
        ${src}
      </div>
      <div class="eq-title">${c.t}</div>
    </div>
    <div class="cbody">${c.body}</div>`;
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pt").textContent=`Card ${cur+1} of ${cards.length}`;
  document.getElementById("nc").textContent=`${cur+1} / ${cards.length}`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  // chapter strip
  document.getElementById("chs").innerHTML=chapters.map(ch=>{
    const act=cards[cur].ch===ch?" active":"";
    return `<button class="chbtn${act}" onclick="jumpCh('${ch}')">${ch}</button>`;
  }).join("");
  // minimap
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mmdot${i===cur?" active":""}" onclick="jump(${i})" title="${i+1}"></div>`
  ).join("");
  if(window.renderMathInElement){
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],
      throwOnError:false
    });
  }
}

function go(d){
  cur=Math.max(0,Math.min(cards.length-1,cur+d));
  const el=document.getElementById("mc");
  el.style.animation="none";
  requestAnimationFrame(()=>{
    el.style.animation=d>0?"slideLeft .28s cubic-bezier(.4,0,.2,1)":"slideRight .28s cubic-bezier(.4,0,.2,1)";
    render();
  });
  window.scrollTo({top:0,behavior:"smooth"});
}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){
  const el=btn.nextElementSibling;
  const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";
  btn.innerHTML=open?"‚ñº Hide proof":"‚ñ∂ Show proof";
}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);
});
// Read jump target from index.html via sessionStorage
const _saved = sessionStorage.getItem('tpcCard');
if (_saved !== null) { cur = Math.min(parseInt(_saved,10), cards.length-1); sessionStorage.removeItem('tpcCard'); }
render();
</script>
