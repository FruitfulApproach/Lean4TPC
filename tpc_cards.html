// ═══════════════════════════════════════════════════════════════
// Card 7 — Prop 2.4: Structure of N
// ═══════════════════════════════════════════════════════════════
{id:"prop-2.4",ch:"§2 Monoid",badge:"b-prop",title:"Proposition 2.4 — Structure of $N = \\langle G \\rangle$",lean:`${GH}/TPC/Monoid.lean#L40`,body:`
<p><strong>Prop 2.4.1.</strong> For $a \\neq b$, the product $\\mathfrak{a} \\cdot \\mathfrak{b}$ is a <strong>formal product</strong> — it does NOT simplify to a single pure tensor.</p>
<p><strong>Prop 2.4.3.</strong> $M$ and $N$ are <strong>commutative</strong> (tensor product of commutative monoids is commutative).</p>
<p><strong>Prop 2.4.4.</strong> $k \\mapsto \\mathfrak{k} = (k,k)$ is <strong>injective</strong> on $\\mathbb{Z} \\setminus \\{0\\}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proofs via separating invariants</button>
<div class="proof-content" style="display:none">
<p>All three follow from <a class="ilink" onclick="goToCard('lem-sep-inv')">Lemma 2.3</a>. The family $\\{\\bar{f}_{q,p}: M\\to(\\mathbb{Z},+)\\}$ satisfies $\\bar{f}_{q,p}\\circ\\iota = f_{q,p}$:</p>
<div class="math-block">$$\\begin{CD}
(\\mathbb{Z},\\circledast)\\times(\\mathbb{Z},\\star) @>{f_{q,p}}>> (\\mathbb{Z},+) \\\\
@V{\\iota}VV @| \\\\
M @>{\\bar{f}_{q,p}}>> (\\mathbb{Z},+)
\\end{CD}$$</div>
<p><strong>2.4.1:</strong> If $\\mathfrak{a}\\cdot\\mathfrak{b} = z\\otimes w$ for some $z,w$, apply $\\bar{f}_{q,p}$: the left side gives $\\bar{f}_{q,p}(\\mathfrak{a})+\\bar{f}_{q,p}(\\mathfrak{b})$, the right gives $f_{q,p}(z,w)=v_q|\\phi(z)|\\cdot v_p|\\psi(w)|$. But choosing $(q,p)$ that separates $a$ from $b$ forces an additive split that no single product $v_q(\\cdot)\\cdot v_p(\\cdot)$ can match. Contradiction. ✓</p>
<p><strong>2.4.4:</strong> If $\\mathfrak{k}=\\mathfrak{l}$ then $\\bar{f}_{q,p}(\\mathfrak{k})=\\bar{f}_{q,p}(\\mathfrak{l})$ for all $(q,p)$. By Lemma 2.3 separation, $k=l$. ✓</p>
<p><strong>2.4.3:</strong> Since $\\circledast$ and $\\star$ are commutative, $z\\otimes w = (z\\circledast 0)\\otimes w$, and the bilinearity relations give commutativity on generators; it extends to all of $M$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.5 (Unique multiset representation).</strong> Different multisets of non-zero generators give different elements: if $\\mathfrak{k}_1\\cdots\\mathfrak{k}_r = \\mathfrak{l}_1\\cdots\\mathfrak{l}_s$ in $M$, then $r=s$ and $\\{k_1,\\ldots,k_r\\} = \\{l_1,\\ldots,l_s\\}$ as multisets.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Proof — choose irreducibles, then UFD</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span><strong>Choose $\\mathfrak{k}_i, \\mathfrak{l}_j$ to be irreducible.</strong> By <a class="ilink" onclick="goToCard('lem-ufd')">Lem 2.4.A</a> (existence), every factor has an irreducible factorization in $N$. Replace each $\\mathfrak{k}_i$ and $\\mathfrak{l}_j$ by its irreducible factorization; the equality is preserved and we may write</p>
<div class="math-block">$$\\mathfrak{q}_1\\cdots\\mathfrak{q}_n \\;=\\; \\mathfrak{\\lambda}_1\\cdots\\mathfrak{\\lambda}_m, \\qquad \\mathfrak{q}_i,\\mathfrak{\\lambda}_j\\in\\mathrm{Irr}(N).$$</div>
<p><span class="step-num">2</span><strong>Apply $\\bar{\\phi}: M\\to(\\mathbb{Z},\\cdot)$.</strong> Since $\\phi:(\\mathbb{Z},\\circledast)\\to(\\mathbb{Z},\\cdot)$, $z\\mapsto 6z+1$ is a monoid homomorphism, it extends via the UMP to $\\bar{\\phi}$ on $M$:</p>
<div class="math-block">$$\\phi(q_1)\\cdots\\phi(q_n) \\;=\\; \\phi(\\lambda_1)\\cdots\\phi(\\lambda_m).$$</div>
<p>Since every factor is irreducible, each $\\phi(q_i)$ and $\\phi(\\lambda_j)$ is <strong>prime</strong>. Both sides are therefore products of primes. By <strong>UFD in $\\mathbb{Z}$</strong>: $n=m$ and $\\{\\phi(q_i)\\}=\\{\\phi(\\lambda_j)\\}$ as multisets. Since $\\phi$ is injective, $\\{q_i\\}=\\{\\lambda_j\\}$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
${mkVerify('prop-2.4','# 2.4.4: k → (φ(k),ψ(k)) injective\ncol = [(phi(k),psi(k)) for k in range(-15,16) if k]\nassert len(col) == len(set(col))\n# 2.4.5: distinct multisets → distinct (⊛,⋆)-products\nfor ms in combinations_with_replacement(range(1,9), r<=4):\n    assert no two multisets map to same (z,w)')}`},

// ═══════════════════════════════════════════════════════════════
// Card 6 — Def 4.1: Irreducibility
// ═══════════════════════════════════════════════════════════════
{id:"def-4.1",ch:"§3 Irred",badge:"b-def",title:"Definition 4.1 — Irreducibility in $N$",lean:`${GH}/TPC/Main.lean#L5`,body:`
<p>An element $m \\in N \\setminus \\{e\\}$ is <strong>irreducible in $N$</strong> (written $m \\in \\mathrm{Irr}(N)$) if:</p>
<div class="math-block">$$m = a \\cdot b\\text{ with }a,b\\in N \\implies a = e\\text{ or }b = e$$</div>
<p>In other words, $m$ cannot be decomposed as a nontrivial product of two elements of $N$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Note</div>
<p>Every element of $N$ is a product of diagonal tensors $\\mathfrak{k} = (k,k)$. Irreducibility means the generating sequence has length exactly 1: $m = \\mathfrak{k}$ for some $k$ that is simultaneously $\\circledast$-irreducible and $\\star$-irreducible.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card 7 — Thm 4.2: Irreducibles ⟺ Twin Primes
// ═══════════════════════════════════════════════════════════════
{id:"thm-4.2",ch:"§3 Irred",badge:"b-thm",title:"Theorem 4.2 — Irreducibles $\\Longleftrightarrow$ Twin Primes",lean:`${GH}/TPC/Main.lean#L8`,body:`
<p>A pure tensor $z\\otimes w$ is irreducible in $M$ iff $z$ is $\\circledast$-irreducible and $w$ is $\\star$-irreducible. For diagonal elements $\\mathfrak{k} = (k,k) \\in N$:</p>
<div class="math-block">$$\\mathfrak{k} \\in \\mathrm{Irr}(N) \\iff \\phi(k)=6k+1 \\text{ is } \\pm\\text{prime and } \\psi(k)=6k-1 \\text{ is } \\pm\\text{prime}$$</div>
<p>i.e., $(6k-1, 6k+1)$ is a <strong>twin prime pair</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>($\\Rightarrow$) $z\\otimes w$ irreducible $\\Rightarrow$ both components irreducible:</strong></p>
<p><span class="step-num">1</span>If $z = a\\circledast b$ with $a,b\\neq 0$, then $z\\otimes w = (a\\otimes w)(b\\otimes w)$, a nontrivial factorization. Contradicts irreducibility.</p>
<p><span class="step-num">2</span>Similarly, if $w = c\\star d$ with $c,d\\neq 0$, then $z\\otimes w = (z\\otimes c)(z\\otimes d)$. Contradiction.</p>
<p><strong>($\\Leftarrow$) Both irreducible $\\Rightarrow$ $z\\otimes w$ irreducible:</strong></p>
<p><span class="step-num">3</span><strong>Left-splitting:</strong> $z\\otimes w = (a\\otimes w)(b\\otimes w)$ requires $z = a\\circledast b$. Irreducibility of $z$: $a=0$ or $b=0$. Trivial.</p>
<p><span class="step-num">4</span><strong>Right-splitting:</strong> $z\\otimes w = (z\\otimes c)(z\\otimes d)$ requires $w = c\\star d$. Irreducibility of $w$: $c=0$ or $d=0$. Trivial.</p>
<p><span class="step-num">5</span><strong>Mixed splitting:</strong> If $z\\otimes w = (a\\otimes c)(b\\otimes d)$ with $a,b,c,d \\neq 0$, apply $\\bar{f}_{q,p}$ for any primes $q,p$: the left side gives $v_q|\\phi(z)|\\cdot v_p|\\psi(w)|$; the right gives $v_q|\\phi(a)|\\cdot v_p|\\psi(c)| + v_q|\\phi(b)|\\cdot v_p|\\psi(d)|$. A single product $v_q(\\cdot)\\cdot v_p(\\cdot)$ cannot equal a sum of two such products for all choices of $(q,p)$ unless both summands are zero — but then $v_q|\\phi(a)|=0$ or $v_p|\\psi(c)|=0$ for all $q,p$, implying $|\\phi(a)|=1$ (impossible for $a\\neq 0$ integer) or $|\\psi(c)|=1$ (impossible for $c\\neq 0$ integer). Contradiction.</p>
<p>Therefore $z\\otimes w$ is irreducible. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Twin Prime Table</div>
<div class="code-block" style="margin:0"> k    φ(k)=6k+1  ψ(k)=6k-1  Twin pair?
 1       7          5       YES  (5, 7)
 2      13         11       YES  (11, 13)
 3      19         17       YES  (17, 19)
 4      25         23       NO   25 = 5²
 5      31         29       YES  (29, 31)
 7      43         41       YES  (41, 43)</div>
</div>
<p>So $|\\mathrm{Irr}(N)|=\\infty$ (restricted to diagonal tensors) is <strong>exactly</strong> the Twin Prime Conjecture.</p>
${mkVerify('thm-4.2','# For k=1..24, check φ(k)=6k+1 and |ψ(k)|=|6k-1|\nfor k in range(1, 25):\n    p1 = abs(psi(k))     # 6k-1\n    p2 = phi(k)          # 6k+1\n    twin = is_prime(p1) and is_prime(p2)\n    irred = twin         # by Thm 4.2')}`},

// ═══════════════════════════════════════════════════════════════
// Card 8 — Lem 4.3: Norm
// ═══════════════════════════════════════════════════════════════
{id:"lem-4.3",ch:"§3 Irred",badge:"b-lem",title:"Lemma 4.3 — The Norm Function",lean:`${GH}/TPC/Main.lean#L40`,body:`
<p>Define the <strong>norm</strong> on $N$ (well-defined by <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>):</p>
<div class="math-block">$$\\|\\mathfrak{k}_1 \\cdots \\mathfrak{k}_r\\| = \\prod_{i=1}^r \\phi(k_i)^2 = \\prod_{i=1}^r (6k_i+1)^2$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show properties</button>
<div class="proof-content" style="display:none">
<p><strong>N1. Non-negative:</strong> Product of squares. ✓</p>
<p><strong>N2. Identity:</strong> $\\|e\\| = 1$ (empty product). ✓</p>
<p><strong>N3. Non-degenerate:</strong> $\\|m\\|=1 \\iff$ all $(6k_i+1)^2 = 1 \\iff$ all $k_i=0 \\iff m = e$. ✓</p>
<p><strong>N4. Multiplicative:</strong> $\\|a \\cdot b\\| = \\|a\\|\\cdot\\|b\\|$. ✓</p>
<p><strong>N5. Proper factors have smaller norm:</strong> If $m = a \\cdot b$ with $a, b \\neq e$, then by N4, $\\|a\\|\\cdot\\|b\\|=\\|m\\|$. Each $|\\phi(k_i)|=|6k_i+1|\\geq 5$ for $k_i\\in\\mathbb{Z}\\setminus\\{0\\}$ (since $|6k+1|=1$ requires $k=-1/3\\notin\\mathbb{Z}$), so $\\|b\\|\\geq 25$. Hence $\\|a\\|=\\|m\\|/\\|b\\|\\leq\\|m\\|/25 < \\|m\\|$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
${mkVerify('lem-4.3','# Norm: ‖𝔨₁⋯𝔨ᵣ‖ = ∏ φ(kᵢ)²\ndef nm(*ks): return product(phi(k)**2 for k in ks)\n# N4: nm(a·b) = nm(a)·nm(b)\n# N5: if m = a·b with a,b≠e, nm(a),nm(b) < nm(m)\nassert all(nm(*a+b) == nm(*a)*nm(*b))')}`},

// ═══════════════════════════════════════════════════════════════
// Card 9 — Lem 4.4 + Cor 4.5: Covering
// ═══════════════════════════════════════════════════════════════
{id:"lem-4.4",ch:"§3 Irred",badge:"b-cor",title:"Lemma 4.4 + Corollary 4.5 — Irreducible Divisors and Covering",lean:`${GH}/TPC/Main.lean#L55`,body:`
<p><strong>Lemma 4.4:</strong> For every $m \\in N \\setminus \\{e\\}$, there exists $\\mathfrak{q} \\in \\mathrm{Irr}(N)$ with $\\mathfrak{q} \\mid m$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><strong>Strong induction on $\\|m\\|$.</strong></p>
<p><strong>Base:</strong> If $m$ is irreducible, take $\\mathfrak{q}=m$. ✓</p>
<p><strong>Step:</strong> If $m = a \\cdot b$ with $a, b \\neq e$, then $\\|a\\| < \\|m\\|$ by <a class="ilink" onclick="goToCard('lem-4.3')">N5</a>. By induction, some $\\mathfrak{q}\\in\\mathrm{Irr}(N)$ divides $a$, hence divides $m$. ✓</p>
<p><strong>Termination:</strong> $\\|m\\| \\in \\mathbb{N}$ with $\\|m\\|\\geq 25$ for $m \\neq e$. Well-ordering. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Corollary 4.5 — The Covering:</strong></p>
<div class="math-block">$$N\\setminus\\{e\\}=\\bigcup_{\\mathfrak{q}\\in\\mathrm{Irr}(N)}\\mathfrak{q} \\cdot N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><strong>($\\supseteq$):</strong> $\\mathfrak{q} \\cdot n = e$ only if $\\mathfrak{q} = e$ (no zero divisors), but $\\mathfrak{q}$ is irreducible hence $\\neq e$. So each $\\mathfrak{q} \\cdot N \\subseteq N\\setminus\\{e\\}$. ✓</p>
<p><strong>($\\subseteq$):</strong> By Lemma 4.4, every $m \\in N\\setminus\\{e\\}$ has $\\mathfrak{q} \\mid m$, so $m \\in \\mathfrak{q} \\cdot N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Analogy with Furstenberg</div>
<p>This is the exact analogue of $\\mathbb{Z}\\setminus\\{\\pm1\\} = \\bigcup_{p\\text{ prime}} p\\mathbb{Z}$ in Furstenberg's original proof.</p>
</div>
${mkVerify('lem-4.4','# Every k ∈ N∖{e} has an irreducible divisor\n# (φ(q) | φ(k) for some irreducible q)\nfor k in range(1, 14):\n    pk = phi(k)\n    divs = [q for q in irreds if pk % phi(q) == 0]\n    assert len(divs) > 0  # Lemma 4.4')}`},

// ═══════════════════════════════════════════════════════════════
// Card 10 — Def: Projected Map π and Topology on N
// ═══════════════════════════════════════════════════════════════
{id:"def-proj",ch:"§4 Topology",badge:"b-def",title:"Definition — Projected Map $\\pi$ and Topology on $N$",lean:null,body:`
<p>By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, every element of $N$ has a <strong>unique multiset representation</strong> $\\mathfrak{k}_1\\cdots\\mathfrak{k}_r$. Define the <strong>projected map</strong>:</p>
<div class="math-block">$$\\pi = (\\pi_1, \\pi_2): N \\to \\mathbb{Z}^2, \\qquad \\pi(\\mathfrak{k}_1\\cdots\\mathfrak{k}_r) = (k_1 \\circledast \\cdots \\circledast k_r,\\; k_1 \\star \\cdots \\star k_r)$$</div>
<p>with $\\pi(e) = (0, 0)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $\\pi$ is well-defined and a homomorphism</button>
<div class="proof-content" style="display:none">
<p><strong>Well-defined:</strong> By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, the multiset $\\{k_1,\\ldots,k_r\\}$ is unique. Since $\\circledast$ and $\\star$ are commutative, order doesn't matter. ✓</p>
<p><strong>Homomorphism:</strong> $\\pi_1(m \\cdot m') = \\pi_1(m) \\circledast \\pi_1(m')$ (concatenate generator sequences, then $\\circledast$-multiply). Similarly $\\pi_2$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>The projected topology on $N$:</strong> Give $N$ the <strong>initial topology</strong> from $\\pi$: a set $U \\subseteq N$ is open iff $U = \\pi^{-1}(V)$ for some open $V \\subseteq \\mathbb{Z}^2$ (Furstenberg product topology). Basic opens are intersections of two coset preimages:</p>
<div class="math-block">$$\\pi^{-1}\\bigl(a + b\\mathbb{Z}\\bigr) \\cap \\pi^{-1}\\bigl(c + d\\mathbb{Z}\\bigr) = \\pi^{-1}\\bigl((a + b\\mathbb{Z}) \\times (c + d\\mathbb{Z})\\bigr) = \\{m \\in N : \\pi_1(m) \\equiv a \\!\\!\\pmod{b},\\; \\pi_2(m) \\equiv c \\!\\!\\pmod{d}\\}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Why this topology?</div>
<p>The final topology from $\\beta: \\mathbb{Z}^2 \\to M$ only "sees" pure tensors. Products of $\\geq 2$ distinct diagonal generators are <strong>not</strong> pure tensors, so they would be isolated in the final topology — breaking the Furstenberg argument. The projected map $\\pi$ gives $N$ a non-trivial topology where every element has infinite neighborhoods.</p>
</div>
<p style="font-size:.85rem;color:var(--gray);">Key: $\\pi$ intertwines left-multiplication by $\\mathfrak{q}$ with $L_q(z,w) = (q \\circledast z,\\, q \\star w)$ on $\\mathbb{Z}^2$.</p>`},

// ═══════════════════════════════════════════════════════════════
// Card — Prop: Clopen Preimage in Initial Topology
// ═══════════════════════════════════════════════════════════════
{id:"prop-clopen-preimage",ch:"§4 Topology",badge:"b-prop",title:"Proposition — Clopen Preimage in the Initial Topology",lean:null,body:`
<p>Let $f: X \\to Y$ be a function and give $X$ the <strong>initial topology</strong> induced by $f$ (the coarsest topology making $f$ continuous). Then:</p>
<div class="math-block">$$C \\subseteq Y \\text{ clopen} \\implies f^{-1}(C) \\text{ clopen in } X.$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em></p>
<p><span class="step-num">1</span><strong>$f^{-1}(C)$ is open:</strong> Since $C$ is open in $Y$ and $f$ is continuous (by definition of the initial topology), $f^{-1}(C)$ is open in $X$. ✓</p>
<p><span class="step-num">2</span><strong>$f^{-1}(C)$ is closed:</strong> Since $C$ is closed, $C^c = Y \\setminus C$ is open. So $f^{-1}(C^c) = X \\setminus f^{-1}(C)$ is open, meaning $f^{-1}(C)$ is closed. ✓</p>
<p>Therefore $f^{-1}(C)$ is both open and closed — i.e., <strong>clopen</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-arrow-right-circle-fill me-1"></i>Application to $N$</div>
<p>Take $f = \\pi: N \\to \\mathbb{Z}^2$ and $C = S_q = (q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})$. Since $\\mathbb{Z}^2$ carries the Furstenberg product topology in which every arithmetic progression is clopen, $S_q$ is clopen. By this proposition, $\\pi^{-1}(S_q)$ is clopen in $N$ — exactly the clopenness claimed in the <a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a>.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-diagram-2 me-1"></i>Why the initial topology?</div>
<p>The initial (weak) topology is the <em>minimal</em> topology making $f$ continuous. Its open sets are exactly $\\{f^{-1}(V) : V \\text{ open in } Y\\}$. The proposition is immediate from this: clopen $=$ open $\\cap$ closed, and preimages preserve both under any continuous map.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Proposition: N is a Topological Monoid
// ═══════════════════════════════════════════════════════════════
{id:"prop-top-monoid",ch:"§4 Topology",badge:"b-prop",title:"Proposition — $N$ is a Topological Monoid",lean:null,body:`
<p>Under the <a class="ilink" onclick="goToCard('def-proj')">projected topology</a>, the multiplication $\\mu: N \\times N \\to N$ is <strong>continuous</strong>, making $(N, \\mu)$ a <strong>topological monoid</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Strategy:</strong> The projected topology is the initial topology from $\\pi: N \\to \\mathbb{Z}^2$. A map into $N$ is continuous iff its composition with $\\pi$ is continuous. So we need $\\pi \\circ \\mu: N \\times N \\to \\mathbb{Z}^2$ to be continuous.</p>
<p><span class="step-num">1</span><strong>Factor through $\\pi$:</strong> Since $\\pi$ is a <a class="ilink" onclick="goToCard('def-proj')">homomorphism</a>:</p>
<div class="math-block">$$\\pi(m \\cdot n) = \\bigl(\\pi_1(m) \\circledast \\pi_1(n),\\; \\pi_2(m) \\star \\pi_2(n)\\bigr)$$</div>
<p>So $\\pi \\circ \\mu = (\\circledast,\\, \\star) \\circ ((\\pi_1 \\times \\pi_1),\\, (\\pi_2 \\times \\pi_2))$. It suffices to show $\\circledast$ and $\\star$ are continuous in the Furstenberg topology on $\\mathbb{Z}$.</p>
<p><span class="step-num">2</span><strong>$\\circledast$ is continuous:</strong> Let $x_0 \\circledast y_0 \\in a + b\\mathbb{Z}$ (a basic open). Take $x \\in x_0 + b\\mathbb{Z}$, $y \\in y_0 + b\\mathbb{Z}$, say $x = x_0 + b\\alpha$, $y = y_0 + b\\beta$. Then:</p>
<div class="math-block">$$x \\circledast y = 6(x_0+b\\alpha)(y_0+b\\beta) + (x_0+b\\alpha) + (y_0+b\\beta) = (x_0 \\circledast y_0) + b(\\cdots) \\in a + b\\mathbb{Z}$$</div>
<p>since every cross-term contains a factor of $b$. So $\\circledast^{-1}(a+b\\mathbb{Z}) \\supseteq (x_0+b\\mathbb{Z})\\times(y_0+b\\mathbb{Z})$. ✓</p>
<p><span class="step-num">3</span><strong>$\\star$ is continuous:</strong> Identical argument with $-6$ replacing $6$. ✓</p>
<p><span class="step-num">4</span><strong>Compose:</strong> $\\pi_1, \\pi_2: N \\to \\mathbb{Z}$ are continuous by definition (initial topology). Products and compositions of continuous maps are continuous. Therefore $\\pi \\circ \\mu$ is continuous, hence $\\mu$ is continuous. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Consequence: Left translation is continuous</div>
<p>For each $\\mathfrak{q} \\in N$, the map $L_{\\mathfrak{q}}: N \\to N$, $n \\mapsto \\mathfrak{q} \\cdot n$ is continuous (restrict $\\mu$ to $\\{\\mathfrak{q}\\} \\times N$). Under $\\pi$, this corresponds to $L_q(z,w) = (q \\circledast z,\\, q \\star w)$ on $\\mathbb{Z}^2$, which maps arithmetic progressions to arithmetic progressions.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Why $\\mathfrak{q}N$ is NOT automatically closed</div>
<p>In a topological <strong>group</strong>, left translation is a homeomorphism, so $gH$ is closed for any closed subgroup $H$. But $N$ is a <strong>monoid</strong> — $L_{\\mathfrak{q}}$ is injective but not surjective, so not a homeomorphism. In the projected topology, a set is closed iff it equals $\\pi^{-1}(F)$ for closed $F$. Requiring $\\mathfrak{q}\\cdot N = \\pi^{-1}(\\cdots)$ is equivalent to the <a class="ilink" onclick="goToCard('critical')">false Coset Identity</a>. Instead, we use the <strong>containment approach</strong>: $\\mathfrak{q}\\cdot N \\subseteq \\pi^{-1}(S_q)$ with $S_q$ clopen and $e \\notin \\pi^{-1}(S_q)$.</p>
</div>
${mkVerify('prop-top-monoid','# ⊛ is continuous: (x₀+bℤ)×(y₀+bℤ) → (x₀⊛y₀)+bℤ\n# x=x₀+b·i, y=y₀+b·j ⟹ x⊛y ≡ x₀⊛y₀ (mod b)\nfor b,x0,y0 in [(3,1,2),(7,2,3),(5,4,1)]:\n    assert cts_circ(b,x0,y0)\n    # preimage of coset ⊇ coset×coset')}`},

// ═══════════════════════════════════════════════════════════════
// Card 12 — Containment Lemma (replaces false Coset Identity)
// ═══════════════════════════════════════════════════════════════
{id:"lem-proj-contain",ch:"§4 Topology",badge:"b-lem",title:"Lemma — Containment $\\mathfrak{q} \\cdot N \\subseteq \\pi^{-1}(S_q)$ and $e \\notin \\pi^{-1}(S_q)$",lean:null,body:`
<p>For each irreducible $\\mathfrak{q} = (q,q) \\in \\mathrm{Irr}(N)$, define the <strong>clopen envelope</strong>:</p>
<div class="math-block">$$S_q = (q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z}) \\subseteq \\mathbb{Z}^2$$</div>
<p>Then: <strong>(a)</strong> $\\mathfrak{q} \\cdot N \\subseteq \\pi^{-1}(S_q)$, and <strong>(b)</strong> $e \\notin \\pi^{-1}(S_q)$, and <strong>(c)</strong> $\\pi^{-1}(S_q)$ is <strong>clopen</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>(a) Containment:</strong></p>
<p><span class="step-num">1</span>Let $m = \\mathfrak{q} \\cdot n$ for $n \\in N$. Since $\\pi_1$ is a <a class="ilink" onclick="goToCard('def-proj')">homomorphism</a> (and $L_{\\mathfrak{q}}$ is <a class="ilink" onclick="goToCard('prop-top-monoid')">continuous</a>):</p>
<p>$\\pi_1(m) = q \\circledast \\pi_1(n)$, so $\\phi(\\pi_1(m)) = \\phi(q) \\cdot \\phi(\\pi_1(n))$.</p>
<p>Hence $\\phi(q) \\mid \\phi(\\pi_1(m))$, which gives $\\pi_1(m) \\in q + \\phi(q)\\mathbb{Z}$. ✓</p>
<p><span class="step-num">2</span>Similarly: $\\pi_2(m) = q \\star \\pi_2(n)$, so $\\psi(q) \\mid \\psi(\\pi_2(m))$, giving $\\pi_2(m) \\in q + \\psi(q)\\mathbb{Z}$. ✓</p>
<p><strong>(b) Identity excluded:</strong></p>
<p><span class="step-num">3</span>$\\pi(e) = (0, 0)$. Need $0 \\notin q + \\phi(q)\\mathbb{Z}$, i.e., $(6q+1) \\nmid q$. Since $q \\neq 0$ (irreducibles are non-identity) and $|6q+1| > |q|$ for all $|q| \\geq 1$, this holds. ✓</p>
<p><strong>(c) Clopenness:</strong></p>
<p><span class="step-num">4</span>$S_q$ is a product of two arithmetic progressions, hence <strong>clopen</strong> in the Furstenberg product topology on $\\mathbb{Z}^2$. By the <a class="ilink" onclick="goToCard('prop-clopen-preimage')">Clopen Preimage Proposition</a>, $\\pi^{-1}(S_q)$ is clopen in $N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="gap-box">
<div class="gap-title"><i class="bi bi-exclamation-triangle-fill me-1"></i>Important: Containment, NOT equality</div>
<p>One might hope that $\\mathfrak{q} \\cdot N = \\pi^{-1}(S_q)$, but this is <strong>false</strong>. Counterexample: $\\mathfrak{36} = (36,36)$ has $\\pi(\\mathfrak{36}) = (36, 36)$ with $36 \\equiv 1 \\pmod{7}$ and $36 \\equiv 1 \\pmod{5}$, so $\\mathfrak{36} \\in \\pi^{-1}(S_1)$, but $\\mathfrak{36} \\notin \\mathfrak{1} \\cdot N$ since the generator multiset $\\{36\\}$ does not contain $1$. The Furstenberg argument only requires the <strong>containment + exclusion of $e$</strong>, not equality. See <a class="ilink" onclick="goToCard('critical')">Critical Assessment</a>.</p>
</div>
${mkVerify('lem-proj-contain','# For irred. q, n ∈ N: π(q·n) ∈ S_q\nfor q in irreds:\n    z = circ(q, n);  w = star(q, n)\n    assert (z - q) % phi(q) == 0   # part (a)\n    assert (w - q) % psi(q) == 0   # part (a)\n    assert (0 - q) % phi(q) != 0   # e ∉ S_q')}`},

// ═══════════════════════════════════════════════════════════════
// Card 13 — Thm: Every Nonempty Open Set in N is Infinite
// ═══════════════════════════════════════════════════════════════
{id:"thm-empty-or-inf",ch:"§4 Topology",badge:"b-thm",title:"Theorem — Every Nonempty Open Set in $N$ is Infinite",lean:null,body:`
<p>In the <a class="ilink" onclick="goToCard('def-proj')">projected topology</a> on $N$:</p>
<div class="math-block">$$\\text{For any }a,b,c,d\\in\\mathbb{Z}\\text{ with }b,d\\neq 0:\\quad \\pi^{-1}\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)\\text{ is either }\\emptyset\\text{ or infinite.}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>Why this matters</div>
<p>This shows $N$ is "topologically large" — no singleton $\\{m\\}$ can be open. This is the key contradiction target in the Furstenberg argument.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em> Suppose the set is nonempty; pick $m_0 \\in N$ with $\\pi(m_0) = (z_0, w_0) \\in (a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})$. Set $D = bd$ (the product of both moduli).</p>
<p><span class="step-num">1</span><strong>Construct infinitely many elements.</strong> For each $n \\in \\mathbb{Z}$ define the generator $\\mathfrak{\\delta}_n := nD \\otimes nD \\in G$ and set $v_n := m_0 \\cdot \\mathfrak{\\delta}_n \\in N$.</p>
<p><span class="step-num">2</span><strong>$\\pi_1(v_n) \\in a + b\\mathbb{Z}$:</strong> Since $\\pi$ is a homomorphism and $b \\mid D$:</p>
<div class="math-block">$$\\pi_1(v_n) = z_0 \\circledast nD = 6z_0(nD)+z_0+nD \\equiv z_0 \\equiv a\\pmod{b}.$$</div>
<p><span class="step-num">3</span><strong>$\\pi_2(v_n) \\in c + d\\mathbb{Z}$:</strong> Since $d \\mid D$:</p>
<div class="math-block">$$\\pi_2(v_n) = w_0 \\star nD = -6w_0(nD)+w_0+nD \\equiv w_0 \\equiv c\\pmod{d}.$$</div>
<p><span class="step-num">4</span><strong>Distinct $n$ give distinct elements.</strong> Apply $\\phi$ to $\\pi_1$:</p>
<div class="math-block">$$\\phi(\\pi_1(v_n)) = \\phi(z_0 \\circledast nD) = \\phi(z_0)\\cdot\\phi(nD) = \\phi(z_0)(6nD+1).$$</div>
<p>Since $\\phi(z_0) = 6z_0+1 \\neq 0$ for all $z_0 \\in \\mathbb{Z}$, distinct $n$ give distinct $\\phi(\\pi_1(v_n))$, hence distinct $v_n \\in N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Logical structure</div>
<p>Uses: <span class="depends-badge">$\\pi$ is a homomorphism</span> <span class="depends-badge">$G \\ni \\mathfrak{(nbd)}$ for all $n$</span> <span class="depends-badge">$\\phi(z_0) \\neq 0$ for injectivity</span></p>
</div>
${mkVerify('thm-empty-or-inf','# Basic open (a+bℤ)×(c+dℤ): if nonempty → infinite\n# vₙ = m₀·(nD⊗nD), D=bd\nfor z0,w0,b,d in cases:\n    D = b*d\n    seq = [(circ(z0,n*D),star(w0,n*D)) for n in range(10)]\n    assert all((z-z0)%b==0 and (w-w0)%d==0 for z,w in seq)\n    assert len(set(seq)) == 10')}`},

// ═══════════════════════════════════════════════════════════════
// Card — Thm: Furstenberg's Irreducible Infinitude Recipe
// ═══════════════════════════════════════════════════════════════
{id:"thm-furstenberg-recipe",ch:"§5 Proof",badge:"b-thm",title:"Theorem — Furstenberg's Irreducible Infinitude Recipe",lean:null,body:`
<p>Let $(M, \\cdot)$ be a <strong>topological monoid</strong> with identity $e$. Suppose:</p>
<div class="math-block">$$\\textbf{(R1)}\\quad M\\setminus\\{e\\} = \\bigcup_{q\\,\\in\\,\\mathrm{Irr}(M)} q\\cdot M \\quad\\text{(irreducibles cover non-identity)}$$</div>
<div class="math-block">$$\\textbf{(R2)}\\quad \\forall\\, q\\in\\mathrm{Irr}(M),\\; \\exists\\text{ clopen }C_q\\subseteq M:\\quad q\\cdot M\\subseteq C_q\\text{ and }e\\notin C_q$$</div>
<div class="math-block">$$\\textbf{(R3)}\\quad \\text{Every nonempty open set in }M\\text{ is infinite.}$$</div>
<p>Then $|\\mathrm{Irr}(M)| = \\infty$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof by contradiction.</em> Assume $\\mathrm{Irr}(M)$ is finite, say $\\mathrm{Irr}(M) = \\{q_1,\\ldots,q_m\\}$.</p>
<p><span class="step-num">1</span>By (R2), each $q_i$ has a clopen $C_{q_i}$ with $q_i\\cdot M \\subseteq C_{q_i}$ and $e\\notin C_{q_i}$.</p>
<p><span class="step-num">2</span>By (R1): $M\\setminus\\{e\\} \\subseteq \\bigcup_{i=1}^m q_i\\cdot M \\subseteq \\bigcup_{i=1}^m C_{q_i}$.</p>
<p><span class="step-num">3</span>Since $e\\notin C_{q_i}$ for all $i$, we have $e\\notin \\bigcup C_{q_i}$. Combined with step 2: $M\\setminus\\bigcup_{i=1}^m C_{q_i} = \\{e\\}$.</p>
<p><span class="step-num">4</span>A finite union of clopen sets is clopen, so $\\bigcup C_{q_i}$ is clopen, hence its complement $\\{e\\}$ is clopen — in particular <strong>open</strong>.</p>
<p><span class="step-num">5</span>But $\\{e\\}$ is a nonempty finite (singleton) open set, <strong>contradicting (R3)</strong>.</p>
<p>Therefore $|\\mathrm{Irr}(M)| = \\infty$. <span class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</span></p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>The abstract Furstenberg pattern</div>
<p>Furstenberg's original 1955 proof of infinitely many primes uses $M = (\\mathbb{Z}, \\cdot)$ with the arithmetic-progression topology. (R1) is Euclid's lemma, (R2) uses $p\\mathbb{Z}$ as the clopen envelope with $0\\notin p\\mathbb{Z}$, and (R3) is immediate since $|a + b\\mathbb{Z}| = \\infty$. This recipe extracts the abstract skeleton valid for any topological monoid satisfying the three hypotheses.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Prop: N Satisfies the Recipe
// ═══════════════════════════════════════════════════════════════
{id:"prop-n-satisfies",ch:"§5 Proof",badge:"b-prop",title:"Proposition — $N$ Satisfies Furstenberg's Recipe",lean:null,body:`
<p>The topological monoid $N$ satisfies all three hypotheses of the <a class="ilink" onclick="goToCard('thm-furstenberg-recipe')">Irreducible Infinitude Recipe</a>:</p>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R1) Covering</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('lem-4.4')">Lemma 4.4 + Corollary 4.5</a>.</p>
<p>Every $m\\in N\\setminus\\{e\\}$ has an irreducible divisor $\\mathfrak{q}$, so $m\\in\\mathfrak{q}\\cdot N$. Thus $N\\setminus\\{e\\} = \\bigcup_{\\mathfrak{q}\\in\\mathrm{Irr}(N)} \\mathfrak{q}\\cdot N$. ✓</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R2) Clopen Envelopes</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a> + <a class="ilink" onclick="goToCard('prop-clopen-preimage')">Clopen Preimage Proposition</a>.</p>
<p>For each irreducible $\\mathfrak{q}=(q,q)$, take $C_q = \\pi^{-1}(S_q)$ where $S_q=(q+\\phi(q)\\mathbb{Z})\\times(q+\\psi(q)\\mathbb{Z})$. Then:</p>
<ul style="margin:.4rem 0 0 1rem;line-height:1.9">
<li>$\\mathfrak{q}\\cdot N\\subseteq C_q$ — containment, part (a). ✓</li>
<li>$e\\notin C_q$ — identity excluded, part (b). ✓</li>
<li>$C_q$ is clopen — $S_q$ is clopen in $\\mathbb{Z}^2$ (arithmetic progressions), so $\\pi^{-1}(S_q)$ is clopen by the clopen preimage proposition. ✓</li>
</ul>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R3) No Finite Nonempty Open Sets</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>.</p>
<p>Every nonempty basic open set $\\pi^{-1}((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z}))$ in $N$ is infinite. ✓</p>
</div>
<p><strong>Conclusion:</strong> By the <a class="ilink" onclick="goToCard('thm-furstenberg-recipe')">Irreducible Infinitude Recipe</a>: $|\\mathrm{Irr}(N)| = \\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>All three hypotheses verified — Recipe applies</div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Thm 5.2: |Irr(N)| = ∞ (Corrected Furstenberg Argument)
// ═══════════════════════════════════════════════════════════════
{id:"thm-5.2",ch:"§5 Proof",badge:"b-thm",title:"Theorem 5.2 — $|\\mathrm{Irr}(N)|=\\infty$ (The Furstenberg Argument)",lean:`${GH}/TPC/Main.lean#L88`,body:`
<div class="math-block">$$|\\mathrm{Irr}(N)| = \\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof by contradiction.</strong> Assume $\\mathrm{Irr}(N)$ is finite: $\\mathrm{Irr}(N)=\\{\\mathfrak{q}_1,\\ldots,\\mathfrak{q}_m\\}$.</p>
<p><span class="step-num">1</span><strong>Clopen envelopes (<a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a>):</strong> For each $i$, define $C_i = \\pi^{-1}(S_{q_i})$ where $S_{q_i} = (q_i + \\phi(q_i)\\mathbb{Z}) \\times (q_i + \\psi(q_i)\\mathbb{Z})$. Each $C_i$ is <strong>clopen</strong> in the projected topology.</p>
<p><span class="step-num">2</span><strong>Containment:</strong> $\\mathfrak{q}_i \\cdot N \\subseteq C_i$ for each $i$.</p>
<p><span class="step-num">3</span><strong>Apply covering (<a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>):</strong> $N\\setminus\\{e\\} = \\bigcup_{i=1}^{m} \\mathfrak{q}_i \\cdot N \\subseteq \\bigcup_{i=1}^{m} C_i$.</p>
<p><span class="step-num">4</span><strong>Identity excluded:</strong> $e \\notin C_i$ for any $i$ (by the Containment Lemma, part (b)).</p>
<p><span class="step-num">5</span><strong>Pinch:</strong> From steps 3–4: every non-identity element of $N$ is in $\\bigcup C_i$, and $e$ is not. Therefore $N \\setminus \\bigcup_{i=1}^m C_i = \\{e\\}$.</p>
<p><span class="step-num">6</span><strong>Finite union of clopen = clopen:</strong> $\\bigcup_{i=1}^m C_i$ is clopen (finite union).</p>
<p><span class="step-num">7</span><strong>Complement is clopen:</strong> $\\{e\\} = N \\setminus \\bigcup C_i$ is clopen, hence <strong>open</strong>.</p>
<p><span class="step-num">8</span><strong>Contradiction:</strong> By the <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>, every nonempty open set in $N$ is infinite. But $\\{e\\}$ is a singleton. <strong>Contradiction!</strong></p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $|\\mathrm{Irr}(N)|=\\infty$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Proof Ingredients</div>
<p>This proof uses exactly four facts:</p>
<p><span class="depends-badge"><a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a>: $\\mathfrak{q}\\cdot N \\subseteq C_q$, $e \\notin C_q$, $C_q$ clopen</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>: covering</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('thm-empty-or-inf')">Thm ∅/∞</a>: no finite open</span> <span class="depends-badge">Finite union of clopen = clopen</span></p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Key insight: equality not needed</div>
<p>Unlike Furstenberg's original proof where each $p\\mathbb{Z}$ is <em>exactly</em> clopen, here we only need each $\\mathfrak{q} \\cdot N$ to be <em>contained in</em> a clopen set that excludes $e$. The "pinch" argument (step 5) then forces $\\{e\\}$ to be the complement.</p>
</div>
${mkVerify('thm-5.2','# Suppose Irr(N) finite = {q₁,…,qₘ}\n# Each Cᵢ = π⁻¹(Sᵢ) is clopen, e∉Cᵢ\n# N∖{e} ⊆ ∪Cᵢ → {e} = N∖∪Cᵢ is open → ⊥\nfor m in [3, 5, 8, 12]:\n    sub = irreds[:m]\n    e_excl = all((0-q)%phi(q)!=0 for q in sub)')}`},

// ═══════════════════════════════════════════════════════════════
// Card 15 — Cor 5.3: TPC ∎
// ═══════════════════════════════════════════════════════════════
{id:"cor-5.3",ch:"§5 Proof",badge:"b-cor",title:"Corollary 5.3 — Infinitely Many Twin Primes $\\blacksquare$",lean:`${GH}/TPC/Main.lean#L110`,body:`
<div class="math-block">$$\\bigl|\\{k\\in\\mathbb{Z}:6k-1\\in\\pm\\mathbb{P}\\text{ and }6k+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>By <a class="ilink" onclick="goToCard('thm-4.2')">Theorem 4.2</a>: $\\mathrm{Irr}(N) = \\{(k,k) : 6k+1\\in\\pm\\mathbb{P}\\text{ and }6k-1\\in\\pm\\mathbb{P}\\}$.</p>
<p>By <a class="ilink" onclick="goToCard('thm-5.2')">Theorem 5.2</a>: $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p>For each such $k>0$, the pair $(6k-1, 6k+1)$ is a <strong>twin prime pair</strong>.</p>
<p>Since infinitely many such $k$ exist, there are <strong>infinitely many twin prime pairs</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — Twin Prime Conjecture ∎</div>
</div>
<p><strong>Complete logical chain:</strong></p>
<p style="font-size:.92rem;line-height:2;">
<span class="depends-badge"><a class="ilink" onclick="goToCard('def-1.1')">Def 1.1</a>: $\\circledast,\\star$</span>
<span style="color:var(--purple);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('thm-1.3')">Thm 1.3</a>: $\\phi,\\psi$ isos</span>
<span style="color:var(--purple);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('def-2.1')">Def 2.1</a>: $M, N$</span>
<span style="color:var(--blue);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4</a>: Unique rep</span>
<span style="color:var(--blue);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('def-proj')">Def $\\pi$</a>: Topology</span>
<span style="color:var(--green);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('lem-proj-contain')">Contain.</a> + <a class="ilink" onclick="goToCard('lem-4.4')">Cover</a> + <a class="ilink" onclick="goToCard('thm-empty-or-inf')">∅/∞</a></span>
<span style="color:var(--orange);font-weight:bold"> → </span>
<span class="depends-badge" style="background:var(--purple-light);border-color:var(--purple);">★ <a class="ilink" onclick="goToCard('thm-5.2')">Thm 5.2</a></span>
<span style="color:var(--purple);font-weight:bold"> → </span>
<span class="depends-badge" style="background:var(--green-light);border-color:var(--green);">★ Twin Primes ∎</span>
</p>

from itertools import combinations_with_replacement

def phi(x):     return 6*x + 1
def psi_abs(x): return abs(6*x - 1)
def circ(x, y): return 6*x*y + x + y
def star(x, y): return -6*x*y + x + y

def v(p, n):
    n = abs(n)
    if n == 0: return 999
    c = 0
    while n % p == 0: n //= p; c += 1
    return c

def f(q, p, z, w):
    return v(q, abs(phi(z))) * v(p, psi_abs(w))

def is_prime(n):
    if n < 2: return False
    if n == 2: return True
    if n % 2 == 0: return False
    for i in range(3, int(n**0.5)+1, 2):
        if n % i == 0: return False
    return True

p_primes = all_primes  # primes dividing |psi(w)| — any residue class

# ──── 1. Bilinearity ────────────────────────────────────────
print("1. Bilinearity of f_{q,p}")
print("   f(a*b, w) = f(a,w)+f(b,w)  and  f(z, c*d) = f(z,c)+f(z,d)")
R = range(-5, 6); fails = 0; total = 0
for q in [7, 13]:
    for p in [5, 11]:
        for a in R:
            for b in R:
                for w in R:
                    if f(q,p,circ(a,b),w) != f(q,p,a,w) + f(q,p,b,w): fails += 1
                    total += 1
                for z in R:
                    if f(q,p,z,star(a,b)) != f(q,p,z,a) + f(q,p,z,b): fails += 1
                    total += 1
print(f"   {total} checks | failures: {fails} | {'PASS' if not fails else 'FAIL'}")

# ──── 2. Generator Separation ───────────────────────────────
print()
print("2. Separation of Generators")
print("   For all k != l in [-10,10]\\{0}, exists (q,p): f_{q,p}(k,k) != f_{q,p}(l,l)")
K = [k for k in range(-10, 11) if k != 0]
unsep = []; total = 0
for i, k in enumerate(K):
    for l in K[i+1:]:
        total += 1
        sep = next(((q,p) for q in q_primes for p in p_primes
                    if f(q,p,k,k) != f(q,p,l,l)), None)
        if sep is None:
            unsep.append((k, l))
        elif total <= 5:
            print(f"   k={k:3d}, l={l:3d}  separated by q={sep[0]}, p={sep[1]}  "
                  f"  f(k,k)={f(sep[0],sep[1],k,k)}, f(l,l)={f(sep[0],sep[1],l,l)}")
print(f"   ... ({total} pairs total)")
print(f"   Unseparated: {len(unsep)} | {'ALL SEPARATED' if not unsep else 'GAPS: '+str(unsep)}")

# ──── 3. Unique Multiset Representation ─────────────────────
print()
print("3. Prop 2.4.5 -- Unique Multiset Representation (small cases)")
print("   Distinct multisets of size <= 4 from {1..8} give distinct (circ-prod, star-prod)")

def ms_prod(ms):
    z = w = 0
    for k in ms: z = circ(z, k); w = star(w, k)
    return (z, w)

seen = {}; collisions = []
for size in range(1, 5):
    for ms in combinations_with_replacement(range(1, 9), size):
        prod = ms_prod(ms)
        if prod in seen and seen[prod] != ms:
            collisions.append((seen[prod], ms, prod))
        else:
            seen[prod] = ms
print(f"   {len(seen)} distinct products | collisions: {len(collisions)} | {'PASS' if not collisions else 'COLLISION FOUND'}")
if collisions:
    for a, b, p in collisions[:3]:
        print(f"   !! {a} and {b} both map to {p}")

# ──── 4. UFD Proof: φ maps irreducibles to distinct primes ───
print()
print("4. Irreducible Generators — φ(q) is prime, φ is injective on Irr(N)")
print("   (This is the exact mechanism used in the Prop 2.4.5 proof)")
irreds = [(k, phi(k), psi_abs(k))
          for k in range(-30, 31) if k != 0
          and is_prime(abs(phi(k))) and is_prime(psi_abs(k))]
phi_vals = [abs(p) for k, p, ps in irreds]
distinct = len(phi_vals) == len(set(phi_vals))
print(f"   Irreducibles q in [-30,30]\\{{0}}: {len(irreds)} found")
print(f"   First 6: {[(k, p) for k, p, ps in irreds[:6]]}")
print(f"   φ-values on irreducibles are distinct primes: {'YES' if distinct else 'NO'}")
# Verify: two products of irreducibles equal ⟹ same multiset (UFD in Z)
from functools import reduce
import operator
def prod_list(lst): return reduce(operator.mul, lst, 1)
ufd_ok = True
irr_ks = [k for k, p, ps in irreds[:10]]
for i, a in enumerate(irr_ks):
    for b in irr_ks[i:]:
        for c in irr_ks:
            for d in irr_ks[irr_ks.index(c):]:
                if prod_list([phi(a), phi(b)]) == prod_list([phi(c), phi(d)]):
                    if sorted([a, b]) != sorted([c, d]):
                        ufd_ok = False
                        print(f"   !! UFD failure: phi({a})*phi({b}) = phi({c})*phi({d})")
print(f"   UFD uniqueness (products of 2 irreducibles, first 10): {'PASS' if ufd_ok else 'FAIL'}")

# ──── Summary ────────────────────────────────────────────────
print()
print("Summary")
ok = not fails and not unsep and not collisions and ufd_ok
print(f"   All checks: {'PASS' if ok else 'ISSUES FOUND -- see above'}")
