<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[

{ch:"Abstract",badge:"b-abs",title:"Abstract вҖ” The Coset Topology Approach",lean:null,body:`
<p>We prove there are <strong>infinitely many twin prime pairs</strong> via the submonoid $N=\\langle G\\rangle\\leqslant M=(\\mathbb{Z}^2,\\otimes)$ where $G=\\{(k,k):k\\in\\mathbb{Z}\\}$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Core Strategy</div>
<p>We transfer the twin-prime question into an algebraic/topological setting where Furstenberg's classic proof-technique applies. The map $\\phi(x)=6x+1$ converts the monoid $(\\mathbb{Z},\\circledast)$ into ordinary multiplication in $6\\mathbb{Z}+1$. Irreducible elements of $N$ correspond exactly to twin prime pairs.</p>
</div>
<p><strong>Key identity:</strong> For each irreducible $\\widehat{q}\\in\\mathrm{Irr}(N)$:</p>
<div class="math-block">$$\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)$$</div>
<p>Since $\\widehat{q}\\otimes M$ is a <strong>product of two arithmetic progressions</strong> (hence clopen in the Furstenberg product topology on $M$), each coset $\\widehat{q}\\otimes N$ is <strong>clopen in $N$</strong>. The Furstenberg argument then forces $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p><strong>Additionally:</strong> We prove that $N\\cap(a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})$ is either <strong>empty or infinite</strong> вҖ” a fundamental property of $N$'s interaction with the Furstenberg topology that underpins the entire argument.</p>
<div class="d-flex flex-wrap gap-1 mt-3">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tag"><i class="bi bi-stars me-1"></i>Twin Primes</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tag"><i class="bi bi-clock-history me-1"></i>Furstenberg 1955</a>
<a href="https://leanprover.github.io/" target="_blank" class="tag"><i class="bi bi-braces me-1"></i>Lean 4</a>
<a href="https://en.wikipedia.org/wiki/Monoid" target="_blank" class="tag"><i class="bi bi-diagram-3 me-1"></i>Monoid Theory</a>
</div>`},

{ch:"В§1 Ops",badge:"b-def",title:"Definition 1.1 вҖ” Operations $\\mathbin{\\circledast}$ and $\\mathbin{\\star}$",lean:`${GH}/TPC/Basic.lean#L10`,body:`
<p>Define two binary operations on $\\mathbb{Z}$:</p>
<div class="math-block">$$x\\mathbin{\\circledast}y=6xy+x+y\\qquad x\\mathbin{\\star}y=-6xy+x+y$$</div>
<p>Both have <strong>identity element $0$</strong>: one checks $x\\mathbin{\\circledast}0 = 6\\cdot x\\cdot 0 + x + 0 = x$ and similarly for $\\mathbin{\\star}$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Why these operations?</div>
<p>They arise from "transporting" ordinary multiplication through the maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$. Every integer $n\\equiv 1\\pmod{6}$ has the form $\\phi(x)$ for a unique $x$, and every $n\\equiv 5\\pmod{6}$ (equivalently $n\\equiv -1\\pmod{6}$) has the form $\\psi(x)$. Since all primes $>3$ satisfy $p\\equiv\\pm1\\pmod{6}$, these operations capture the multiplicative structure of primes in the correct residue classes.</p>
</div>
<div class="code-block">def mstar (x y : в„Ө) : в„Ө := 6 * x * y + x + y
def sstar (x y : в„Ө) : в„Ө := -6 * x * y + x + y</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Computation Table</div>
<div class="code-block" style="margin:0"> x    y   xвҠӣy   xвӢҶy    ПҶ(xвҠӣy)       Check
 1    1     8    -4      49      = 7В·7 = ПҶ(1)ВІ
 2    3    41   -31     247      = 13В·19 = ПҶ(2)В·ПҶ(3)
-1   -1     4    -8      25      = (-5)В·(-5) = ПҶ(-1)ВІ
 1   -1    -6     0     -35      = 7В·(-5) = ПҶ(1)В·ПҶ(-1)
 0    x     x     x    6x+1      identity вң“</div>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show associativity proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof of associativity for $\\circledast$:</strong></p>
<p>$(x\\circledast y)\\circledast z = 6(6xy+x+y)z+(6xy+x+y)+z$</p>
<p>$= 36xyz+6xz+6yz+6xy+x+y+z$</p>
<p>$x\\circledast(y\\circledast z) = 6x(6yz+y+z)+x+(6yz+y+z)$</p>
<p>$= 36xyz+6xy+6xz+x+6yz+y+z$</p>
<p>Both equal $36xyz+6xy+6xz+6yz+x+y+z$. Commutativity: $x\\circledast y = 6xy+x+y = 6yx+y+x = y\\circledast x$. The $\\star$ case is identical with $-6$ replacing $6$ in the leading term.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{ch:"В§1 Ops",badge:"b-thm",title:"Theorem 1.3 вҖ” Isomorphisms $\\phi$ and $\\psi$",lean:`${GH}/TPC/Basic.lean#L38`,body:`
<p>The maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ are <strong>monoid isomorphisms</strong>:</p>
<div class="math-block">$$\\phi:(\\mathbb{Z},\\circledast)\\xrightarrow{\\sim}(6\\mathbb{Z}+1,\\cdot)\\qquad\\psi:(\\mathbb{Z},\\star)\\xrightarrow{\\sim}(6\\mathbb{Z}-1,\\bullet)$$</div>
<p>where $a\\bullet b = -(ab)$ on $6\\mathbb{Z}-1$. Both are bijections: $\\phi^{-1}(n)=\\frac{n-1}{6}$, $\\psi^{-1}(n)=\\frac{n+1}{6}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>$\\phi$ is multiplicative:</strong></p>
<p>$\\phi(x\\circledast y) = 6(6xy+x+y)+1 = 36xy+6x+6y+1 = (6x+1)(6y+1) = \\phi(x)\\cdot\\phi(y)$.</p>
<p><strong>$\\phi$ is a bijection onto $6\\mathbb{Z}+1$:</strong></p>
<p>If $n\\in 6\\mathbb{Z}+1$ then $n=6k+1$ for some $k\\in\\mathbb{Z}$, so $\\phi(k)=n$. Injectivity: $\\phi(x)=\\phi(y)\\Rightarrow 6x+1=6y+1\\Rightarrow x=y$.</p>
<p><strong>$\\psi$ is multiplicative (with $\\bullet$):</strong></p>
<p>$\\psi(x\\star y)=6(-6xy+x+y)-1=-36xy+6x+6y-1=-[(6x-1)(6y-1)]$.</p>
<p>And $\\psi(x)\\bullet\\psi(y) = -[(6x-1)(6y-1)]$. Equal. вң“</p>
<p><strong>$\\psi$ is a bijection onto $6\\mathbb{Z}-1$:</strong> same argument as $\\phi$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-lightning-charge me-1"></i>Key Consequence</div>
<p>$x$ is <strong>$\\circledast$-irreducible</strong> (cannot be written as $a\\circledast b$ with $a,b\\neq 0$) $\\iff$ $\\phi(x)=6x+1$ is <strong>prime</strong> in $\\mathbb{Z}$ (up to sign). This is because $\\phi$ converts $\\circledast$-factorizations into ordinary factorizations in $6\\mathbb{Z}+1$.</p>
</div>
<div class="code-block">lemma ПҶ_mul (x y : в„Ө) : ПҶ (x вҠӣ y) = ПҶ x * ПҶ y := by
  simp [ПҶ, mstar]; ring

lemma ПҲ_mul (x y : в„Ө) : ПҲ (x вӢҶ y) = -(ПҲ x * ПҲ y) := by
  simp [ПҲ, sstar]; ring</div>`},

{ch:"В§1 Ops",badge:"b-lem",title:"Lemma 1.4 вҖ” No Zero Divisors",lean:`${GH}/TPC/Basic.lean#L62`,body:`
<p><strong>Statement:</strong> If $u,v\\neq 0$ then $u\\mathbin{\\circledast}v\\neq 0$ and $u\\mathbin{\\star}v\\neq 0$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>For $\\circledast$:</strong> Suppose $u\\circledast v = 0$. Applying $\\phi$:</p>
<p>$\\phi(u\\circledast v) = \\phi(u)\\phi(v) = (6u+1)(6v+1) = \\phi(0) = 1$.</p>
<p>In $\\mathbb{Z}$, $ab=1$ forces $a=b=1$ or $a=b=-1$.</p>
<p><strong>Case 1:</strong> $6u+1=6v+1=1 \\Rightarrow u=v=0$. Contradicts $u\\neq 0$.</p>
<p><strong>Case 2:</strong> $6u+1=6v+1=-1 \\Rightarrow u=v=-1/3\\notin\\mathbb{Z}$. Impossible.</p>
<p><strong>For $\\star$:</strong> Suppose $u\\star v = 0$. Applying $\\psi$:</p>
<p>$\\psi(u\\star v) = -\\psi(u)\\psi(v) = -(6u-1)(6v-1)$. And $\\psi(0) = -1$.</p>
<p>So $(6u-1)(6v-1) = 1$, giving $6u-1=6v-1=\\pm1$, so $u=v=0$ or $u=v=1/3\\notin\\mathbb{Z}$. Either way contradiction.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Where this is used</div>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i>Thm 3.2</span> Prime divisibility in the coset identity proof</p>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i>Lem 3.4</span> Injectivity of left multiplication $L_{\\widehat{q}}$</p>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i>Thm NEW</span> Emptiness-or-infinitude of $N\\cap$ basic opens</p>
</div>
<div class="code-block">lemma mstar_no_zero_div (u v : в„Ө) (hu : u вү  0) (hv : v вү  0) :
    mstar u v вү  0 := by
  intro h; have := ПҶ_mul u v; rw [h] at this
  simp [ПҶ] at this; omega</div>`},

{ch:"В§2 Monoid",badge:"b-def",title:"Definition 2.1вҖ“2.2 вҖ” Product Monoid $M$, Generators $G$, Submonoid $N$",lean:`${GH}/TPC/Monoid.lean#L10`,body:`
<p><strong>Definition 2.1.</strong> The <strong>product monoid</strong>:</p>
<div class="math-block">$$M = (\\mathbb{Z}^2, \\otimes),\\quad (x_1,x_2)\\otimes(y_1,y_2) = (x_1\\circledast y_1,\\; x_2\\star y_2),\\quad \\mathbf{1}_M=(0,0)$$</div>
<p><strong>Definition 2.2.</strong> The <strong>generating set</strong> is the diagonal:</p>
<div class="math-block">$$G=\\{(k,k):k\\in\\mathbb{Z}\\}\\qquad N=\\langle G\\rangle = \\{\\Delta(k_1)\\otimes\\cdots\\otimes\\Delta(k_r) : r\\geq 0,\\; k_i\\in\\mathbb{Z}\\}$$</div>
<p>where $\\Delta(k)=(k,k)$. Elements of $N$ have the form $(z,w)$ where:</p>
<div class="math-block">$$z = k_1\\circledast\\cdots\\circledast k_r,\\qquad w = k_1\\star\\cdots\\star k_r$$</div>
<p>built from the <strong>same sequence</strong> $k_1,\\ldots,k_r$ under different operations. In general $z\\neq w$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $N$ is a submonoid</button>
<div class="proof-content" style="display:none">
<p><strong>Identity:</strong> The empty product ($r=0$) gives $(0,0)\\in N$. вң“</p>
<p><strong>Closure:</strong> If $(z,w)$ comes from sequence $k_1,\\ldots,k_r$ and $(z',w')$ from $k_1',\\ldots,k_s'$, then $(z,w)\\otimes(z',w')$ comes from the concatenated sequence $k_1,\\ldots,k_r,k_1',\\ldots,k_s'$. This is because $\\circledast$ and $\\star$ are associative, so:</p>
<p>$(k_1\\circledast\\cdots\\circledast k_r)\\circledast(k_1'\\circledast\\cdots\\circledast k_s') = k_1\\circledast\\cdots\\circledast k_r\\circledast k_1'\\circledast\\cdots\\circledast k_s'$</p>
<p>and similarly for $\\star$. вң“</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Generator Products</div>
<div class="code-block" style="margin:0">О”(1)вҠ—О”(1)   = (1вҠӣ1, 1вӢҶ1)   = (8, -4)
О”(1)вҠ—О”(2)   = (1вҠӣ2, 1вӢҶ2)   = (15, -9)
О”(2)вҠ—О”(3)   = (2вҠӣ3, 2вӢҶ3)   = (41, -31)
О”(0)вҠ—О”(k)   = (0вҠӣk, 0вӢҶk)   = (k, k)  вҶҗ identity!
О”(1)вҠ—О”(1)вҠ—О”(1) = (1вҠӣ1вҠӣ1, 1вӢҶ1вӢҶ1) = (1вҠӣ8, 1вӢҶ(-4)) = (57, -27)</div>
</div>`},

{ch:"В§2 Monoid",badge:"b-prop",title:"Proposition 2.3 вҖ” $M$ is a Topological Monoid",lean:`${GH}/TPC/Monoid.lean#L55`,body:`
<p>Equip $\\mathbb{Z}$ with the <strong>Furstenberg topology</strong>: the basis consists of all arithmetic progressions $a+b\\mathbb{Z}$ with $b\\neq 0$, each of which is clopen. Give $M=\\mathbb{Z}^2$ the product topology. Then $(M,\\otimes)$ is a <strong>topological monoid</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>We must show $\\otimes:M\\times M\\to M$ is continuous. Since $\\otimes=(\\circledast,\\star)$ component-wise, it suffices to show each of $\\circledast$ and $\\star$ is continuous $\\mathbb{Z}\\times\\mathbb{Z}\\to\\mathbb{Z}$.</p>
<p><strong>Continuity of $\\circledast$:</strong> Let $(x_0,y_0)\\in\\mathbb{Z}^2$ and let $a+b\\mathbb{Z}$ be a basic open neighborhood of $x_0\\circledast y_0$. We need a neighborhood $U\\times V$ of $(x_0,y_0)$ mapping into $a+b\\mathbb{Z}$.</p>
<p>Take $U=x_0+b\\mathbb{Z}$, $V=y_0+b\\mathbb{Z}$. For $x=x_0+bs$, $y=y_0+bt$:</p>
<p>$x\\circledast y - x_0\\circledast y_0 = (6y_0+1)\\cdot bs + (6x_0+1)\\cdot bt + 6b^2st$</p>
<p>$= b\\bigl[(6y_0+1)s + (6x_0+1)t + 6b\\cdot st\\bigr] \\equiv 0\\pmod{b}$</p>
<p>So $x\\circledast y \\equiv x_0\\circledast y_0 \\equiv a \\pmod{b}$. Hence $U\\times V$ maps into $a+b\\mathbb{Z}$. вң“</p>
<p><strong>Continuity of $\\star$:</strong> Identical argument with $-6$ replacing $6$ in the leading term. The correction term $(-6y_0-1)bs+(-6x_0-1)bt+(-6)b^2st$ is still divisible by $b$. вң“</p>
<p>Therefore $\\otimes = \\circledast\\times\\star$ is continuous, making $(M,\\otimes)$ a topological monoid.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Consequence</div>
<p>Left multiplication $L_{\\widehat{q}}(\\widehat{x})=\\widehat{q}\\otimes\\widehat{x}$ is <strong>continuous</strong> for any fixed $\\widehat{q}$. Combined with injectivity (Lem 1.4), $L_{\\widehat{q}}$ is a homeomorphism onto its image when $\\widehat{q}\\neq(0,0)$.</p>
</div>`},

{ch:"В§3 Coset",badge:"b-lem",title:"Lemma 3.1 вҖ” $\\widehat{a}\\otimes M$ is Clopen",lean:`${GH}/TPC/CosetTopology.lean#L15`,body:`
<p>For $\\widehat{a}=(a_1,a_2)\\neq(0,0)$:</p>
<div class="math-block">$$\\widehat{a}\\otimes M=(a_1+(6a_1+1)\\mathbb{Z})\\times(a_2+(6a_2-1)\\mathbb{Z})$$</div>
<p>A <strong>product of two arithmetic progressions</strong> вҖ” each factor is clopen in the Furstenberg topology, hence the product is <strong>clopen in $M$</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>First component:</strong> $\\{a_1\\circledast x : x\\in\\mathbb{Z}\\}$. Applying $\\phi$:</p>
<p>$\\phi(a_1\\circledast x) = \\phi(a_1)\\phi(x) = (6a_1+1)(6x+1)$.</p>
<p>As $x$ ranges over $\\mathbb{Z}$, $6x+1$ ranges over all of $6\\mathbb{Z}+1$. So the image under $\\phi$ is $(6a_1+1)\\cdot(6\\mathbb{Z}+1) = (6a_1+1) + 6(6a_1+1)\\mathbb{Z}$.</p>
<p>Pulling back through $\\phi^{-1}$: $a_1+(6a_1+1)\\mathbb{Z}$. вң“</p>
<p><strong>Second component:</strong> $\\{a_2\\star x : x\\in\\mathbb{Z}\\}$. Similarly via $\\psi$:</p>
<p>$\\psi(a_2\\star x) = -(6a_2-1)(6x-1)$. As $x$ ranges over $\\mathbb{Z}$, $6x-1$ ranges over $6\\mathbb{Z}-1$.</p>
<p>The image is $\\{-(6a_2-1)m : m\\in 6\\mathbb{Z}-1\\}$. Pulling back: $a_2+(6a_2-1)\\mathbb{Z}$. вң“</p>
<p><strong>Clopenness:</strong> Each arithmetic progression $a+b\\mathbb{Z}$ (with $b\\neq 0$) is clopen in the Furstenberg topology. Products of clopen sets are clopen in the product topology.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Explicit Cosets</div>
<div class="code-block" style="margin:0">(1,1) вҠ— M = (1+7в„Ө) Г— (1+5в„Ө)
           = {...,вҲ’6,1,8,15,22,...} Г— {...,вҲ’4,1,6,11,16,...}
(2,2) вҠ— M = (2+13в„Ө) Г— (2+11в„Ө)
(5,5) вҠ— M = (5+31в„Ө) Г— (5+29в„Ө)

Step sizes: 6aвӮҒ+1 = ПҶ(aвӮҒ), 6aвӮӮвҲ’1 = ПҲ(aвӮӮ)  вҶҗ the isomorphism values!</div>
</div>`},

{ch:"В§3 Coset",badge:"b-thm",title:"Theorem 3.2 вҖ” The Coset Identity (The Key Lemma)",lean:`${GH}/TPC/CosetTopology.lean#L45`,body:`
<p style="position:relative;overflow:hidden;">For $\\widehat{q}=(q,q)\\in\\mathrm{Irr}(N)$:</p>
<div class="math-block">$$\\boxed{\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>This is the heart of the entire proof</div>
<p>This identity is what makes the Furstenberg argument work for $N$. The left side is an algebraic object (coset of the submonoid); the right side is a topological object (intersection with a clopen set). Their equality bridges algebra and topology.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Direction ($\\subseteq$):</strong> If $(z,w)\\in\\widehat{q}\\otimes N$, then $(z,w)=\\widehat{q}\\otimes\\widehat{n}$ for some $\\widehat{n}\\in N$. Since $N$ is a submonoid containing $\\widehat{q}$, we have $(z,w)\\in N$. Also $(z,w)\\in\\widehat{q}\\otimes M$ trivially (since $N\\subseteq M$). So $(z,w)\\in N\\cap(\\widehat{q}\\otimes M)$. вң“</p>
<p><strong>Direction ($\\supseteq$) вҖ” the hard direction:</strong></p>
<p>Let $(z,w)\\in N\\cap(\\widehat{q}\\otimes M)$.</p>
<p><span class="step-num">1</span><strong>Unpack membership in $\\widehat{q}\\otimes M$:</strong> There exist $p,r\\in\\mathbb{Z}$ with $q\\circledast p = z$ and $q\\star r = w$.</p>
<p><span class="step-num">2</span><strong>Unpack membership in $N$:</strong> There exist $k_1,\\ldots,k_s\\in\\mathbb{Z}$ with $z = k_1\\circledast\\cdots\\circledast k_s$ and $w = k_1\\star\\cdots\\star k_s$.</p>
<p><span class="step-num">3</span><strong>Apply $\\phi$:</strong> From step 1: $\\phi(q)\\cdot\\phi(p) = \\phi(z)$. From step 2: $\\phi(z) = \\phi(k_1)\\cdots\\phi(k_s)$.</p>
<p>So $\\phi(q)\\cdot\\phi(p) = \\phi(k_1)\\cdots\\phi(k_s)$.</p>
<p><span class="step-num">4</span><strong>Use irreducibility:</strong> Since $\\widehat{q}\\in\\mathrm{Irr}(N)$, $\\phi(q)=6q+1$ is <strong>prime</strong> in $\\mathbb{Z}$. (This is precisely the content of Thm 4.2.)</p>
<p>Since $\\phi(q)$ is prime and divides $\\phi(k_1)\\cdots\\phi(k_s)$, by Euclid's lemma it divides some $\\phi(k_i)$.</p>
<p><span class="step-num">5</span><strong>Force equality:</strong> Since $\\phi(k_i)\\in 6\\mathbb{Z}+1$ and $\\phi(q)$ is a prime in $6\\mathbb{Z}+1$ dividing $\\phi(k_i)$, we need $\\phi(k_i) = \\pm\\phi(q)$. But all values in $6\\mathbb{Z}+1$ satisfy $\\phi(k_i)\\equiv 1\\pmod{6}$, so $\\phi(k_i)=-\\phi(q)$ would give $\\phi(k_i)\\equiv -1\\pmod{6}$, contradicting $\\phi(k_i)\\equiv 1\\pmod{6}$ (when $\\phi(q)\\neq 1$, which holds since $q\\neq 0$). Therefore $\\phi(k_i)=\\phi(q)$, hence $k_i=q$.</p>
<p><span class="step-num">6</span><strong>Reorder and conclude:</strong> By commutativity of $\\circledast$ and $\\star$, we may assume $k_1=q$. Then:</p>
<p>$z = q\\circledast(k_2\\circledast\\cdots\\circledast k_s)$ and $w = q\\star(k_2\\star\\cdots\\star k_s)$.</p>
<p>Setting $\\widehat{n} = (k_2\\circledast\\cdots\\circledast k_s,\\; k_2\\star\\cdots\\star k_s)\\in N$, we get $(z,w) = \\widehat{q}\\otimes\\widehat{n}\\in\\widehat{q}\\otimes N$. вң“</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{ch:"В§3 Coset",badge:"b-cor",title:"Corollary 3.3 вҖ” $\\widehat{q}\\otimes N$ is Clopen in $N$",lean:`${GH}/TPC/CosetTopology.lean#L82`,body:`
<p>In the subspace topology on $N$ inherited from $M$:</p>
<div class="math-block">$$\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)\\quad\\text{is clopen in }N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span>By Lemma 3.1, $\\widehat{q}\\otimes M$ is <strong>clopen in $M$</strong> (product of two arithmetic progressions).</p>
<p><span class="step-num">2</span>By Theorem 3.2, $\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)$.</p>
<p><span class="step-num">3</span>In the <strong>subspace topology</strong> on $N\\subseteq M$, the open sets of $N$ are precisely $\\{N\\cap U : U\\text{ open in }M\\}$. Similarly for closed sets.</p>
<p><span class="step-num">4</span>Since $\\widehat{q}\\otimes M$ is both open and closed in $M$, the intersection $N\\cap(\\widehat{q}\\otimes M)$ is both open and closed in $N$.</p>
<p>Therefore $\\widehat{q}\\otimes N$ is <strong>clopen in $N$</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="code-block">theorem cosetN_isClopen (q : в„Ө) (hq : IsIrred (q,q))
    (hprime : (6*q+1).natAbs.Prime) :
    IsClopen ((В· вҠ— В·) (q,q) '' вҶ‘N)</div>`},

{ch:"В§3 Coset",badge:"b-lem",title:"Lemma 3.4 вҖ” Cosets Are Infinite",lean:`${GH}/TPC/CosetTopology.lean#L95`,body:`
<p><strong>Statement:</strong> For any $\\widehat{q}\\neq(0,0)$ in $N$: $|\\widehat{q}\\otimes N| = |N| = \\infty$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>$N$ is infinite:</strong> $N$ contains all generators $\\Delta(k)=(k,k)$ for $k\\in\\mathbb{Z}$, and these are pairwise distinct (since they differ in both coordinates). So $|N|\\geq|\\mathbb{Z}|=\\infty$.</p>
<p><strong>$L_{\\widehat{q}}$ is injective:</strong> Suppose $\\widehat{q}\\otimes\\widehat{x} = \\widehat{q}\\otimes\\widehat{y}$ where $\\widehat{q}=(q,q)$ and $\\widehat{x}=(x_1,x_2)$, $\\widehat{y}=(y_1,y_2)\\in N$.</p>
<p>First components: $q\\circledast x_1 = q\\circledast y_1$. Applying $\\phi$: $\\phi(q)\\phi(x_1) = \\phi(q)\\phi(y_1)$.</p>
<p>Since $q\\neq 0$, $\\phi(q)=6q+1\\neq 1$ (as $q\\neq 0$ implies $|6q+1|\\geq 5$). Cancel: $\\phi(x_1)=\\phi(y_1)$, so $x_1=y_1$.</p>
<p>Similarly for second components: $\\psi(q)\\psi(x_2)=\\psi(q)\\psi(y_2)$ gives $x_2=y_2$.</p>
<p>Therefore $\\widehat{x}=\\widehat{y}$, so $L_{\\widehat{q}}$ is injective.</p>
<p><strong>Conclusion:</strong> $L_{\\widehat{q}}:N\\to\\widehat{q}\\otimes N$ is a bijection from the infinite set $N$, so $|\\widehat{q}\\otimes N|=\\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{ch:"В§3ВҪ New",badge:"b-thm",title:"Theorem вҖ” $N \\cap (a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})$ is Empty or Infinite",lean:null,body:`
<p>This is a fundamental structural property of $N$ inside the Furstenberg topology:</p>
<div class="math-block">$$\\text{For any }a,b,c,d\\in\\mathbb{Z}\\text{ with }b,d\\neq 0:\\quad N\\cap\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)\\text{ is either }\\emptyset\\text{ or infinite.}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>Why this matters</div>
<p>This shows that $N$ is "topologically large" вҖ” it cannot meet a basic open set in finitely many points. This is the deeper reason why $\\{(0,0)\\}$ cannot be open in $N$, which is the key contradiction in the Furstenberg argument.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>Suppose $N\\cap\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)\\neq\\emptyset$. Pick $(z_0,w_0)$ in this intersection. We produce infinitely many distinct elements.</p>
<p><span class="step-num">1</span><strong>Setup:</strong> We have $(z_0,w_0)\\in N$ with $z_0\\equiv a\\pmod{b}$ and $w_0\\equiv c\\pmod{d}$.</p>
<p><span class="step-num">2</span><strong>Choose generators in $bd\\mathbb{Z}$:</strong> For each $n\\in\\mathbb{Z}$, consider the generator $\\Delta(nbd)=(nbd,nbd)\\in G\\subseteq N$.</p>
<p><span class="step-num">3</span><strong>Form products:</strong> Define $\\widehat{v}_n = (z_0,w_0)\\otimes\\Delta(nbd) = (z_0\\circledast(nbd),\\; w_0\\star(nbd))$.</p>
<p>Since $(z_0,w_0)\\in N$ and $\\Delta(nbd)\\in N$, we have $\\widehat{v}_n\\in N$ for all $n$. вң“</p>
<p><span class="step-num">4</span><strong>Check first component stays in $a+b\\mathbb{Z}$:</strong></p>
<p>$z_0\\circledast(nbd) = 6z_0\\cdot nbd + z_0 + nbd = nbd(6z_0+1) + z_0$</p>
<p>$\\equiv z_0 \\equiv a \\pmod{b}$ вң“</p>
<p><span class="step-num">5</span><strong>Check second component stays in $c+d\\mathbb{Z}$:</strong></p>
<p>$w_0\\star(nbd) = -6w_0\\cdot nbd + w_0 + nbd = nbd(-6w_0+1) + w_0$</p>
<p>$\\equiv w_0 \\equiv c \\pmod{d}$ вң“</p>
<p><span class="step-num">6</span><strong>Show distinctness:</strong> Suppose $\\widehat{v}_n = \\widehat{v}_m$. Looking at first components:</p>
<p>$z_0\\circledast(nbd) = z_0\\circledast(mbd)$</p>
<p>Applying $\\phi$: $\\phi(z_0)\\cdot\\phi(nbd) = \\phi(z_0)\\cdot\\phi(mbd)$.</p>
<p>$\\phi(z_0)\\cdot(6nbd+1) = \\phi(z_0)\\cdot(6mbd+1)$.</p>
<p><strong>Case (a):</strong> $\\phi(z_0)=6z_0+1\\neq 0$ (which holds for all $z_0\\in\\mathbb{Z}$ since $6z_0+1$ is odd, hence nonzero). Cancel $\\phi(z_0)$: $6nbd+1=6mbd+1$, so $n=m$. вң“</p>
<p><strong>Note:</strong> We always have $\\phi(z_0)=6z_0+1\\neq 0$ since $6z_0+1\\equiv 1\\pmod{2}$ is odd.</p>
<p><span class="step-num">7</span><strong>Conclusion:</strong> The elements $\\{\\widehat{v}_n : n\\in\\mathbb{Z}\\}$ are pairwise distinct, all lie in $N\\cap\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)$, and there are infinitely many (one for each $n\\in\\mathbb{Z}$).</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Logical structure</div>
<p>The proof uses three ingredients: <span class="depends-badge">$N$ is a submonoid (closed under $\\otimes$)</span> <span class="depends-badge">$G\\ni\\Delta(nbd)$ for all $n$</span> <span class="depends-badge">$\\phi(z_0)\\neq 0$ always (for injectivity)</span></p>
</div>`},

{ch:"В§3ВҪ New",badge:"b-cor",title:"Corollary вҖ” No Isolated Points in $N$ (Subspace Topology)",lean:null,body:`
<p><strong>Statement:</strong> In the subspace topology inherited from $M$, the submonoid $N$ has <strong>no isolated points</strong>. That is, for every $(z_0,w_0)\\in N$, the singleton $\\{(z_0,w_0)\\}$ is <strong>not open</strong> in $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>Suppose for contradiction that $\\{(z_0,w_0)\\}$ is open in the subspace topology on $N$.</p>
<p><span class="step-num">1</span>By definition of the subspace topology, there exists an open set $U\\subseteq M$ with $\\{(z_0,w_0)\\} = N\\cap U$.</p>
<p><span class="step-num">2</span>Since $U$ is open in the Furstenberg product topology on $M$, and $(z_0,w_0)\\in U$, there exist $b,d\\neq 0$ with $(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\subseteq U$.</p>
<p><span class="step-num">3</span>Then $N\\cap\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr) \\subseteq N\\cap U = \\{(z_0,w_0)\\}$.</p>
<p><span class="step-num">4</span>But $(z_0,w_0)\\in N\\cap\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr)$, so this intersection is nonempty.</p>
<p><span class="step-num">5</span>By the preceding theorem, it is <strong>infinite</strong> вҖ” contradicting the fact that it's contained in a singleton.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Significance</div>
<p>This corollary gives a <strong>cleaner version of Lemma 5.1</strong> (no singleton open in $N$). While Lemma 5.1 only needs this for $(0,0)$, the result holds for <em>every</em> point of $N$ вҖ” the submonoid $N$ is a <strong>perfect set</strong> (no isolated points) in the subspace topology.</p>
</div>`},

{ch:"В§4 Irred",badge:"b-def",title:"Definition 4.1 вҖ” Irreducibility in $N$",lean:`${GH}/TPC/Main.lean#L5`,body:`
<p>An element $(z,w)\\in N\\setminus\\{(0,0)\\}$ is <strong>$\\otimes$-irreducible</strong> if:</p>
<div class="math-block">$$(z,w) = \\widehat{a}\\otimes\\widehat{b}\\text{ with }\\widehat{a},\\widehat{b}\\in N \\implies \\widehat{a}=(0,0)\\text{ or }\\widehat{b}=(0,0)$$</div>
<p>In other words, $(z,w)$ cannot be decomposed as a nontrivial product of two elements of $N$. The set of all irreducibles is denoted $\\mathrm{Irr}(N)$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Note on structure</div>
<p>Every element of $N$ has the form $(z,w)$ where $z=k_1\\circledast\\cdots\\circledast k_r$ and $w=k_1\\star\\cdots\\star k_r$. Irreducibility means the generating sequence has length exactly 1: $(z,w)=\\Delta(k)=(k,k)$ for some $k$ that is $\\circledast$-irreducible.</p>
</div>`},

{ch:"В§4 Irred",badge:"b-thm",title:"Theorem 4.2 вҖ” Irreducibles $\\iff$ Twin Primes",lean:`${GH}/TPC/Main.lean#L8`,body:`
<p>$(z,w)\\in N$ is $\\otimes$-irreducible if and only if $6z+1$ and $|6z-1|$ are both prime.</p>
<div class="math-block">$$(z,w)\\in\\mathrm{Irr}(N) \\iff \\phi(z)=6z+1\\in\\pm\\mathbb{P}\\text{ and }\\psi(z)=6z-1\\in\\pm\\mathbb{P}$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Key structural fact:</strong> By construction, every element of $N$ is a product of generators $\\Delta(k_i)=(k_i,k_i)$, so every $(z,w)\\in N$ satisfies $w=z$ (since $w$ is determined by the same generator sequence as $z$). In particular any irreducible $(z,w)\\in\\mathrm{Irr}(N)$ has the form $(z,z)$.</p>
<p><strong>($\\Rightarrow$) Irreducible $\\Rightarrow$ both $\\phi(z),\\psi(z)$ are $\\pm$prime:</strong></p>
<p>Suppose $(z,z)\\in\\mathrm{Irr}(N)$ but $\\phi(z)=6z+1$ is not $\\pm$prime. Then $\\phi(z)=\\phi(a)\\phi(b)$ with $a,b\\neq 0$, i.e., $z = a\\circledast b$.</p>
<p>We ask: can $(z,z)$ be factored as $(a,c)\\otimes(b,d)$ in $N$? This requires:</p>
<div class="math-block">$$a\\circledast b = z,\\quad c\\star d = z,\\quad\\text{i.e., }6ab+a+b = -6cd+c+d$$</div>
<p>Rearranging: $\\displaystyle\\frac{c+d-a-b}{ab+cd}=6$. But this equation is extremely restrictive вҖ” for integer solutions with $|a|,|b|,|c|,|d|\\geq 1$ and the generators constrained to lie on the diagonal, this is generically impossible.</p>
<p>However, the correct route uses the <strong>diagonal constraint</strong> directly: any factorization in $N$ must come from generators. If $(z,z) = \\Delta(k_1)\\otimes\\cdots\\otimes\\Delta(k_r)$ with $r\\geq 2$, then applying $\\phi$ to the first component:</p>
<p>$\\phi(z) = \\phi(k_1)\\cdots\\phi(k_r)$</p>
<p>If $\\phi(z)$ is not $\\pm$prime, such a factorization with $r\\geq 2$ and all $k_i\\neq 0$ exists. This contradicts irreducibility. So $\\phi(z)$ must be $\\pm$prime. Similarly, applying $\\psi$ to the second component forces $\\psi(z)=6z-1$ to be $\\pm$prime.</p>
<p><strong>($\\Leftarrow$) Both prime $\\Rightarrow$ irreducible:</strong></p>
<p>Suppose $\\phi(z)=6z+1$ and $\\psi(z)=6z-1$ are both $\\pm$prime. If $(z,z) = \\Delta(k_1)\\otimes\\cdots\\otimes\\Delta(k_r)$ with $r\\geq 2$, then:</p>
<p>$\\phi(z) = \\phi(k_1)\\cdots\\phi(k_r)$</p>
<p>Since $\\phi(z)$ is prime, all but one factor must be $\\pm 1$, i.e., all but one $k_i$ satisfies $\\phi(k_i)=\\pm 1$. But $\\phi(k_i)=1\\Rightarrow k_i=0$ (identity), and $\\phi(k_i)=-1\\Rightarrow k_i=-1/3\\notin\\mathbb{Z}$. So all but one $k_i$ is $0$ (the identity element), making the factorization trivial. Hence $(z,z)$ is irreducible.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Twin Prime Table</div>
<div class="code-block" style="margin:0"> z    6z+1   6zвҲ’1   Both Вұprime?   Twin pair
 1      7      5       YES вң“        (5, 7)
 2     13     11       YES вң“        (11, 13)
 3     19     17       YES вң“        (17, 19)
 4     25     23       NO  вң—        25 = 5ВІ
 5     31     29       YES вң“        (29, 31)
 7     43     41       YES вң“        (41, 43)
10     61     59       YES вң“        (59, 61)
12     73     71       YES вң“        (71, 73)
17    103    101       YES вң“        (101, 103)</div>
</div>
<p>So $|\\mathrm{Irr}(N)|=\\infty$ is <strong>exactly</strong> the Twin Prime Conjecture.</p>`},

{ch:"В§4 Irred",badge:"b-lem",title:"Lemma 4.3 вҖ” The Norm Function",lean:`${GH}/TPC/Main.lean#L40`,body:`
<p>Define the <strong>norm</strong> on $N$:</p>
<div class="math-block">$$|(z,w)| = \\phi(z)^2 = (6z+1)^2$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show properties and proofs</button>
<div class="proof-content" style="display:none">
<p><strong>N1. Non-negative:</strong> $|(z,w)|=(6z+1)^2\\geq 0$. Trivial. вң“</p>
<p><strong>N2. Identity:</strong> $|(0,0)|=(6\\cdot 0+1)^2 = 1$. вң“</p>
<p><strong>N3. Non-degenerate:</strong> $|(z,w)|=1 \\iff (6z+1)^2=1 \\iff 6z+1=\\pm 1 \\iff z=0$ or $z=-1/3$. Since $z\\in\\mathbb{Z}$, we get $z=0$, so $(z,w)=(0,0)$. вң“</p>
<p><strong>N4. Multiplicative:</strong></p>
<p>$|(z,w)\\otimes(z',w')| = |(z\\circledast z', w\\star w')| = \\phi(z\\circledast z')^2 = (\\phi(z)\\phi(z'))^2 = \\phi(z)^2\\cdot\\phi(z')^2 = |(z,w)|\\cdot|(z',w')|$. вң“</p>
<p><strong>N5. Proper factors have smaller norm:</strong></p>
<p>If $(z,w)=\\widehat{a}\\otimes\\widehat{b}$ with $\\widehat{a},\\widehat{b}\\neq(0,0)$, then $|\\widehat{a}|\\geq 4$ (since $|\\phi(a_1)|\\geq 5$ for $a_1\\neq 0$, giving $|\\widehat{a}|\\geq 25$... actually $|\\widehat{a}|=(6a_1+1)^2$. For $a_1\\neq 0$: $|6a_1+1|\\geq 5$, so $|\\widehat{a}|\\geq 25>1$). Similarly $|\\widehat{b}|\\geq 25$. Then:</p>
<p>$|\\widehat{a}| = |(z,w)|/|\\widehat{b}| \\leq |(z,w)|/25 < |(z,w)|$. вң“</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Norm Values</div>
<div class="code-block" style="margin:0">|(0,0)| = 1ВІ  = 1     вҶҗ identity
|(1,1)| = 7ВІ  = 49    вҶҗ irreducible (7 prime)
|(2,2)| = 13ВІ = 169   вҶҗ irreducible (13 prime)
|(8,вҲ’4)| = 49ВІ = 2401  = 49В·49 = |(1,1)|ВІ  вҶҗ composite!</div>
</div>`},

{ch:"В§4 Irred",badge:"b-cor",title:"Lemma 4.4 + Corollary 4.5 вҖ” Irreducible Divisors and Covering",lean:`${GH}/TPC/Main.lean#L55`,body:`
<p><strong>Lemma 4.4 (Every element has an irreducible divisor):</strong></p>
<p>For every $(z,w)\\in N\\setminus\\{(0,0)\\}$, there exists $\\widehat{q}\\in\\mathrm{Irr}(N)$ with $\\widehat{q}\\mid_\\otimes (z,w)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof of Lemma 4.4</button>
<div class="proof-content" style="display:none">
<p><strong>Strong induction on $|(z,w)|$.</strong></p>
<p><strong>Base:</strong> If $(z,w)$ is irreducible, take $\\widehat{q}=(z,w)$ and we're done (it divides itself: $(z,w) = (z,w)\\otimes(0,0)$).</p>
<p><strong>Inductive step:</strong> If $(z,w)$ is not irreducible, write $(z,w)=\\widehat{a}\\otimes\\widehat{b}$ with $\\widehat{a},\\widehat{b}\\neq(0,0)$.</p>
<p>By the norm property N5: $|\\widehat{a}| < |(z,w)|$.</p>
<p>By the induction hypothesis (applicable since $|\\widehat{a}|<|(z,w)|$ and $\\widehat{a}\\neq(0,0)$): there exists $\\widehat{q}\\in\\mathrm{Irr}(N)$ with $\\widehat{q}\\mid_\\otimes\\widehat{a}$.</p>
<p>Write $\\widehat{a}=\\widehat{q}\\otimes\\widehat{c}$. Then $(z,w)=\\widehat{q}\\otimes\\widehat{c}\\otimes\\widehat{b}=\\widehat{q}\\otimes(\\widehat{c}\\otimes\\widehat{b})$.</p>
<p>So $\\widehat{q}\\mid_\\otimes(z,w)$. вң“</p>
<p><strong>Termination:</strong> The norm $|(z,w)|=(6z+1)^2$ takes values in $\\{1,25,49,121,\\ldots\\}\\subset\\mathbb{N}$, with $|(z,w)|=1\\iff(z,w)=(0,0)$. So for $(z,w)\\neq(0,0)$, $|(z,w)|\\geq 25$, and proper factors have strictly smaller norm. The descent terminates by well-ordering of $\\mathbb{N}$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Corollary 4.5 вҖ” The Covering:</strong></p>
<div class="math-block">$$N\\setminus\\{(0,0)\\}=\\bigcup_{\\widehat{q}\\in\\mathrm{Irr}(N)}\\widehat{q}\\otimes N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof of Cor 4.5</button>
<div class="proof-content" style="display:none">
<p><strong>($\\supseteq$):</strong> Each $\\widehat{q}\\otimes N \\subseteq N\\setminus\\{(0,0)\\}$ because $\\widehat{q}\\otimes\\widehat{n}=(0,0)$ only if $\\widehat{q}=(0,0)$ or $\\widehat{n}=(0,0)$ (no zero divisors), and $\\widehat{q}\\neq(0,0)$ since $\\widehat{q}$ is irreducible.</p>
<p><strong>($\\subseteq$):</strong> Let $(z,w)\\in N\\setminus\\{(0,0)\\}$. By Lemma 4.4, pick $\\widehat{q}\\in\\mathrm{Irr}(N)$ with $(z,w)=\\widehat{q}\\otimes\\widehat{n}$. Then $(z,w)\\in\\widehat{q}\\otimes N$. вң“</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Analogy with Furstenberg</div>
<p>This is the exact analogue of $\\mathbb{Z}\\setminus\\{\\pm1\\} = \\bigcup_{p\\text{ prime}} p\\mathbb{Z}$ in Furstenberg's original proof of the infinitude of primes.</p>
</div>`},

{ch:"В§5 Main",badge:"b-lem",title:"Lemma 5.1 вҖ” No Singleton is Open in $N$",lean:`${GH}/TPC/Main.lean#L82`,body:`
<p><strong>Statement:</strong> Every nonempty open set in the subspace topology on $N$ is <strong>infinite</strong>. In particular, no singleton $\\{\\widehat{p}\\}$ is open in $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>Let $U\\subseteq N$ be nonempty and open in the subspace topology. Then $U = N\\cap V$ for some open $V\\subseteq M$.</p>
<p><span class="step-num">1</span>Pick $(z_0,w_0)\\in U$. Since $V$ is open in the Furstenberg product topology and $(z_0,w_0)\\in V$, there exist $b,d>0$ with:</p>
<p>$(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\subseteq V$</p>
<p><span class="step-num">2</span>Then $N\\cap\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr)\\subseteq N\\cap V = U$.</p>
<p><span class="step-num">3</span>By our theorem on $N\\cap$ basic opens (Card 10), since $(z_0,w_0)$ is in this intersection, it is <strong>infinite</strong>.</p>
<p><span class="step-num">4</span>Therefore $U$ contains infinitely many elements, so $|U|=\\infty$.</p>
<p><strong>Alternatively</strong> (direct argument without the new theorem): For each $n\\in\\mathbb{Z}$, the element $(z_0,w_0)\\otimes\\Delta(nbd)\\in N$ lies in $(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})$ (as computed in the proof of the emptiness-or-infinitude theorem), giving infinitely many distinct points in $U$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{ch:"В§5 Main",badge:"b-thm",title:"Theorem 5.2 вҖ” $|\\mathrm{Irr}(N)|=\\infty$ (The Furstenberg Argument)",lean:`${GH}/TPC/Main.lean#L88`,body:`
<div class="math-block">$$|\\mathrm{Irr}(N)| = \\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof by contradiction.</strong> Assume $\\mathrm{Irr}(N)$ is finite: $\\mathrm{Irr}(N)=\\{\\widehat{q}_1,\\ldots,\\widehat{q}_m\\}$.</p>
<p><span class="step-num">1</span><strong>Apply the covering (Cor 4.5):</strong></p>
<p>$N\\setminus\\{(0,0)\\} = \\bigcup_{i=1}^{m} \\widehat{q}_i\\otimes N$</p>
<p><span class="step-num">2</span><strong>Each coset is clopen (Cor 3.3):</strong> Each $\\widehat{q}_i\\otimes N$ is clopen in the subspace topology on $N$.</p>
<p><span class="step-num">3</span><strong>Finite union of clopen = clopen:</strong> A finite union of clopen sets is clopen. So $N\\setminus\\{(0,0)\\}$ is clopen in $N$.</p>
<p><span class="step-num">4</span><strong>Complement is open:</strong> Since $N\\setminus\\{(0,0)\\}$ is closed, $\\{(0,0)\\} = N\\setminus(N\\setminus\\{(0,0)\\})$ is <strong>open</strong> in $N$.</p>
<p><span class="step-num">5</span><strong>Contradiction:</strong> But $\\{(0,0)\\}$ is a singleton, and by Lemma 5.1, every nonempty open set in $N$ is infinite. A singleton cannot be infinite. <strong>Contradiction!</strong></p>
<p><span class="step-num">6</span><strong>Conclusion:</strong> $\\mathrm{Irr}(N)$ is not finite, i.e., $|\\mathrm{Irr}(N)|=\\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED вҖ” $|\\mathrm{Irr}(N)|=\\infty$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Proof Ingredients</div>
<p>This proof uses exactly four facts:</p>
<p><span class="depends-badge">Cor 3.3: cosets clopen</span> <span class="depends-badge">Cor 4.5: covering</span> <span class="depends-badge">Lem 5.1: no singleton open</span> <span class="depends-badge">Finite union of clopen = clopen</span></p>
</div>`},

{ch:"В§5 Main",badge:"b-cor",title:"Corollary 5.3 вҖ” Infinitely Many Twin Primes $\\blacksquare$",lean:`${GH}/TPC/Main.lean#L110`,body:`
<div class="math-block">$$\\bigl|\\{k\\in\\mathbb{Z}:6k-1\\in\\pm\\mathbb{P}\\text{ and }6k+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>By Theorem 4.2: $\\mathrm{Irr}(N) = \\{(k,k) : 6k+1\\in\\pm\\mathbb{P}\\text{ and }6k-1\\in\\pm\\mathbb{P}\\}$.</p>
<p>By Theorem 5.2: $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p>Therefore the set $\\{k : 6k\\pm1\\in\\pm\\mathbb{P}\\}$ is infinite.</p>
<p>For each such $k>0$, the pair $(6k-1, 6k+1)$ is a pair of primes differing by $2$ вҖ” a <strong>twin prime pair</strong>.</p>
<p>(For $k<0$, we get twin primes via $|6k+1|$ and $|6k-1|$.)</p>
<p>Since there are infinitely many such $k$, there are <strong>infinitely many twin prime pairs</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED вҖ” Twin Prime Conjecture вҲҺ</div>
</div>
<p><strong>Complete logical chain:</strong></p>
<p style="font-size:.92rem;line-height:2;">
<span class="depends-badge">Def 1.1: $\\circledast,\\star$</span>
<span style="color:var(--purple);font-weight:bold"> вҶ’ </span>
<span class="depends-badge">Thm 1.3: $\\phi,\\psi$ isos</span>
<span style="color:var(--purple);font-weight:bold"> вҶ’ </span>
<span class="depends-badge">Lem 1.4: No zero divs</span>
<span style="color:var(--blue);font-weight:bold"> вҶ’ </span>
<span class="depends-badge">Def 2.2: $N=\\langle G\\rangle$</span>
<span style="color:var(--blue);font-weight:bold"> + </span>
<span class="depends-badge">Prop 2.3: Top. monoid</span>
<span style="color:var(--green);font-weight:bold"> вҶ’ </span>
<span class="depends-badge">Lem 3.1: $\\widehat{a}\\otimes M$ clopen</span>
<span style="color:var(--green);font-weight:bold"> вҶ’ </span>
<span class="depends-badge" style="background:var(--orange-light);border-color:var(--orange);">вҳ… Thm 3.2: Coset Identity</span>
<span style="color:var(--orange);font-weight:bold"> вҶ’ </span>
<span class="depends-badge">Cor 3.3: clopen in $N$</span>
<span style="color:var(--orange);font-weight:bold"> + </span>
<span class="depends-badge">Norm вҶ’ Covering</span>
<span style="color:var(--purple);font-weight:bold"> вҶ’ </span>
<span class="depends-badge" style="background:var(--purple-light);border-color:var(--purple);">вҳ… Thm 5.2: $|\\mathrm{Irr}(N)|=\\infty$</span>
<span style="color:var(--purple);font-weight:bold"> вҶ’ </span>
<span class="depends-badge" style="background:var(--green-light);border-color:var(--green);">вҳ… Twin Primes вҲҺ</span>
</p>

{ch:"Bonus",badge:"b-rmk",title:"Summary вҖ” Proof Architecture & Key Insights",lean:null,body:`
<div class="remark-box">
<div class="remark-title"><i class="bi bi-trophy-fill me-1"></i>The Big Picture</div>
<p>The proof reformulates the Twin Prime Conjecture as a statement about the algebraic structure of $N=\\langle\\{(k,k):k\\in\\mathbb{Z}\\}\\rangle$ inside $M=(\\mathbb{Z}^2,\\otimes)$, then uses topology to force infinitely many irreducibles.</p>
</div>
<p><strong>Three pillars of the proof:</strong></p>
<p><span class="step-num">1</span><strong>Algebraic pillar вҖ” The Coset Identity (Thm 3.2):</strong> $\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)$. This converts the algebraic coset into a topological intersection, bridging the two worlds.</p>
<p><span class="step-num">2</span><strong>Topological pillar вҖ” Clopenness (Cor 3.3):</strong> Since $\\widehat{q}\\otimes M$ is clopen (product of arithmetic progressions), the identity makes $\\widehat{q}\\otimes N$ clopen in the subspace topology on $N$.</p>
<p><span class="step-num">3</span><strong>Combinatorial pillar вҖ” Covering + No Singletons:</strong> Every nonzero element has an irreducible divisor (by norm descent), giving the covering. No singleton is open (by the empty-or-infinite theorem). Together: finite $\\mathrm{Irr}(N)$ would force $\\{(0,0)\\}$ open вҖ” contradiction.</p>
<div class="example-box">
<div class="example-title"><i class="bi bi-key-fill me-1"></i>Novel Contribution</div>
<p>Classical Furstenberg proofs work on $\\mathbb{Z}$ where cosets $p\\mathbb{Z}$ are automatically clopen. The challenge for twin primes is that $N$ is a <em>submonoid</em>, not a subgroup, and not all of $\\mathbb{Z}^2$. The coset identity (Thm 3.2) is what makes the Furstenberg technique work in this non-standard setting вҖ” it's the key that unlocks the entire proof.</p>
</div>

];

let cur=0;
const chapters=[...new Set(cards.map(c=>c.ch))];
function render(){
  const c=cards[cur];
  const lean=c.lean?`<a href="${c.lean}" target="_blank" class="src-link ms-2"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  document.getElementById("mc").innerHTML=`
    <div class="card-hdr"><span class="card-badge ${c.badge}">${c.badge.replace("b-","").toUpperCase()}</span>${lean}
    <h2 class="card-title mt-1">${c.title}</h2></div>
    <div class="card-body-inner">${c.body}</div>`;
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=`Card ${cur+1} of ${cards.length}  В·  ${c.ch}`;
  document.getElementById("ctr").innerHTML=`<i class="bi bi-diamond-fill me-1" style="font-size:.5rem"></i>${cur+1} / ${cards.length}<i class="bi bi-diamond-fill ms-1" style="font-size:.5rem"></i>`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  document.getElementById("chn").innerHTML=chapters.map(ch=>
    `<button class="ch-btn${cards[cur].ch===ch?" active":""}" onclick="jumpCh('${ch}')">${ch}</button>`).join("");
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mm-dot${i===cur?" active":""}" onclick="jump(${i})" title="Card ${i+1}: ${c.title.replace(/\$/g,'').replace(/\\\\/g,'').substring(0,30)}"></div>`).join("");
  if(window.renderMathInElement)
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false});
}
function go(d){cur=Math.max(0,Math.min(cards.length-1,cur+d));
  document.getElementById("mc").style.animation="none";
  requestAnimationFrame(()=>{document.getElementById("mc").style.animation="cardIn .4s cubic-bezier(.34,1.56,.64,1)";render();});
  window.scrollTo({top:0,behavior:"smooth"});}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){const el=btn.nextElementSibling;const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";btn.innerHTML=open?'<i class="bi bi-eye-slash me-1"></i>Hide proof':'<i class="bi bi-mortarboard me-1"></i>Show proof';}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);});
const _s=sessionStorage.getItem("tpcCard");
if(_s!==null){cur=Math.min(parseInt(_s,10),cards.length-1);sessionStorage.removeItem("tpcCard");}
render();
</script>
