<style>
:root{
  --blue:#1e90ff;--blue-dk:#0d6efd;--blue-pale:#e8f3ff;
  --yellow:#fffde7;--yellow-mid:#f5e642;
  --g50:#f9f9f9;--g100:#eeeeee;--g200:#cccccc;--g500:#888;--g800:#333;
  --black:#111;--white:#fff;
  --sans:'IBM Plex Sans',sans-serif;

  --r:14px;--r-sm:8px;
  --sh-btn:0 4px 16px rgba(30,144,255,.35);
  --sh-card:0 6px 24px rgba(0,0,0,.09);
  --sh-card-h:0 12px 36px rgba(30,144,255,.16);
  --t:.22s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--g50);color:var(--black);min-height:100vh}

/* header */
.hdr{background:var(--black);color:var(--white);padding:.85rem 1.4rem;
  border-bottom:3px solid var(--blue);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.hdr h1{font-family:var(--mono);font-size:clamp(.82rem,2.4vw,1.05rem);font-weight:600;color:var(--white)}
.hdr h1 span{color:var(--blue)}
.hdr-links{display:flex;gap:.4rem;flex-wrap:wrap}

/* progress */
.prog{background:var(--g100);padding:.4rem 1.4rem;border-bottom:1px solid var(--g200)}
.prog-track{height:5px;background:var(--g200);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5bb8ff);border-radius:3px;transition:width .4s var(--t)}
.prog-txt{font-family:var(--mono);font-size:.68rem;color:var(--g500);margin-top:.22rem}

/* chapter strip */
.chstrip{background:var(--white);border-bottom:1px solid var(--g200);
  padding:.45rem 1.2rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.chstrip::-webkit-scrollbar{display:none}

  padding:.26rem .72rem;border-radius:30px;border:1.5px solid var(--g200);
  background:var(--white);color:var(--g500);cursor:pointer;margin-right:.35rem;transition:var(--t)}
.chbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
.chbtn.active{background:var(--blue);color:var(--white);border-color:var(--blue);
  box-shadow:0 2px 10px rgba(30,144,255,.35)}

/* stage */
.stage{min-height:calc(100vh - 210px);display:flex;align-items:flex-start;
  justify-content:center;padding:1.8rem 1rem 6rem}

/* card */
.pcard{background:var(--white);border-radius:var(--r);box-shadow:var(--sh-card);
  max-width:780px;width:100%;overflow:hidden;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  transition:box-shadow var(--t)}
.pcard:hover{box-shadow:var(--sh-card-h)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

/* card top */
.ctop{background:#2d2d3a;padding:1.1rem 1.5rem .85rem}
.badge-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.55rem;flex-wrap:wrap}
.tbadge{font-family:var(--mono);font-size:.61rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:.17rem .52rem;border-radius:30px}
.b-def{background:var(--blue);color:var(--white)}
.b-thm{background:var(--yellow-mid);color:var(--black)}
.b-prop{background:var(--g200);color:var(--g800)}
.b-lem{background:#444;color:var(--white)}
.b-cor{background:var(--blue-pale);color:var(--blue-dk);border:1px solid var(--blue)}
.b-ex{background:#1e1e1e;color:#aaa}
.b-abs{background:var(--blue);color:var(--white)}
.eq-title{font-family:var(--serif);font-size:clamp(.95rem,2.8vw,1.22rem);
  font-weight:400;color:var(--white);line-height:1.4}
.eq-title .katex,.eq-title .katex *{color:var(--yellow-mid)!important}

/* card body */
.cbody{padding:1.3rem 1.5rem 1.1rem}
.cbody p{line-height:1.76;color:var(--g800);margin-bottom:.75rem}
.cbody p:last-child{margin-bottom:0}
.mdisp{background:var(--yellow);border-left:4px solid var(--blue);
  border-radius:0 var(--r-sm) var(--r-sm) 0;padding:.8rem 1.1rem;margin:.85rem 0;overflow-x:auto}
.cblk{font-family:var(--mono);font-size:.75rem;background:#111;color:#e5e5e5;
  padding:.85rem 1rem;border-radius:var(--r-sm);overflow-x:auto;white-space:pre;

.cblk .kw{color:#5bb8ff}.cblk .fn{color:#f5e642}.cblk .cm{color:#666}

/* minimap */
.mmap{position:fixed;right:.7rem;top:50%;transform:translateY(-50%);

.mmdot{width:7px;height:7px;border-radius:50%;background:var(--g200);

/* graph overlay */
.graph-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);

.graph-overlay.active{display:flex}
.graph-hdr{display:flex;align-items:center;justify-content:space-between;

.graph-hdr h2{font-family:var(--mono);font-size:.9rem;color:var(--white);font-weight:600}
.graph-hdr h2 span{color:var(--blue)}
.graph-close{font-size:1.4rem;color:#888;cursor:pointer;background:none;border:none;

.graph-close:hover{color:var(--white);background:#333}
.graph-hint{font-family:var(--mono);font-size:.6rem;color:#666;padding:0 1.2rem .3rem;

#cy{flex:1;width:100%;background:radial-gradient(ellipse at center,#1a1a24 0%,#0d0d14 100%)}
.graph-legend{display:flex;gap:1rem;padding:.3rem 1.2rem .5rem;flex-wrap:wrap}
.graph-legend-item{display:flex;align-items:center;gap:.35rem;font-family:var(--mono);font-size:.58rem;color:#888}
.graph-legend-swatch{width:12px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.15)}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[
{id:"abs",ch:"Abstract",b:"b-abs",
 t:`Twin Primes $\\iff$ $|\\mathrm{Irr}(\\Delta(\\mathbb{Z}))| = \\infty$`,
 body:`<p>The <strong>Twin Prime Conjecture</strong> — infinitely many primes $p$ with $p+2$ also prime — has resisted proof for centuries.</p>
<p>We give an algebraic reformulation: twin primes index exactly the <em>irreducibles</em> of the anti-diagonal submonoid $N=\\Delta(\\mathbb{Z})\\subset(\\mathbb{Z}^2,\\otimes)$. A <a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank">Furstenberg-style topological argument</a> proves $|\\mathrm{Irr}(N)|=\\infty$ unconditionally.</p>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tpill">Twin Primes (Wikipedia)</a>
<a href="https://leanprover-community.github.io/" target="_blank" class="tpill">Lean 4</a>
<a href="https://en.wikipedia.org/wiki/Monoid" target="_blank" class="tpill">Monoid theory</a>
</div>`,lean:null},

{id:"d1.1",ch:"§1 Algebra",b:"b-def",
 t:`Def 1.1 — Weakly Saturated: $ab\\in N \\Rightarrow \\exists\\,a'b'\\in N$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">A submonoid $N\\subseteq M$ is <strong>weakly saturated</strong> if: whenever two nontrivial elements of $M$ multiply to land in $N$, there exist two nontrivial elements <em>of $N$</em> with the same product.</p>
<div class="mdisp">$$\\forall\\,a,b\\in M,\\quad a,b\\neq 1_M,\\quad ab\\in N\\implies\\exists\\,a',b'\\in N,\\;a',b'\\neq 1_N:a'b'=ab$$</div>
<p>You may change the <em>factors</em> (from $a,b$ to $a',b'$), but the <em>product</em> stays the same.</p>
<p><strong>Hierarchy:</strong> divisor-closed $\\Rightarrow$ saturated $\\Rightarrow$ weakly saturated. Our $N$ shows the last arrow is strict.</p>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L10`},

{id:"c1.5",ch:"§1 Algebra",b:"b-cor",
 t:`Cor 1.5 — Weakly Saturated $\\implies$ Irred$_M(n)\\iff$ Irred$_N(n)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">An element that cannot be split in the big monoid $M$ also cannot be split in the submonoid $N$, and vice versa — weak saturation ensures factorizability transfers both ways.</p>
<div class="mdisp">$$n\\in N,\\;N\\text{ w.s.}\\implies \\bigl(n\\text{ irred. in }M\\iff n\\text{ irred. in }N\\bigr)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>($\\Rightarrow$) Irred in $M$ $\\implies$ irred in $N$:</strong> Suppose $n\\in N$ is irreducible in $M$. If $n=a'b'$ for some $a',b'\\in N$ with $a',b'\\neq 1_N$, then since $N\\subseteq M$ this is also a nontrivial factorization in $M$, contradicting $M$-irreducibility.</p>
<p><strong>($\\Leftarrow$) Irred in $N$ $\\implies$ irred in $M$:</strong> Suppose $n\\in N$ is irreducible in $N$ but reducible in $M$: say $n=ab$ with $a,b\\in M$, $a,b\\neq 1_M$. Since $n=ab\\in N$ and $N$ is weakly saturated (<a class="iref" onclick="jumpId('d1.1')">Def 1.1</a>), there exist $a',b'\\in N$ with $a',b'\\neq 1_N$ and $a'b'=n$. But this contradicts $n$ being irreducible in $N$. $\\square$</p>
<p><strong>Example (irreducible):</strong> $x=1$: $\\phi(1)=7\\in\\mathbb{P}$, $\\psi(1)=5\\in\\mathbb{P}$, so $(1,-1)\\in\\mathrm{Irr}(N)$. By this corollary, $(1,-1)$ is also irreducible in $M=(\\mathbb{Z}^2,\\otimes)$.</p>
<p><strong>Example (reducible):</strong> $x=4$: $\\phi(4)=25=5^2$, so $4=(-1)\\mathbin{\\circledast}(-1)$, giving $(4,-4)=(-1,1)\\otimes(-1,1)$ — reducible in both $M$ and $N$.</p>
</div>
<p class="mt-2"><strong>Key point:</strong> Weak saturation is the exact condition needed — saturation would be too strong (our $N$ is not saturated).</p>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L20`},

{id:"d2.1",ch:"§2 Ops",b:"b-def",
 t:`Def 2.1 — $x\\mathbin{\\circledast}y=6xy+x+y$, $\\;x\\mathbin{\\star}y=-6xy+x+y$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Two binary operations on $\\mathbb{Z}$, both with identity $0$. They are "twisted multiplications" designed so that $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ become ring homomorphisms.</p>
<div class="mdisp">$$x\\mathbin{\\circledast}y:=6xy+x+y\\quad(\\texttt{mstar}),\\qquad x\\mathbin{\\star}y:=-6xy+x+y\\quad(\\texttt{sstar})$$
$$\\text{identity }=0\\text{ in both}$$</div>
<div class="cblk"><span class="kw">def</span> <span class="fn">mstar</span> (x y:ℤ):ℤ:=6*x*y+x+y
<span class="kw">def</span> <span class="fn">sstar</span> (x y:ℤ):ℤ:=-6*x*y+x+y</div>
<div class="cblk"> x    y    x⊛y     x⋆y
 1    1      8      -4
 2    3     41     -31
-1   -1      4      -8
 1   -1     -6       6</div>
<button class="btnprf" onclick="tp(this)">▶ Show extended table</button>
<div class="prfbody" style="display:none"><div class="cblk">  x    y      x⊛y       x⋆y       φ(x⊛y)
  0    0        0         0          1  ← identity
  0    5        5         5         31  ← 0 is identity
  1    1        8        -4         49  = 7·7
  1    2       15        -9         91  = 7·13
  1    3       22       -14        133  = 7·19
  1    4       29       -19        175  = 7·25
  1    5       36       -24        217  = 7·31
  2    2       28       -20        169  = 13·13
  2    3       41       -31        247  = 13·19
  2    5       67       -53        403  = 13·31
  3    3       60       -48        361  = 19·19
  3    5       98       -82        589  = 19·31
  5    5      160      -140        961  = 31·31
 -1   -1        4        -8        25  = (-5)·(-5)
 -1    1       -6         6       -35  = (-5)·7
 -1    2      -11        13       -65  = (-5)·13
 -2   -2       20       -28       121  = (-11)·(-11)
 -2    3      -35        37      -209  = (-11)·19
 -3   -3       48       -60       289  = (-17)·(-17)
 10    1       71       -49       427  = 61·7
 10    2      132       -108      793  = 61·13</div>
<p>Note: $\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)$ is visible in the last column.</p></div>`,
lean:`${GH}/TPC/Basic.lean#L15`},

{id:"p2.3",ch:"§2 Ops",b:"b-prop",
 t:`Prop 2.3 — Assoc + Comm $\\implies$ $(\\mathbb{Z},\\mathbin{\\circledast})$ and $(\\mathbb{Z},\\mathbin{\\star})$ are CommMonoids`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Both $\\circledast$ and $\\star$ are associative and commutative with identity $0$, making $(\\mathbb{Z},\\circledast)$ and $(\\mathbb{Z},\\star)$ into commutative monoids.</p>
<button class="btnprf" onclick="tp(this)">▶ Show associativity</button>
<div class="prfbody" style="display:none">
<p><strong>Associativity of $\\circledast$:</strong> Let $w=x\\mathbin{\\circledast}y=6xy+x+y$. Then:</p>
<p>$$w\\mathbin{\\circledast}z=6wz+w+z=6(6xy+x+y)z+(6xy+x+y)+z$$
$$=36xyz+6xz+6yz+6xy+x+y+z$$</p>
<p>Now compute from the right. Let $v=y\\mathbin{\\circledast}z=6yz+y+z$. Then:</p>
<p>$$x\\mathbin{\\circledast}v=6xv+x+v=6x(6yz+y+z)+x+(6yz+y+z)$$
$$=36xyz+6xy+6xz+6yz+x+y+z$$</p>
<p>These are identical. $\\checkmark$</p>
<p><strong>Commutativity:</strong> $x\\mathbin{\\circledast}y=6xy+x+y=6yx+y+x=y\\mathbin{\\circledast}x$. $\\checkmark$</p>
<p><strong>Identity:</strong> $x\\mathbin{\\circledast}0=6\\cdot x\\cdot 0+x+0=x$. $\\checkmark$</p>
<p><strong>For $\\star$:</strong> Replace every $6$ with $-6$; the same algebra works since only parity of the leading coefficient matters for commutativity, and the triple-product terms cancel the same way for associativity. $\\square$</p>
<p><strong>Numerical check:</strong> $(1\\mathbin{\\circledast}2)\\mathbin{\\circledast}3=15\\mathbin{\\circledast}3=6\\cdot45+15+3=288$. And $1\\mathbin{\\circledast}(2\\mathbin{\\circledast}3)=1\\mathbin{\\circledast}41=6\\cdot41+1+41=288$. $\\checkmark$</p>
</div>
<div class="cblk"><span class="kw">instance</span>:CommMonoid Nstar <span class="kw">where</span>
  mul_assoc:=mstar_assoc <span class="cm">-- by ring</span>
  mul_comm :=mstar_comm</div>`,
lean:`${GH}/TPC/Monoid.lean#L18`},

{id:"eta",ch:"§2 Ops",b:"b-prop",
 t:`Involution — $\\eta(x)=-x\\implies N^*\\cong N^\\star$, so $\\;(-a)\\mathbin{\\star}(-b)=-(a\\mathbin{\\circledast}b)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Negation $\\eta(x)=-x$ swaps $\\circledast$ and $\\star$: it is a monoid isomorphism $N^*\\cong N^\\star$ that is its own inverse.</p>
<div class="mdisp">$$\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)=(-x)\\mathbin{\\star}(-y)=\\eta(x)\\mathbin{\\star}\\eta(y)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Step 1: $\\eta$ respects the operation.</strong> We need $\\eta(x\\mathbin{\\circledast}y)=\\eta(x)\\mathbin{\\star}\\eta(y)$.</p>
<p><strong>LHS:</strong> $\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)=-6xy-x-y$</p>
<p><strong>RHS:</strong> $\\eta(x)\\mathbin{\\star}\\eta(y)=(-x)\\mathbin{\\star}(-y)=-6(-x)(-y)+(-x)+(-y)=-6xy-x-y$</p>
<p>LHS $=$ RHS. $\\checkmark$</p>
<p><strong>Step 2: $\\eta$ preserves identity.</strong> $\\eta(0)=-0=0$, and $0$ is the identity of both $\\circledast$ and $\\star$. $\\checkmark$</p>
<p><strong>Step 3: $\\eta$ is its own inverse.</strong> $\\eta(\\eta(x))=-(-x)=x$, so $\\eta\\circ\\eta=\\mathrm{id}$. Hence $\\eta$ is bijective, making it an isomorphism. $\\square$</p>
<p><strong>Worked examples:</strong></p>
<div class="cblk">  x    y    x⊛y   η(x⊛y)   η(x)⋆η(y)  Match?
  2    3     41     -41      (-2)⋆(-3)=-6·6-2-3=-41  ✓
  1    1      8      -8      (-1)⋆(-1)=-6·1-1-1=-8   ✓
 -1    2    -11      11      (1)⋆(-2)=-6·(-2)+1-2=11 ✓
  5    5    160    -160      (-5)⋆(-5)=-6·25-10=-160  ✓</div>
<div class="cblk"><span class="kw">def</span> η(x:ℤ):ℤ:=-x
<span class="kw">lemma</span> <span class="fn">η_mstar_sstar</span>(x y:ℤ):η(x⊛y)=η x⋆η y:=<span class="kw">by</span> simp[η,mstar,sstar];ring</div>
</div>
<p><strong>Example:</strong> $\\eta(2\\mathbin{\\circledast}3)=\\eta(41)=-41=(-2)\\mathbin{\\star}(-3)$.</p>
<p>This identity is used in the <a class="iref" onclick="jumpId('t4.1')">Thm 4.1</a> proof: $(-a)\\mathbin{\\star}(-c)=-(a\\mathbin{\\circledast}c)=-k$.</p>`,
lean:`${GH}/TPC/Basic.lean#L70`},

{id:"t2.6",ch:"§2 Ops",b:"b-thm",
 t:`Thm 2.6 — $\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies N^*\\cong(6\\mathbb{Z}+1,\\cdot)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The map $\\phi(x)=6x+1$ is a monoid isomorphism from $(\\mathbb{Z},\\circledast)$ onto $(6\\mathbb{Z}+1,\\cdot)$. Similarly $\\psi(x)=6x-1$ gives $(\\mathbb{Z},\\star)\\cong(6\\mathbb{Z}-1,\\bullet)$. These isomorphisms translate factorization in $\\circledast/\\star$ to ordinary integer factorization.</p>
<div class="mdisp">$$\\phi(x)=6x+1,\\quad\\phi(x\\mathbin{\\circledast}y)=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$$\\psi(x)=6x-1,\\quad\\psi(x\\mathbin{\\star}y)=-[(6x-1)(6y-1)]=\\psi(x)\\bullet\\psi(y)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>$\\phi$ is a homomorphism:</strong>
$$\\phi(x\\mathbin{\\circledast}y)=6(6xy+x+y)+1=36xy+6x+6y+1=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$\\phi(0)=1$ (identity to identity). $\\phi$ is injective since $6x+1=6y+1\\Rightarrow x=y$. The image is exactly $6\\mathbb{Z}+1$ since every $6k+1$ has $k$ as preimage.</p>
<p><strong>$\\psi$ is a homomorphism:</strong>
$$\\psi(x\\mathbin{\\star}y)=6(-6xy+x+y)-1=-36xy+6x+6y-1$$
$$\\psi(x)\\bullet\\psi(y)=-[(6x-1)(6y-1)]=-(36xy-6x-6y+1)=-36xy+6x+6y-1$$
These are equal. $\\psi(0)=-1$ and $(-1)\\bullet(-1)=-1$ confirms identity. $\\square$</p>
<div class="cblk"><span class="kw">def</span> φ(x:ℤ):ℤ:=6*x+1
<span class="kw">lemma</span> <span class="fn">φ_mul</span>(x y:ℤ):φ(x⊛y)=φ x*φ y:=<span class="kw">by</span> simp[φ,mstar];ring</div></div>
<p><strong>Example:</strong> $\\phi(2\\mathbin{\\circledast}3)=\\phi(41)=247=13\\times19=\\phi(2)\\phi(3)$.</p>`,
lean:`${GH}/TPC/Basic.lean#L55`},

{id:"l2.8",ch:"§2 Ops",b:"b-lem",
 t:`Lem 2.8 — $(6u+1)(6v+1)=1$ has no solution with $u,v\\neq0$ — No Zero Divisors`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Neither $\\circledast$ nor $\\star$ has zero divisors: a product of two nonzero integers is always nonzero. This is because $\\phi$ maps $\\circledast$ to ordinary multiplication in $6\\mathbb{Z}+1$, which inherits the no-zero-divisor property from $\\mathbb{Z}$.</p>
<div class="mdisp">$$u,v\\neq0\\implies u\\mathbin{\\circledast}v\\neq0\\text{ and }u\\mathbin{\\star}v\\neq0$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Proof for $\\circledast$:</strong> Apply $\\phi$ to both sides of $u\\mathbin{\\circledast}v=0$:
$$\\phi(u\\mathbin{\\circledast}v)=\\phi(0) \\implies \\phi(u)\\phi(v)=1 \\implies (6u+1)(6v+1)=1$$</p>
<p>In $\\mathbb{Z}$, the only units are $\\pm1$. So $6u+1\\in\\{1,-1\\}$:</p>
<p>$\\bullet$ $6u+1=1 \\implies u=0$<br/>$\\bullet$ $6u+1=-1 \\implies u=-1/3\\notin\\mathbb{Z}$</p>
<p>So $u\\mathbin{\\circledast}v=0$ forces $u=0$ (or $v=0$ by symmetry). Contrapositively: $u,v\\neq0\\implies u\\mathbin{\\circledast}v\\neq0$.</p>
<p><strong>Proof for $\\star$:</strong> Similarly, $\\psi(u\\mathbin{\\star}v)=\\psi(u)\\bullet\\psi(v)$. If $u\\mathbin{\\star}v=0$, then $\\psi(0)=-1$, so $-(6u-1)(6v-1)=-1$, giving $(6u-1)(6v-1)=1$, and the same argument applies. $\\square$</p>
<p><strong>Numerical check:</strong> The smallest nonzero values $u=\\pm1$ give $\\phi(\\pm1)\\in\\{7,-5\\}$, so $|\\phi(u)|\\geq5$. Then $|\\phi(u)\\phi(v)|\\geq25\\neq1$, confirming $u\\mathbin{\\circledast}v\\neq0$.</p>
</div>
<p><strong>Key use:</strong> forces $a,c\\neq0$ from $a\\mathbin{\\circledast}c=k\\neq0$ in the <a class="iref" onclick="jumpId('t4.1')">Thm 4.1</a> proof.</p>`,
lean:`${GH}/TPC/Basic.lean#L90`},

{id:"d2.10",ch:"§2 Ops",b:"b-def",
 t:`Def 2.10 — Product Monoid $M=(\\mathbb{Z}^2,\\otimes)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The ambient monoid $M$ is $\\mathbb{Z}^2$ with coordinate-wise twisted multiplication: $\\circledast$ in the first slot, $\\star$ in the second. The anti-diagonal submonoid $N$ lives inside $M$.</p>
<div class="mdisp">$$(x,y)\\otimes(x',y'):=(x\\mathbin{\\circledast}x',\\;y\\mathbin{\\star}y'),\\quad 1_M=(0,0)$$</div>
<p>Combines <a class="iref" onclick="jumpId('d2.1')">$\\circledast$</a> on the first coordinate and $\\star$ on the second. The anti-diagonal <a class="iref" onclick="jumpId('d3.1')">$N=\\Delta(\\mathbb{Z})$</a> lives inside $M$.</p>
<button class="btnprf" onclick="tp(this)">▶ Show examples</button>
<div class="prfbody" style="display:none"><div class="cblk"> (x,y)       (x',y')       (x,y)⊗(x',y')
 (1, 0)      (1,-8)        (1⊛1,  0⋆(-8))  = ( 8, -8)
 (1,-1)      (2,-2)        (1⊛2,(-1)⋆(-2)) = (15,-15)
 (0, 0)      (x, y)        (0⊛x,  0⋆y)     = ( x,  y)
 (1,-1)      (1,-1)        (1⊛1,(-1)⋆(-1)) = ( 8, -8)
 (2,-2)      (3,-3)        (2⊛3,(-2)⋆(-3)) = (41,-41)
 (1, 0)      (0,-1)        (1⊛0,  0⋆(-1))  = ( 1, -1)</div></div>
<div class="cblk"><span class="kw">def</span> otimes(a b:ℤ×ℤ):ℤ×ℤ:=(mstar a.1 b.1, sstar a.2 b.2)</div>`,
lean:`${GH}/TPC/Basic.lean#L40`},

{id:"d3.1",ch:"§3 Anti-Diag",b:"b-def",
 t:`Def 3.1 — $\\Delta(\\mathbb{Z})=\\{(x,-x)\\}$, $\\;\\Delta(x)\\otimes\\Delta(y)=\\Delta(x\\mathbin{\\circledast}y)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The anti-diagonal $N$ consists of all pairs $(x,-x)$. It is a submonoid of $M$ because products on $N$ stay on $N$ — the involution $\\eta$ ensures the second coordinate is always the negative of the first.</p>
<div class="mdisp">$$N:=\\Delta(\\mathbb{Z})=\\{(x,-x):x\\in\\mathbb{Z}\\}\\subset(\\mathbb{Z}^2,\\otimes)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show $N$ is a submonoid</button>
<div class="prfbody" style="display:none"><p><strong>Closure:</strong> $(x,-x)\\otimes(y,-y)=(x\\mathbin{\\circledast}y,\\;(-x)\\mathbin{\\star}(-y))$. By the <a class="iref" onclick="jumpId('eta')">involution $\\eta$</a>: $(-x)\\mathbin{\\star}(-y)=-(x\\mathbin{\\circledast}y)$. So the result is $(x\\mathbin{\\circledast}y,\\,-(x\\mathbin{\\circledast}y))\\in N$.</p>
<p><strong>Identity:</strong> $(0,0)=(0,-0)\\in N$. $\\square$</p>
<div class="cblk"><span class="kw">def</span> AntiDiag:Set(ℤ×ℤ):={p|p.2=-p.1}
<span class="kw">def</span> Δ(x:ℤ):ℤ×ℤ:=(x,-x)
<span class="kw">lemma</span> <span class="fn">Δ_otimes</span>(x y:ℤ):Δ x⊗Δ y=Δ(x⊛y):=<span class="kw">by</span> simp[Δ,otimes,neg_sstar_neg]</div></div>
<p><strong>Example:</strong> $(1,-1)\\otimes(2,-2)=(1\\mathbin{\\circledast}2,-(1\\mathbin{\\circledast}2))=(15,-15)\\in N$.</p>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L10`},

{id:"cx",ch:"§4 Weak Sat",b:"b-ex",
 t:`Counterexample — $(1,0)\\otimes(1,-8)=(8,-8)\\in N$ but $(1,0)\\notin N$ — NOT Saturated`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">$N$ is <strong>not</strong> saturated: a product can land in $N$ even though neither factor is in $N$. This is why we need the weaker notion of weak saturation.</p>
<div class="mdisp">$$a=(1,0),\\;b=(1,-8):\\quad(1\\mathbin{\\circledast}1,\\;0\\mathbin{\\star}(-8))=(8,-8)\\in N$$</div>
<p>$(1,0)\\notin N$ since $0\\neq-1$. Saturation fails.</p>
<div class="cblk"><span class="kw">theorem</span> <span class="fn">antiDiag_not_saturated</span>:
  ∃ a b:ℤ×ℤ, a∉AntiDiag∧b∉AntiDiag∧a⊗b∈AntiDiag:=<span class="kw">by</span>
  refine⟨(1,0),(1,-8),?_,?_,?_⟩ <span class="cm">-- norm_num closes all three</span></div>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L80`},

{id:"t4.1",ch:"§4 Weak Sat",b:"b-thm",
 t:`Thm 4.1 — $a\\mathbin{\\circledast}c=k\\neq0$ + Lemma 2.8 $\\implies$ $\\Delta(\\mathbb{Z})$ is Weakly Saturated`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Whenever a product in $M$ lands on the anti-diagonal, we can "lift" the factorization: replace any factors $(a,b),(c,d)$ with anti-diagonal elements $(a,-a),(c,-c)$ that give the same product. The no-zero-divisor lemma ensures these lifts are nontrivial.</p>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Setup:</strong> Suppose $(a,b)\\otimes(c,d)=(k,-k)\\in N$ with $(a,b),(c,d)\\neq(0,0)$. We need to find $(a',-a'),(c',-c')\\in N$ with $(a',-a')\\otimes(c',-c')=(k,-k)$.</p>
<p><strong>Step 1:</strong> The first coordinate gives $a\\mathbin{\\circledast}c=k$. Since $(k,-k)\\neq(0,0)$, we have $k\\neq0$, so $a\\mathbin{\\circledast}c\\neq0$.</p>
<p><strong>Step 2:</strong> By <a class="iref" onclick="jumpId('l2.8')">Lemma 2.8</a> (no zero divisors), $a\\mathbin{\\circledast}c\\neq0$ implies $a\\neq0$ and $c\\neq0$.</p>
<p><strong>Step 3:</strong> Set $a'=(a,-a)\\in N$ and $c'=(c,-c)\\in N$. Both are nonidentity since $a,c\\neq0$.</p>
<p><strong>Step 4:</strong> Compute $a'\\otimes c'=(a,-a)\\otimes(c,-c)=(a\\mathbin{\\circledast}c,\\;(-a)\\mathbin{\\star}(-c))$. By the <a class="iref" onclick="jumpId('eta')">involution</a>: $(-a)\\mathbin{\\star}(-c)=-(a\\mathbin{\\circledast}c)=-k$. So $a'\\otimes c'=(k,-k)$. $\\blacksquare$</p>
<p><strong>Worked example:</strong> $(1,0)\\otimes(1,-8)=(8,-8)\\in N$:</p>
<div class="cblk"> Original factors: (1,0) and (1,-8) — neither in N
 First coord: a⊛c = 1⊛1 = 6·1·1+1+1 = 8 = k  ✓
 k≠0, so by Lem 2.8: a=1≠0, c=1≠0
 Lifted factors: (1,-1) and (1,-1) — both in N
 Check: (1,-1)⊗(1,-1) = (1⊛1, (-1)⋆(-1))
      = (8, -6·1+(-1)+(-1)) = (8, -8) ✓</div>
</div>`,
lean:`${GH}/TPC/WeaklySaturated.lean#L45`},

{id:"t5.1",ch:"§5 Irred",b:"b-thm",
 t:`Thm 5.1 — $\\phi(x)\\in\\pm\\mathbb{P}$ and $\\psi(x)\\in\\pm\\mathbb{P}$ $\\iff$ $(x,-x)\\in\\mathrm{Irr}(N)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">An element $(x,-x)$ is irreducible in $N$ if and only if both $6x+1$ and $6x-1$ are $\\pm$primes — i.e., $(6x-1,6x+1)$ is a twin prime pair. This is the bridge between algebra and number theory.</p>
<div class="mdisp">$$(x,-x)\\in\\mathrm{Irr}(N)\\iff 6x+1\\in\\pm\\mathbb{P}\\text{ and }6x-1\\in\\pm\\mathbb{P}\\iff(6x-1,6x+1)\\text{ twin prime}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>($\\Rightarrow$) Irreducible in $N$ $\\implies$ twin prime:</strong></p>
<p>Suppose $(x,-x)\\in\\mathrm{Irr}(N)$ with $x\\neq0$. Any factorization $(x,-x)=(a,-a)\\otimes(b,-b)$ in $N$ gives $x=a\\mathbin{\\circledast}b$, hence $\\phi(x)=\\phi(a)\\phi(b)$ by <a class="iref" onclick="jumpId('t2.6')">Thm 2.6</a>. Since $(x,-x)$ is irreducible, one of $a,b$ must be $0$ (the identity). So $\\phi(x)=\\phi(a)\\cdot1$ or $\\phi(x)=1\\cdot\\phi(b)$ — i.e., $\\phi(x)=6x+1$ has no nontrivial factorization in $6\\mathbb{Z}+1$.</p>
<p>By <a class="iref" onclick="jumpId('c1.5')">Cor 1.5</a> (weak saturation preserves irreducibility), $\\phi(x)$ is irreducible in all of $\\mathbb{Z}$, meaning $6x+1\\in\\pm\\mathbb{P}$. The same argument with $\\psi$ gives $6x-1\\in\\pm\\mathbb{P}$.</p>
<p><strong>($\\Leftarrow$) Twin prime $\\implies$ irreducible in $N$:</strong></p>
<p>If $6x+1$ and $6x-1$ are both $\\pm$prime, suppose $(x,-x)=(a,-a)\\otimes(b,-b)$ with $a,b\\neq0$. Then:
$$\\phi(x)=\\phi(a)\\phi(b) \\quad\\text{with}\\quad |\\phi(a)|,|\\phi(b)|\\geq5$$
But $\\phi(x)=6x+1$ is $\\pm$prime, so it cannot be a product of two integers both $\\geq5$ in absolute value. Contradiction. $\\square$</p>
<p><strong>Worked example ($x=2$):</strong></p>
<div class="cblk"> φ(2)=13 (prime), ψ(2)=11 (prime) → (2,-2) ∈ Irr(N)
 Check: any factor (a,-a)⊗(b,-b)=(2,-2) needs φ(a)φ(b)=13
 Since 13 is prime: φ(a)=±1 or φ(b)=±1
 φ(a)=1 ⟹ a=0 (identity), so factorization is trivial ✓</div>
<p><strong>Worked non-example ($x=4$):</strong></p>
<div class="cblk"> φ(4)=25=5·5, ψ(4)=23 (prime) → (4,-4) ∉ Irr(N)
 Factorization: φ(-1)=-5, so 25=(-5)·(-5)=φ(-1)·φ(-1)
 Hence 4=(-1)⊛(-1): verify 6·1+(-1)+(-1)=4 ✓
 So (4,-4)=(-1,1)⊗(-1,1) is a nontrivial factorization</div>
</div>

{id:"n56",ch:"§6 Norm",b:"b-prop",
 t:`Prop N5–N6 — $\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies |x\\otimes y|=|x||y|$ and strict descent`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem"><strong>N5:</strong> The norm is multiplicative — the norm of a product equals the product of norms. <strong>N6:</strong> In any nontrivial factorization, both factors have strictly smaller norm than the product. Together, these enable strong induction on norm.</p>
<div class="mdisp">$$\\textbf{N5:}\\quad|(x,-x)\\otimes(y,-y)|=|(x,-x)|\\cdot|(y,-y)|$$
$$\\textbf{N6:}\\quad(x,-x)=(a,-a)\\otimes(b,-b),\\;a,b\\neq0\\implies|(a,-a)|,|(b,-b)|<|(x,-x)|$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>N5 (multiplicativity) — step by step:</strong></p>
<p>$$|(x,-x)\\otimes(y,-y)| = |(x\\mathbin{\\circledast}y,\\;-(x\\mathbin{\\circledast}y))|$$
$$= \\phi(x\\mathbin{\\circledast}y)^2 \\qquad\\text{(by definition of norm)}$$
$$= (\\phi(x)\\phi(y))^2 \\qquad\\text{(by }\\phi\\text{ homomorphism, }\\href{javascript:jumpId('t2.6')}{\\text{Thm 2.6}}\\text{)}$$
$$= \\phi(x)^2\\cdot\\phi(y)^2 = |(x,-x)|\\cdot|(y,-y)|$$</p>
<p><strong>N5 numerical check:</strong></p>
<div class="cblk"> (x,-x)    (y,-y)    x⊛y    |(x,-x)|  |(y,-y)|  |(x⊛y,−)|  product
 (1,-1)   (2,-2)     15      49       169       8281    49·169=8281 ✓
 (1,-1)   (1,-1)      8      49        49       2401    49·49=2401  ✓
 (2,-2)   (3,-3)     41     169       361      60889   169·361=60889 ✓
 (-1,1)   (-1,1)      4      25        25        625    25·25=625   ✓</div>
<p><strong>N6 (strict descent) — step by step:</strong></p>
<p>Suppose $(x,-x)=(a,-a)\\otimes(b,-b)$ with $a,b\\neq0$. Then $x=a\\mathbin{\\circledast}b$.</p>
<p>Since $a\\neq0$: $\\phi(a)=6a+1\\neq1$, so $|\\phi(a)|\\geq5$ (next values after $1$ are $\\pm5,\\pm7,\\ldots$).</p>
<p>Similarly $|\\phi(b)|\\geq5$. Then:</p>
<p>$$|(a,-a)|=\\phi(a)^2 < \\phi(a)^2\\cdot\\phi(b)^2 = |(x,-x)|$$</p>
<p>since $\\phi(b)^2\\geq25>1$. The same bound gives $|(b,-b)|<|(x,-x)|$. $\\square$</p>
<div class="cblk"> Descent examples:
 (8,-8) = (1,-1)⊗(1,-1):  |8|=2401, |1|=49   → 49 < 2401 ✓
 (4,-4) = (-1,1)⊗(-1,1):  |4|=625,  |-1|=25  → 25 < 625  ✓
 (15,-15)= (1,-1)⊗(2,-2): |15|=8281, |1|=49, |2|=169 → both < 8281 ✓
 (41,-41)= (2,-2)⊗(3,-3): |41|=60889, |2|=169, |3|=361 → both < 60889 ✓</div>
</div>`,
lean:`${GH}/TPC/Norm.lean#L50`},

{id:"t7.2",ch:"§7 Divisibility",b:"b-thm",
 t:`Thm 7.2 — N5+N6+Weak Sat. $\\implies$ $\\forall n\\in N\\;\\exists q\\in\\mathrm{Irr}(N):q\\mid_{\\otimes}n$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Every nonidentity element of $N$ is divisible (under $\\otimes$) by some irreducible. This is the monoid analogue of "every integer $>1$ has a prime factor", proved by strong induction on the norm $|(k,-k)|$.</p>
<button class="btnprf" onclick="tp(this)">▶ Induction proof</button>
<div class="prfbody" style="display:none">
<p><strong>Proof by strong induction on $|(k,-k)|$.</strong></p>
<p><strong>Base case:</strong> The smallest nonidentity norms are $|(\\pm1,\\mp1)|=25$ and $49$. For $|(k,-k)|=25$: $k=-1$, $\\phi(-1)=-5\\in\\pm\\mathbb{P}$, $\\psi(-1)=-7\\in\\pm\\mathbb{P}$, so $(-1,1)$ is itself irreducible. Similarly $|(1,-1)|=49$ gives twin pair $(5,7)$. Done.</p>
<p><strong>Inductive step:</strong> Assume the result holds for all elements with norm $&lt;|(k,-k)|$.</p>
<p><strong>Case 1:</strong> $(k,-k)$ is irreducible in $N$. Then $q=(k,-k)$ itself is the irreducible divisor, with $(k,-k)=(k,-k)\\otimes(0,0)$. Done.</p>
<p><strong>Case 2:</strong> $(k,-k)$ is reducible in $N$. Then $(k,-k)=(a,-a)\\otimes(b,-b)$ with $a,b\\neq0$. By <a class="iref" onclick="jumpId('n56')">N6</a>, $|(a,-a)|&lt;|(k,-k)|$. By the inductive hypothesis, $(a,-a)$ has an irreducible divisor $q$. Since $q\\mid_{\\otimes}(a,-a)$ and $(a,-a)\\mid_{\\otimes}(k,-k)$, we get $q\\mid_{\\otimes}(k,-k)$.</p>
<p><strong>Case 3:</strong> $(k,-k)$ is irreducible in $N$ but reducible in $M$. This cannot happen by <a class="iref" onclick="jumpId('c1.5')">Cor 1.5</a> + <a class="iref" onclick="jumpId('t4.1')">Thm 4.1</a> (weak saturation preserves irreducibility). But if $(k,-k)$ is reducible in $M$ via $(a,b)\\otimes(c,d)=(k,-k)$ with $(a,b),(c,d)\\notin N$, then weak saturation provides a factorization within $N$, reducing to Case 2. $\\blacksquare$</p>
<p><strong>Worked example — $(14,-14)$:</strong></p>
<div class="cblk"> φ(14) = 85 = 5·17 → reducible
 Need a,b with a⊛b = 14 and φ(a)φ(b) = 85
 φ(-1)=-5, φ(-3)=-17 → (-5)·(-17)=85 ✓
 Check: (-1)⊛(-3) = 6·3+(-1)+(-3) = 14 ✓
 So (14,-14) = (-1,1)⊗(-3,3)
 |-1| = 25,  |-3| = 289  → both < 7225 = |14| ✓
 (-1,1): φ(-1)=-5∈±ℙ, ψ(-1)=-7∈±ℙ → irreducible! Done.</div>
</div>`,
lean:`${GH}/TPC/Norm.lean#L90`},

{id:"c7.5",ch:"§7 Divisibility",b:"b-cor",
 t:`Cor 7.5 — $N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in\\mathrm{Irr}(N)}q\\otimes N$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The nonidentity part of $N$ is exactly covered by irreducible cosets $q\\otimes N$. This is the monoid analogue of $\\mathbb{Z}\\setminus\\{\\pm1\\}=\\bigcup_{p\\in\\mathbb{P}} p\\mathbb{Z}$ from Furstenberg's proof.</p>
<div class="mdisp">$$\\text{Every nonidentity element of }N\\text{ lies in some irreducible coset}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Proof:</strong> Let $(k,-k)\\in N\\setminus\\{(0,0)\\}$. By <a class="iref" onclick="jumpId('t7.2')">Thm 7.2</a>, there exists $(q,-q)\\in\\mathrm{Irr}(N)$ with $(q,-q)\\mid_{\\otimes}(k,-k)$. This means $(k,-k)=(q,-q)\\otimes(m,-m)$ for some $(m,-m)\\in N$. Hence $(k,-k)\\in(q,-q)\\otimes N$, giving $\\subseteq$.</p>
<p>Conversely, every element of $q\\otimes N$ is in $N$ (since $N$ is a submonoid), and $q\\neq0$ implies $q\\otimes(m,-m)\\neq(0,0)$ by <a class="iref" onclick="jumpId('l2.8')">Lem 2.8</a>. So the union $\\subseteq N\\setminus\\{(0,0)\\}$. $\\square$</p>
<p><strong>First few cosets:</strong></p>
<div class="cblk"> q=-1: (-1,1)⊗N = {(-1⊛x, 1⋆(-x)) : x∈ℤ}
   x=0: (-1,1), x=1: (-6,6), x=2: (-11,11), x=-1: (4,-4)
   Image under φ: multiples of φ(-1)=-5 in 6ℤ+1

 q=1:  (1,-1)⊗N = {(1⊛x, -(1⊛x)) : x∈ℤ}
   x=0: (1,-1), x=1: (8,-8), x=2: (15,-15)
   Image under φ: multiples of φ(1)=7 in 6ℤ+1

 q=2:  (2,-2)⊗N = {(2⊛x, -(2⊛x)) : x∈ℤ}
   x=0: (2,-2), x=1: (15,-15), x=2: (28,-28)
   Image under φ: multiples of φ(2)=13 in 6ℤ+1</div>
</div>`,
lean:`${GH}/TPC/Norm.lean#L110`},

{id:"d8.1",ch:"§8 Topology",b:"b-def",
 t:`Def 8.1 — $U_{a,b,c}=\\{(a+cz,\\,b-cz)\\}$, anti-diagonal APs`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Anti-diagonal arithmetic progressions: sets of pairs $(a+cz,\\,b-cz)$ as $z$ ranges over $\\mathbb{Z}$. These form the basic open sets of the topology on $\\mathbb{Z}^2$.</p>
<div class="mdisp">$$U_{a,b,c}=\\{(a+cz,\\;b-cz):z\\in\\mathbb{Z}\\},\\quad c\\neq0$$</div>
<div class="cblk"><span class="kw">def</span> U(a b c:ℤ):Set(ℤ×ℤ):=
  {p|∃z:ℤ, p=(a+c*z, b-c*z)}</div>
<p>$U_{1,-1,7}=\\{\\ldots,(-6,6),(1,-1),(8,-8),(15,-15),\\ldots\\}$</p>
<p>$N\\cap U_{a,b,c}$: empty if $c\\nmid a+b$, else infinite AP in $N$.</p>
<p><strong>Consequence:</strong> No singleton of $N$ is open.</p>`,
lean:`${GH}/TPC/Topology.lean#L18`},

{id:"t8.3",ch:"§8 Topology",b:"b-thm",
 t:`Thm 8.3 — CRT $\\implies$ $\\{U_{a,b,c}\\}$ is a basis and each $U_{a,b,c}$ is clopen`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The sets $U_{a,b,c}$ form a topological basis: they cover $\\mathbb{Z}^2$, their intersections reduce (via CRT) to another basis element, and each is simultaneously open and closed (clopen). This gives $\\mathbb{Z}^2$ a totally disconnected topology.</p>
<button class="btnprf" onclick="tp(this)">▶ Show proof sketch</button>
<div class="prfbody" style="display:none">
<p><strong>B1 (covering):</strong> Every $(x,y)\\in\\mathbb{Z}^2$ lies in $U_{x,y,1}=\\{(x+z,y-z):z\\in\\mathbb{Z}\\}$ (take $z=0$). $\\checkmark$</p>
<p><strong>B2 (intersections):</strong> Let $(x,y)\\in U_{a,b,c}\\cap U_{a',b',c'}$. Then:
$$x=a+cz_1=a'+c'z_2 \\implies a+cz_1\\equiv a'\\pmod{c'}$$
By CRT (since we need $x\\equiv a\\pmod{c}$ and $x\\equiv a'\\pmod{c'}$), there exists $x^*$ with $x^*\\equiv a\\pmod{c}$ and $x^*\\equiv a'\\pmod{c'}$, and the solution set is $x^*+\\mathrm{lcm}(c,c')\\mathbb{Z}$. Since $x+y=a+b=a'+b'$ is constant on each anti-diagonal, the intersection is $U_{x^*,\\,a+b-x^*,\\,\\mathrm{lcm}(c,c')}$. $\\checkmark$</p>
<p><strong>Clopen:</strong> The complement of $U_{a,b,c}$ in the anti-diagonal line $x+y=a+b$ consists of all points with $x\\not\\equiv a\\pmod{c}$. These are exactly:
$$\\mathbb{Z}^2\\setminus U_{a,b,c}=\\bigcup_{k=1}^{|c|-1}U_{a+k,\\,b-k,\\,c}$$
a finite union of basis elements $\\implies$ open. So $U_{a,b,c}$ has open complement $\\implies$ closed. Being both open (by definition) and closed $\\implies$ clopen. $\\square$</p>
<p><strong>Worked CRT example:</strong></p>
<div class="cblk"> U_{1,-1,7} ∩ U_{8,-8,5}:
 Need x ≡ 1 (mod 7) and x ≡ 8 (mod 5)
 x ≡ 1 (mod 7): x ∈ {…,-6, 1, 8, 15, 22, 29, 36, 43,…}
 x ≡ 8 (mod 5): x ∈ {…,-2, 3, 8, 13, 18, 23, 28, 33, 38, 43,…}
 First common: x* = 8 (works: 8≡1 mod 7, 8≡3 mod 5... no!)
 Actually: 8 mod 7 = 1 ✓, 8 mod 5 = 3 ≠ 8 mod 5 ✗
 Try x*=43: 43 mod 7 = 1 ✓, 43 mod 5 = 3 ≠ 8 ✗
 Wait — 8 mod 5 = 3. Need x≡3 mod 5.
 43 mod 5 = 3 ✓! So intersection = U_{43,-43,35}</div>
</div>
<p><strong>Example:</strong> $U_{1,-1,7}\\cap U_{8,-8,5}$: $x\\equiv1\\pmod7$, $x\\equiv8\\pmod5$ gives $x^*=43$, intersection $=U_{43,-43,35}$.</p>
<p><strong>Key:</strong> $N\\cap U_{a,b,c}$ is infinite or empty $\\Rightarrow$ no singleton is open.</p>`,
lean:`${GH}/TPC/Topology.lean#L75`},

{id:"t8.7",ch:"§8 Topology",b:"b-thm",
 t:`Thm 8.7 — Every nonempty open set in $N$ is infinite; no singleton is open`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">In the subspace topology on $N$, every nonempty open set is infinite. This means no singleton $\\{(x,-x)\\}$ can be open — the key topological fact for the final contradiction.</p>
<div class="mdisp">$$N\\cap U_{a,b,c}\\neq\\emptyset\\implies|N\\cap U_{a,b,c}|=\\infty$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Step 1:</strong> Recall $U_{a,b,c}=\\{(a+cz,b-cz):z\\in\\mathbb{Z}\\}$. A point $(x,-x)\\in N$ lies in $U_{a,b,c}$ iff $x=a+cz$ and $-x=b-cz$ for some $z$. Adding: $0=a+b$, i.e., $c\\mid a+b$ is necessary (taking $a+b=0$ in the simplest case).</p>
<p><strong>Step 2 (nonempty $\\implies$ infinite):</strong> If $c\\mid a+b$, write $a+b=cm$. Then for every $z\\in\\mathbb{Z}$:
$$(a+cz,\\;b-cz)=(a+cz,\\;-(a+cz)+(a+b))=(a+cz,\\;-(a+cz)+cm)$$
For this to be in $N$: $b-cz=-(a+cz)$, i.e., $a+b=0$, which holds when $a+b=0$. More generally, when $c\\mid a+b$, the intersection is $\\{(a+cn,-(a+cn)):n\\in\\mathbb{Z}\\}$, parametrised by all $n\\in\\mathbb{Z}$ — an infinite set.</p>
<p><strong>Step 3 (no singleton open):</strong> If $\\{(x,-x)\\}$ were open, it would contain some basic open set $N\\cap U_{a,-a,c}$ (with $(x,-x)$ as a member). But $N\\cap U_{a,-a,c}$ is infinite by Step 2, contradicting $|\\{(x,-x)\\}|=1$. $\\square$</p>
<div class="cblk"> N ∩ U_{1,-1,7}:  a+b = 1+(-1) = 0, and 7|0 ✓
 Elements: z=…,-1,0,1,2,3,…
 z=-1: (1-7, -1+7) = (-6, 6)
 z= 0: (1, -1)
 z= 1: (8, -8)
 z= 2: (15,-15)
 z= 3: (22,-22)   — infinite ✓

 N ∩ U_{2,-1,5}:  a+b = 2+(-1) = 1, and 5∤1
 Intersection = ∅   — as expected</div>
</div>
<p>This is the property that produces the <a class="iref" onclick="jumpId('t9.1')">Thm 9.1</a> contradiction.</p>`,
lean:`${GH}/TPC/Topology.lean#L100`},

{id:"t8.9",ch:"§8 Topology",b:"b-thm",
 t:`Thm 8.9 — $\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies L_p$ homeomorphism $\\implies$ $q\\otimes N$ closed`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Left multiplication $L_p(x)=p\\otimes x$ is a homeomorphism of $N$ onto a clopen subset. Therefore every coset $q\\otimes N$ is closed — this is what makes the finite-union-of-closed-sets argument work in the main theorem.</p>
<div class="mdisp">$$p\\otimes N=V_{p_1,\\,6p_1+1}\\text{ (clopen)}, \\quad L_p\\text{ homeomorphism}\\implies p\\otimes C\\text{ closed for closed }C$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Step 1 — Define $L_p$:</strong> For $p=(p_1,-p_1)\\in N\\setminus\\{(0,0)\\}$, define left multiplication:</p>
<p>$$L_p : N \\to N, \\quad L_p(x,-x) = p\\otimes(x,-x) = (p_1\\mathbin{\\circledast}x,\\;-(p_1\\mathbin{\\circledast}x))$$</p>
<p>This is well-defined since $N=\\Delta(\\mathbb{Z})=\\{(x,-x):x\\in\\mathbb{Z}\\}$ is closed under $\\otimes$ (<a class="iref" onclick="jumpId('d2.10')">Def 2.10</a>).</p>

<p><strong>Step 2 — Continuity:</strong> $L_p = \\mu(p,\\,-)$ is continuous because it is the restriction of the multiplication map $\\mu: N\\times N\\to N$ to $\\{p\\}\\times N$, and $\\mu$ is continuous by <a class="iref" onclick="jumpId('t8.3')">Thm 8.3</a> ($N$ is a topological monoid). Concretely, $\\mu$ is continuous because for any basis element $V_{a,c} = N\\cap U_{a,-a,c}$ and any $(x_0,-x_0),(y_0,-y_0)\\in\\mu^{-1}(V_{a,c})$ (i.e., $x_0\\mathbin{\\circledast}y_0\\equiv a\\pmod{c}$), the product $V_{x_0,c}\\otimes V_{y_0,c}\\subseteq V_{a,c}$, since for $x=x_0+cs$, $y=y_0+ct$:</p>
<p>$$x\\mathbin{\\circledast}y = 6xy+x+y = 6(x_0+cs)(y_0+ct)+(x_0+cs)+(y_0+ct)$$
$$= 6x_0 y_0 + x_0 + y_0 + c\\bigl(6x_0 t + 6y_0 s + 6cst + s + t\\bigr)$$
$$= \\underbrace{x_0\\mathbin{\\circledast}y_0}_{\\equiv\\,a\\,(\\mathrm{mod}\\,c)} + c\\bigl((6x_0+1)t + (6y_0+1)s + 6cst\\bigr) \\;\\equiv\\; a \\pmod{c} \\;\\checkmark$$</p>

<p><strong>Step 3 — Open map (basis elements $\\to$ basis elements):</strong> We show $L_p$ maps each basis element of $N$ to another basis element, which proves $L_p$ is an open map onto its image. Take a basis element $V_{x_0,c}=\\{(x_0+cn,\\,-(x_0+cn)):n\\in\\mathbb{Z}\\}$. For each $n$:</p>
<p>$$p_1\\mathbin{\\circledast}(x_0+cn) = 6p_1(x_0+cn)+p_1+(x_0+cn)$$</p>
<p>Expand the first term:</p>
<p>$$= 6p_1 x_0 + 6p_1 cn + p_1 + x_0 + cn$$</p>
<p>Group the constant part and the $n$-dependent part:</p>
<p>$$= \\underbrace{(6p_1 x_0 + p_1 + x_0)}_{=\\,p_1\\,\\circledast\\, x_0} \\;+\\; \\underbrace{(6p_1 + 1)}_{=\\,\\phi(p_1)} \\cdot c \\cdot n$$</p>
<p>Therefore:</p>
<p>$$L_p(V_{x_0,c}) = \\{(p_1\\mathbin{\\circledast}x_0 + \\phi(p_1)\\,c\\,n,\\; -(p_1\\mathbin{\\circledast}x_0 + \\phi(p_1)\\,c\\,n)) : n\\in\\mathbb{Z}\\} = V_{p_1\\,\\circledast\\, x_0,\\;\\phi(p_1)\\,c}$$</p>
<p>This is a basis element of $N$ with starting point $p_1\\mathbin{\\circledast}x_0$ and step size $\\phi(p_1)\\cdot c$. Since $L_p$ maps every basis element to a basis element, $L_p$ is an open map onto its image. $\\checkmark$</p>

<p><strong>Step 4 — Injectivity:</strong> Suppose $p_1\\mathbin{\\circledast}x=p_1\\mathbin{\\circledast}y$. Recall from <a class="iref" onclick="jumpId('t2.6')">Thm 2.6</a> that $\\phi$ is a monoid isomorphism with $\\phi(a\\mathbin{\\circledast}b)=\\phi(a)\\phi(b)$. Applying $\\phi$ to both sides:</p>
<p>$$\\phi(p_1)\\,\\phi(x) = \\phi(p_1)\\,\\phi(y)$$</p>
<p>Now $p_1\\neq 0$ implies $\\phi(p_1)=6p_1+1\\neq 1$, and more critically $\\phi(p_1)\\neq 0$ (since $6p_1+1=0$ would require $p_1=-\\tfrac{1}{6}\\notin\\mathbb{Z}$). So we may cancel $\\phi(p_1)$ to get $\\phi(x)=\\phi(y)$, hence $x=y$ by injectivity of $\\phi$. $\\checkmark$</p>

<p><strong>Step 5 — Image is clopen:</strong> As $x$ ranges over $\\mathbb{Z}$, $\\phi(x)=6x+1$ ranges over all of $6\\mathbb{Z}+1$. So:</p>
<p>$$\\phi(L_p(N)) = \\{\\phi(p_1)\\,\\phi(x) : x\\in\\mathbb{Z}\\} = \\phi(p_1)\\cdot(6\\mathbb{Z}+1)$$</p>
<p>Pulling back through $\\phi^{-1}$: $L_p(N) = V_{p_1,\\,\\phi(p_1)}$, the arithmetic progression $\\{(p_1+\\phi(p_1)\\,n,\\;-(p_1+\\phi(p_1)\\,n)):n\\in\\mathbb{Z}\\}$. This is a basis element, hence clopen in $N$. $\\checkmark$</p>

<p><strong>Step 6 — $L_p$ is a homeomorphism:</strong> Steps 2–5 show $L_p$ is continuous, open, and injective with clopen image $V_{p_1,\\,\\phi(p_1)}$. A continuous open bijection onto its image is a homeomorphism. $\\checkmark$</p>

<p><strong>Step 7 — Cosets are closed:</strong> For any $q\\in\\mathrm{Irr}(N)$, we have $q\\otimes N = L_q(N) = V_{q_1,\\,\\phi(q_1)}$, which is clopen (hence closed) by Step 5. More generally, for any closed $C\\subseteq N$: $L_q(C)$ is closed in $L_q(N)$ (since $L_q$ is a homeomorphism), and $L_q(N)$ is clopen in $N$, so a closed subset of a clopen set is closed in the ambient space. Therefore $q\\otimes C$ is closed in $N$. $\\square$</p>
<p><strong>Worked example ($p_1=1$):</strong></p>
<div class="cblk"> L_{(1,-1)}: (x,-x) ↦ (1⊛x, -(1⊛x))
 φ(1)=7, so image has step size 7:
 x=0: 1⊛0 = 1   → (1,-1)
 x=1: 1⊛1 = 8   → (8,-8)
 x=2: 1⊛2 = 15  → (15,-15)
 x=-1: 1⊛(-1)=-6 → (-6,6)
 Image = V_{1,7} = {(1+7n, -(1+7n)) : n∈ℤ} — clopen ✓</div>
</div>
<p><strong>Example ($p_1=1$):</strong> $L_{(1,-1)}$ maps $N$ onto $V_{1,7}=\\{(1+7n,-(1+7n))\\}$, step $7=\\phi(1)$.</p>`,
lean:`${GH}/TPC/Topology.lean#L155`},

{id:"t9.1",ch:"§9 Main",b:"b-thm",
 t:`Thm 9.1 — Covering + Closed Cosets + No Open Singletons $\\implies$ $|\\mathrm{Irr}(N)|=\\infty$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">If the set of irreducibles were finite, then $N\\setminus\\{(0,0)\\}$ would be a finite union of closed sets (hence closed), making $\\{(0,0)\\}$ open. But no singleton is open in $N$. Contradiction — so there are infinitely many irreducibles.</p>
<div class="mdisp">$$N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in\\mathrm{Irr}(N)}q\\otimes N$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Ingredient 1 — Covering (<a class="iref" onclick="jumpId('c7.5')">Cor 7.5</a>):</strong>
$$N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in\\mathrm{Irr}(N)}q\\otimes N$$
Every nonidentity element has an irreducible divisor, so it lies in some irreducible coset.</p>
<p><strong>Ingredient 2 — Each coset is closed (<a class="iref" onclick="jumpId('t8.9')">Thm 8.9</a>):</strong> For each $q\\in\\mathrm{Irr}(N)$, the left multiplication $L_q$ is a homeomorphism, so $q\\otimes N=L_q(N)$ is clopen (hence closed) in $N$.</p>
<p><strong>Ingredient 3 — No singleton is open (<a class="iref" onclick="jumpId('t8.7')">Thm 8.7</a>):</strong> Every nonempty open set in $N$ is infinite.</p>
<p><strong>Proof by contradiction:</strong> Suppose $\\mathrm{Irr}(N)$ is finite, say $\\mathrm{Irr}(N)=\\{q_1,\\ldots,q_n\\}$. Then:</p>
<p>$$N\\setminus\\{(0,0)\\}=q_1\\otimes N\\cup\\cdots\\cup q_n\\otimes N$$</p>
<p>Each $q_i\\otimes N$ is closed (Ingredient 2). A finite union of closed sets is closed. Therefore $N\\setminus\\{(0,0)\\}$ is closed in $N$.</p>
<p>But then $\\{(0,0)\\}=N\\setminus(N\\setminus\\{(0,0)\\})$ is open in $N$ — a singleton open set. This contradicts Ingredient 3. $\\blacksquare$</p>
<p><strong>Summary of the logical chain:</strong></p>
<div class="cblk"> Finite Irr(N)
   → N\{0} = finite union of closed sets
   → N\{0} is closed
   → {(0,0)} is open
   → But every open set in N is infinite (Thm 8.7)
   → Contradiction!
   → |Irr(N)| = ∞  □</div>
<div class="cblk"><span class="kw">theorem</span> <span class="fn">infinitely_many_irred</span>:
  {q:ℤ|Irred q}.Infinite</div></div>
<p>This is <a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank">Furstenberg's argument</a> verbatim.</p>`,
lean:`${GH}/TPC/Main.lean#L60`},

{id:"c9.3",ch:"§9 Main",b:"b-cor",
 t:`Cor 9.3 — Thm 5.1 + Thm 9.1 $\\implies$ Infinitely Many Twin Prime Pairs`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Combining the algebraic equivalence (irreducibles $=$ twin primes) with the topological result (infinitely many irreducibles): there are infinitely many twin prime pairs.</p>
<div class="mdisp">$$\\boxed{\\bigl|\\{x\\in\\mathbb{Z}:6x-1\\in\\pm\\mathbb{P}\\text{ and }6x+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Step 1 (<a class="iref" onclick="jumpId('t5.1')">Thm 5.1</a>):</strong> Establishes a bijection:
$$\\mathrm{Irr}(N) \\longleftrightarrow \\{x\\in\\mathbb{Z}: 6x-1\\in\\pm\\mathbb{P}\\text{ and }6x+1\\in\\pm\\mathbb{P}\\}$$
Each irreducible $(x,-x)\\in N$ corresponds to the twin prime pair $(6x-1,6x+1)$.</p>
<p><strong>Step 2 (<a class="iref" onclick="jumpId('t9.1')">Thm 9.1</a>):</strong> The topological argument proves $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p><strong>Conclusion:</strong> Combining Steps 1 and 2:
$$|\\mathrm{Irr}(N)|=\\infty \\implies |\\{\\text{twin prime pairs}\\}|=\\infty$$</p>
<p>Concretely: every twin prime pair $(p,p+2)$ with $p\\equiv5\\pmod6$ corresponds to $x=\\frac{p+1}{6}$:
$(5,7)\\to x=1$, $(11,13)\\to x=2$, $(17,19)\\to x=3$, $(29,31)\\to x=5$, $(41,43)\\to x=7$, $\\ldots$ $\\blacksquare$</p>
</div>
<div class="mdisp">$$\\phi,\\psi\\text{ isom.}\\to\\text{Weak sat.}\\to\\text{Irred equiv.}\\to\\text{Norm}\\to\\text{Covering}\\to U_{a,b,c}\\to\\text{Cosets closed}\\to\\mathbf{TPC}$$</div>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime_conjecture" target="_blank" class="tpill">Twin Prime Conjecture</a>
<a href="${GH}/TPC/Main.lean" target="_blank" class="tpill"><i class="bi bi-code-slash"></i> Main.lean</a>
<a href="${GH}/PAPER.md" target="_blank" class="tpill"><i class="bi bi-file-text"></i> PAPER.md</a>
<a href="https://leanprover-community.github.io/mathlib4_docs/" target="_blank" class="tpill">Mathlib4 docs</a>
</div>`}
];

const chapters=[...new Set(cards.map(c=>c.ch))];
let cur=0;

function render(){
  const c=cards[cur];
  const src=c.lean?`<a href="${c.lean}" target="_blank" class="srclink"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  history.replaceState(null,"","#"+c.id);
  document.getElementById("mc").innerHTML=`
    <div class="ctop">
      <div class="badge-row">
        <span class="tbadge ${c.b}">${c.b.replace("b-","")}</span>
        <span style="font-family:var(--mono);font-size:.62rem;color:#555">${cur+1}/${cards.length}</span>
        ${src}
        <button class="btn-copy" onclick="copyLink(this)" title="Copy link to this card"><i class="bi bi-link-45deg"></i> Link</button>
      </div>
      <div class="eq-title">${c.t}</div>
    </div>
    <div class="cbody">${c.body}</div>`;
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pt").textContent=`Card ${cur+1} of ${cards.length}`;
  document.getElementById("nc").textContent=`${cur+1} / ${cards.length}`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  // chapter strip
  document.getElementById("chs").innerHTML=chapters.map(ch=>{
    const act=cards[cur].ch===ch?" active":"";
    return `<button class="chbtn${act}" onclick="jumpCh('${ch}')">${ch}</button>`;
  }).join("");
  // minimap
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mmdot${i===cur?" active":""}" onclick="jump(${i})" title="${i+1}"></div>`
  ).join("");
  if(window.renderMathInElement){
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],
      throwOnError:false
    });
  }
}

function go(d){
  cur=Math.max(0,Math.min(cards.length-1,cur+d));
  const el=document.getElementById("mc");
  el.style.animation="none";
  requestAnimationFrame(()=>{
    el.style.animation=d>0?"slideLeft .28s cubic-bezier(.4,0,.2,1)":"slideRight .28s cubic-bezier(.4,0,.2,1)";
    render();
  });
  window.scrollTo({top:0,behavior:"smooth"});
}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpId(id){const i=cards.findIndex(c=>c.id===id);if(i>=0)jump(i);}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){
  const el=btn.nextElementSibling;
  const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";
  btn.innerHTML=open?"▼ Hide proof":"▶ Show proof";
}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);
});
// Deep link via hash (e.g. #t8.9)
const _hash = location.hash.replace('#','');
if (_hash) { const hi = cards.findIndex(c=>c.id===_hash); if(hi>=0) cur=hi; }
// Read jump target from index.html via sessionStorage
const _saved = sessionStorage.getItem('tpcCard');
if (_saved !== null) { cur = Math.min(parseInt(_saved,10), cards.length-1); sessionStorage.removeItem('tpcCard'); }
render();
function copyLink(btn){
  const url = location.origin + location.pathname + '#' + cards[cur].id;
  navigator.clipboard.writeText(url).then(()=>{
    btn.classList.add('copied');
    btn.innerHTML='<i class="bi bi-check2"></i> Copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<i class="bi bi-link-45deg"></i> Link';},1800);
  });
}

/* ── Dependency Graph ── */
let cyInst=null;
function toggleGraph(){
  const ov=document.getElementById("graphOverlay");
  ov.classList.toggle("active");
  if(ov.classList.contains("active")&&!cyInst) initGraph();
  if(cyInst) setTimeout(()=>cyInst.resize().fit(null,40),100);
}
function initGraph(){
  const N=[
    {id:"d1.1", l:"Def 1.1\nWeak Sat.", t:"def"},
    {id:"c1.5", l:"Cor 1.5\nIrred ⇔", t:"cor"},
    {id:"d2.1", l:"Def 2.1\n⊛ and ⋆", t:"def"},
    {id:"p2.3", l:"Prop 2.3\nCommMonoid", t:"prop"},
    {id:"eta",  l:"Involution\nη(x)=−x", t:"prop"},
    {id:"t2.6", l:"Thm 2.6\nφ, ψ isom.", t:"thm"},
    {id:"l2.8", l:"Lem 2.8\nNo 0-div", t:"lem"},
    {id:"d2.10",l:"Def 2.10\nM=(ℤ²,⊗)", t:"def"},
    {id:"d3.1", l:"Def 3.1\nΔ(ℤ)⊂M", t:"def"},
    {id:"cx",   l:"Cex\nNot Sat.", t:"ex"},
    {id:"t4.1", l:"Thm 4.1\nWeak Sat.", t:"thm"},
    {id:"t5.1", l:"Thm 5.1\nIrred⇔Twin", t:"thm"},
    {id:"d6.1", l:"Def 6.1\nNorm", t:"def"},
    {id:"n56",  l:"Prop N5–N6\nMult+Desc", t:"prop"},
    {id:"t7.2", l:"Thm 7.2\nIrred Div", t:"thm"},
    {id:"c7.5", l:"Cor 7.5\nCovering", t:"cor"},
    {id:"d8.1", l:"Def 8.1\nU_{a,b,c}", t:"def"},
    {id:"t8.3", l:"Thm 8.3\nBasis+Clopen", t:"thm"},
    {id:"t8.7", l:"Thm 8.7\nNo Open {pt}", t:"thm"},
    {id:"t8.9", l:"Thm 8.9\nCosets Closed", t:"thm"},
    {id:"t9.1", l:"Thm 9.1\n|Irr|=∞", t:"thm"},
    {id:"c9.3", l:"Cor 9.3\n∞ Twin Primes", t:"cor"}
  ];
  const E=[
    ["d1.1","c1.5"],["d1.1","t4.1"],
    ["d2.1","p2.3"],["d2.1","eta"],["d2.1","t2.6"],["d2.1","l2.8"],["d2.1","d2.10"],
    ["p2.3","t2.6"],
    ["eta","d2.10"],["eta","d3.1"],
    ["d2.10","d3.1"],
    ["d3.1","cx"],["d3.1","t4.1"],
    ["l2.8","t4.1"],
    ["c1.5","t5.1"],["t2.6","t5.1"],["t4.1","t5.1"],
    ["t2.6","d6.1"],
    ["t2.6","n56"],["d6.1","n56"],
    ["n56","t7.2"],["t4.1","t7.2"],
    ["t7.2","c7.5"],
    ["d8.1","t8.3"],
    ["t8.3","t8.7"],
    ["t2.6","t8.9"],["t8.3","t8.9"],["d8.1","t8.9"],
    ["c7.5","t9.1"],["t8.9","t9.1"],["t8.7","t9.1"],
    ["t5.1","c9.3"],["t9.1","c9.3"]
  ];
  const colors={def:"#1e90ff",thm:"#f5e642",prop:"#aaa",lem:"#666",cor:"#7ec8e3",ex:"#555"};
  cyInst=cytoscape({
    container:document.getElementById("cy"),
    elements:[
      ...N.map(n=>({data:{id:n.id,label:n.l,ntype:n.t}})),
      ...E.map(([s,t])=>({data:{source:s,target:t}}))
    ],
    style:[
      {selector:"node",style:{
        "label":"data(label)","text-wrap":"wrap","text-valign":"center","text-halign":"center",
        "font-family":"'IBM Plex Mono',monospace","font-size":"10px","color":"#111",
        "text-max-width":"100px",
        "width":110,"height":48,"shape":"round-rectangle",
        "background-color":"#1e90ff","background-opacity":0.95,
        "border-width":2,"border-color":"#333","border-opacity":0.8,
        "padding":"8px","text-margin-y":0,
        "shadow-blur":8,"shadow-color":"rgba(0,0,0,0.4)","shadow-offset-x":0,"shadow-offset-y":2,"shadow-opacity":0.5
      }},
      {selector:"node[ntype='def']",style:{"background-color":"#1a6dd4","color":"#fff","border-color":"#0d5bbd"}},
      {selector:"node[ntype='thm']",style:{"background-color":"#f0dd30","color":"#1a1a1a","border-color":"#b8a800","font-weight":"bold"}},
      {selector:"node[ntype='prop']",style:{"background-color":"#c8c8c8","color":"#222","border-color":"#888"}},
      {selector:"node[ntype='lem']",style:{"background-color":"#4a4a5a","color":"#e8e8e8","border-color":"#333"}},
      {selector:"node[ntype='cor']",style:{"background-color":"#b8ddf5","color":"#0a4f8a","border-color":"#3a9ad9"}},
      {selector:"node[ntype='ex']",style:{"background-color":"#2a2a2a","color":"#999","border-color":"#444"}},
      {selector:"edge",style:{
        "width":2,"line-color":"#556","target-arrow-color":"#99a",
        "target-arrow-shape":"triangle-backcurve",
        "curve-style":"unbundled-bezier",
        "control-point-distances":[20],"control-point-weights":[0.5],
        "arrow-scale":0.9,"opacity":0.65,
        "line-cap":"round"
      }},
      {selector:"edge.highlighted",style:{"line-color":"#1e90ff","target-arrow-color":"#1e90ff","opacity":1,"width":3,"z-index":999}},
      {selector:"node:active",style:{"overlay-opacity":0}},
      {selector:"node.hover",style:{"border-width":3,"border-color":"#fff","z-index":999,"shadow-blur":16,"shadow-color":"rgba(30,144,255,0.6)"}},
      {selector:"node.dimmed",style:{"opacity":0.25}},
      {selector:"edge.dimmed",style:{"opacity":0.1}}
    ],
    layout:{
      name:"dagre",
      rankDir:"TB",
      nodeSep:40,
      rankSep:70,
      edgeSep:20,
      ranker:"network-simplex",
      spacingFactor:1.05
    },
    minZoom:0.3,maxZoom:3,wheelSensitivity:0.3,
    boxSelectionEnabled:false
  });
  cyInst.on("tap","node",function(evt){
    const id=evt.target.id();
    toggleGraph();
    jumpId(id);
  });
  cyInst.on("mouseover","node",function(e){
    var n=e.target;
    n.addClass("hover");
    var conn=n.connectedEdges();
    var neighbors=conn.connectedNodes();
    cyInst.elements().not(neighbors).not(conn).not(n).addClass("dimmed");
    conn.addClass("highlighted");
    document.getElementById("cy").style.cursor="pointer";
  });
  cyInst.on("mouseout","node",function(e){
    e.target.removeClass("hover");
    cyInst.elements().removeClass("dimmed highlighted");
    document.getElementById("cy").style.cursor="default";
  });
}
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"&&document.getElementById("graphOverlay").classList.contains("active")) toggleGraph();
});
</script>
