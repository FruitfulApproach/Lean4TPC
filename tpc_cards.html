<style>
:root{
  /* Core palette */
  --purple:#7c3aed;--purple-dk:#6d28d9;--purple-lt:#ede9fe;--purple-glow:rgba(124,58,237,.25);
  --green:#10b981;--green-dk:#059669;--green-lt:#d1fae5;--green-glow:rgba(16,185,129,.2);
  --blue:#3b82f6;--blue-dk:#2563eb;--blue-lt:#dbeafe;--blue-glow:rgba(59,130,246,.2);
  --orange:#f59e0b;--orange-dk:#d97706;--orange-lt:#fef3c7;--orange-glow:rgba(245,158,11,.2);
  --g50:#fafafa;--g100:#f4f4f5;--g200:#e4e4e7;--g300:#d4d4d8;--g400:#a1a1aa;--g500:#71717a;--g600:#52525b;--g800:#27272a;--g900:#18181b;
  --black:#0f0f0f;--white:#ffffff;

  /* Typography */
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Lora',Georgia,serif;
  --mono:'JetBrains Mono','Fira Code',monospace;

  /* Spacing & shape */
  --r:18px;--r-sm:10px;--r-lg:24px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --sh-lg:0 12px 40px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --sh-purple:0 8px 30px rgba(124,58,237,.18);
  --sh-glow:0 0 20px rgba(124,58,237,.12);
  --t:.2s cubic-bezier(.4,0,.2,1);--t-bounce:.35s cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--g50);color:var(--g900);min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ── Header ── */
.hdr{background:var(--g900);color:var(--white);padding:.9rem 1.6rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;
  position:relative;z-index:300}
.hdr h1{font-family:var(--sans);font-size:clamp(.82rem,2.4vw,1rem);font-weight:600;
  color:rgba(255,255,255,.88);letter-spacing:-.01em}
.hdr h1 span{background:linear-gradient(135deg,var(--purple),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:700}
.hdr-links{display:flex;gap:.35rem;flex-wrap:wrap}

/* ── Progress ── */
.prog{background:var(--white);padding:.5rem 1.6rem .45rem;
  border-bottom:1px solid var(--g200)}
.prog-track{height:4px;background:var(--g200);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue),var(--green));
  border-radius:99px;transition:width .5s var(--t)}
.prog-txt{font-family:var(--mono);font-size:.65rem;color:var(--g400);margin-top:.2rem;
  letter-spacing:.03em}

/* ── Chapter strip ── */
.chstrip{background:var(--white);border-bottom:1px solid var(--g200);
  padding:.5rem 1.4rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.chstrip::-webkit-scrollbar{display:none}
.chbtn{font-family:var(--mono);font-size:.64rem;font-weight:500;letter-spacing:.03em;
  padding:.3rem .8rem;border-radius:99px;border:1.5px solid var(--g200);
  background:var(--white);color:var(--g500);cursor:pointer;margin-right:.35rem;
  transition:all var(--t)}
.chbtn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-lt)}
.chbtn.active{background:var(--purple);color:var(--white);border-color:var(--purple);
  box-shadow:0 2px 12px var(--purple-glow)}

/* ── Stage ── */
.stage{min-height:calc(100vh - 210px);display:flex;align-items:flex-start;
  justify-content:center;padding:2rem 1rem 6.5rem;
  background:linear-gradient(180deg,var(--g100) 0%,var(--g50) 40%,var(--white) 100%)}

/* ── Card ── */
.pcard{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-md);
  max-width:800px;width:100%;overflow:hidden;
  animation:slideUp .35s cubic-bezier(.4,0,.2,1);
  transition:box-shadow var(--t),transform var(--t);
  border:1px solid var(--g200)}
.pcard:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

.ctop::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;
  background:radial-gradient(circle,var(--purple-glow) 0%,transparent 70%);

.b-thm{background:var(--orange);color:var(--black)}

.b-lem{background:var(--g600);color:var(--g200)}

.eq-title{font-family:var(--serif);font-size:clamp(.95rem,2.8vw,1.22rem);
  font-weight:400;color:rgba(255,255,255,.92);line-height:1.45;position:relative;z-index:1}

.cbody{padding:1.4rem 1.6rem 1.2rem}

.cbody p:last-child{margin-bottom:0}
.mdisp{background:linear-gradient(135deg,var(--purple-lt) 0%,var(--blue-lt) 100%);
  border-left:4px solid var(--purple);

.cblk{font-family:var(--mono);font-size:.74rem;background:var(--g900);color:#e4e4e7;

.cbody a:hover{background:var(--purple-lt);border-radius:3px;border-bottom-color:var(--purple)}

.iref:hover{color:var(--purple);border-bottom-color:var(--purple);background:var(--purple-lt);

/* ── Source link ── */
.srclink{font-family:var(--mono);font-size:.64rem;color:var(--g400);
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:99px;

/* ── Minimap ── */

/* ── Graph overlay ── */
.graph-overlay{position:fixed;inset:0;z-index:9999;
  background:rgba(15,15,15,.94);backdrop-filter:blur(8px);

.graph-close{font-size:1.4rem;color:var(--g400);cursor:pointer;background:none;border:none;

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--purple)}

/* ── Selection ── */
::selection{background:var(--purple-lt);color:var(--purple-dk)}
</style>

<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[

// ═══════════════════════════════════════════════════════════════
// §0  ABSTRACT
// ═══════════════════════════════════════════════════════════════

{id:"abs",ch:"Abstract",b:"b-abs",
 t:`Infinitely Many Twin Primes via a Generated Diagonal Submonoid`,
 body:`<p>This paper presents a <strong>novel algebraic-topological proof</strong> that there are infinitely many twin prime pairs. The approach generalises Furstenberg's 1955 topological proof of the infinitude of primes to a carefully constructed <em>generated diagonal submonoid</em> $N\\subseteq(\\mathbb{Z}^2,\\otimes)$, whose irreducible elements correspond bijectively to twin prime pairs $(6k-1,\\,6k+1)$.</p>

<p><strong>The operations.</strong> On $\\mathbb{Z}$, define:</p>
<div class="mdisp">$$x\\mathbin{\\circledast}y = 6xy+x+y \\qquad\\text{and}\\qquad x\\star y = -6xy+x+y$$</div>
<p>Both are commutative monoids with identity $0$. The maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ are isomorphisms onto $(6\\mathbb{Z}+1,\\,\\cdot\\,)$ and $(6\\mathbb{Z}-1,\\,\\bullet\\,)$ respectively, where $a\\bullet b:=-ab$.</p>

<p><strong>The product monoid.</strong> Form $M=(\\mathbb{Z}^2,\\,\\otimes)$ with $(a,b)\\otimes(c,d)=(a\\mathbin{\\circledast}c,\\;b\\star d)$.</p>

<p><strong>The generated diagonal submonoid.</strong> Define the <em>twin-prime generators</em>:</p>
<div class="mdisp">$$G = \\bigl\\{(k,k) : 6k+1\\in\\pm\\mathbb{P}\\text{ and }6k-1\\in\\pm\\mathbb{P}\\bigr\\}$$</div>
<p>and the generated submonoid $N=\\langle G\\rangle^{\\otimes}$, which sits inside the diagonal $\\{(x,x)\\}\\subset\\mathbb{Z}^2$. We prove $\\mathrm{Irr}(N)=G$: the irreducibles of $N$ are precisely the twin-prime generators.</p>

<p><strong>The topology.</strong> We equip $N$ with the subspace topology from the <em>product Furstenberg topology</em> on $\\mathbb{Z}^2$ and verify the three Furstenberg hypotheses:</p>
<div class="mdisp">
$$\\textbf{(H1)}\\;N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in G}q\\otimes N \\qquad
\\textbf{(H2)}\\;q\\otimes N\\text{ clopen} \\qquad
\\textbf{(H3)}\\;\\{(0,0)\\}\\text{ not open}$$
</div>

<p><strong>The punchline.</strong> If $G$ were finite, $N\\setminus\\{(0,0)\\}$ would be a finite union of closed sets, making $\\{(0,0)\\}$ open — contradicting (H3). Therefore $|G|=\\infty$, and there are <strong>infinitely many twin prime pairs</strong>.</p>

<div class="mdisp" style="background:linear-gradient(135deg,#ede9fe,#dbeafe);border-left-color:#7c3aed">
<strong>Standing notation:</strong>
$$\\mathbin{\\circledast}:\\; x\\mathbin{\\circledast}y = 6xy+x+y, \\qquad \\star:\\; x\\star y = -6xy+x+y$$
$$\\phi(x)=6x+1, \\qquad \\psi(x)=6x-1, \\qquad \\eta(x)=-x$$
$$M = (\\mathbb{Z}^2,\\,\\otimes), \\quad (a,b)\\otimes(c,d)=(a\\mathbin{\\circledast}c,\\; b\\star d)$$
$$G=\\{(k,k):6k\\pm1\\in\\pm\\mathbb{P}\\}, \\quad N=\\langle G\\rangle^{\\otimes}$$
</div>

<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tpill">Twin Primes (Wikipedia)</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tpill">Furstenberg's Proof</a>
<a href="https://en.wikipedia.org/wiki/Euler%27s_theorem" target="_blank" class="tpill">Euler's Theorem</a>
<a href="https://leanprover-community.github.io/" target="_blank" class="tpill">Lean 4</a>
<a href="https://en.wikipedia.org/wiki/Monoid" target="_blank" class="tpill">Monoid theory</a>
</div>`,lean:null},

// ═══════════════════════════════════════════════════════════════
// §1  OPERATIONS
// ═══════════════════════════════════════════════════════════════

{id:"d1.1",ch:"§1 Operations",b:"b-def",
 t:`Def 1.1 — $x\\mathbin{\\circledast}y=6xy+x+y$, $\\;x\\mathbin{\\star}y=-6xy+x+y$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Two binary operations on $\\mathbb{Z}$, both with identity $0$. They are "twisted multiplications" designed so that $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ become monoid homomorphisms.</p>
<div class="mdisp">$$x\\mathbin{\\circledast}y:=6xy+x+y\\quad(\\texttt{mstar}),\\qquad x\\mathbin{\\star}y:=-6xy+x+y\\quad(\\texttt{sstar})$$
$$\\text{identity }=0\\text{ in both}$$</div>
<div class="cblk"><span class="kw">def</span> <span class="fn">mstar</span> (x y:ℤ):ℤ:=6*x*y+x+y
<span class="kw">def</span> <span class="fn">sstar</span> (x y:ℤ):ℤ:=-6*x*y+x+y</div>
<div class="cblk"> x    y    x⊛y     x⋆y
 1    1      8      -4
 2    3     41     -31
-1   -1      4      -8

<button class="btnprf" onclick="tp(this)">▶ Show extended table</button>

{id:"p1.2",ch:"§1 Operations",b:"b-prop",
 t:`Prop 1.2 — $(\\mathbb{Z},\\mathbin{\\circledast})$ and $(\\mathbb{Z},\\mathbin{\\star})$ are Commutative Monoids`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Both $\\circledast$ and $\\star$ are associative and commutative with identity $0$.</p>
<button class="btnprf" onclick="tp(this)">▶ Show associativity</button>
<div class="prfbody" style="display:none">
<p><strong>Associativity of $\\circledast$:</strong> $(x\\mathbin{\\circledast}y)\\mathbin{\\circledast}z$:</p>
<p>$$=6(6xy+x+y)z+(6xy+x+y)+z=36xyz+6xz+6yz+6xy+x+y+z$$</p>
<p>$x\\mathbin{\\circledast}(y\\mathbin{\\circledast}z)$:</p>
<p>$$=6x(6yz+y+z)+x+(6yz+y+z)=36xyz+6xy+6xz+6yz+x+y+z$$</p>
<p>Identical. $\\checkmark$ Commutativity: $6xy+x+y=6yx+y+x$. $\\checkmark$ Identity: $x\\mathbin{\\circledast}0=x$. $\\checkmark$</p>
<p>For $\\star$: the same algebra works with $-6$ replacing $6$. $\\square$</p>
</div>
<div class="cblk"><span class="kw">instance</span>:CommMonoid Nstar <span class="kw">where</span>
  mul_assoc:=mstar_assoc <span class="cm">-- by ring</span>
  mul_comm :=mstar_comm</div>`,
lean:`${GH}/TPC/Monoid.lean#L18`},

{id:"t1.3",ch:"§1 Operations",b:"b-thm",
 t:`Thm 1.3 — $\\phi(x\\mathbin{\\circledast}y)=\\phi(x)\\phi(y)\\implies (\\mathbb{Z},\\circledast)\\cong(6\\mathbb{Z}+1,\\cdot)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The map $\\phi(x)=6x+1$ is a monoid isomorphism from $(\\mathbb{Z},\\circledast)$ onto $(6\\mathbb{Z}+1,\\cdot)$. Similarly $\\psi(x)=6x-1$ gives $(\\mathbb{Z},\\star)\\cong(6\\mathbb{Z}-1,\\bullet)$ where $a\\bullet b:=-ab$.</p>
<div class="mdisp">$$\\phi(x)=6x+1,\\quad\\phi(x\\mathbin{\\circledast}y)=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$$\\psi(x)=6x-1,\\quad\\psi(x\\mathbin{\\star}y)=-[(6x-1)(6y-1)]=\\psi(x)\\bullet\\psi(y)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none"><p><strong>$\\phi$ homomorphism:</strong>
$$\\phi(x\\mathbin{\\circledast}y)=6(6xy+x+y)+1=36xy+6x+6y+1=(6x+1)(6y+1)=\\phi(x)\\phi(y)$$
$\\phi(0)=1$. $\\phi$ injective since $6x+1=6y+1\\Rightarrow x=y$. Image $=6\\mathbb{Z}+1$.</p>
<p><strong>$\\psi$ homomorphism:</strong>
$$\\psi(x\\mathbin{\\star}y)=6(-6xy+x+y)-1=-36xy+6x+6y-1$$
$$\\psi(x)\\bullet\\psi(y)=-(6x-1)(6y-1)=-36xy+6x+6y-1$$
Equal. $\\psi(0)=-1$ and $(-1)\\bullet(-1)=-1$. $\\square$</p>
</div>
<p><strong>Example:</strong> $\\phi(2\\mathbin{\\circledast}3)=\\phi(41)=247=13\\times19=\\phi(2)\\phi(3)$.</p>`,
lean:`${GH}/TPC/Basic.lean#L55`},

{id:"eta",ch:"§1 Operations",b:"b-prop",
 t:`Prop 1.4 — Swap Automorphism $\\eta(x)=-x$: $\\;(-a)\\mathbin{\\star}(-b)=-(a\\mathbin{\\circledast}b)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Negation $\\eta(x)=-x$ is a monoid isomorphism $(\\mathbb{Z},\\circledast)\\xrightarrow{\\sim}(\\mathbb{Z},\\star)$.</p>
<div class="mdisp">$$\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)=(-x)\\mathbin{\\star}(-y)=\\eta(x)\\mathbin{\\star}\\eta(y)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>LHS:</strong> $\\eta(x\\mathbin{\\circledast}y)=-(6xy+x+y)=-6xy-x-y$</p>
<p><strong>RHS:</strong> $(-x)\\mathbin{\\star}(-y)=-6(-x)(-y)+(-x)+(-y)=-6xy-x-y$</p>
<p>LHS $=$ RHS. $\\eta(0)=0$. $\\eta\\circ\\eta=\\mathrm{id}$, so $\\eta$ is a bijection. $\\square$</p>
</div>
<p><strong>Consequence:</strong> $x$ is $\\circledast$-irreducible $\\iff$ $-x$ is $\\star$-irreducible.</p>`,
lean:`${GH}/TPC/Basic.lean#L70`},

{id:"l1.5",ch:"§1 Operations",b:"b-lem",
 t:`Lem 1.5 — No Zero Divisors: $u,v\\neq0\\implies u\\circledast v\\neq0$ and $u\\star v\\neq0$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Neither operation has zero divisors. This is because $\\phi$ maps into $(6\\mathbb{Z}+1,\\cdot)$, which inherits the no-zero-divisor property from $\\mathbb{Z}$.</p>
<div class="mdisp">$$u\\mathbin{\\circledast}v=0\\implies \\phi(u)\\phi(v)=(6u+1)(6v+1)=1\\implies u=0\\text{ or }v=0$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>$u\\mathbin{\\circledast}v=0 \\implies \\phi(u)\\phi(v)=1$. In $\\mathbb{Z}$: $6u+1\\in\\{\\pm1\\}$. $6u+1=1\\implies u=0$. $6u+1=-1\\implies u=-\\tfrac{1}{3}\\notin\\mathbb{Z}$. So $u=0$.</p>
<p>For $\\star$: same argument via $\\psi$. $\\square$</p>
<p><strong>Bound:</strong> If $u\\neq 0$, then $|\\phi(u)|=|6u+1|\\geq 5$ (smallest: $\\phi(\\pm1)\\in\\{7,-5\\}$).</p>
</div>`,
lean:`${GH}/TPC/Basic.lean#L90`},

// ═══════════════════════════════════════════════════════════════
// §2  PRODUCT MONOID & GENERATED SUBMONOID
// ═══════════════════════════════════════════════════════════════

{id:"d2.1",ch:"§2 Product",b:"b-def",
 t:`Def 2.1 — Product Monoid $M=(\\mathbb{Z}^2,\\otimes)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The ambient monoid $M$ is $\\mathbb{Z}^2$ with $\\circledast$ in the first slot and $\\star$ in the second.</p>
<div class="mdisp">$$(a,b)\\otimes(c,d):=(a\\mathbin{\\circledast}c,\\;b\\mathbin{\\star}d),\\quad 1_M=(0,0)$$</div>
<div class="cblk"><span class="kw">def</span> otimes(a b:ℤ×ℤ):ℤ×ℤ:=(mstar a.1 b.1, sstar a.2 b.2)</div>
<button class="btnprf" onclick="tp(this)">▶ Show examples</button>
<div class="prfbody" style="display:none"><div class="cblk"> (a,b)       (c,d)         (a,b)⊗(c,d)
 (1, 1)      (1, 1)        (1⊛1,  1⋆1)   = ( 8, -4)
 (1, 1)      (2, 2)        (1⊛2,  1⋆2)   = (15, -9)
 (0, 0)      (x, y)        (0⊛x,  0⋆y)   = ( x,  y)
 (1, 1)      (3, 3)        (1⊛3,  1⋆3)   = (22,-14)</div></div>`,
lean:`${GH}/TPC/Basic.lean#L40`},

{id:"d2.2",ch:"§2 Product",b:"b-def",
 t:`Def 2.2 — Generated Diagonal Submonoid $N=\\langle G\\rangle^{\\otimes}$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The central object: a submonoid of $M$ freely generated by pairs $(k,k)$ where both $6k\\pm1$ are $\\pm$prime — encoding twin prime pairs.</p>

<p>An element $k\\in\\mathbb{Z}$ is a <strong>twin-prime generator</strong> if both $\\phi(k)=6k+1$ and $\\psi(k)=6k-1$ are $\\pm$prime. Define:</p>
<div class="mdisp">$$G = \\bigl\\{(k,k) : 6k+1\\in\\pm\\mathbb{P}\\text{ and }6k-1\\in\\pm\\mathbb{P}\\bigr\\}$$</div>

<p>The <strong>generated diagonal submonoid</strong> is:</p>
<div class="mdisp" style="background:linear-gradient(135deg,#d1fae5,#dbeafe);border-left-color:#10b981">
$$\\boxed{\\;N = \\langle G \\rangle^{\\otimes} = \\bigl\\{\\, g_1\\otimes g_2 \\otimes \\cdots \\otimes g_m : g_i\\in G,\\; m\\geq 0\\,\\bigr\\}}$$
</div>
<p>including the empty product $(0,0)=1_N$. Every element of $N$ has the form $(x,x)$ for some $x\\in\\mathbb{Z}$, so $N$ sits inside the diagonal.</p>

<div class="cblk"> k    6k-1   6k+1   Twin pair?   (k,k) ∈ G?
 1       5      7    (5,7) ✓       YES
 2      11     13    (11,13) ✓     YES
 3      17     19    (17,19) ✓     YES
 5      29     31    (29,31) ✓     YES
 6      35     37    35=5·7 ✗      NO
 7      41     43    (41,43) ✓     YES
10      59     61    (59,61) ✓     YES
-1      -7     -5    (-7,-5) ✓     YES
-2     -13    -11    (-13,-11) ✓   YES</div>

<p><strong>Why not the full diagonal?</strong> The diagonal $\\{(k,k):k\\in\\mathbb{Z}\\}$ is <em>not</em> a submonoid: $(k,k)\\otimes(l,l)=(k\\mathbin{\\circledast}l,\\;k\\star l)$, and $k\\mathbin{\\circledast}l=k\\star l$ requires $12kl=0$, which fails for general $k,l\\neq0$.</p>

<p><strong>Why not the anti-diagonal?</strong> The anti-diagonal $\\{(x,-x)\\}$ <em>is</em> a submonoid (via $(-a)\\star(-b)=-(a\\circledast b)$), but that same identity collapses it so irreducibility depends only on $\\circledast$, encoding primes $\\equiv\\pm1\\pmod6$ rather than twin primes.</p>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L10`},

// ═══════════════════════════════════════════════════════════════
// §3  IRREDUCIBILITY
// ═══════════════════════════════════════════════════════════════

{id:"l3.1",ch:"§3 Irreducibility",b:"b-lem",
 t:`Lem 3.1 — Diagonal Closure: $(k,k)\\otimes(l,l)=(k\\circledast l,\\;k\\star l)$ with $k\\circledast l\\neq k\\star l$ in general`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Products of diagonal elements do not stay on the diagonal unless the generators satisfy special properties. This is why $N$ must be <em>generated</em> rather than defined as a level set.</p>
<div class="mdisp">$$(k,k)\\otimes(l,l) = (k\\mathbin{\\circledast}l,\\; k\\star l) = (6kl+k+l,\\; -6kl+k+l)$$</div>
<p>These two coordinates differ by $12kl$. They are equal iff $kl=0$.</p>
<button class="btnprf" onclick="tp(this)">▶ Show examples</button>
<div class="prfbody" style="display:none"><div class="cblk"> (k,k)     (l,l)     k⊛l    k⋆l    equal?
 (1,1)    (1,1)       8     -4      NO  (12·1≠0)
 (1,1)    (2,2)      15     -9      NO  (12·2≠0)
 (1,1)    (0,0)       1      1      YES (identity)
 (2,2)    (3,3)      41    -31      NO  (12·6≠0)</div>
<p>This shows the full diagonal is NOT closed under $\\otimes$. But $N=\\langle G\\rangle^{\\otimes}$ is a submonoid by definition (closure under $\\otimes$ is guaranteed since we take all finite products).</p>
</div>`,
lean:null},

{id:"t3.2",ch:"§3 Irreducibility",b:"b-thm",
 t:`Thm 3.2 — Generators are Irreducible: $G\\subseteq\\mathrm{Irr}(N)$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Every twin-prime generator $(k,k)\\in G$ is irreducible in $N$ — it cannot be written as a nontrivial $\\otimes$-product of elements of $N$.</p>
<div class="mdisp">$$(k,k)\\in G \\implies (k,k)\\in\\mathrm{Irr}(N)$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Suppose $(k,k)=(a,a')\\otimes(b,b')$ for some $(a,a'),(b,b')\\in N\\setminus\\{(0,0)\\}$. Since every element of $N$ is a product of generators $(g_i,g_i)$, and generators have the form $(g,g)$, we need to check if the product can produce an element on the diagonal.</p>
<p>Actually, since $N=\\langle G\\rangle^{\\otimes}$ and every generator has the form $(g,g)$, every element of $N$ can be written as a $\\otimes$-product of such generators. But the first component is the $\\circledast$-product of the first coordinates and the second component is the $\\star$-product of the second coordinates. So if $(a,a')\\in N$, then $a'$ is the $\\star$-product of the same generator values that gave $a$ via $\\circledast$.</p>
<p><strong>Key constraint:</strong> Suppose $(k,k) = (a,a')\\otimes(b,b')$ with both nonidentity. The first component gives $k = a\\mathbin{\\circledast}b$ and the second gives $k = a'\\star b'$. Since both factors are in $N$, each is built from generators. But consider: $(k,k)$ being a generator means it is a "single-letter word" in $G$. If it factored as a product of two nonidentity elements, each built from at least one generator, then $(k,k)$ would be a product of $\\geq 2$ generators.</p>
<p>In $N$, applying $\\phi$ to the first component: $\\phi(k)=6k+1\\in\\pm\\mathbb{P}$. If $(k,k)=g_1\\otimes g_2\\otimes\\cdots\\otimes g_m$ with $m\\geq 2$, then $\\phi(k)=\\prod_i \\phi(g_i)=\\prod_i(6g_i+1)$. Each $|6g_i+1|\\geq 5$ (since $g_i\\neq 0$), so $|\\phi(k)|\\geq 25$. But $\\phi(k)\\in\\pm\\mathbb{P}$ means $|\\phi(k)|$ is prime, and primes cannot be written as a product of integers each $\\geq 5$. Contradiction. $\\square$</p>
</div>
<p><strong>Example:</strong> $(1,1)\\in G$ since $(5,7)$ is a twin prime pair. $\\phi(1)=7\\in\\mathbb{P}$, so $(1,1)$ cannot be a product of $\\geq 2$ generators.</p>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L95`},

{id:"t3.3",ch:"§3 Irreducibility",b:"b-thm",
 t:`Thm 3.3 — Irreducibles are Generators: $\\mathrm{Irr}(N)\\subseteq G$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Conversely, every irreducible of $N$ is a generator — no other element of $N$ can be irreducible.</p>
<div class="mdisp">$$(q,q')\\in\\mathrm{Irr}(N),\\;(q,q')\\neq(0,0) \\implies (q,q')\\in G$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Every nonidentity element of $N=\\langle G\\rangle^{\\otimes}$ is a $\\otimes$-product of generators: $(q,q')=g_1\\otimes\\cdots\\otimes g_m$ with $m\\geq 1$ and each $g_i\\in G$. If $m\\geq 2$, then $(q,q')=(g_1)\\otimes(g_2\\otimes\\cdots\\otimes g_m)$ is a nontrivial factorization in $N$ (both factors nonidentity), contradicting irreducibility. So $m=1$ and $(q,q')=g_1\\in G$. $\\square$</p>
</div>

<p><strong>Combining Thms 3.2 and 3.3:</strong></p>
<div class="mdisp" style="background:linear-gradient(135deg,#d1fae5,#dbeafe);border-left-color:#10b981">
$$\\mathrm{Irr}(N) = G = \\bigl\\{(k,k) : (6k-1,\\,6k+1)\\in\\pm\\mathbb{P}^2\\bigr\\}$$
$$\\text{Irreducibles of } N \\;\\longleftrightarrow\\; \\text{twin prime pairs}$$
</div>`,
lean:`${GH}/TPC/AntiDiagonal.lean#L95`},

// ═══════════════════════════════════════════════════════════════
// §4  DECOMPOSABILITY
// ═══════════════════════════════════════════════════════════════

{id:"l4.1",ch:"§4 Decomposability",b:"b-lem",
 t:`Lem 4.1 — $x\\in\\{a\\mathbin{\\circledast}b:a,b\\neq0\\}$ $\\iff$ $6x+1$ is composite`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">An integer $x$ can be written as $a\\mathbin{\\circledast}b$ with $a,b\\neq0$ if and only if $\\phi(x)=6x+1$ is composite.</p>
<div class="mdisp">$$x\\in\\{a\\mathbin{\\circledast}b:a,b\\neq0\\} \\;\\iff\\; 6x+1\\text{ is composite}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>($\\Rightarrow$):</strong> If $x=a\\mathbin{\\circledast}b$ with $a,b\\neq0$, then $\\phi(x)=\\phi(a)\\phi(b)=(6a+1)(6b+1)$ with $|6a+1|,|6b+1|\\geq 5$. So $|\\phi(x)|\\geq 25$, and $\\phi(x)$ factors nontrivially. $\\checkmark$</p>
<p><strong>($\\Leftarrow$):</strong> If $6x+1$ is composite, write $6x+1=cd$ with $|c|,|d|>1$. Since $6x+1\\equiv 1\\pmod6$, both factors satisfy $c,d\\equiv\\pm1\\pmod6$.</p>
<p><em>Case 1 — both $\\equiv 1$:</em> $c=6a+1,d=6b+1$, then $\\phi(a)\\phi(b)=\\phi(x)$ gives $a\\mathbin{\\circledast}b=x$. $\\checkmark$</p>
<p><em>Case 2 — both $\\equiv -1$:</em> $c=6\\alpha-1,d=6\\beta-1$, set $a=-\\alpha,b=-\\beta$. Then $\\phi(a)\\phi(b)=(-c)(-d)=cd=\\phi(x)$, giving $a\\mathbin{\\circledast}b=x$. $\\checkmark$ $\\square$</p>
</div>
<p><strong>Corollary:</strong> $x$ is $\\circledast$-irreducible $\\iff$ $6x+1\\in\\pm\\mathbb{P}$.</p>`,
lean:`${GH}/TPC/Irreducible.lean#L10`},

{id:"l4.2",ch:"§4 Decomposability",b:"b-lem",
 t:`Lem 4.2 — $x\\in\\{a\\star b:a,b\\neq0\\}$ $\\iff$ $6x-1$ is composite`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The $\\star$-analogue: $x$ is $\\star$-decomposable iff $\\psi(x)=6x-1$ is composite.</p>
<div class="mdisp">$$x\\in\\{a\\star b:a,b\\neq0\\} \\;\\iff\\; 6x-1\\text{ is composite}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>($\\Rightarrow$):</strong> If $x=a\\star b$ with $a,b\\neq0$, then $\\psi(x)=-(6a-1)(6b-1)$ with $|6a-1|,|6b-1|\\geq 5$. So $|\\psi(x)|\\geq 25$, composite. $\\checkmark$</p>
<p><strong>($\\Leftarrow$):</strong> If $6x-1$ is composite, write $6x-1=cd$. Since $cd\\equiv -1\\pmod6$, exactly one factor $\\equiv 1$ and one $\\equiv -1\\pmod6$. Say $c=6\\alpha-1,d=6\\beta+1$. Then $-(6\\alpha-1)(6(-\\beta)-1)=\\psi(\\alpha)\\bullet\\psi(-\\beta)=\\psi(\\alpha\\star(-\\beta))$, giving $x=\\alpha\\star(-\\beta)$. $\\square$</p>
</div>
<p><strong>Corollary:</strong> $x$ is $\\star$-irreducible $\\iff$ $6x-1\\in\\pm\\mathbb{P}$.</p>

<div class="cblk"> x    6x+1  ⊛-irred?   6x-1  ⋆-irred?   Twin?
 1       7    YES         5    YES       YES (5,7)
 2      13    YES        11    YES       YES (11,13)
 3      19    YES        17    YES       YES (17,19)
 4      25     NO        23    YES       NO
 5      31    YES        29    YES       YES (29,31)
 6      37    YES        35     NO       NO
 7      43    YES        41    YES       YES (41,43)
 8      49     NO        47    YES       NO
10      61    YES        59    YES       YES (59,61)
12      73    YES        71    YES       YES (71,73)</div>`,
lean:`${GH}/TPC/Irreducible.lean#L10`},

// ═══════════════════════════════════════════════════════════════
// §5  NO-ZERO-COMPONENT LEMMA
// ═══════════════════════════════════════════════════════════════

{id:"l5.1",ch:"§5 Structure",b:"b-lem",
 t:`Lem 5.1 — No Zero Component: $(a,0)\\in N \\implies a=0$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">No nonidentity element of $N$ can have a zero component. This ensures factorizations in $N$ are "genuine" and cannot degenerate.</p>
<div class="mdisp">$$(a,0)\\in N \\implies (a,0)=(0,0) \\qquad\\text{(and symmetrically for }(0,b)\\text{)}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Every nonidentity element of $N$ is a product of generators $(g_i,g_i)\\in G$. Write $(a,0)=(g_1,g_1)\\otimes\\cdots\\otimes(g_m,g_m)$. The second component gives:</p>
<div class="mdisp">$$0 = g_1\\star g_2\\star\\cdots\\star g_m$$</div>
<p>Applying $\\psi$:</p>
<div class="mdisp">$$\\psi(g_1\\star\\cdots\\star g_m) = \\psi(g_1)\\bullet\\cdots\\bullet\\psi(g_m) = (-1)^{m-1}\\prod_{i=1}^m(6g_i-1)$$</div>
<p>Since $\\psi(0)=-1$: $(-1)^{m-1}\\prod(6g_i-1) = -1$, so $\\bigl|\\prod(6g_i-1)\\bigr| = 1$.</p>
<p>But each $g_i\\in G$ has $6g_i-1\\in\\pm\\mathbb{P}$, so $|6g_i-1|\\geq 5$ (the smallest twin prime pair gives $|6\\cdot 1-1|=5$). Therefore $|\\prod(6g_i-1)|\\geq 5^m\\geq 5$ for $m\\geq 1$. This contradicts $|\\prod|=1$, so $m=0$ and $(a,0)=(0,0)$. $\\square$</p>
</div>
<p><strong>Consequence:</strong> If $(q,q')\\in N$ and $q=0$, then $q'=0$ too (and vice versa). Every nonidentity element of $N$ has both components nonzero.</p>`,
lean:null},

{id:"p5.2",ch:"§5 Structure",b:"b-prop",
 t:`Prop 5.2 — $N$ is a Free Commutative Monoid on $G$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Every element of $N$ has a <strong>unique</strong> factorization into generators (up to reordering). This follows because the $\\phi$-values of generators are distinct primes.</p>
<div class="mdisp">$$\\text{If }\\; g_1\\otimes\\cdots\\otimes g_m = h_1\\otimes\\cdots\\otimes h_n \\;\\text{ in }N\\text{, then } m=n \\text{ and } \\{g_i\\}=\\{h_j\\} \\text{ as multisets}$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Apply $\\phi$ to the first components. For generators $(g_i,g_i)\\in G$, the first component of the product is $g_1\\mathbin{\\circledast}\\cdots\\mathbin{\\circledast}g_m$, and $\\phi(g_1\\mathbin{\\circledast}\\cdots\\mathbin{\\circledast}g_m)=\\prod_i \\phi(g_i)=\\prod_i(6g_i+1)$.</p>
<p>Each $\\phi(g_i)=6g_i+1\\in\\pm\\mathbb{P}$ is a <em>distinct</em> prime (up to sign). The equality $\\prod_i \\phi(g_i)=\\prod_j \\phi(h_j)$ in $\\mathbb{Z}$ then forces the multisets $\\{\\phi(g_i)\\}$ and $\\{\\phi(h_j)\\}$ to agree (by unique factorization in $\\mathbb{Z}$). Since $\\phi$ is injective, $\\{g_i\\}=\\{h_j\\}$. $\\square$</p>
<p><strong>Note:</strong> Distinct generators may share the same $|\\phi|$-value only if $g$ and $g'$ give the same prime. But $\\phi(g)=\\phi(g')\\implies g=g'$, so generators are uniquely determined by their $\\phi$-value.</p>
</div>`,
lean:null},

// ═══════════════════════════════════════════════════════════════
// §6  COVERING (H1)
// ═══════════════════════════════════════════════════════════════

{id:"t6.1",ch:"§6 Covering",b:"b-thm",
 t:`Thm 6.1 (H1) — $N\\setminus\\{(0,0)\\}=\\bigcup_{q\\in G}q\\otimes N$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Every nonidentity element of $N$ is divisible by a generator (= irreducible). This is hypothesis (H1) of the Furstenberg criterion.</p>
<div class="mdisp">$$\\text{Every nonidentity }(x,x')\\in N\\text{ lies in }q\\otimes N\\text{ for some }q\\in G$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Every nonidentity element of $N=\\langle G\\rangle^{\\otimes}$ is a product of generators: $(x,x')=g_1\\otimes\\cdots\\otimes g_m$ with $m\\geq 1$. Then $(x,x')=g_1\\otimes(g_2\\otimes\\cdots\\otimes g_m)\\in g_1\\otimes N$, with $g_1\\in G$. $\\square$</p>
<p>This is immediate from the definition of $N$ as a generated submonoid — no norm or induction needed.</p>
</div>
<p><strong>Contrast with the anti-diagonal case:</strong> For $\\Delta(\\mathbb{Z})=\\{(x,-x)\\}$, proving (H1) required a multiplicative norm and Noetherian descent. Here, the generated structure gives (H1) for free.</p>`,
lean:null},

// ═══════════════════════════════════════════════════════════════
// §7  TOPOLOGY
// ═══════════════════════════════════════════════════════════════

{id:"d7.1",ch:"§7 Topology",b:"b-def",
 t:`Def 7.1 — Product Furstenberg Topology on $\\mathbb{Z}^2$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The product Furstenberg topology on $\\mathbb{Z}^2$: the product of two copies of the Furstenberg topology on $\\mathbb{Z}$, whose basis consists of two-sided arithmetic progressions.</p>
<div class="mdisp">$$\\text{Basis on }\\mathbb{Z}:\\quad a+d\\mathbb{Z} = \\{a+dn : n\\in\\mathbb{Z}\\},\\quad d\\geq 1$$</div>
<div class="mdisp">$$\\text{Basis on }\\mathbb{Z}^2:\\quad (a+d\\mathbb{Z})\\times(b+e\\mathbb{Z}),\\quad a,b\\in\\mathbb{Z},\\; d,e\\geq 1$$</div>
<p>We give $N$ the <strong>subspace topology</strong> inherited from $\\mathbb{Z}^2$. A basis for the topology on $N$ consists of:</p>
<div class="mdisp">$$N\\cap\\bigl((a+d\\mathbb{Z})\\times(b+e\\mathbb{Z})\\bigr)$$</div>
<p>Each set $a+d\\mathbb{Z}$ is clopen in the Furstenberg topology (its complement is $\\bigcup_{j=1}^{d-1}(a+j)+d\\mathbb{Z}$, a finite union of open sets). So basis sets in $\\mathbb{Z}^2$ are clopen, and their intersections with $N$ are clopen in $N$.</p>`,
lean:null},

// ═══════════════════════════════════════════════════════════════
// §8  CLOPEN COSETS (H2)
// ═══════════════════════════════════════════════════════════════

{id:"t8.1",ch:"§8 Clopen Cosets",b:"b-thm",
 t:`Thm 8.1 (H2) — For each $q=(k,k)\\in G$, the coset $q\\otimes N$ is clopen in $N$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Every irreducible coset is simultaneously open and closed in $N$. This is hypothesis (H2) of the Furstenberg criterion.</p>
<div class="mdisp">$$q\\otimes N = N\\cap\\bigl(\\{x\\equiv k\\!\\pmod{6k+1}\\}\\times\\mathbb{Z}\\bigr) \\quad\\text{is clopen in }N$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p><strong>Step 1 — Characterise the coset via congruences.</strong></p>
<p>If $(a,a')\\in q\\otimes N$, then $(a,a')=(k,k)\\otimes(r,r')$ for some $(r,r')\\in N$. The first component gives $a=k\\mathbin{\\circledast}r=6kr+k+r$. Applying $\\phi$: $\\phi(a)=\\phi(k)\\cdot\\phi(r)=(6k+1)(6r+1)$, so $(6k+1)\\mid\\phi(a)$, i.e., $(6k+1)\\mid(6a+1)$.</p>
<p>Now $6a+1\\equiv 0\\pmod{6k+1}$ iff $6a\\equiv -1\\pmod{6k+1}$ iff $6a\\equiv 6k\\pmod{6k+1}$ iff $a\\equiv k\\pmod{6k+1}$ (since $\\gcd(6,6k+1)=1$). So the first-component condition is $a\\in k+(6k+1)\\mathbb{Z}$.</p>

<p><strong>Step 2 — Converse inclusion.</strong></p>
<p>If $(a,a')\\in N$ and $a\\equiv k\\pmod{6k+1}$, then $(6k+1)\\mid(6a+1)$. By unique factorization in $N$ (<a class="iref" onclick="jumpId('p5.2')">Prop 5.2</a>), write the factorization of $(a,a')$ in terms of generators. The first component satisfies $\\phi(a)=\\prod_i\\phi(g_i)$. Since $(6k+1)$ is prime (as $(k,k)\\in G$) and divides $\\phi(a)$, it must divide some $\\phi(g_i)=6g_i+1$. Since each $\\phi(g_i)\\in\\pm\\mathbb{P}$ and $|6k+1|=|\\phi(g_i)|$ forces $g_i=k$ (by injectivity of $\\phi$). So $(k,k)$ appears among the generators, giving $(a,a')\\in q\\otimes N$.</p>

<p><strong>Step 3 — Clopenness.</strong></p>
<p>The set $\\{x\\equiv k\\pmod{6k+1}\\} = k+(6k+1)\\mathbb{Z}$ is clopen in the Furstenberg topology on $\\mathbb{Z}$, and $\\mathbb{Z}$ is clopen. Their product is clopen in $\\mathbb{Z}^2$. Intersecting with $N$ gives a clopen set in $N$. $\\square$</p>
</div>

<div class="cblk"> Generator (k,k)   φ(k)=6k+1   Coset condition on first coord
 (1,1)                  7        a ≡ 1 (mod 7)
 (2,2)                 13        a ≡ 2 (mod 13)
 (3,3)                 19        a ≡ 3 (mod 19)
 (5,5)                 31        a ≡ 5 (mod 31)
 (7,7)                 43        a ≡ 7 (mod 43)</div>`,
lean:null},

// ═══════════════════════════════════════════════════════════════
// §9  NO OPEN SINGLETONS (H3)
// ═══════════════════════════════════════════════════════════════

{id:"t9.1",ch:"§9 No Singletons",b:"b-thm",
 t:`Thm 9.1 (H3) — $\\{(0,0)\\}$ is not open in $N$ (unconditional)`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">No singleton of $N$ is open. The proof uses only <strong>Euler's theorem</strong> and the existence of the single twin prime pair $(5,7)$ — it does not assume infinitely many twin primes.</p>
<div class="mdisp">$$\\{(0,0)\\}\\text{ is not open in }N \\subseteq \\mathbb{Z}^2$$</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Suppose $\\{(0,0)\\}$ is open in $N$. Then there exist $d,e\\geq 1$ such that:</p>
<div class="mdisp">$$N\\cap\\bigl(d\\mathbb{Z}\\times e\\mathbb{Z}\\bigr) = \\{(0,0)\\}$$</div>
<p>We produce a nonzero element of $N\\cap(d\\mathbb{Z}\\times e\\mathbb{Z})$ using powers of the generator $(1,1)\\in G$ (which exists since $(5,7)$ is a twin prime pair).</p>

<p><strong>Powers of $(1,1)$.</strong> Write $(1,1)^{\\otimes n}=(s_n,t_n)\\in N$. Under $\\phi$:</p>
<div class="mdisp">$$\\phi(s_n) = \\phi(1)^n = 7^n \\quad\\implies\\quad s_n = \\frac{7^n - 1}{6}$$</div>
<p>Under $\\psi$ for the second component: $\\psi(t_n) = (\\psi(1))^{\\bullet n} = (-1)^{n-1}\\cdot 5^n$. For even $n$:</p>
<div class="mdisp">$$\\psi(t_n) = -5^n \\quad\\implies\\quad t_n = \\frac{-5^n + 1}{6} = \\frac{1-5^n}{6}$$</div>

<p><strong>Finding $n$ with $d\\mid s_n$ and $e\\mid t_n$.</strong></p>
<p>We need $d\\mid\\frac{7^n-1}{6}$ and $e\\mid\\frac{1-5^n}{6}$, i.e., $7^n\\equiv 1\\pmod{6d}$ and $5^n\\equiv 1\\pmod{6e}$ (for even $n$).</p>
<p>By <strong>Euler's theorem</strong>: $\\gcd(7,6d)=1$ and $\\gcd(5,6e)=1$, so $7^{\\varphi(6d)}\\equiv 1\\pmod{6d}$ and $5^{\\varphi(6e)}\\equiv 1\\pmod{6e}$.</p>
<p>Take $n = 2\\cdot\\mathrm{lcm}(\\varphi(6d),\\varphi(6e))$, which is even. Then:</p>
<div class="mdisp">$$7^n\\equiv 1\\pmod{6d}\\quad\\text{and}\\quad 5^n\\equiv 1\\pmod{6e}$$</div>
<p>So $(s_n,t_n)\\in N\\cap(d\\mathbb{Z}\\times e\\mathbb{Z})$ with $s_n = \\frac{7^n-1}{6}\\neq 0$ (since $7^n > 1$ for $n\\geq 1$). This contradicts $N\\cap(d\\mathbb{Z}\\times e\\mathbb{Z})=\\{(0,0)\\}$. $\\square$</p>

<p><strong>Worked example ($d=e=1$):</strong></p>
<div class="cblk"> n=2: (1,1)⊗(1,1) = (1⊛1, 1⋆1) = (8, -4)
   s₂ = (49-1)/6 = 8,  t₂ = (1-25)/6 = -4
   8 ∈ 1·ℤ ✓,  -4 ∈ 1·ℤ ✓  → (8,-4) ∈ N ∩ (ℤ×ℤ), nonzero ✓

 n=4: s₄ = (7⁴-1)/6 = 2400/6 = 400
       t₄ = (1-5⁴)/6 = -624/6 = -104
       (400,-104) ∈ N, nonzero ✓</div>
</div>
<p><strong>Key:</strong> This argument is <em>unconditional</em> — it uses only Euler's theorem and the single twin prime pair $(5,7)$.</p>`,
lean:null},

// ═══════════════════════════════════════════════════════════════
// §10  MAIN THEOREM
// ═══════════════════════════════════════════════════════════════

{id:"t10.1",ch:"§10 Main",b:"b-thm",
 t:`Thm 10.1 — $|\\mathrm{Irr}(N)|=\\infty$: Infinitely Many Twin Prime Pairs`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The Furstenberg punchline. Combining (H1), (H2), (H3) yields infinitely many irreducibles in $N$, hence infinitely many twin prime pairs.</p>
<div class="mdisp" style="background:linear-gradient(135deg,#fef3c7,#fde68a);border-left-color:#f59e0b;padding:1rem 1.2rem">
$$\\boxed{\\;|\\mathrm{Irr}(N)| = |G| = \\infty\\;}$$
</div>
<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>Suppose for contradiction that $\\mathrm{Irr}(N)=G$ is finite: $G=\\{q_1,\\ldots,q_n\\}$.</p>
<p><strong>(H1)</strong> (<a class="iref" onclick="jumpId('t6.1')">Thm 6.1</a>): $N\\setminus\\{(0,0)\\}=q_1\\otimes N\\cup\\cdots\\cup q_n\\otimes N$.</p>
<p><strong>(H2)</strong> (<a class="iref" onclick="jumpId('t8.1')">Thm 8.1</a>): Each $q_i\\otimes N$ is closed in $N$.</p>
<p>A finite union of closed sets is closed. Therefore $N\\setminus\\{(0,0)\\}$ is closed, making $\\{(0,0)\\}$ open.</p>
<p><strong>(H3)</strong> (<a class="iref" onclick="jumpId('t9.1')">Thm 9.1</a>): $\\{(0,0)\\}$ is not open in $N$.</p>
<p>Contradiction. $\\blacksquare$</p>
</div>

<p>Since $\\mathrm{Irr}(N)=G=\\{(k,k):(6k-1,6k+1)\\in\\pm\\mathbb{P}^2\\}$:</p>
<div class="mdisp" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-left-color:#10b981;padding:1rem 1.2rem">
<strong>Corollary (Twin Prime Conjecture).</strong>
$$|G|=\\infty \\implies |\\{(p,p+2) : p,p+2\\in\\mathbb{P}\\}| = \\infty$$
</div>

<div class="cblk"> Finite G
   → N\\{0} = finite union of closed sets
   → N\\{0} is closed
   → {(0,0)} is open
   → But (0,0) has nonzero elements in every neighbourhood
     (powers of (1,1) via Euler's theorem)
   → Contradiction!
   → |G| = ∞
   → infinitely many twin primes  □</div>

<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime_conjecture" target="_blank" class="tpill">Twin Prime Conjecture</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tpill">Furstenberg's Proof</a>
<a href="${GH}/TPC/Main.lean" target="_blank" class="tpill"><i class="bi bi-code-slash"></i> Main.lean</a>
<a href="${GH}/PAPER.md" target="_blank" class="tpill"><i class="bi bi-file-text"></i> PAPER.md</a>
<a href="https://leanprover-community.github.io/mathlib4_docs/" target="_blank" class="tpill">Mathlib4 docs</a>
</div>`,
lean:`${GH}/TPC/Main.lean#L60`},

// ═══════════════════════════════════════════════════════════════
// §11  GENERAL FURSTENBERG THEOREM
// ═══════════════════════════════════════════════════════════════

{id:"gen",ch:"§11 General",b:"b-thm",
 t:`General Furstenberg Theorem — Topological Monoids with Irreducible Covering have $|\\mathrm{Irr}|=\\infty$`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">The argument is an instance of a general theorem about topological monoids.</p>

<p><strong>Theorem (General Furstenberg Criterion).</strong> Let $(N,\\cdot)$ be a commutative monoid equipped with a topology satisfying:</p>

<div class="mdisp">
$$\\textbf{(H1)}\\quad N\\setminus\\{1_N\\}=\\bigcup_{q\\in\\mathrm{Irr}(N)} q\\cdot N$$
</div>
<div class="mdisp">
$$\\textbf{(H2)}\\quad\\text{For every }q\\in\\mathrm{Irr}(N),\\; q\\cdot N\\text{ is closed in }N$$
</div>
<div class="mdisp">
$$\\textbf{(H3)}\\quad\\text{No singleton of }N\\text{ is open}$$
</div>

<p>Then $|\\mathrm{Irr}(N)|=\\infty$.</p>

<button class="btnprf" onclick="tp(this)">▶ Show proof</button>
<div class="prfbody" style="display:none">
<p>If $\\mathrm{Irr}(N)=\\{q_1,\\ldots,q_n\\}$ were finite, then $N\\setminus\\{1_N\\}=\\bigcup q_i\\cdot N$ is a finite union of closed sets, hence closed. So $\\{1_N\\}$ is open, contradicting (H3). $\\blacksquare$</p>
</div>

<p><strong>Application to twin primes.</strong> We verify (H1)–(H3) for the generated diagonal submonoid $N=\\langle G\\rangle^{\\otimes}\\subseteq(\\mathbb{Z}^2,\\otimes)$:</p>
<p><strong>(H1)</strong>: immediate from generation (<a class="iref" onclick="jumpId('t6.1')">Thm 6.1</a>).</p>
<p><strong>(H2)</strong>: $q\\otimes N$ is clopen via unique factorization and distinct prime $\\phi$-values (<a class="iref" onclick="jumpId('t8.1')">Thm 8.1</a>).</p>
<p><strong>(H3)</strong>: powers of $(1,1)$ via Euler's theorem, unconditional (<a class="iref" onclick="jumpId('t9.1')">Thm 9.1</a>).</p>

<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tpill">Furstenberg's Proof (Wikipedia)</a>
<a href="https://en.wikipedia.org/wiki/Topological_group" target="_blank" class="tpill">Topological Groups</a>
<a href="https://github.com/FruitfulApproach/Lean4TPC" target="_blank" class="tpill"><i class="bi bi-github"></i> Lean4TPC</a>
</div>`,lean:null},

// ═══════════════════════════════════════════════════════════════
// §12  ANTI-DIAGONAL (HISTORICAL)
// ═══════════════════════════════════════════════════════════════

{id:"hist",ch:"§12 Historical",b:"b-ex",
 t:`Historical Note — The Anti-Diagonal $\\Delta(\\mathbb{Z})=\\{(x,-x)\\}$ and Why It Falls Short`,
 body:`<p style="color:#555;font-style:italic;margin-bottom:.6rem">Before arriving at the generated diagonal submonoid, we explored the anti-diagonal — a natural submonoid of $M$ that encodes primes $\\equiv\\pm1\\pmod6$ but <em>not</em> twin primes.</p>

<p><strong>The anti-diagonal submonoid.</strong> Define $\\Delta(\\mathbb{Z})=\\{(x,-x):x\\in\\mathbb{Z}\\}$. This is a submonoid of $M$ because the swap identity $(-a)\\star(-b)=-(a\\circledast b)$ ensures closure:</p>
<div class="mdisp">$$(x,-x)\\otimes(y,-y)=(x\\circledast y,\\;(-x)\\star(-y))=(x\\circledast y,\\;-(x\\circledast y))$$</div>

<p><strong>The collapse.</strong> The same identity that makes $\\Delta(\\mathbb{Z})$ a submonoid also <em>collapses</em> its structure: every product in $\\Delta(\\mathbb{Z})$ depends only on $\\circledast$. Consequently:</p>
<div class="mdisp">$$(x,-x)\\in\\mathrm{Irr}(\\Delta(\\mathbb{Z})) \\;\\iff\\; 6x+1\\in\\pm\\mathbb{P}$$</div>
<p>This encodes primes $\\equiv\\pm1\\pmod6$ (not twin primes). For example, $(6,-6)$ is irreducible in $\\Delta(\\mathbb{Z})$ because $\\phi(6)=37$ is prime, even though $\\psi(6)=35=5\\cdot 7$ is composite — so $6$ is NOT a twin-prime generator.</p>

<p><strong>What works for $\\Delta(\\mathbb{Z})$:</strong> the anti-diagonal approach gives a valid Furstenberg-style proof that there are infinitely many primes $\\equiv\\pm1\\pmod6$ — a result already known from Dirichlet's theorem, but rederived here by purely topological-algebraic means.</p>

<p><strong>The fix:</strong> Replace the anti-diagonal (a natural submonoid where $\\star$ collapses) with the generated diagonal submonoid $N=\\langle G\\rangle^{\\otimes}$ (where both $\\circledast$ and $\\star$ contribute independently via the two components).</p>`,
lean:null},

{id:"credits",ch:"Credits",b:"b-cred",

 body:`<p><strong>Author:</strong> FruitfulApproach</p>
<p><strong>AI Collaborator:</strong> Claude Sonnet 4.6 (Anthropic) — assisted with proof exploration, error detection, construction of the generated diagonal submonoid approach, and production of this proof-card deck.</p>
<p><strong>Formalisation:</strong> <a href="https://leanprover-community.github.io/" target="_blank">Lean 4</a> + <a href="https://leanprover-community.github.io/mathlib4_docs/" target="_blank">Mathlib4</a>. Source: <a href="https://github.com/FruitfulApproach/Lean4TPC" target="_blank">github.com/FruitfulApproach/Lean4TPC</a>.</p>
<p><strong>Key references:</strong></p>
<ul style="font-size:.9rem;line-height:1.8;color:var(--g600)">
<li>H. Furstenberg, <em>On the infinitude of primes</em>, Amer. Math. Monthly <strong>62</strong> (1955), 353.</li>
<li>The twin prime conjecture: $(p,\\,p+2)$ are both prime for infinitely many $p$.</li>
<li>Euler's theorem: $\\gcd(a,n)=1\\implies a^{\\varphi(n)}\\equiv 1\\pmod n$.</li>
</ul>
<p style="margin-top:1rem;font-size:.82rem;color:var(--g400)">This deck presents the construction and proof for peer review. The argument hinges on: (1) the irreducibility characterisation $\\mathrm{Irr}(N)=G$, (2) clopenness of cosets via unique factorisation in $N$, and (3) the unconditional density argument using Euler's theorem. Errors and feedback welcome.</p>

<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://github.com/FruitfulApproach/Lean4TPC" target="_blank" class="tpill"><i class="bi bi-github"></i> Lean4TPC</a>

</div>`,lean:null}

];

const chapters=[...new Set(cards.map(c=>c.ch))];
let cur=0;

function render(){
  const c=cards[cur];
  const src=c.lean?`<a href="${c.lean}" target="_blank" class="srclink"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  history.replaceState(null,"","#"+c.id);
  document.getElementById("mc").innerHTML=`
    <div class="ctop">
      <div class="badge-row">
        <span class="tbadge ${c.b}">${c.b.replace("b-","")}</span>
        <span style="font-family:var(--mono);font-size:.62rem;color:#555">${cur+1}/${cards.length}</span>
        ${src}
        <button class="btn-copy" onclick="copyLink(this)" title="Copy link to this card"><i class="bi bi-link-45deg"></i> Link</button>
      </div>
      <div class="eq-title">${c.t}</div>
    </div>
    <div class="cbody">${c.body}</div>`;
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pt").textContent=`Card ${cur+1} of ${cards.length}`;
  document.getElementById("nc").textContent=`${cur+1} / ${cards.length}`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  // chapter strip
  document.getElementById("chs").innerHTML=chapters.map(ch=>{
    const act=cards[cur].ch===ch?" active":"";
    return `<button class="chbtn${act}" onclick="jumpCh('${ch}')">${ch}</button>`;
  }).join("");
  // minimap
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mmdot${i===cur?" active":""}" onclick="jump(${i})" title="${i+1}"></div>`
  ).join("");
  if(window.renderMathInElement){
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],
      throwOnError:false
    });
  }
}

function go(d){
  cur=Math.max(0,Math.min(cards.length-1,cur+d));
  const el=document.getElementById("mc");
  el.style.animation="none";
  requestAnimationFrame(()=>{
    el.style.animation=d>0?"slideLeft .28s cubic-bezier(.4,0,.2,1)":"slideRight .28s cubic-bezier(.4,0,.2,1)";
    render();
  });
  window.scrollTo({top:0,behavior:"smooth"});
}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpId(id){const i=cards.findIndex(c=>c.id===id);if(i>=0)jump(i);}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){
  const el=btn.nextElementSibling;
  const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";
  btn.innerHTML=open?"&#9660; Hide proof":"&#9654; Show proof";
}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);
});
// Deep link via hash (e.g. #t8.1)
const _hash = location.hash.replace('#','');
if (_hash) { const hi = cards.findIndex(c=>c.id===_hash); if(hi>=0) cur=hi; }
// Read jump target from index.html via sessionStorage
const _saved = sessionStorage.getItem('tpcCard');
if (_saved !== null) { cur = Math.min(parseInt(_saved,10), cards.length-1); sessionStorage.removeItem('tpcCard'); }
render();
function copyLink(btn){
  const url = location.origin + location.pathname + '#' + cards[cur].id;
  navigator.clipboard.writeText(url).then(()=>{
    btn.classList.add('copied');
    btn.innerHTML='<i class="bi bi-check2"></i> Copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<i class="bi bi-link-45deg"></i> Link';},1800);
  });
}

/* ── Dependency Graph ── */
let cyInst=null;
function toggleGraph(){
  const ov=document.getElementById("graphOverlay");
  ov.classList.toggle("active");
  if(ov.classList.contains("active")&&!cyInst) initGraph();
  if(cyInst) setTimeout(()=>cyInst.resize().fit(null,40),100);
}
function initGraph(){
  const N=[
    {id:"d1.1", l:"Def 1.1\n⊛ and ⋆", t:"def"},
    {id:"p1.2", l:"Prop 1.2\nCommMonoid", t:"prop"},
    {id:"t1.3", l:"Thm 1.3\nφ, ψ isom.", t:"thm"},
    {id:"eta",  l:"Prop 1.4\nη(x)=−x", t:"prop"},
    {id:"l1.5", l:"Lem 1.5\nNo 0-div", t:"lem"},
    {id:"d2.1", l:"Def 2.1\nM=(ℤ²,⊗)", t:"def"},
    {id:"d2.2", l:"Def 2.2\nN=⟨G⟩", t:"def"},
    {id:"l3.1", l:"Lem 3.1\nDiag closure", t:"lem"},
    {id:"t3.2", l:"Thm 3.2\nG⊆Irr(N)", t:"thm"},
    {id:"t3.3", l:"Thm 3.3\nIrr(N)⊆G", t:"thm"},
    {id:"l4.1", l:"Lem 4.1\n⊛-decomp⇔comp", t:"lem"},
    {id:"l4.2", l:"Lem 4.2\n⋆-decomp⇔comp", t:"lem"},
    {id:"l5.1", l:"Lem 5.1\nNo 0-comp", t:"lem"},
    {id:"p5.2", l:"Prop 5.2\nFree monoid", t:"prop"},
    {id:"t6.1", l:"Thm 6.1\n(H1) Covering", t:"thm"},
    {id:"d7.1", l:"Def 7.1\nProd Furst.", t:"def"},
    {id:"t8.1", l:"Thm 8.1\n(H2) Clopen", t:"thm"},
    {id:"t9.1", l:"Thm 9.1\n(H3) No sgltn", t:"thm"},
    {id:"t10.1",l:"Thm 10.1\n∞ Twin Primes", t:"thm"},
    {id:"gen",  l:"General\nFurstenberg", t:"thm"}
  ];
  const E=[
    ["d1.1","p1.2"],["d1.1","t1.3"],["d1.1","eta"],["d1.1","l1.5"],
    ["p1.2","t1.3"],
    ["d1.1","d2.1"],["eta","d2.1"],
    ["d2.1","d2.2"],["t1.3","d2.2"],
    ["d2.1","l3.1"],
    ["d2.2","t3.2"],["t1.3","t3.2"],["l1.5","t3.2"],
    ["d2.2","t3.3"],
    ["t1.3","l4.1"],["t1.3","l4.2"],
    ["l4.1","t3.2"],["l4.2","t3.2"],
    ["d2.2","l5.1"],["l4.2","l5.1"],
    ["t1.3","p5.2"],["d2.2","p5.2"],
    ["d2.2","t6.1"],["t3.2","t6.1"],["t3.3","t6.1"],
    ["d7.1","t8.1"],["p5.2","t8.1"],["t3.2","t8.1"],["t3.3","t8.1"],
    ["d2.2","t9.1"],["d7.1","t9.1"],
    ["t6.1","t10.1"],["t8.1","t10.1"],["t9.1","t10.1"],
    ["t10.1","gen"]
  ];
  const colors={def:"#7c3aed",thm:"#f59e0b",prop:"#a1a1aa",lem:"#52525b",cor:"#3b82f6",ex:"#27272a"};
  cyInst=cytoscape({
    container:document.getElementById("cy"),
    elements:[
      ...N.map(n=>({data:{id:n.id,label:n.l,ntype:n.t}})),
      ...E.map(([s,t])=>({data:{source:s,target:t}}))
    ],
    style:[
      {selector:"node",style:{
        "label":"data(label)","text-wrap":"wrap","text-valign":"center","text-halign":"center",
        "font-family":"'JetBrains Mono',monospace","font-size":"10px","color":"#111",
        "text-max-width":"100px",
        "width":110,"height":48,"shape":"round-rectangle",
        "background-color":"#7c3aed","background-opacity":0.95,
        "border-width":2,"border-color":"#333","border-opacity":0.8,
        "padding":"8px","text-margin-y":0,
        "shadow-blur":8,"shadow-color":"rgba(0,0,0,0.4)","shadow-offset-x":0,"shadow-offset-y":2,"shadow-opacity":0.5
      }},
      {selector:"node[ntype='def']",style:{"background-color":"#7c3aed","color":"#fff","border-color":"#6d28d9"}},
      {selector:"node[ntype='thm']",style:{"background-color":"#f59e0b","color":"#0f0f0f","border-color":"#d97706","font-weight":"bold"}},
      {selector:"node[ntype='prop']",style:{"background-color":"#a1a1aa","color":"#18181b","border-color":"#71717a"}},
      {selector:"node[ntype='lem']",style:{"background-color":"#52525b","color":"#e4e4e7","border-color":"#3f3f46"}},
      {selector:"node[ntype='cor']",style:{"background-color":"#93c5fd","color":"#1e3a5f","border-color":"#3b82f6"}},
      {selector:"node[ntype='ex']",style:{"background-color":"#27272a","color":"#a1a1aa","border-color":"#3f3f46"}},
      {selector:"edge",style:{
        "width":2,"line-color":"#4a4458","target-arrow-color":"#7c6f99",
        "target-arrow-shape":"triangle-backcurve",
        "curve-style":"taxi",
        "taxi-direction":"downward",
        "taxi-turn":"50%",
        "taxi-turn-min-distance":"15px",
        "arrow-scale":0.9,"opacity":0.5,
        "line-cap":"round"
      }},
      {selector:"edge.highlighted",style:{"line-color":"#7c3aed","target-arrow-color":"#7c3aed","opacity":1,"width":3,"z-index":999}},
      {selector:"node:active",style:{"overlay-opacity":0}},
      {selector:"node.hover",style:{"border-width":3,"border-color":"#fff","z-index":999,"shadow-blur":18,"shadow-color":"rgba(124,58,237,0.6)"}},
      {selector:"node.dimmed",style:{"opacity":0.2}},
      {selector:"edge.dimmed",style:{"opacity":0.08}}
    ],
    layout:{
      name:"elk",
      elk:{
        algorithm:"layered",
        "elk.direction":"DOWN",
        "elk.layered.spacing.nodeNodeBetweenLayers":"90",
        "elk.spacing.nodeNode":"50",
        "elk.layered.spacing.edgeNodeBetweenLayers":"30",
        "elk.layered.spacing.edgeEdgeBetweenLayers":"12",
        "elk.spacing.edgeEdge":"10",
        "elk.spacing.edgeNode":"15",
        "elk.edgeRouting":"ORTHOGONAL",
        "elk.layered.nodePlacement.strategy":"NETWORK_SIMPLEX",
        "elk.layered.crossingMinimization.strategy":"LAYER_SWEEP",
        "elk.layered.considerModelOrder.strategy":"NODES_AND_EDGES",
        "elk.layered.mergeEdges":"false"
      }
    },
    minZoom:0.3,maxZoom:3,wheelSensitivity:0.3,
    boxSelectionEnabled:false
  });
  cyInst.on("tap","node",function(evt){
    const id=evt.target.id();
    toggleGraph();
    jumpId(id);
  });
  cyInst.on("mouseover","node",function(e){
    var n=e.target;
    n.addClass("hover");
    var conn=n.connectedEdges();
    var neighbors=conn.connectedNodes();
    cyInst.elements().not(neighbors).not(conn).not(n).addClass("dimmed");
    conn.addClass("highlighted");
    document.getElementById("cy").style.cursor="pointer";
  });
  cyInst.on("mouseout","node",function(e){
    e.target.removeClass("hover");
    cyInst.elements().removeClass("dimmed highlighted");
    document.getElementById("cy").style.cursor="default";
  });
}
</script>
</body>
</html>
