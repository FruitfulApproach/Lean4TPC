<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[
{ch:"Abstract",badge:"b-abs",title:"Abstract — The Coset Topology Approach",lean:null,body:`
<p>We prove there are infinitely many twin prime pairs via the submonoid $N=\\langle G\\rangle\\leqslant M=(\\mathbb{Z}^2,\\otimes)$ where $G=\\{(k,k):k\\in\\mathbb{Z}\\}$.</p>
<p><strong>Key idea:</strong> For each irreducible $\\widehat{q}\\in\\mathrm{Irr}(N)$, we prove the <strong>coset identity</strong>:</p>
<div class="math-block">$$\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)$$</div>
<p>Since $\\widehat{q}\\otimes M$ is a <strong>product of two arithmetic progressions</strong> (hence clopen in the Furstenberg product topology on $M$), each coset $\\widehat{q}\\otimes N$ is <strong>clopen in $N$</strong> via the subspace topology. The Furstenberg argument then gives $|\\mathrm{Irr}(N)|=\\infty$.</p>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tag">Twin Primes</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tag">Furstenberg 1955</a>
<a href="https://leanprover.github.io/" target="_blank" class="tag">Lean 4</a>
</div>`},

{ch:"§1 Ops",badge:"b-def",title:"Definition 1.1 — Operations $\\mathbin{\\oast}$ and $\\mathbin{\\star}$",lean:`${GH}/TPC/Basic.lean#L10`,body:`
<p>Two binary operations on $\\mathbb{Z}$ (Lean: <code>mstar</code> and <code>sstar</code>):</p>
<div class="math-block">$$x\\mathbin{\\oast}y=6xy+x+y\\qquad x\\mathbin{\\star}y=-6xy+x+y$$</div>
<p>Both have identity $0$.</p>
<div class="code-block">def mstar (x y : ℤ) : ℤ := 6 * x * y + x + y
def sstar (x y : ℤ) : ℤ := -6 * x * y + x + y</div>
<div class="code-block"> x    y   x⊛y   x⋆y
 1    1     8    -4
 2    3    41   -31
-1   -1     4    -8</div>`},

{ch:"§1 Ops",badge:"b-thm",title:"Theorem 1.3 — Isomorphisms $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$",lean:`${GH}/TPC/Basic.lean#L38`,body:`
<div class="math-block">$$\\phi:N^*\\xrightarrow{\\sim}(6\\mathbb{Z}+1,\\cdot)\\qquad\\psi:N^\\star\\xrightarrow{\\sim}(6\\mathbb{Z}-1,\\bullet)$$</div>
<button class="proof-toggle" onclick="tp(this)">▶ Show proof</button>
<div class="proof-content" style="display:none">
<p>$\\phi(x\\mathbin{\\oast}y)=6(6xy+x+y)+1=(6x+1)(6y+1)=\\phi(x)\\phi(y)$. And $\\psi(x\\mathbin{\\star}y)=-[(6x-1)(6y-1)]=\\psi(x)\\bullet\\psi(y)$. $\\square$</p>
</div>
<div class="code-block">lemma φ_mul (x y : ℤ) : φ (x ⊛ y) = φ x * φ y := by
  simp [φ, mstar]; ring</div>
<p><strong>Example:</strong> $\\phi(2\\mathbin{\\oast}3)=\\phi(41)=247=13\\times19=\\phi(2)\\phi(3)$.</p>`},

{ch:"§1 Ops",badge:"b-lem",title:"Lemma 1.4 — No Zero Divisors",lean:`${GH}/TPC/Basic.lean#L62`,body:`
<p>$u,v\\neq 0\\Rightarrow u\\mathbin{\\oast}v\\neq 0$ and $u\\mathbin{\\star}v\\neq 0$.</p>
<button class="proof-toggle" onclick="tp(this)">▶ Show proof</button>
<div class="proof-content" style="display:none">
<p>$u\\mathbin{\\oast}v=0\\iff(6u+1)(6v+1)=1\\Rightarrow u=0$ or $u=-1/3\\notin\\mathbb{Z}$. Contradiction. $\\square$</p>
</div>
<p><strong>Used in:</strong> Thm 3.2 (prime divisibility in the coset identity) and Lem 3.4 (injectivity of $L_{\\widehat{q}}$).</p>`},

{ch:"§2 Monoid",badge:"b-def",title:"Definition 2.2 — Generating Set $G$ and Submonoid $N$",lean:`${GH}/TPC/Monoid.lean#L40`,body:`
<div class="math-block">$$G=\\{(k,k):k\\in\\mathbb{Z}\\}\\qquad N=\\langle G\\rangle\\leqslant M=(\\mathbb{Z}^2,\\otimes)$$</div>
<p>Elements of $N$: $(z,w)$ where $z=k_1\\mathbin{\\oast}\\cdots\\mathbin{\\oast}k_r$ and $w=k_1\\mathbin{\\star}\\cdots\\mathbin{\\star}k_r$ for the <strong>same</strong> sequence. In general $z\\neq w$.</p>
<div class="code-block">-- Products of generators:
-- (1,1)⊗(1,1) = (8,-4)
-- (2,2)⊗(3,3) = (41,-31)
-- (1,1)⊗(2,2)⊗(3,3) = ?</div>`},

{ch:"§2 Monoid",badge:"b-prop",title:"Proposition 2.3 — $M$ is a Topological Monoid",lean:`${GH}/TPC/Monoid.lean#L55`,body:`
<p>Equip $\\mathbb{Z}$ with the <a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank">Furstenberg topology</a> (basis: $a+b\\mathbb{Z}$, clopen). Then $(M,\\otimes)$ is a topological monoid.</p>
<button class="proof-toggle" onclick="tp(this)">▶ Show key step</button>
<div class="proof-content" style="display:none">
<p>For $\\mathbin{\\oast}$: neighborhood $(x_0+b\\mathbb{Z})\\times(y_0+b\\mathbb{Z})$ maps into $a+b\\mathbb{Z}$ since correction $(6y_0+1)bs+(6x_0+1)bt+6b^2st\\equiv 0\\pmod{b}$. $\\square$</p>
</div>
<p><strong>Consequence:</strong> $L_{\\widehat{q}}(\\widehat{x})=\\widehat{q}\\otimes\\widehat{x}$ is continuous for any fixed $\\widehat{q}$, so $L_{\\widehat{q}}$ is a homeomorphism onto its image.</p>`},

{ch:"§3 Coset",badge:"b-lem",title:"Lemma 3.1 — $\\widehat{a}\\otimes M$ is Clopen",lean:`${GH}/TPC/CosetTopology.lean#L15`,body:`
<p>For $\\widehat{a}=(a_1,a_2)\\neq(0,0)$:</p>
<div class="math-block">$$\\widehat{a}\\otimes M=(a_1+(6a_1+1)\\mathbb{Z})\\times(a_2+(6a_2-1)\\mathbb{Z})$$</div>
<p>A product of two arithmetic progressions — <strong>clopen</strong> in $M$.</p>
<div class="code-block">-- (1,1) ⊗ M = (1+7Z) × (1+5Z)
-- (2,2) ⊗ M = (2+13Z) × (2+11Z)
-- (5,5) ⊗ M = (5+31Z) × (5+29Z)</div>
<p>Note: the step sizes $6a_1+1=\\phi(a_1)$ and $6a_2-1=\\psi(a_2)$ are exactly the isomorphism values!</p>`},

{ch:"§3 Coset",badge:"b-thm",title:"Theorem 3.2 — Coset Identity (The Key Lemma)",lean:`${GH}/TPC/CosetTopology.lean#L45`,body:`
<p>For $\\widehat{q}=(q,q)\\in\\mathrm{Irr}(N)$:</p>
<div class="math-block">$$\\widehat{q}\\otimes N = N\\cap(\\widehat{q}\\otimes M)$$</div>
<button class="proof-toggle" onclick="tp(this)">▶ Show proof</button>
<div class="proof-content" style="display:none">
<p>$(\\supseteq)$: clear. $(\\subseteq)$: Let $(z,w)\\in N\\cap(\\widehat{q}\\otimes M)$. Then $q\\mathbin{\\oast}p=z$ for some $p$. Since $(z,w)\\in N$: $\\phi(z)=\\phi(k_1)\\cdots\\phi(k_s)$. Since $\\phi(q)$ is prime (as $\\widehat{q}\\in\\mathrm{Irr}(N)$) and divides this product, $\\phi(q)=\\phi(k_i)$ for some $i$, so $k_i=q$. By commutativity reorder $k_1=q$: get $(z,w)=\\widehat{q}\\otimes(k_2\\mathbin{\\oast}\\cdots,k_2\\mathbin{\\star}\\cdots)\\in\\widehat{q}\\otimes N$. $\\square$</p>
</div>
<p><strong>This is the heart of the proof.</strong> Irreducibility of $\\widehat{q}$ (so $\\phi(q)$ prime) is what makes the prime divisibility argument work. We restrict to $\\widehat{q}\\in\\mathrm{Irr}(N)$ precisely to avoid the gap.</p>`},

{ch:"§3 Coset",badge:"b-cor",title:"Corollary 3.3 — $\\widehat{q}\\otimes N$ Clopen in $N$; Lemma 3.4 — Infinite",lean:`${GH}/TPC/CosetTopology.lean#L82`,body:`
<p><strong>Corollary 3.3:</strong> In the subspace topology on $N$:</p>
<div class="math-block">$$\\widehat{q}\\otimes N=N\\cap(\\widehat{q}\\otimes M)\\text{ is clopen in }N$$</div>
<p>because $\\widehat{q}\\otimes M$ is clopen in $M$ (Lem 3.1) and subspace intersections preserve clopenness.</p>
<p><strong>Lemma 3.4:</strong> $|\\widehat{q}\\otimes N|=|N|=\\infty$.</p>
<p>Proof: $L_{\\widehat{q}}:N\\to\\widehat{q}\\otimes N$ is injective by no-zero-divisors (Lem 1.4), and $N$ is infinite (it contains all generators $\\Delta(k)=(k,k)$).</p>
<div class="code-block">theorem cosetN_isClopen (q : ℤ) (hq : IsIrred (q,q))
    (hprime : (6*q+1).natAbs.Prime) :
    IsClopen ((· ⊗ ·) (q,q) '' ↑N)</div>`},

{ch:"§4 Irred",badge:"b-thm",title:"Theorem 4.2 — Irreducibles $\\iff$ Twin Primes",lean:`${GH}/TPC/Main.lean#L8`,body:`
<p>$(z,w)\\in N$ is $\\otimes$-irreducible $\\iff$ $6z+1$ and $6z-1$ are both $\\pm$prime.</p>
<div class="code-block"> z    6z+1  6z-1   Irr?  Twin pair
 1      7     5    YES   (5,7)
 2     13    11    YES   (11,13)
 3     19    17    YES   (17,19)
 4     25    23    NO    25=5²
 5     31    29    YES   (29,31)
10     61    59    YES   (59,61)</div>
<p>So $|\\mathrm{Irr}(N)|=\\infty$ <strong>is exactly</strong> the Twin Prime Conjecture.</p>`},

{ch:"§4 Irred",badge:"b-cor",title:"Lemma 4.4 + Corollary 4.5 — Descent and Covering",lean:`${GH}/TPC/Main.lean#L55`,body:`
<p><strong>Norm:</strong> $|(z,w)|=\\phi(z)^2=(6z+1)^2$ is multiplicative and proper factors have strictly smaller norm.</p>
<p><strong>Lemma 4.4:</strong> Every $(z,w)\\in N\\setminus\\{(0,0)\\}$ has an irreducible $\\otimes$-divisor. (Strong induction on norm.)</p>
<p><strong>Corollary 4.5 — The Covering:</strong></p>
<div class="math-block">$$N\\setminus\\{(0,0)\\}=\\bigcup_{\\widehat{q}\\in\\mathrm{Irr}(N)}\\widehat{q}\\otimes N$$</div>
<p>This is the analogue of Furstenberg's $\\mathbb{Z}\\setminus\\{\\pm1\\}=\\bigcup_p p\\mathbb{Z}$.</p>`},

{ch:"§5 Main",badge:"b-thm",title:"Theorem 5.2 — $|\\mathrm{Irr}(N)|=\\infty$",lean:`${GH}/TPC/Main.lean#L88`,body:`
<p>The Furstenberg argument:</p>
<div class="math-block">$$N\\setminus\\{(0,0)\\}=\\bigcup_{\\widehat{q}\\in\\mathrm{Irr}(N)}\\widehat{q}\\otimes N$$</div>
<p>If $\\mathrm{Irr}(N)$ finite $\\Rightarrow$ finite union of clopen sets $\\Rightarrow$ $N\\setminus\\{(0,0)\\}$ clopen $\\Rightarrow$ $\\{(0,0)\\}$ open in $N$.</p>
<p>But every nonempty open set in $N$ contains $\\widehat{q}\\otimes N$ (infinite) — <strong>contradiction</strong>.</p>
<p>Therefore $|\\mathrm{Irr}(N)|=\\infty$. $\\blacksquare$</p>`},

{ch:"§5 Main",badge:"b-cor",title:"Corollary 5.3 — Infinitely Many Twin Primes",lean:`${GH}/TPC/Main.lean#L110`,body:`
<div class="math-block">$$\\bigl|\\{k\\in\\mathbb{Z}:6k-1\\in\\pm\\mathbb{P}\\text{ and }6k+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty\\qquad\\blacksquare$$</div>
<p><strong>Logical chain:</strong></p>
<p>$\\phi,\\psi$ isos $\\to$ No zero divs $\\to$ $M$ top. monoid $\\to$ $\\widehat{q}\\otimes M$ clopen $\\to$ <strong>Coset identity</strong> $\\to$ $\\widehat{q}\\otimes N$ clopen in $N$ $\\to$ Norm descent $\\to$ Covering $\\to$ Furstenberg $\\to$ $|\\mathrm{Irr}(N)|=\\infty$ $\\to$ <strong>Twin primes.</strong></p>
<div class="d-flex flex-wrap gap-1 mt-2">
<a href="https://en.wikipedia.org/wiki/Twin_prime_conjecture" target="_blank" class="tag">Twin Prime Conjecture</a>
<a href="${GH}/TPC/Main.lean" target="_blank" class="tag"><i class="bi bi-code-slash"></i> Main.lean</a>
<a href="https://github.com/FruitfulApproach/Lean4TPC/blob/main/PAPER.md" target="_blank" class="tag"><i class="bi bi-file-text"></i> PAPER.md</a>
</div>`},
];

let cur=0;
const chapters=[...new Set(cards.map(c=>c.ch))];
function render(){
  const c=cards[cur];
  const lean=c.lean?`<a href="${c.lean}" target="_blank" class="src-link ms-2"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  document.getElementById("mc").innerHTML=`
    <div class="card-hdr"><span class="card-badge ${c.badge}">${c.badge.replace("b-","").toUpperCase()}</span>${lean}
    <h2 class="card-title mt-1">${c.title}</h2></div>
    <div class="card-body">${c.body}</div>`;
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=`Card ${cur+1} of ${cards.length}`;
  document.getElementById("ctr").textContent=`${cur+1} / ${cards.length}`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  document.getElementById("chn").innerHTML=chapters.map(ch=>
    `<button class="ch-btn${cards[cur].ch===ch?" active":""}" onclick="jumpCh('${ch}')">${ch}</button>`).join("");
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mm-dot${i===cur?" active":""}" onclick="jump(${i})"></div>`).join("");
  if(window.renderMathInElement)
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false});
}
function go(d){cur=Math.max(0,Math.min(cards.length-1,cur+d));
  document.getElementById("mc").style.animation="none";
  requestAnimationFrame(()=>{document.getElementById("mc").style.animation="cardIn .32s ease";render();});
  window.scrollTo({top:0,behavior:"smooth"});}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){const el=btn.nextElementSibling;const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";btn.innerHTML=open?"▼ Hide proof":"▶ Show proof";}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);});
const _s=sessionStorage.getItem("tpcCard");
if(_s!==null){cur=Math.min(parseInt(_s,10),cards.length-1);sessionStorage.removeItem("tpcCard");}
render();
</script>
