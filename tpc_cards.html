const cards=[

// Card 1 ŌĆö Proposition: L is a commutative monoid
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"prop-L-monoid",ch:"┬¦1 Monoids",badge:"b-prop",title:"Proposition ŌĆö $L = (\\mathbb{Z}, *)$ is a Commutative Monoid",lean:null,body:`
<p>Define $L = (\\mathbb{Z}, *)$ where $x * y := 6xy + x + y$. We claim $L$ is a commutative monoid with identity $e_L = 0$.</p>
<div class="math-block">$$x * y \\;:=\\; 6xy + x + y \\qquad (x,y \\in \\mathbb{Z})$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span><strong>Closure.</strong> For $x, y \\in \\mathbb{Z}$: $6xy + x + y \\in \\mathbb{Z}$. Ō£ō</p>
<p><span class="step-num">2</span><strong>Identity.</strong> $0 * x = 6 \\cdot 0 \\cdot x + 0 + x = x$ and $x * 0 = x$. So $e_L = 0$. Ō£ō</p>
<p><span class="step-num">3</span><strong>Commutativity.</strong> $x * y = 6xy + x + y = 6yx + y + x = y * x$. Ō£ō</p>
<p><span class="step-num">4</span><strong>Associativity.</strong> Expanding both sides:</p>
<div class="math-block">$$(x * y) * z = 36xyz + 6xy + 6xz + 6yz + x + y + z = x * (y * z)$$</div>
<p>(Both sides equal $36xyz + 6xy + 6xz + 6yz + x + y + z$.) Ō£ō</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Isomorphism $\\phi: L \\xrightarrow{\\sim} (S_+, \\cdot)$</div>
<p>Set $\\phi(x) = 6x+1$. Then $\\phi(x * y) = 6(6xy+x+y)+1 = (6x+1)(6y+1) = \\phi(x)\\phi(y)$, so $\\phi$ is a monoid homomorphism. The image $S_+ = \\{6k+1 : k\\in\\mathbb{Z}\\}$ is closed under multiplication (since $(6a+1)(6b+1) = 6(a{*}b)+1$), and $\\phi$ is bijective with $\\phi^{-1}(n) = (n-1)/6$. Hence $\\phi: L \\xrightarrow{\\sim} (S_+, \\cdot)$ is a monoid isomorphism.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-shield-check me-1"></i>No Zero Divisors in $L$</div>
<p>If $a, b \\neq 0$ then $|6a+1| \\geq 5$ (since $|6a+1|=1$ forces $a = 0$ or $a = -1/3 \\notin \\mathbb{Z}$). So $\\phi(a*b) = (6a+1)(6b+1)$ satisfies $|\\phi(a*b)| \\geq 25 \\neq 1 = \\phi(0)$, giving $a * b \\neq 0$.</p>
<div class="math-block">$$a, b \\neq 0 \\implies a * b \\neq 0$$</div>
</div>`},

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// Card 2 ŌĆö Proposition: R is a commutative monoid
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"prop-R-monoid",ch:"┬¦1 Monoids",badge:"b-prop",title:"Proposition ŌĆö $R = (\\mathbb{Z}, \\star)$ is a Commutative Monoid",lean:null,body:`
<p>Define $R = (\\mathbb{Z}, \\star)$ where $x \\star y := -6xy + x + y$. We claim $R$ is a commutative monoid with identity $e_R = 0$.</p>
<div class="math-block">$$x \\star y \\;:=\\; -6xy + x + y \\qquad (x,y \\in \\mathbb{Z})$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span><strong>Closure.</strong> For $x, y \\in \\mathbb{Z}$: $-6xy + x + y \\in \\mathbb{Z}$. Ō£ō</p>
<p><span class="step-num">2</span><strong>Identity.</strong> $0 \\star x = -6 \\cdot 0 \\cdot x + 0 + x = x$ and $x \\star 0 = x$. So $e_R = 0$. Ō£ō</p>
<p><span class="step-num">3</span><strong>Commutativity.</strong> $x \\star y = -6xy + x + y = -6yx + y + x = y \\star x$. Ō£ō</p>
<p><span class="step-num">4</span><strong>Associativity.</strong> Expanding both sides:</p>
<div class="math-block">$$(x \\star y) \\star z = 36xyz - 6xy - 6xz - 6yz + x + y + z = x \\star (y \\star z)$$</div>
<p>(Both sides equal $36xyz - 6xy - 6xz - 6yz + x + y + z$.) Ō£ō</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Isomorphism $\\psi: R \\xrightarrow{\\sim} (S_+, \\cdot)$</div>
<p>Set $\\psi(x) = 1 - 6x$. Then $\\psi(x \\star y) = 1 - 6(-6xy+x+y) = 1 + 36xy - 6x - 6y = (1-6x)(1-6y) = \\psi(x)\\psi(y)$, so $\\psi$ is a monoid homomorphism. The image is again $S_+ = \\{1-6k : k \\in \\mathbb{Z}\\} = \\{6k+1 : k \\in \\mathbb{Z}\\}$, and $\\psi$ is bijective. Hence $\\psi: R \\xrightarrow{\\sim} (S_+, \\cdot)$.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-shield-check me-1"></i>No Zero Divisors in $R$</div>
<p>If $a, b \\neq 0$ then $|1-6a| \\geq 5$ (since $|1-6a|=1$ forces $a=0$ or $a=1/3\\notin\\mathbb{Z}$). So $\\psi(a \\star b) = (1-6a)(1-6b)$ satisfies $|\\psi(a\\star b)| \\geq 25 \\neq 1 = \\psi(0)$, giving $a \\star b \\neq 0$.</p>
<div class="math-block">$$a, b \\neq 0 \\implies a \\star b \\neq 0$$</div>
</div>`},

// Card 3 ŌĆö Definition: Tensor product of commutative monoids
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"def-tensor-product",ch:"┬¦2 Tensor Product",badge:"b-def",title:"Definition ŌĆö Tensor Product of Commutative Monoids $M \\otimes N$",lean:null,body:`
<p>Let $(M, \\cdot_M, 1_M)$ and $(N, \\cdot_N, 1_N)$ be commutative monoids. Their <strong>tensor product</strong> $M \\otimes N$ is the commutative monoid presented by:</p>
<div class="example-box">
<div class="example-title"><i class="bi bi-list-ul me-1"></i>Generators and Relations</div>
<p><strong>Generators:</strong> Formal symbols $\\{\\, m \\otimes n \\mid m \\in M,\\, n \\in N \\,\\}$ called <em>simple tensors</em>.</p>
<p><strong>Relations</strong> (for all $m, m_1, m_2 \\in M$; $n, n_1, n_2 \\in N$):</p>
<div class="math-block">$$\\begin{aligned}
(m_1 \\cdot_M m_2) \\otimes n &\\sim (m_1 \\otimes n)(m_2 \\otimes n) &\\quad &\\text{(left bimultiplicativity)} \\\\
m \\otimes (n_1 \\cdot_N n_2) &\\sim (m \\otimes n_1)(m \\otimes n_2) &\\quad &\\text{(right bimultiplicativity)} \\\\
1_M \\otimes n &\\sim 1_{M \\otimes N} &\\quad &\\text{(left identity)} \\\\
m \\otimes 1_N &\\sim 1_{M \\otimes N} &\\quad &\\text{(right identity)}
\\end{aligned}$$</div>
</div>
<p>The identity of $M \\otimes N$ is $1_{M \\otimes N} = 1_M \\otimes 1_N$. Elements of $M \\otimes N$ are equivalence classes of finite products of simple tensors under the above relations.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-2 me-1"></i>Universal Property</div>
<p>For any commutative monoid $P$ and <strong>bimultiplicative</strong> map $f: M \\times N \\to P$ ŌĆö meaning $f(m_1 m_2, n) = f(m_1,n)f(m_2,n)$, $f(m, n_1 n_2) = f(m,n_1)f(m,n_2)$, and $f(1_M,n) = f(m,1_N) = 1_P$ ŌĆö there exists a <em>unique</em> monoid homomorphism $\\bar f: M \\otimes N \\to P$ with $\\bar f(m \\otimes n) = f(m,n)$ for all $m,n$.</p>
<div class="math-block">$$M \\times N \\xrightarrow{\\;\\otimes\\;} M \\otimes N \\xrightarrow{\\;\\exists!\\,\\bar f\\;} P$$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle me-1"></i>Elements and Simplification</div>
<p>Not every element of $M \\otimes N$ is a simple tensor; in general it is a product $(m_1 \\otimes n_1)(m_2 \\otimes n_2) \\cdots (m_k \\otimes n_k)$. Two such products are equal when they are related by a finite chain of bimultiplicativity steps. The key moves are:</p>
<div class="math-block">$$\\underbrace{(\\alpha \\otimes \\beta)(\\gamma \\otimes \\beta) = (\\alpha \\cdot_M \\gamma) \\otimes \\beta}_{\\text{R1: same right factor}} \\qquad \\underbrace{(\\alpha \\otimes \\beta)(\\alpha \\otimes \\delta) = \\alpha \\otimes (\\beta \\cdot_N \\delta)}_{\\text{R2: same left factor}}$$</div>
</div>`},

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// Card 4 ŌĆö Definition: T = L ŌŖŚ R
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"def-T",ch:"┬¦2 Tensor Product",badge:"b-def",title:"Definition ŌĆö $T = L \\otimes R$",lean:null,body:`
<p>Let $T := L \\otimes R$ be the tensor product of the commutative monoids $L = (\\mathbb{Z}, *)$ and $R = (\\mathbb{Z}, \\star)$.</p>
<p>Since $e_L = e_R = 0$, the identity of $T$ is $0_T = 0 \\otimes 0$. The bimultiplicativity relations take the concrete forms:</p>
<div class="math-block">$$\\begin{aligned}
(a * b) \\otimes r &\\;\\sim\\; (a \\otimes r)(b \\otimes r) &\\quad &\\text{for all } a, b, r \\in \\mathbb{Z} \\\\
\\ell \\otimes (a \\star b) &\\;\\sim\\; (\\ell \\otimes a)(\\ell \\otimes b) &\\quad &\\text{for all } \\ell, a, b \\in \\mathbb{Z} \\\\
0 \\otimes r &\\;\\sim\\; 0_T &\\quad &\\text{for all } r \\in \\mathbb{Z} \\\\
\\ell \\otimes 0 &\\;\\sim\\; 0_T &\\quad &\\text{for all } \\ell \\in \\mathbb{Z}
\\end{aligned}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>How products of simple tensors combine</div>
<p>The two fundamental reduction moves in $T$ are:</p>
<p><strong>R1</strong> (matching right): $(a \\otimes b)(c \\otimes b) = (a*c) \\otimes b$</p>
<p><strong>R2</strong> (matching left): $(a \\otimes b)(a \\otimes d) = a \\otimes (b \\star d)$</p>
<p>When neither left factors match nor right factors match, $(a \\otimes b)(c \\otimes d)$ is <em>not</em> a simple tensor ŌĆö it is a genuine product of two simple tensors. This is what makes irreducibility non-trivial.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Examples</div>
<p>$\\bullet$ $(1 \\otimes 2)(1 \\otimes 3) = 1 \\otimes (2 \\star 3) = 1 \\otimes (-6{\\cdot}2{\\cdot}3+2+3) = 1 \\otimes (-31)$ &emsp;(R2)</p>
<p>$\\bullet$ $(2 \\otimes 5)(3 \\otimes 5) = (2*3) \\otimes 5 = (6{\\cdot}6+2+3) \\otimes 5 = 41 \\otimes 5$ &emsp;(R1)</p>
<p>$\\bullet$ $(2 \\otimes 3)(4 \\otimes 7)$ ŌĆö not directly a simple tensor (different left and right factors).</p>
</div>`},

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// Card 5 ŌĆö Definition: Diagonal ╬öT
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"def-delta-T",ch:"┬¦2 Tensor Product",badge:"b-def",title:"Definition ŌĆö The Diagonal $\\Delta T$",lean:null,body:`
<p>Define the <strong>diagonal</strong> of $T$ to be the set of simple tensors of the form $t \\otimes t$:</p>
<div class="math-block">$$\\Delta T \\;:=\\; \\{\\, t \\otimes t \\;:\\; t \\in \\mathbb{Z} \\,\\} \\;\\subseteq\\; T$$</div>
<p>The element $0 \\otimes 0 = 0_T$ is the identity of $T$ and corresponds to $t = 0$. For $t \\neq 0$, the element $t \\otimes t$ is a nonzero simple tensor.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle me-1"></i>$\\Delta T$ as a generating set</div>
<p>The submonoid $\\langle \\Delta T \\rangle \\leq T$ generated by $\\Delta T$ consists of all finite products $t_1 \\otimes t_1)(t_2 \\otimes t_2) \\cdots (t_k \\otimes t_k)$. Since left and right factors are paired, this submonoid has a natural diagonal structure inherited from both $L$ and $R$. The element $t \\otimes t \\in \\Delta T$ is $*$-irreducible (in the left coordinate) iff $6t+1$ is prime, and $\\star$-irreducible (in the right coordinate) iff $|1-6t|$ is prime.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Connection to twin primes</div>
<p>An element $t \\otimes t \\in \\Delta T$ is irreducible in $T$ (see <a onclick="goToCard('prop-irreducibility')" style="cursor:pointer">Proposition</a> below) if and only if $t$ is irreducible in $L$ <em>and</em> in $R$ simultaneously ŌĆö i.e., $6t+1$ and $|6t-1|$ are both prime. This is precisely a twin prime pair $(|6t-1|,\\, 6t+1)$. The Twin Prime Conjecture is $|\\{t \\otimes t \\in \\Delta T : t \\otimes t \\text{ irred. in } T\\}| = \\infty$.</p>
</div>`},

// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
// Card 6 ŌĆö Proposition: Reduction Lemma (by induction)
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"prop-reduction-lemma",ch:"┬¦3 Irreducibility",badge:"b-prop",title:"Proposition (Reduction Lemma) ŌĆö Products of Simple Tensors",lean:null,body:`
<p>This proposition characterizes when a product of nonzero simple tensors in $T$ can equal a single simple tensor, and shows that in such cases one of the coordinates must be reducible.</p>
<div class="math-block">$$\\textbf{Proposition.}\\quad\\text{Let } n \\geq 2 \\text{ and } a_i, b_i \\in \\mathbb{Z} \\setminus \\{0\\}. \\text{ If}$$
$$(a_1 \\otimes b_1)(a_2 \\otimes b_2) \\cdots (a_n \\otimes b_n) \\;=\\; s \\otimes t \\quad \\text{in } T,\\; s,t \\neq 0,$$
$$\\text{then either } s \\text{ is reducible in } L \\text{ or } t \\text{ is reducible in } R.$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof by induction</button>
<div class="proof-content" style="display:none">
<p><strong>Proof by induction on $n$.</strong></p>
<p><strong>Base case $n = 2$.</strong> Suppose $(a_1 \\otimes b_1)(a_2 \\otimes b_2) = s \\otimes t$. By the bimultiplicativity relations, the only ways to combine two nonzero simple tensors into one are via R1 or R2:</p>
<p>&emsp;<strong>R1</strong> (right factors agree: $b_1 = b_2 = b$): $(a_1 \\otimes b)(a_2 \\otimes b) = (a_1 * a_2) \\otimes b$. Here $s = a_1 * a_2$ with $a_1, a_2 \\neq 0$, so $s$ is reducible in $L$. Ō£ō</p>
<p>&emsp;<strong>R2</strong> (left factors agree: $a_1 = a_2 = a$): $(a \\otimes b_1)(a \\otimes b_2) = a \\otimes (b_1 \\star b_2)$. Here $t = b_1 \\star b_2$ with $b_1, b_2 \\neq 0$, so $t$ is reducible in $R$. Ō£ō</p>
<p><strong>Inductive step ($n \\geq 3$).</strong> Assume the result for all products of fewer than $n$ nonzero simple tensors. Any sequence of bimultiplicativity reductions converting $n$ simple tensors to the single simple tensor $s \\otimes t$ must end with a <em>final reduction step</em> that merges two simple tensors $\\alpha \\otimes \\beta$ and $\\gamma \\otimes \\delta$ into $s \\otimes t$, where $\\alpha \\otimes \\beta$ arises from $k$ of the original factors and $\\gamma \\otimes \\delta$ from the remaining $n - k$ (with $1 \\leq k < n$).</p>
<p>Since $L$ and $R$ have no zero divisors (<a onclick="goToCard('prop-L-monoid')" style="cursor:pointer">Props 1ŌĆō2</a>), products of nonzero elements are nonzero. Therefore $\\alpha, \\beta, \\gamma, \\delta \\neq 0$ (they are products of subsets of the nonzero $a_i$ or $b_i$).</p>
<p>The final step uses R1 or R2 on $\\alpha \\otimes \\beta$ and $\\gamma \\otimes \\delta$:</p>
<p>&emsp;<strong>R1</strong> ($\\beta = \\delta$): $s = \\alpha * \\gamma$ with $\\alpha, \\gamma \\neq 0$, so $s$ is reducible in $L$. Ō£ō</p>
<p>&emsp;<strong>R2</strong> ($\\alpha = \\gamma$): $t = \\beta \\star \\delta$ with $\\beta, \\delta \\neq 0$, so $t$ is reducible in $R$. Ō£ō</p>
<p>In either case, one of $s$ or $t$ is reducible.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED &ensp; $\\blacksquare$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-arrow-right-circle me-1"></i>Interpretation</div>
<p>The Reduction Lemma says: if $s \\otimes t$ factors as a product of two or more nonzero simple tensors, then at least one of $s,t$ must already be reducible in its respective monoid. In contrapositive form: if both $s$ and $t$ are irreducible, then $s \\otimes t$ cannot factor as a product of two or more nonzero simple tensors ŌĆö which is exactly the $\\Leftarrow$ direction of the irreducibility characterization on the next card.</p>
</div>`},

// Card 7 ŌĆö Proposition: Irreducibility in T
// ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
{id:"prop-irreducibility",ch:"┬¦3 Irreducibility",badge:"b-prop",title:"Proposition ŌĆö Irreducibility in $T$",lean:null,body:`
<p>Recall: an element $x$ of a commutative monoid $(M, \\cdot, 1_M)$ is <strong>irreducible</strong> if $x \\neq 1_M$ and $x = ab$ implies $a = 1_M$ or $b = 1_M$. In $L$ and $R$ (where $1_M = 0$): $s$ is irreducible in $L$ iff $s \\neq 0$ and $s = a * b$ implies $a = 0$ or $b = 0$.</p>
<div class="math-block">$$\\textbf{Proposition.}\\quad s \\otimes t \\in T \\text{ (with } s,t \\neq 0\\text{) is irreducible in } T$$
$$\\text{if and only if}\\quad s \\text{ is irreducible in } L \\quad\\text{and}\\quad t \\text{ is irreducible in } R.$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><strong>($\\Rightarrow$) Suppose $s \\otimes t$ is irreducible in $T$.</strong></p>
<p>Since $s \\otimes t \\neq 0_T$, we have $s, t \\neq 0$ (as $0 \\otimes r \\sim 0_T$ and $\\ell \\otimes 0 \\sim 0_T$).</p>
<p><em>$s$ is irreducible in $L$:</em> Suppose for contradiction $s = a * b$ with $a, b \\neq 0$. By left bimultiplicativity:</p>
<div class="math-block">$$s \\otimes t = (a * b) \\otimes t = (a \\otimes t)(b \\otimes t)$$</div>
<p>Since $a, b, t \\neq 0$, both $a \\otimes t \\neq 0_T$ and $b \\otimes t \\neq 0_T$. This is a nontrivial factorization of $s \\otimes t$, contradicting its irreducibility. So $s$ is irreducible in $L$. Ō£ō</p>
<p><em>$t$ is irreducible in $R$:</em> If $t = a \\star b$ with $a, b \\neq 0$, then by right bimultiplicativity $s \\otimes t = (s \\otimes a)(s \\otimes b)$ ŌĆö again a nontrivial factorization. Contradiction. Ō£ō</p>
<p><strong>($\\Leftarrow$) Suppose $s$ is irreducible in $L$ and $t$ is irreducible in $R$.</strong></p>
<p>Suppose $s \\otimes t = u \\cdot v$ in $T$ with $u, v \\neq 0_T$. Write $u$ and $v$ each as a product of nonzero simple tensors; together they give:</p>
<div class="math-block">$$s \\otimes t = (a_1 \\otimes b_1)(a_2 \\otimes b_2) \\cdots (a_n \\otimes b_n), \\quad n \\geq 2, \\; a_i, b_i \\neq 0.$$</div>
<p>By the <a onclick="goToCard('prop-reduction-lemma')" style="cursor:pointer">Reduction Lemma</a>: either $s$ is reducible in $L$, or $t$ is reducible in $R$. But both are irreducible by assumption ŌĆö contradiction. Therefore no such factorization exists, and $s \\otimes t$ is irreducible in $T$. Ō£ō</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED &ensp; $\\blacksquare$</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Diagonal examples in $\\Delta T$</div>
<p>For $t \\otimes t \\in \\Delta T$: $t \\otimes t$ is irreducible in $T$ iff $t$ is irreducible in both $L$ and $R$, i.e., $6t+1$ and $|1-6t| = |6t-1|$ are both prime.</p>
<div style="font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.9;margin-top:.4rem">
$t=1$: $\\phi(1)=7$ (prime), $|\\psi(1)|=5$ (prime) &rarr; $1\\otimes 1$ <strong>irreducible</strong> in $T$ &ensp;Ōåö twin prime $(5,7)$<br>
$t=2$: $\\phi(2)=13$ (prime), $|\\psi(2)|=11$ (prime) &rarr; $2\\otimes 2$ <strong>irreducible</strong> in $T$ &ensp;Ōåö twin prime $(11,13)$<br>
$t=4$: $\\phi(4)=25=5^2$ (composite) &rarr; $4\\otimes 4$ <strong>reducible</strong> in $T$ (fails in $L$)<br>
$t=6$: $|\\psi(6)|=35=5{\\cdot}7$ (composite) &rarr; $6\\otimes 6$ <strong>reducible</strong> in $T$ (fails in $R$)
</div>
</div>`},

// ŌöĆŌöĆ Proof Dependency Map ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const PM_NODES=[
  {id:'prop-L-monoid',       l1:'Prop',  l2:'L monoid',    t:'prop', c:0, r:0},
  {id:'prop-R-monoid',       l1:'Prop',  l2:'R monoid',    t:'prop', c:0, r:2},
  {id:'def-tensor-product',  l1:'Def',   l2:'M \u2297 N',  t:'def',  c:1, r:1},
  {id:'def-T',               l1:'Def',   l2:'T = L\u2297R',t:'def',  c:2, r:1},
  {id:'def-delta-T',         l1:'Def',   l2:'\u0394T diag.',t:'def', c:2, r:3},
  {id:'prop-reduction-lemma',l1:'Prop',  l2:'Reduction',   t:'prop', c:3, r:1},
  {id:'prop-irreducibility', l1:'Prop',  l2:'Irred. in T', t:'prop', c:4, r:1},
];
const PM_EDGES=[
  ['prop-L-monoid','def-T'],
  ['prop-R-monoid','def-T'],
  ['def-tensor-product','def-T'],
  ['def-T','def-delta-T'],
  ['def-T','prop-reduction-lemma'],
  ['prop-L-monoid','prop-reduction-lemma'],
  ['prop-R-monoid','prop-reduction-lemma'],
  ['prop-reduction-lemma','prop-irreducibility'],
  ['prop-L-monoid','prop-irreducibility'],
  ['prop-R-monoid','prop-irreducibility'],
];
const PM_COL=[70,175,280,420,570];
const PM_ROW=[30,100,170,240];
const NW=110,NH=40;
const PM_CLR={
  def: {f:'#dbeafe',s:'#1d4ed8',t:'#1d4ed8'},
  thm: {f:'#ffedd5',s:'#c2410c',t:'#c2410c'},
  lem: {f:'#ede9fe',s:'#5b21b6',t:'#5b21b6'},
  prop:{f:'#dcfce7',s:'#15803d',t:'#15803d'},
};
function pmC(n){return{x:PM_COL[n.c]-NW/2, y:PM_ROW[n.r], cx:PM_COL[n.c], cy:PM_ROW[n.r]+NH/2};}
function renderProofMap(){
  const svg=document.getElementById('pm-svg'); if(!svg)return;
  const nm={}; PM_NODES.forEach(n=>nm[n.id]=n);
  const activeId=cards[cur].id;
  let out=`<defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,1 L7,3.5 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;
  PM_EDGES.forEach(([a,b])=>{
    const s=nm[a],t=nm[b]; if(!s||!t)return;
    const sc=pmC(s),tc=pmC(t);
    const x1=sc.cx+(NW/2)+2,y1=sc.cy, x2=tc.cx-(NW/2)-9,y2=tc.cy;
    const mx=(x1+x2)/2;
    out+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-opacity=".65" marker-end="url(#arr)"/>`;
  });
  PM_NODES.forEach(n=>{
    const {x,y,cx}=pmC(n);
    const cl=PM_CLR[n.t];
    const active=n.id===activeId;
    const sw=active?3:1.5;
    const filt=active?' filter="url(#glow)"':'';
    out+=`<g class="pm-node" data-id="${n.id}" style="cursor:pointer">
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="9" fill="${cl.f}" stroke="${cl.s}" stroke-width="${sw}"${filt}/>
      <text x="${cx}" y="${y+15}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" fill="${cl.t}">${n.l1}</text>
      <text x="${cx}" y="${y+29}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="${cl.t}" opacity=".8">${n.l2}</text>
    </g>`;
  });
  svg.innerHTML=out;
  svg.querySelectorAll('.pm-node').forEach(el=>{
    el.addEventListener('click',()=>{const id=el.dataset.id;if(id){goToCard(id);togglePM();}});
    el.addEventListener('mouseenter',()=>{el.querySelector('rect').style.opacity='.7';});
    el.addEventListener('mouseleave',()=>{el.querySelector('rect').style.opacity='';});
  });
}
function togglePM(){
  const ov=document.getElementById('pmOverlay');
  const open=ov.style.display==='none'||!ov.style.display;
  if(open)renderProofMap();
  ov.style.display=open?'flex':'none';
}

let cur=0;
const chapters=[...new Set(cards.map(c=>c.ch))];
function goToCard(id){const i=cards.findIndex(c=>c.id===id);if(i>=0)jump(i);}
function shareCard(){
  const url=window.location.origin+window.location.pathname+'#'+cards[cur].id;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.querySelector('.share-btn');
    btn.classList.add('copied');btn.innerHTML='<i class="bi bi-check-lg"></i>';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<i class="bi bi-link-45deg"></i>';},1500);
  }).catch(()=>{prompt('Copy link:',url);});
}
function render(){
  const c=cards[cur];
  document.getElementById('mc').innerHTML=`
    <div class="card-hdr"><span class="card-badge ${c.badge}">${c.badge.replace('b-','').toUpperCase()}</span>
    <button class="share-btn" onclick="shareCard()" title="Copy link to this card"><i class="bi bi-link-45deg"></i></button>
    <h2 class="card-title mt-1">${c.title}</h2></div>
    <div class="card-body-inner">${c.body}</div>`;
  history.replaceState(null,'','#'+c.id);
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pl').textContent=`Card ${cur+1} of ${cards.length}  \u00b7  ${c.ch}`;
  document.getElementById('ctr').innerHTML=`<i class="bi bi-diamond-fill me-1" style="font-size:.5rem"></i>${cur+1} / ${cards.length}<i class="bi bi-diamond-fill ms-1" style="font-size:.5rem"></i>`;
  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bn').disabled=cur===cards.length-1;
  document.getElementById('chn').innerHTML=chapters.map(ch=>
    `<button class="ch-btn${cards[cur].ch===ch?' active':''}" onclick="jumpCh('${ch}')">${ch}</button>`).join('');
  document.getElementById('mm').innerHTML=cards.map((c,i)=>
    `<div class="mm-dot${i===cur?' active':''}" onclick="jump(${i})" title="Card ${i+1}: ${c.title.replace(/\$/g,'').replace(/\\\\/g,'').substring(0,30)}"></div>`).join('');
  if(document.getElementById('pmOverlay')&&document.getElementById('pmOverlay').style.display==='flex')renderProofMap();
  if(window.renderMathInElement)
    renderMathInElement(document.getElementById('mc'),{
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
}
function go(d){cur=Math.max(0,Math.min(cards.length-1,cur+d));
  document.getElementById('mc').style.animation='none';
  requestAnimationFrame(()=>{document.getElementById('mc').style.animation='cardIn .4s cubic-bezier(.34,1.56,.64,1)';render();});
  window.scrollTo({top:0,behavior:'smooth'});}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){const el=btn.nextElementSibling;const open=el.style.display==='none'||!el.style.display;
  el.style.display=open?'block':'none';btn.innerHTML=open?'<i class="bi bi-eye-slash me-1"></i>Hide proof':'<i class="bi bi-mortarboard me-1"></i>Show proof';}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);});
if(window.location.hash){const h=window.location.hash.slice(1);const hi=cards.findIndex(c=>c.id===h);if(hi>=0)cur=hi;}
window.addEventListener('hashchange',()=>{const h=window.location.hash.slice(1);const hi=cards.findIndex(c=>c.id===h);if(hi>=0&&hi!==cur)jump(hi);});
render();
</script>
