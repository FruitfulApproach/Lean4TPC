<script>
const GH="https://github.com/FruitfulApproach/Lean4TPC/blob/main";
const cards=[

{id:"abstract",ch:"Abstract",badge:"b-abs",title:"Abstract — The Monoid Tensor Product Approach",lean:null,body:`
<p>We prove there are <strong>infinitely many twin prime pairs</strong> via the monoid tensor product $M = (\\mathbb{Z},\\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z},\\star)$ and the submonoid $N = \\langle \\{k \\otimes k : k \\in \\mathbb{Z}\\} \\rangle \\leqslant M$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Core Strategy</div>
<p>We transfer the twin-prime question into an algebraic/topological setting where Furstenberg's classic proof-technique applies. The map $\\phi(x)=6x+1$ converts the monoid $(\\mathbb{Z},\\circledast)$ into ordinary multiplication in $6\\mathbb{Z}+1$. The monoid tensor product $M$ has bilinearity relations $(a \\circledast b) \\otimes w = (a \\otimes w)(b \\otimes w)$ and $z \\otimes (c \\star d) = (z \\otimes c)(z \\otimes d)$, with $z \\otimes 0 = 0 \\otimes w = e$ (identity). This identity condition is <strong>key</strong>: it kills the "trivial splitting" that plagues the direct product. Irreducible elements of $N$ correspond exactly to twin prime pairs.</p>
</div>
<p><strong>Key identity:</strong> For each irreducible $\\widehat{q} = q \\otimes q \\in \\mathrm{Irr}(N)$:</p>
<div class="math-block">$$\\widehat{q} \\cdot N = N \\cap (\\widehat{q} \\cdot M)$$</div>
<p>In the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> on $N$, each coset $\\widehat{q} \\cdot N = \\sigma^{-1}\\!\\bigl((q+\\phi(q)\\mathbb{Z})\\times(q+\\psi(q)\\mathbb{Z})\\bigr)$ is <a class="ilink" onclick="goToCard('cor-shadow-clopen')"><strong>clopen in $N$</strong></a> (preimage of a clopen product of arithmetic progressions). The <a class="ilink" onclick="goToCard('thm-5.2')">Furstenberg argument</a> then forces $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p><strong>Additionally:</strong> We prove that $N \\cap \\beta^{-1}(U)$ for any basic open $U$ is either <a class="ilink" onclick="goToCard('thm-empty-or-inf')"><strong>empty or infinite</strong></a> — a fundamental property of $N$'s interaction with the final topology that underpins the entire argument.</p>
<div class="d-flex flex-wrap gap-1 mt-3">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tag"><i class="bi bi-stars me-1"></i>Twin Primes</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tag"><i class="bi bi-clock-history me-1"></i>Furstenberg 1955</a>
<a href="https://leanprover.github.io/" target="_blank" class="tag"><i class="bi bi-braces me-1"></i>Lean 4</a>
<a href="https://en.wikipedia.org/wiki/Monoid" target="_blank" class="tag"><i class="bi bi-diagram-3 me-1"></i>Monoid Theory</a>
</div>`},

{id:"def-1.1",ch:"§1 Ops",badge:"b-def",title:"Definition 1.1 — Operations $\\mathbin{\\circledast}$ and $\\mathbin{\\star}$",lean:`${GH}/TPC/Basic.lean#L10`,body:`
<p>Define two binary operations on $\\mathbb{Z}$:</p>
<div class="math-block">$$x\\mathbin{\\circledast}y=6xy+x+y\\qquad x\\mathbin{\\star}y=-6xy+x+y$$</div>
<p>Both have <strong>identity element $0$</strong>: one checks $x\\mathbin{\\circledast}0 = 6\\cdot x\\cdot 0 + x + 0 = x$ and similarly for $\\mathbin{\\star}$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Why these operations?</div>
<p>They arise from "transporting" ordinary multiplication through the maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$. Every integer $n\\equiv 1\\pmod{6}$ has the form $\\phi(x)$ for a unique $x$, and every $n\\equiv 5\\pmod{6}$ (equivalently $n\\equiv -1\\pmod{6}$) has the form $\\psi(x)$. Since all primes $>3$ satisfy $p\\equiv\\pm1\\pmod{6}$, these operations capture the multiplicative structure of primes in the correct residue classes.</p>
</div>
<div class="code-block">def mstar (x y : ℤ) : ℤ := 6 * x * y + x + y
def sstar (x y : ℤ) : ℤ := -6 * x * y + x + y</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Computation Table</div>
<div class="code-block" style="margin:0"> x    y   x⊛y   x⋆y    φ(x⊛y)       Check
 1    1     8    -4      49      = 7·7 = φ(1)²
 2    3    41   -31     247      = 13·19 = φ(2)·φ(3)
-1   -1     4    -8      25      = (-5)·(-5) = φ(-1)²
 1   -1    -6     0     -35      = 7·(-5) = φ(1)·φ(-1)
 0    x     x     x    6x+1      identity ✓</div>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show associativity proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof of associativity for $\\circledast$:</strong></p>
<p>$(x\\circledast y)\\circledast z = 6(6xy+x+y)z+(6xy+x+y)+z$</p>
<p>$= 36xyz+6xz+6yz+6xy+x+y+z$</p>
<p>$x\\circledast(y\\circledast z) = 6x(6yz+y+z)+x+(6yz+y+z)$</p>
<p>$= 36xyz+6xy+6xz+x+6yz+y+z$</p>
<p>Both equal $36xyz+6xy+6xz+6yz+x+y+z$. Commutativity: $x\\circledast y = 6xy+x+y = 6yx+y+x = y\\circledast x$. The $\\star$ case is identical with $-6$ replacing $6$ in the leading term.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{id:"thm-1.3",ch:"§1 Ops",badge:"b-thm",title:"Theorem 1.3 — Isomorphisms $\\phi$ and $\\psi$",lean:`${GH}/TPC/Basic.lean#L38`,body:`
<p>The maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ are <strong>monoid isomorphisms</strong>:</p>
<div class="math-block">$$\\phi:(\\mathbb{Z},\\circledast)\\xrightarrow{\\sim}(6\\mathbb{Z}+1,\\cdot)\\qquad\\psi:(\\mathbb{Z},\\star)\\xrightarrow{\\sim}(6\\mathbb{Z}-1,\\bullet)$$</div>
<!-- https://q.uiver.app/#q=WzAsMyxbMCwwLCIoXG1hdGhiYntafSxcY2lyY2xlZGFzdCkiXSxbMiwwLCIoNlxtYXRoYmJ7Wn0rMSxcY2RvdCkiXSxbMSwxLCIoXG1hdGhiYntafSxcc3RhcikiXSxbMCwxLCJccGhpIiwwXSxbMiwxLCJccHNpIiwyXV0= -->
<iframe class="quiver-embed" src="https://q.uiver.app/#q=WzAsMyxbMCwwLCIoXFxtYXRoYmJ7Wn0sXFxjaXJjbGVkYXN0KSJdLFsyLDAsIig2XFxtYXRoYmJ7Wn0rMSxcXGNkb3QpIl0sWzEsMSwiKFxcbWF0aGJie1p9LFxcc3RhcikiXSxbMCwxLCJcXHBoaSIsMF0sWzIsMSwiXFxwc2kiLDJdXQ==&embed" width="400" height="200" style="border-radius: 8px; border: none;"></iframe>
<p>where $a\\bullet b = -(ab)$ on $6\\mathbb{Z}-1$. Both are bijections: $\\phi^{-1}(n)=\\frac{n-1}{6}$, $\\psi^{-1}(n)=\\frac{n+1}{6}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>$\\phi$ is multiplicative:</strong></p>
<p>$\\phi(x\\circledast y) = 6(6xy+x+y)+1 = 36xy+6x+6y+1 = (6x+1)(6y+1) = \\phi(x)\\cdot\\phi(y)$.</p>
<p><strong>$\\phi$ is a bijection onto $6\\mathbb{Z}+1$:</strong></p>
<p>If $n\\in 6\\mathbb{Z}+1$ then $n=6k+1$ for some $k\\in\\mathbb{Z}$, so $\\phi(k)=n$. Injectivity: $\\phi(x)=\\phi(y)\\Rightarrow 6x+1=6y+1\\Rightarrow x=y$.</p>
<p><strong>$\\psi$ is multiplicative (with $\\bullet$):</strong></p>
<p>$\\psi(x\\star y)=6(-6xy+x+y)-1=-36xy+6x+6y-1=-[(6x-1)(6y-1)]$.</p>
<p>And $\\psi(x)\\bullet\\psi(y) = -[(6x-1)(6y-1)]$. Equal. ✓</p>
<p><strong>$\\psi$ is a bijection onto $6\\mathbb{Z}-1$:</strong> same argument as $\\phi$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-lightning-charge me-1"></i>Key Consequence</div>
<p>$x$ is <strong>$\\circledast$-irreducible</strong> (cannot be written as $a\\circledast b$ with $a,b\\neq 0$) $\\iff$ $\\phi(x)=6x+1$ is <strong>prime</strong> in $\\mathbb{Z}$ (up to sign). This is because $\\phi$ converts $\\circledast$-factorizations into ordinary factorizations in $6\\mathbb{Z}+1$. See <a class="ilink" onclick="goToCard('thm-4.2')">Thm 4.2</a> for the full irreducibility characterization.</p>
</div>
<div class="code-block">lemma φ_mul (x y : ℤ) : φ (x ⊛ y) = φ x * φ y := by
  simp [φ, mstar]; ring

lemma ψ_mul (x y : ℤ) : ψ (x ⋆ y) = -(ψ x * ψ y) := by
  simp [ψ, sstar]; ring</div>`},

{id:"lem-1.4",ch:"§1 Ops",badge:"b-lem",title:"Lemma 1.4 — No Zero Divisors",lean:`${GH}/TPC/Basic.lean#L62`,body:`
<p><strong>Statement:</strong> If $u,v\\neq 0$ then $u\\mathbin{\\circledast}v\\neq 0$ and $u\\mathbin{\\star}v\\neq 0$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>For $\\circledast$:</strong> Suppose $u\\circledast v = 0$. Applying $\\phi$:</p>
<p>$\\phi(u\\circledast v) = \\phi(u)\\phi(v) = (6u+1)(6v+1) = \\phi(0) = 1$.</p>
<p>In $\\mathbb{Z}$, $ab=1$ forces $a=b=1$ or $a=b=-1$.</p>
<p><strong>Case 1:</strong> $6u+1=6v+1=1 \\Rightarrow u=v=0$. Contradicts $u\\neq 0$.</p>
<p><strong>Case 2:</strong> $6u+1=6v+1=-1 \\Rightarrow u=v=-1/3\\notin\\mathbb{Z}$. Impossible.</p>
<p><strong>For $\\star$:</strong> Suppose $u\\star v = 0$. Applying $\\psi$:</p>
<p>$\\psi(u\\star v) = -\\psi(u)\\psi(v) = -(6u-1)(6v-1)$. And $\\psi(0) = -1$.</p>
<p>So $(6u-1)(6v-1) = 1$, giving $6u-1=6v-1=\\pm1$, so $u=v=0$ or $u=v=1/3\\notin\\mathbb{Z}$. Either way contradiction.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Where this is used</div>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i><a class="ilink" onclick="goToCard('thm-3.2')">Thm 3.2</a></span> Prime divisibility in the coset identity proof</p>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i><a class="ilink" onclick="goToCard('lem-3.4')">Lem 3.4</a></span> Injectivity of left multiplication $L_{\\widehat{q}}$</p>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i><a class="ilink" onclick="goToCard('thm-empty-or-inf')">Thm ∅/∞</a></span> Emptiness-or-infinitude of $N \\cap$ basic opens</p>
</div>
<div class="code-block">lemma mstar_no_zero_div (u v : ℤ) (hu : u ≠ 0) (hv : v ≠ 0) :
    mstar u v ≠ 0 := by
  intro h; have := φ_mul u v; rw [h] at this
  simp [φ] at this; omega</div>`},

{id:"def-2.1",ch:"§2 Monoid",badge:"b-def",title:"Definition 2.1–2.2 — Monoid Tensor Product $M$, Generators $G$, Submonoid $N$",lean:`${GH}/TPC/Monoid.lean#L10`,body:`
<p><strong>Definition 2.1.</strong> The <strong>monoid tensor product</strong>:</p>
<div class="math-block">$$M = (\\mathbb{Z}, \\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z}, \\star)$$</div>
<p>with bilinearity relations:</p>
<div class="math-block">$$(a \\circledast b) \\otimes w = (a \\otimes w)(b \\otimes w), \\qquad z \\otimes (c \\star d) = (z \\otimes c)(z \\otimes d)$$</div>
<div class="math-block">$$z \\otimes 0 = 0 \\otimes w = e \\quad\\text{(identity)}$$</div>
<p>The identity condition $z \\otimes 0 = 0 \\otimes w = e$ is <strong>key</strong>: it kills the "trivial splitting" that plagues the direct product.</p>
<p><strong>Definition 2.2.</strong> The <strong>generating set</strong> is the set of diagonal tensors:</p>
<div class="math-block">$$G = \\{k \\otimes k : k \\in \\mathbb{Z}\\} \\qquad N = \\langle G \\rangle = \\{(k_1 \\otimes k_1)(k_2 \\otimes k_2)\\cdots(k_r \\otimes k_r) : r \\geq 0,\\; k_i \\in \\mathbb{Z}\\}$$</div>
<p>We write $\\widehat{k} = k \\otimes k$ for diagonal tensors. Elements of $N$ are <strong>formal products</strong> of diagonal tensors. A product $\\widehat{k_1}\\cdots\\widehat{k_r}$ with distinct $k_i$ does <strong>not</strong> simplify to a pure tensor (see <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4</a>). The multiset $\\{k_1,\\ldots,k_r\\}$ uniquely determines the element of $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $N$ is a submonoid</button>
<div class="proof-content" style="display:none">
<p><strong>Identity:</strong> The empty product ($r=0$) gives $e \\in N$. ✓</p>
<p><strong>Closure:</strong> If $\\widehat{k_1}\\cdots\\widehat{k_r} \\in N$ and $\\widehat{k_1'}\\cdots\\widehat{k_s'} \\in N$, their product is $\\widehat{k_1}\\cdots\\widehat{k_r}\\widehat{k_1'}\\cdots\\widehat{k_s'} \\in N$ (concatenation of generating sequences). ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Generator Products</div>
<div class="code-block" style="margin:0">ˆ1 · ˆ1       = (1⊗1)(1⊗1)  shadow: (1⊛1, 1⋆1) = (8, -4)
ˆ1 · ˆ2       = (1⊗1)(2⊗2)  shadow: (1⊛2, 1⋆2) = (15, -9)
ˆ2 · ˆ3       = (2⊗2)(3⊗3)  shadow: (2⊛3, 2⋆3) = (41, -31)
e · ˆk        = k⊗k          shadow: (k, k)  ← identity!
ˆ1 · ˆ1 · ˆ1 = (1⊗1)³      shadow: (1⊛1⊛1, 1⋆1⋆1) = (57, -27)</div>
</div>`},

{id:"prop-2.4",ch:"§2 Monoid",badge:"b-prop",title:"Proposition 2.4 — Structure of $N = \\langle G \\rangle$",lean:`${GH}/TPC/Monoid.lean#L40`,body:`
<p>We establish the basic structural properties of $N = \\langle G \\rangle$ inside the monoid tensor product $M$.</p>
<p><strong>Prop 2.4.1 (Products of diagonal generators).</strong> For $a \\neq b$, the product $\\widehat{a} \\cdot \\widehat{b} = (a \\otimes a)(b \\otimes b)$ is a <strong>formal product</strong> in $M$ — it does NOT simplify to a single pure tensor.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>The bilinearity relations of $M$ are:</p>
<div class="math-block">$$(a \\circledast b) \\otimes w = (a \\otimes w)(b \\otimes w) \\qquad z \\otimes (c \\star d) = (z \\otimes c)(z \\otimes d)$$</div>
<p><span class="step-num">1</span><strong>Left bilinearity</strong> applies only when two factors share the <strong>same right component</strong>: $(a \\otimes \\mathbf{w})(b \\otimes \\mathbf{w}) = (a \\circledast b) \\otimes w$.</p>
<p><span class="step-num">2</span><strong>Right bilinearity</strong> applies only when two factors share the <strong>same left component</strong>: $(\\mathbf{z} \\otimes c)(\\mathbf{z} \\otimes d) = z \\otimes (c \\star d)$.</p>
<p><span class="step-num">3</span>In $(a \\otimes a)(b \\otimes b)$ with $a \\neq b$: the right components are $a$ and $b$ (different), and the left components are $a$ and $b$ (different). <strong>Neither</strong> relation applies.</p>
<p>Therefore the product remains a formal word of length 2 in $M$, not a single pure tensor. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.2 (Equal indices: squares collapse to pure tensors).</strong> When $a = b$:</p>
<div class="math-block">$$\\widehat{a}^2 = (a \\otimes a)(a \\otimes a) = (a \\circledast a) \\otimes a = a \\otimes (a \\star a)$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>Now both factors share the right component $a$, so left bilinearity gives $(a \\otimes a)(a \\otimes a) = (a \\circledast a) \\otimes a$.</p>
<p>Both factors also share the left component $a$, so right bilinearity gives $(a \\otimes a)(a \\otimes a) = a \\otimes (a \\star a)$.</p>
<p>This implies the identity $(a \\circledast a) \\otimes a = a \\otimes (a \\star a)$ in $M$, i.e., $(6a^2+2a) \\otimes a = a \\otimes (-6a^2+2a)$.</p>
<p>Note: this pure tensor is <strong>not diagonal</strong> unless $a = 0$ (since $a \\circledast a = 6a^2+2a \\neq a$ for $a \\neq 0$). ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.3 ($M$ and $N$ are commutative).</strong> Both source monoids $(\\mathbb{Z}, \\circledast)$ and $(\\mathbb{Z}, \\star)$ are commutative, so $M = A \\otimes_{\\mathrm{Mon}} B$ is commutative (the monoid tensor product of commutative monoids is commutative). Hence $N \\leq M$ is also commutative.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>The tensor product is presented as the free commutative monoid on symbols $\\{z \\otimes w : z,w \\in \\mathbb{Z}\\}$ modulo bilinearity. Since the free commutative monoid is commutative and the bilinearity relations preserve this (they are symmetric), the quotient $M$ is commutative. ✓</p>
<p>Any submonoid of a commutative monoid is commutative. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.4 (Generators are distinct).</strong> $k \\mapsto \\widehat{k} = k \\otimes k$ is injective on $\\mathbb{Z} \\setminus \\{0\\}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>Suppose $k \\otimes k = l \\otimes l$ in $M$. By the UMP, every bilinear map $f: \\mathbb{Z} \\times \\mathbb{Z} \\to C$ must agree: $f(k,k) = f(l,l)$.</p>
<p>Consider $f: \\mathbb{Z} \\times \\mathbb{Z} \\to (\\mathbb{Z},+)$ defined by $f(z,w) = v_q(|\\phi(z)|) \\cdot v_p(|\\psi(w)|)$ for primes $q \\equiv 1 \\pmod{6}$, $p \\equiv 5 \\pmod{6}$.</p>
<p>This is bilinear (check: $v_q(|\\phi(a \\circledast b)|) = v_q(|\\phi(a)|) + v_q(|\\phi(b)|)$, and $v_p(|\\psi(c \\star d)|) = v_p(|\\psi(c)|) + v_p(|\\psi(d)|)$, with $f(0,w) = f(z,0) = 0$). ✓</p>
<p>Choosing $q = |\\phi(k)| = |6k+1|$ (when prime): $f(k,k) = 1 \\cdot v_p(|6k-1|)$, while $f(l,l) = v_q(|6l+1|) \\cdot v_p(|6l-1|)$. If $6l+1 \\neq \\pm(6k+1)$, then $v_q(|6l+1|)$ could differ, separating $k$ from $l$.</p>
<p>More directly: the family of all such $f$ separates the generators, since $\\phi$ and $\\psi$ are injective and primes are dense enough in $6\\mathbb{Z}\\pm 1$ to distinguish all values. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.5 (Unique representation up to ordering).</strong> Different multisets of non-zero generators give different elements of $N$: if $\\widehat{k_1}\\cdots\\widehat{k_r} = \\widehat{l_1}\\cdots\\widehat{l_s}$ in $M$, then $r = s$ and $\\{k_1,\\ldots,k_r\\} = \\{l_1,\\ldots,l_s\\}$ as multisets.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>The same bilinear maps $f_{q,p}$ from Prop 2.4.4 extend to homomorphisms $\\bar{f}_{q,p}: M \\to (\\mathbb{Z},+)$ by the UMP. On products:</p>
<div class="math-block">$$\\bar{f}_{q,p}(\\widehat{k_1}\\cdots\\widehat{k_r}) = \\sum_{i=1}^{r} v_q(|6k_i+1|) \\cdot v_p(|6k_i-1|)$$</div>
<p>If the products are equal in $M$, all homomorphic images agree: $\\sum_i v_q(|6k_i+1|) \\cdot v_p(|6k_i-1|) = \\sum_j v_q(|6l_j+1|) \\cdot v_p(|6l_j-1|)$ for all primes $q,p$.</p>
<p>The vector $(v_q(|6k+1|) \\cdot v_p(|6k-1|))_{q,p}$ uniquely identifies each generator $\\widehat{k}$ (since the prime factorizations of $|6k+1|$ and $|6k-1|$ are unique). The family of all such linear invariants determines the multiset of generators. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Key consequence for the norm</div>
<p>Since elements of $N$ have a unique multiset representation $\\widehat{k_1}\\cdots\\widehat{k_r}$, the <strong>norm</strong> $\\|\\widehat{k_1}\\cdots\\widehat{k_r}\\| := \\prod_{i=1}^r (6k_i+1)^2$ is <strong>well-defined</strong> on $N$. See <a class="ilink" onclick="goToCard('lem-4.3')">Lemma 4.3</a> for the norm's properties.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Product computations</div>
<div class="code-block" style="margin:0">ˆ1 · ˆ2   formal product, no simplification (1≠2)
ˆ1 · ˆ1   = (1⊛1)⊗1 = 8⊗1  (pure, NOT diagonal)
          = 1⊗(1⋆1) = 1⊗(−4) (same element, two forms)
ˆ2 · ˆ2   = (2⊛2)⊗2 = 28⊗2  (pure, NOT diagonal)
ˆ0        = 0⊗0 = e (identity)
ˆ0 · ˆk   = ˆk (identity absorbed)</div>
</div>`},

{id:"prop-2.3",ch:"§2 Monoid",badge:"b-prop",title:"Proposition 2.3 — Topology on $M$ via UMP",lean:`${GH}/TPC/Monoid.lean#L55`,body:`
<p>The canonical bilinear map $\\beta: \\mathbb{Z} \\times \\mathbb{Z} \\to M$ sends $(z,w) \\mapsto z \\otimes w$ and is <strong>universal</strong>: any bilinear map from $\\mathbb{Z} \\times \\mathbb{Z}$ to a monoid factors uniquely through $\\beta$.</p>
<!-- https://q.uiver.app/#q=WzAsNCxbMCwwLCJcbWF0aGJie1p9XHRpbWVzXG1hdGhiYntafSJdLFsyLDAsIk0iXSxbMCwyLCJDIl0sWzIsMiwiIl0sWzAsMSwiXGJldGEiLDBdLFswLDIsImYiLDFdLFsxLDIsIlxleGlzdHMhXGJhcntmfSIsMCx7InN0eWxlIjp7ImJvZHkiOnsibmFtZSI6ImRhc2hlZCJ9fX1dXQ== -->
<iframe class="quiver-embed" src="https://q.uiver.app/#q=WzAsNCxbMCwwLCJcXG1hdGhiYntafVxcdGltZXNcXG1hdGhiYntafSJdLFsyLDAsIk0iXSxbMCwyLCJDIl0sWzIsMiwiIl0sWzAsMSwiXFxiZXRhIiwwXSxbMCwyLCJmIiwxXSxbMSwyLCJcXGV4aXN0cyFcXGJhcntmfSIsMCx7InN0eWxlIjp7ImJvZHkiOnsibmFtZSI6ImRhc2hlZCJ9fX1dXQ==&embed" width="300" height="260" style="border-radius: 8px; border: none;"></iframe>
<p style="font-size:.85rem;color:var(--gray);">UMP: every bilinear $f: \\mathbb{Z} \\times \\mathbb{Z} \\to C$ factors uniquely as $f = \\bar{f} \\circ \\beta$.</p>
<p>Give $M$ the <strong>final topology</strong>: $U \\subseteq M$ is open iff $\\beta^{-1}(U)$ is open in $\\mathbb{Z}^2$ (with the Furstenberg product topology, where basis elements are products of arithmetic progressions $a + b\\mathbb{Z}$, each clopen). This makes $\\beta$ continuous by construction and gives $M$ a topology where arithmetic-progression cosets are clopen.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>The final topology is well-defined:</strong> By definition, $U \\subseteq M$ is open iff $\\beta^{-1}(U)$ is open in $\\mathbb{Z}^2$. This is a topology (the largest making $\\beta$ continuous).</p>
<p><strong>Multiplication is continuous:</strong> We must show $\\mu: M \\times M \\to M$ is continuous. It suffices to check on pure tensors, where $\\mu$ acts component-wise as $(\\circledast, \\star)$.</p>
<p><strong>Continuity of $\\circledast$ and $\\star$:</strong> In the Furstenberg topology, $(\\mathbb{Z}, +, \\cdot)$ is a <strong>topological ring</strong> — both addition and multiplication are continuous. Since $x \\circledast y = 6xy + x + y$ and $x \\star y = -6xy + x + y$ are <strong>polynomials</strong> in $x$ and $y$ with integer coefficients, they are compositions of continuous operations, hence continuous. ✓</p>
<p>Therefore the monoid operation on $M$ is continuous in the final topology.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Consequence</div>
<p>Left multiplication $L_{\\widehat{q}}(m) = \\widehat{q} \\cdot m$ is <strong>continuous</strong> for any fixed $\\widehat{q} \\in M$. Combined with injectivity (<a class="ilink" onclick="goToCard('lem-1.4')">Lem 1.4</a>), $L_{\\widehat{q}}$ is a homeomorphism onto its image when $\\widehat{q} \\neq e$.</p>
</div>`},

{id:"lem-3.1",ch:"§3 Coset",badge:"b-lem",title:"Lemma 3.1 — $\\widehat{a} \\cdot M$ is Clopen (via $\\beta$)",lean:`${GH}/TPC/CosetTopology.lean#L15`,body:`
<p>For $\\widehat{a} = a \\otimes a$ with $a \\neq 0$, the preimage $\\beta^{-1}(\\widehat{a} \\cdot \\beta(\\mathbb{Z}^2))$ is the product of arithmetic progressions:</p>
<div class="math-block">$$\\beta^{-1}(\\widehat{a} \\cdot M) = (a + \\phi(a)\\mathbb{Z}) \\times (a + \\psi(a)\\mathbb{Z})$$</div>
<p>where $\\phi(a) = 6a+1$ and $\\psi(a) = 6a-1$. This is <strong>clopen</strong> in $\\mathbb{Z}^2$ (Furstenberg product topology). By the final topology on $M$, the coset $\\widehat{a} \\cdot M$ is therefore <strong>clopen in $M$</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>First component:</strong> $\\{a\\circledast x : x\\in\\mathbb{Z}\\}$. Applying $\\phi$:</p>
<p>$\\phi(a\\circledast x) = \\phi(a)\\phi(x) = (6a+1)(6x+1)$.</p>
<p>As $x$ ranges over $\\mathbb{Z}$, $6x+1$ ranges over all of $6\\mathbb{Z}+1$. So the image under $\\phi$ is $(6a+1)\\cdot(6\\mathbb{Z}+1) = (6a+1) + 6(6a+1)\\mathbb{Z}$.</p>
<p>Pulling back through $\\phi^{-1}$: $a+(6a+1)\\mathbb{Z} = a + \\phi(a)\\mathbb{Z}$. ✓</p>
<p><strong>Second component:</strong> $\\{a\\star x : x\\in\\mathbb{Z}\\}$. Similarly via $\\psi$:</p>
<p>$\\psi(a\\star x) = -(6a-1)(6x-1)$. As $x$ ranges over $\\mathbb{Z}$, $6x-1$ ranges over $6\\mathbb{Z}-1$.</p>
<p>Pulling back: $a+(6a-1)\\mathbb{Z} = a + \\psi(a)\\mathbb{Z}$. ✓</p>
<p><strong>Clopenness:</strong> Each arithmetic progression $a+b\\mathbb{Z}$ (with $b\\neq 0$) is clopen in the Furstenberg topology. Products of clopen sets are clopen in the product topology. Since $\\beta^{-1}(\\widehat{a} \\cdot M)$ is clopen in $\\mathbb{Z}^2$, by the final topology definition, $\\widehat{a} \\cdot M$ is clopen in $M$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Explicit Cosets</div>
<div class="code-block" style="margin:0">β⁻¹(ˆ1 · M) = (1+7ℤ) × (1+5ℤ)
              = {...,−6,1,8,15,22,...} × {...,−4,1,6,11,16,...}
β⁻¹(ˆ2 · M) = (2+13ℤ) × (2+11ℤ)
β⁻¹(ˆ5 · M) = (5+31ℤ) × (5+29ℤ)

Step sizes: φ(a) = 6a+1, ψ(a) = 6a−1  ← the isomorphism values!</div>
</div>`},

{id:"thm-3.2",ch:"§3 Coset",badge:"b-thm",title:"Theorem 3.2 — The Coset Identity (The Key Lemma)",lean:`${GH}/TPC/CosetTopology.lean#L45`,body:`
<p style="position:relative;overflow:hidden;">For $\\widehat{q} = q \\otimes q \\in \\mathrm{Irr}(N)$ with $\\phi(q)$ prime:</p>
<div class="math-block">$$\\boxed{\\widehat{q} \\cdot N = N \\cap (\\widehat{q} \\cdot M)}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>This is the heart of the entire proof</div>
<p>This identity is what makes the Furstenberg argument work for $N$. The left side is an algebraic object (coset of the submonoid); the right side is a topological object (intersection with a clopen set). Their equality bridges algebra and topology. The proof uses the prime divisibility of $\\phi(q)$ via $\\phi$.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Direction ($\\subseteq$):</strong> If $m \\in \\widehat{q} \\cdot N$, then $m = \\widehat{q} \\cdot n$ for some $n \\in N$. Since $N$ is a submonoid containing $\\widehat{q}$, we have $m \\in N$. Also $m \\in \\widehat{q} \\cdot M$ trivially (since $N \\subseteq M$). So $m \\in N \\cap (\\widehat{q} \\cdot M)$. ✓</p>
<p><strong>Direction ($\\supseteq$) — the hard direction:</strong></p>
<p>Let $m \\in N \\cap (\\widehat{q} \\cdot M)$.</p>
<p><span class="step-num">1</span><strong>Unpack membership in $\\widehat{q} \\cdot M$:</strong> There exists a pure tensor $p \\otimes r \\in M$ with $m = \\widehat{q} \\cdot (p \\otimes r)$. By bilinearity, the first component is $q \\circledast p$ and the second is $q \\star r$.</p>
<p><span class="step-num">2</span><strong>Unpack membership in $N$:</strong> $m = \\widehat{k_1} \\cdots \\widehat{k_s}$ for some $k_1,\\ldots,k_s \\in \\mathbb{Z}$. The first-component shadow is $z = k_1 \\circledast \\cdots \\circledast k_s$ and second-component shadow is $w = k_1 \\star \\cdots \\star k_s$.</p>
<p><span class="step-num">3</span><strong>Apply $\\phi$:</strong> From step 1: $\\phi(q) \\cdot \\phi(p) = \\phi(z)$. From step 2: $\\phi(z) = \\phi(k_1)\\cdots\\phi(k_s)$.</p>
<p>So $\\phi(q) \\cdot \\phi(p) = \\phi(k_1)\\cdots\\phi(k_s)$.</p>
<p><span class="step-num">4</span><strong>Use irreducibility:</strong> Since $\\widehat{q} \\in \\mathrm{Irr}(N)$, $\\phi(q)=6q+1$ is <strong>prime</strong> in $\\mathbb{Z}$ (this is precisely the content of <a class="ilink" onclick="goToCard('thm-4.2')">Thm 4.2</a>).</p>
<p>Since $\\phi(q)$ is prime and divides $\\phi(k_1)\\cdots\\phi(k_s)$, by Euclid's lemma it divides some $\\phi(k_i)$.</p>
<p><span class="step-num">5</span><strong>Force equality:</strong> Since $\\phi(k_i)\\in 6\\mathbb{Z}+1$ and $\\phi(q)$ is a prime in $6\\mathbb{Z}+1$ dividing $\\phi(k_i)$, we need $\\phi(k_i) = \\pm\\phi(q)$. But all values in $6\\mathbb{Z}+1$ satisfy $\\phi(k_i)\\equiv 1\\pmod{6}$, so $\\phi(k_i)=-\\phi(q)$ would give $\\phi(k_i)\\equiv -1\\pmod{6}$, contradicting $\\phi(k_i)\\equiv 1\\pmod{6}$ (when $\\phi(q)\\neq 1$, which holds since $q\\neq 0$). Therefore $\\phi(k_i)=\\phi(q)$, hence $k_i=q$.</p>
<p><span class="step-num">6</span><strong>Reorder and conclude:</strong> By commutativity of $\\circledast$ and $\\star$, we may assume $k_1=q$. Then:</p>
<p>$m = \\widehat{q} \\cdot (\\widehat{k_2} \\cdots \\widehat{k_s})$.</p>
<p>Setting $n = \\widehat{k_2} \\cdots \\widehat{k_s} \\in N$, we get $m = \\widehat{q} \\cdot n \\in \\widehat{q} \\cdot N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{id:"cor-3.3",ch:"§3 Coset",badge:"b-cor",title:"Corollary 3.3 — $\\widehat{q} \\cdot N$ is Clopen in $N$",lean:`${GH}/TPC/CosetTopology.lean#L82`,body:`
<p>In the subspace topology on $N$ inherited from $M$ (via the final topology):</p>
<div class="math-block">$$\\widehat{q} \\cdot N = N \\cap (\\widehat{q} \\cdot M)\\quad\\text{is clopen in }N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span>By <a class="ilink" onclick="goToCard('lem-3.1')">Lemma 3.1</a>, $\\widehat{q} \\cdot M$ is <strong>clopen in $M$</strong> (the preimage $\\beta^{-1}(\\widehat{q} \\cdot M)$ is a product of two arithmetic progressions, hence clopen in $\\mathbb{Z}^2$, hence $\\widehat{q} \\cdot M$ is clopen by the final topology).</p>
<p><span class="step-num">2</span>By <a class="ilink" onclick="goToCard('thm-3.2')">Theorem 3.2</a>, $\\widehat{q} \\cdot N = N \\cap (\\widehat{q} \\cdot M)$.</p>
<p><span class="step-num">3</span>In the <strong>subspace topology</strong> on $N \\subseteq M$, the open sets of $N$ are precisely $\\{N \\cap U : U\\text{ open in }M\\}$. Similarly for closed sets.</p>
<p><span class="step-num">4</span>Since $\\widehat{q} \\cdot M$ is both open and closed in $M$, the intersection $N \\cap (\\widehat{q} \\cdot M)$ is both open and closed in $N$.</p>
<p>Therefore $\\widehat{q} \\cdot N$ is <strong>clopen in $N$</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="code-block">theorem cosetN_isClopen (q : ℤ) (hq : IsIrred (q ⊗ q))
    (hprime : (6*q+1).natAbs.Prime) :
    IsClopen ((· * ·) (q ⊗ q) '' ↑N)</div>`},

{id:"lem-3.4",ch:"§3 Coset",badge:"b-lem",title:"Lemma 3.4 — Cosets Are Infinite",lean:`${GH}/TPC/CosetTopology.lean#L95`,body:`
<p><strong>Statement:</strong> For any $\\widehat{q} = q \\otimes q \\neq e$ in $N$: $|\\widehat{q} \\cdot N| = |N| = \\infty$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>$N$ is infinite:</strong> $N$ contains all generators $\\widehat{k} = k \\otimes k$ for $k\\in\\mathbb{Z}$, and these are pairwise distinct (since they differ in their component shadows). So $|N|\\geq|\\mathbb{Z}|=\\infty$.</p>
<p><strong>$L_{\\widehat{q}}$ is injective:</strong> Suppose $\\widehat{q} \\cdot x = \\widehat{q} \\cdot y$ where $\\widehat{q} = q \\otimes q$ and $x, y \\in N$.</p>
<p>Looking at first-component shadows: $q\\circledast x_1 = q\\circledast y_1$. Applying $\\phi$: $\\phi(q)\\phi(x_1) = \\phi(q)\\phi(y_1)$.</p>
<p>Since $q\\neq 0$, $\\phi(q)=6q+1\\neq 1$ (as $q\\neq 0$ implies $|6q+1|\\geq 5$). Cancel: $\\phi(x_1)=\\phi(y_1)$, so $x_1=y_1$.</p>
<p>Similarly for second-component shadows: $\\psi(q)\\psi(x_2)=\\psi(q)\\psi(y_2)$ gives $x_2=y_2$.</p>
<p>Therefore $x = y$, so $L_{\\widehat{q}}$ is injective.</p>
<p><strong>Conclusion:</strong> $L_{\\widehat{q}}: N \\to \\widehat{q} \\cdot N$ is a bijection from the infinite set $N$, so $|\\widehat{q} \\cdot N|=\\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{id:"def-shadow",ch:"§3½ New",badge:"b-def",title:"Definition — Shadow Map $\\sigma$ and Topology on $N$",lean:null,body:`
<p>By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, every element of $N$ has a <strong>unique multiset representation</strong> $\\widehat{k_1}\\cdots\\widehat{k_r}$. This lets us define the <strong>shadow map</strong>:</p>
<div class="math-block">$$\\sigma = (\\sigma_1, \\sigma_2): N \\to \\mathbb{Z}^2, \\qquad \\sigma(\\widehat{k_1}\\cdots\\widehat{k_r}) = (k_1 \\circledast \\cdots \\circledast k_r,\\; k_1 \\star \\cdots \\star k_r)$$</div>
<p>with $\\sigma(e) = (0, 0)$.</p>
<!-- https://q.uiver.app/#q=WzAsNSxbMCwwLCJOIl0sWzIsMCwiKFxtYXRoYmJ7Wn0sXGNpcmNsZWRhc3QpIl0sWzQsMCwiKDZcbWF0aGJie1p9KzEsXGNkb3QpIl0sWzAsMSwiKFxtYXRoYmJ7Wn0sXHN0YXIpIl0sWzQsMSwiKDZcbWF0aGJie1p9LTEsXGJ1bGxldCkiXSxbMCwxLCJcc2lnbWFfMSIsMF0sWzAsMywiXHNpZ21hXzIiLDFdLFsxLDIsIlxwaGkiLDBdLFszLDQsIlxwc2kiLDBdXQ== -->
<iframe class="quiver-embed" src="https://q.uiver.app/#q=WzAsNSxbMCwwLCJOIl0sWzIsMCwiKFxcbWF0aGJie1p9LFxcY2lyY2xlZGFzdCkiXSxbNCwwLCIoNlxcbWF0aGJie1p9KzEsXFxjZG90KSJdLFswLDEsIihcXG1hdGhiYntafSxcXHN0YXIpIl0sWzQsMSwiKDZcXG1hdGhiYntafS0xLFxcYnVsbGV0KSJdLFswLDEsIlxcc2lnbWFfMSIsMF0sWzAsMywiXFxzaWdtYV8yIiwxXSxbMSwyLCJcXHBoaSIsMF0sWzMsNCwiXFxwc2kiLDBdXQ==&embed" width="540" height="200" style="border-radius: 8px; border: none;"></iframe>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $\\sigma$ is well-defined and a homomorphism</button>
<div class="proof-content" style="display:none">
<p><strong>Well-defined:</strong> By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, the multiset $\\{k_1,\\ldots,k_r\\}$ is unique. Since $\\circledast$ and $\\star$ are commutative and associative, the order doesn't affect $\\sigma_1$ or $\\sigma_2$. ✓</p>
<p><strong>$\\sigma_1$ is a monoid homomorphism $N \\to (\\mathbb{Z}, \\circledast)$:</strong></p>
<p>$\\sigma_1(m \\cdot m') = \\sigma_1(\\widehat{k_1}\\cdots\\widehat{k_r}\\widehat{l_1}\\cdots\\widehat{l_s}) = k_1 \\circledast \\cdots \\circledast k_r \\circledast l_1 \\circledast \\cdots \\circledast l_s$</p>
<p>$= (k_1 \\circledast \\cdots \\circledast k_r) \\circledast (l_1 \\circledast \\cdots \\circledast l_s) = \\sigma_1(m) \\circledast \\sigma_1(m')$ ✓</p>
<p>And $\\sigma_1(e) = 0$ (the identity of $\\circledast$). ✓</p>
<p>Similarly $\\sigma_2: N \\to (\\mathbb{Z}, \\star)$ is a homomorphism. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>The topology on $N$:</strong> Give $N$ the <strong>initial topology</strong> from $\\sigma$: a set $U \\subseteq N$ is open iff $U = \\sigma^{-1}(V)$ for some open $V \\subseteq \\mathbb{Z}^2$ (Furstenberg product topology). Equivalently, basic opens are:</p>
<div class="math-block">$$\\sigma^{-1}\\bigl((a + b\\mathbb{Z}) \\times (c + d\\mathbb{Z})\\bigr) = \\{m \\in N : \\sigma_1(m) \\equiv a \\!\\!\\pmod{b},\\; \\sigma_2(m) \\equiv c \\!\\!\\pmod{d}\\}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Why not the final topology from $\\beta$?</div>
<p>The final topology from $\\beta: \\mathbb{Z}^2 \\to M$ only "sees" pure tensors $z \\otimes w \\in \\mathrm{im}(\\beta)$. Products of $\\geq 2$ distinct diagonal generators are <strong>not</strong> pure tensors (<a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.1</a>), so they would be <strong>isolated points</strong> in the final topology — breaking the Furstenberg argument. The shadow map $\\sigma$ gives $N$ a non-trivial topology inherited from $\\mathbb{Z}^2$ via the homomorphism, where every element has infinite neighborhoods.</p>
</div>
<!-- https://q.uiver.app/#q=WzAsNCxbMCwwLCJOIl0sWzIsMCwiXG1hdGhiYntafV4yIl0sWzAsMiwiTiJdLFsyLDIsIlxtYXRoYmJ7Wn1eMiJdLFswLDEsIlxzaWdtYSIsMF0sWzIsMywiXHNpZ21hIiwwXSxbMCwyLCJcY2RvdFxoYXR7cX0iLDFdLFsxLDMsIkxfcSIsMV1d -->
<iframe class="quiver-embed" src="https://q.uiver.app/#q=WzAsNCxbMCwwLCJOIl0sWzIsMCwiXFxtYXRoYmJ7Wn1eMiJdLFswLDIsIk4iXSxbMiwyLCJcXG1hdGhiYntafV4yIl0sWzAsMSwiXFxzaWdtYSIsMF0sWzIsMywiXFxzaWdtYSIsMF0sWzAsMiwiXFxjZG90XFxoYXR7cX0iLDFdLFsxLDMsIkxfcSIsMV1d&embed" width="300" height="260" style="border-radius: 8px; border: none;"></iframe>
<p style="font-size:.85rem;color:var(--gray);">Commutative square: $\\sigma$ intertwines $\\cdot\\widehat{q}$ with $L_q(z,w) = (q \\circledast z,\\, q \\star w)$.</p>`},

{id:"cor-shadow-clopen",ch:"§3½ New",badge:"b-cor",title:"Corollary — $\\widehat{q} \\cdot N$ is Clopen in the Shadow Topology",lean:null,body:`
<p>For each $\\widehat{q} = q \\otimes q \\in \\mathrm{Irr}(N)$ (i.e., $\\phi(q)$ and $\\psi(q)$ both prime), the coset $\\widehat{q} \\cdot N$ is <strong>clopen</strong> in the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> on $N$:</p>
<div class="math-block">$$\\widehat{q} \\cdot N = \\sigma^{-1}\\!\\bigl((q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})\\bigr)$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>Why this matters</div>
<p>This is the shadow-topology analogue of <a class="ilink" onclick="goToCard('cor-3.3')">Cor 3.3</a>. While Cor 3.3 proves clopenness in the subspace topology inherited from $M$'s final topology, that topology has the wrong behavior on non-pure-tensor elements of $N$. Here we prove clopenness directly in the shadow topology — the topology actually used by the <a class="ilink" onclick="goToCard('thm-5.2')">Furstenberg argument</a>. The proof is cleaner: $\\widehat{q} \\cdot N$ is literally the $\\sigma$-preimage of a product of two arithmetic progressions.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Claim:</strong> $\\widehat{q} \\cdot N = \\sigma^{-1}\\!\\bigl((q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})\\bigr)$.</p>
<p><strong>Direction ($\\subseteq$):</strong></p>
<p><span class="step-num">1</span>Let $m \\in \\widehat{q} \\cdot N$, so $m = \\widehat{q} \\cdot n$ for some $n \\in N$. Since $\\sigma$ is a <a class="ilink" onclick="goToCard('def-shadow')">homomorphism</a>:</p>
<p>$\\sigma_1(m) = q \\circledast \\sigma_1(n)$, so $\\phi(\\sigma_1(m)) = \\phi(q) \\cdot \\phi(\\sigma_1(n))$. Hence $\\phi(q) \\mid \\phi(\\sigma_1(m))$.</p>
<p>Now $\\phi(q) \\mid (6\\sigma_1(m)+1)$ means $6\\sigma_1(m)+1 \\equiv 0 \\pmod{\\phi(q)}$, i.e., $\\sigma_1(m) \\equiv q \\pmod{\\phi(q)}$ (since $6q+1 \\mid 6\\sigma_1(m)+1$ iff $\\sigma_1(m) \\in q + (6q+1)\\mathbb{Z}$). So $\\sigma_1(m) \\in q + \\phi(q)\\mathbb{Z}$. ✓</p>
<p><span class="step-num">2</span>Similarly: $\\sigma_2(m) = q \\star \\sigma_2(n)$, so $\\psi(q) \\mid \\psi(\\sigma_2(m))$, giving $\\sigma_2(m) \\in q + \\psi(q)\\mathbb{Z}$. ✓</p>
<p><strong>Direction ($\\supseteq$):</strong></p>
<p><span class="step-num">3</span>Let $m \\in N$ with $\\sigma_1(m) \\in q + \\phi(q)\\mathbb{Z}$ and $\\sigma_2(m) \\in q + \\psi(q)\\mathbb{Z}$.</p>
<p>Then $\\phi(q) \\mid \\phi(\\sigma_1(m))$, i.e., $\\phi(q) \\mid \\phi(k_1)\\cdots\\phi(k_r)$ where $m = \\widehat{k_1}\\cdots\\widehat{k_r}$.</p>
<p><span class="step-num">4</span>Since $\\widehat{q} \\in \\mathrm{Irr}(N)$, $\\phi(q)$ is <strong>prime</strong> (<a class="ilink" onclick="goToCard('thm-4.2')">Thm 4.2</a>). By Euclid's lemma, $\\phi(q) \\mid \\phi(k_i)$ for some $i$.</p>
<p><span class="step-num">5</span>Since $\\phi(k_i) \\in 6\\mathbb{Z}+1$ and $\\phi(q)$ is a prime dividing $\\phi(k_i)$, and both are $\\equiv 1 \\pmod{6}$, we get $\\phi(k_i) = \\phi(q)$ (negative prime factors would be $\\equiv -1 \\pmod{6}$, contradicting $\\phi(k_i) \\equiv 1$). So $k_i = q$.</p>
<p><span class="step-num">6</span>Reorder: $m = \\widehat{q} \\cdot (\\widehat{k_1}\\cdots\\widehat{k_{i-1}}\\widehat{k_{i+1}}\\cdots\\widehat{k_r})$. The parenthesized product is in $N$, so $m \\in \\widehat{q} \\cdot N$. ✓</p>
<p><strong>Clopenness:</strong></p>
<p><span class="step-num">7</span>The set $(q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})$ is a product of two arithmetic progressions, hence <strong>clopen</strong> in the Furstenberg product topology on $\\mathbb{Z}^2$.</p>
<p><span class="step-num">8</span>By definition of the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> (initial topology from $\\sigma$), the preimage $\\sigma^{-1}(\\text{clopen}) = \\widehat{q} \\cdot N$ is <strong>clopen in $N$</strong>. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Explicit preimage</div>
<p>Concretely, $m \\in \\widehat{q} \\cdot N$ iff $\\sigma_1(m) \\equiv q \\pmod{6q+1}$ and $\\sigma_2(m) \\equiv q \\pmod{6q-1}$. For $q=1$ (twin pair $(5,7)$): $\\sigma_1(m) \\equiv 1 \\pmod{7}$ and $\\sigma_2(m) \\equiv 1 \\pmod{5}$.</p>
</div>`},

{id:"thm-empty-or-inf",ch:"§3½ New",badge:"b-thm",title:"Theorem — Every Nonempty Open Set in $N$ is Infinite",lean:null,body:`
<p>In the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> on $N$:</p>
<div class="math-block">$$\\text{For any }a,b,c,d\\in\\mathbb{Z}\\text{ with }b,d\\neq 0:\\quad \\sigma^{-1}\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)\\text{ is either }\\emptyset\\text{ or infinite.}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>Why this matters</div>
<p>This shows that $N$ is "topologically large" — it cannot meet a basic open set in finitely many points. This is the deeper reason why $\\{e\\}$ cannot be open in $N$, which is the key contradiction in the Furstenberg argument.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Direct computation of $\\sigma^{-1}((a+b\\mathbb{Z}) \\times (c+d\\mathbb{Z}))$:</strong></p>
<p>An element $m = \\widehat{k_1}\\cdots\\widehat{k_r} \\in N$ lies in this set iff:</p>
<div class="math-block">$$\\sigma_1(m) = k_1 \\circledast \\cdots \\circledast k_r \\equiv a \\!\\!\\pmod{b} \\quad\\text{and}\\quad \\sigma_2(m) = k_1 \\star \\cdots \\star k_r \\equiv c \\!\\!\\pmod{d}$$</div>
<p>Applying $\\phi$ and $\\psi$: this is $\\phi(k_1)\\cdots\\phi(k_r) \\equiv \\phi(a) \\pmod{\\phi(a)\\cdot b'}$ and $\\psi(k_1)\\cdots\\psi(k_r) \\equiv \\psi(c)\\pmod{\\psi(c) \\cdot d'}$ for appropriate $b', d'$.</p>
<p>Now suppose this set is nonempty. Pick $m_0 \\in N$ with $\\sigma(m_0) = (z_0, w_0)$ in the set.</p>
<p><span class="step-num">1</span><strong>Construct new elements:</strong> For each $n \\in \\mathbb{Z}$, define $v_n = m_0 \\cdot \\widehat{nbd}$. Since $m_0 \\in N$ and $\\widehat{nbd} \\in G \\subseteq N$, we have $v_n \\in N$. ✓</p>
<p><span class="step-num">2</span><strong>Compute shadows via $\\sigma$:</strong> Since $\\sigma$ is a homomorphism (<a class="ilink" onclick="goToCard('def-shadow')">Shadow Map</a>):</p>
<p>$\\sigma_1(v_n) = z_0 \\circledast (nbd) = 6z_0 \\cdot nbd + z_0 + nbd = nbd(6z_0 + 1) + z_0$</p>
<p>$\\sigma_2(v_n) = w_0 \\star (nbd) = -6w_0 \\cdot nbd + w_0 + nbd = nbd(-6w_0 + 1) + w_0$</p>
<p><span class="step-num">3</span><strong>First shadow stays in $a + b\\mathbb{Z}$:</strong></p>
<p>$\\sigma_1(v_n) = nbd(6z_0 + 1) + z_0 \\equiv z_0 \\equiv a \\pmod{b}$ &nbsp; (since $b \\mid nbd$) ✓</p>
<p><span class="step-num">4</span><strong>Second shadow stays in $c + d\\mathbb{Z}$:</strong></p>
<p>$\\sigma_2(v_n) = nbd(-6w_0 + 1) + w_0 \\equiv w_0 \\equiv c \\pmod{d}$ &nbsp; (since $d \\mid nbd$) ✓</p>
<p><span class="step-num">5</span><strong>Distinctness:</strong> If $v_n = v_m$ then $\\sigma_1(v_n) = \\sigma_1(v_m)$:</p>
<p>$\\phi(\\sigma_1(v_n)) = \\phi(z_0) \\cdot \\phi(nbd) = \\phi(z_0)(6nbd + 1)$</p>
<p>$= \\phi(z_0)(6mbd + 1) = \\phi(\\sigma_1(v_m))$</p>
<p>Since $\\phi(z_0) = 6z_0 + 1 \\neq 0$ (always odd, never zero), cancel: $6nbd + 1 = 6mbd + 1$, so $n = m$. ✓</p>
<p>Since $\\sigma_1(v_n) \\neq \\sigma_1(v_m)$ for $n \\neq m$, the $v_n$ are <strong>pairwise distinct</strong> elements of $N$. ($\\sigma$ is well-defined, so different $\\sigma$-values $\\Rightarrow$ different elements.) ✓</p>
<p><span class="step-num">6</span><strong>Conclusion:</strong> $\\{v_n : n \\in \\mathbb{Z}\\} \\subseteq \\sigma^{-1}((a+b\\mathbb{Z}) \\times (c+d\\mathbb{Z}))$ is infinite. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Logical structure</div>
<p>The proof uses three ingredients: <span class="depends-badge">$\\sigma$ is a homomorphism</span> <span class="depends-badge">$G \\ni \\widehat{nbd}$ for all $n$</span> <span class="depends-badge">$\\phi(z_0) \\neq 0$ always (for injectivity)</span></p>
</div>`},

{id:"cor-no-isolated",ch:"§3½ New",badge:"b-cor",title:"Corollary — No Isolated Points in $N$",lean:null,body:`
<p><strong>Statement:</strong> In the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> on $N$, the submonoid $N$ has <strong>no isolated points</strong>. That is, for every $m \\in N$, the singleton $\\{m\\}$ is <strong>not open</strong> in $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>Suppose for contradiction that $\\{m\\}$ is open in the shadow topology on $N$.</p>
<p><span class="step-num">1</span>By definition of the initial topology from $\\sigma$, there exists an open set $V \\subseteq \\mathbb{Z}^2$ with $\\{m\\} = \\sigma^{-1}(V)$.</p>
<p><span class="step-num">2</span>Let $(z_0, w_0) = \\sigma(m)$. Since $(z_0, w_0) \\in V$ and $V$ is open in $\\mathbb{Z}^2$, there exist $b,d \\neq 0$ with $(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z}) \\subseteq V$.</p>
<p><span class="step-num">3</span>Then $\\sigma^{-1}\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr) \\subseteq \\sigma^{-1}(V) = \\{m\\}$.</p>
<p><span class="step-num">4</span>But $m \\in \\sigma^{-1}\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr)$, so this set is nonempty.</p>
<p><span class="step-num">5</span>By the <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>, it is <strong>infinite</strong> — contradicting the fact that it's contained in a singleton.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Significance</div>
<p>This corollary gives a <strong>cleaner version of <a class="ilink" onclick="goToCard('lem-5.1')">Lemma 5.1</a></strong> (no singleton open in $N$). While Lemma 5.1 only needs this for $e$, the result holds for <em>every</em> element of $N$ — the submonoid $N$ is a <strong>perfect set</strong> (no isolated points) in the shadow topology.</p>
</div>`},

{id:"def-4.1",ch:"§4 Irred",badge:"b-def",title:"Definition 4.1 — Irreducibility in $N$",lean:`${GH}/TPC/Main.lean#L5`,body:`
<p>An element $m \\in N \\setminus \\{e\\}$ is <strong>irreducible in $N$</strong> (written $m \\in \\mathrm{Irr}(N)$) if:</p>
<div class="math-block">$$m = a \\cdot b\\text{ with }a,b\\in N \\implies a = e\\text{ or }b = e$$</div>
<p>In other words, $m$ cannot be decomposed as a nontrivial product of two elements of $N$. We also write $\\mathrm{Irr}_\\otimes(N)$ for the set of tensor-irreducibles.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Note on structure</div>
<p>Every element of $N$ is a formal product of diagonal tensors $\\widehat{k} = k \\otimes k$. Irreducibility means the generating sequence has length exactly 1: $m = \\widehat{k} = k \\otimes k$ for some $k$ that is $\\circledast$-irreducible. See <a class="ilink" onclick="goToCard('thm-4.2')">Thm 4.2</a> for the full characterization.</p>
</div>`},

{id:"thm-4.2",ch:"§4 Irred",badge:"b-thm",title:"Theorem 4.2 — Irreducibles $\\iff$ Twin Primes",lean:`${GH}/TPC/Main.lean#L8`,body:`
<p>Work in the <strong>monoid tensor product</strong> $M = (\\mathbb{Z},\\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z},\\star)$. A pure tensor $z\\otimes w$ is $\\otimes$-irreducible if and only if $z$ is $\\circledast$-irreducible and $w$ is $\\star$-irreducible:</p>
<div class="math-block">$$z\\otimes w\\in\\mathrm{Irr}(M) \\iff z\\notin\\{x\\circledast y : x,y\\neq 0\\}\\text{ and }w\\notin\\{x\\star y : x,y\\neq 0\\}$$</div>
<p>Equivalently, via $\\phi$ and $\\psi$: $\\phi(z)=6z+1$ is $\\pm$prime and $\\psi(w)=6w-1$ is $\\pm$prime. For diagonal elements $\\widehat{k} = k\\otimes k$, both conditions fall on the same $k$, giving twin prime pairs $(6k-1,\\,6k+1)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Setup:</strong> In the monoid tensor product $M = (\\mathbb{Z},\\circledast)\\otimes_{\\mathrm{Mon}}(\\mathbb{Z},\\star)$, the bilinearity relations are:</p>
<div class="math-block">$$(a\\circledast a')\\otimes w = (a\\otimes w)\\cdot(a'\\otimes w)\\qquad z\\otimes(b\\star b') = (z\\otimes b)\\cdot(z\\otimes b')$$</div>
<p>and the identity is $0\\otimes w = z\\otimes 0 = e$. The only way to factor a pure tensor $z\\otimes w$ into a product of non-identity elements is via these bilinearity relations.</p>
<p><strong>($\\Rightarrow$) $z\\otimes w$ irreducible $\\Rightarrow$ both components irreducible:</strong></p>
<p><span class="step-num">1</span><strong>$z$ is $\\circledast$-irreducible:</strong> If $z = a\\circledast b$ with $a,b\\neq 0$, then by bilinearity:</p>
<p>$z\\otimes w = (a\\circledast b)\\otimes w = (a\\otimes w)\\cdot(b\\otimes w)$</p>
<p>Both $a\\otimes w$ and $b\\otimes w$ are non-identity (since $a,b\\neq 0$ and $w\\neq 0$). This is a nontrivial factorization, contradicting irreducibility of $z\\otimes w$.</p>
<p><span class="step-num">2</span><strong>$w$ is $\\star$-irreducible:</strong> If $w = c\\star d$ with $c,d\\neq 0$, then:</p>
<p>$z\\otimes w = z\\otimes(c\\star d) = (z\\otimes c)\\cdot(z\\otimes d)$</p>
<p>Again a nontrivial factorization. Contradiction.</p>
<p><strong>($\\Leftarrow$) Both components irreducible $\\Rightarrow$ $z\\otimes w$ irreducible:</strong></p>
<p>Suppose $z$ is $\\circledast$-irreducible and $w$ is $\\star$-irreducible. The only factorizations of a pure tensor in $M$ come from the bilinearity relations:</p>
<p><span class="step-num">3</span><strong>Left-splitting:</strong> $z\\otimes w = (a\\otimes w)(b\\otimes w)$ requires $z = a\\circledast b$. Since $z$ is $\\circledast$-irreducible: $a=0$ or $b=0$, making one factor the identity $e$. Trivial.</p>
<p><span class="step-num">4</span><strong>Right-splitting:</strong> $z\\otimes w = (z\\otimes c)(z\\otimes d)$ requires $w = c\\star d$. Since $w$ is $\\star$-irreducible: $c=0$ or $d=0$. Trivial.</p>
<p><span class="step-num">5</span><strong>Mixed splitting:</strong> A product $(a\\otimes c)(b\\otimes d)$ with $a \\neq b$ AND $c \\neq d$ does <em>not</em> simplify to a single pure tensor via the bilinearity relations — it remains a <strong>formal product</strong> in $M$, not equal to any single $z\\otimes w$. This is because the bilinearity relations only allow factoring along one tensor factor at a time: $(a \\circledast b) \\otimes w$ splits the left factor while fixing $w$, and $z \\otimes (c \\star d)$ splits the right factor while fixing $z$. A product of two pure tensors with <em>both</em> components differing cannot be "recombined" into a single pure tensor. So mixed factorizations cannot produce a pure tensor $z\\otimes w$.</p>
<p>Therefore $z\\otimes w$ is irreducible. ✓</p>
<p><strong>Connection to twin primes:</strong> By <a class="ilink" onclick="goToCard('thm-1.3')">Theorem 1.3</a>:</p>
<p>$z$ is $\\circledast$-irreducible $\\iff$ $\\phi(z)=6z+1$ is $\\pm$prime</p>
<p>$w$ is $\\star$-irreducible $\\iff$ $\\psi(w)=6w-1$ is $\\pm$prime</p>
<p>For diagonal elements $\\widehat{k} = k\\otimes k \\in N$: both conditions are on the same $k$, giving $6k+1$ and $6k-1$ both $\\pm$prime — i.e., $(6k-1,\\,6k+1)$ is a <strong>twin prime pair</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Why the tensor product?</div>
<p>In the diagonal submonoid $N = \\langle\\{k \\otimes k\\}\\rangle \\leqslant M$, the two components share the same generator sequence, creating subtle coupling. The monoid tensor product $\\otimes_{\\mathrm{Mon}}$ decouples the components via bilinearity, making irreducibility decompose cleanly. The identity condition $z \\otimes 0 = 0 \\otimes w = e$ ensures that "trivial" tensors collapse to the identity, preventing spurious factorizations.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Twin Prime Table</div>
<div class="code-block" style="margin:0"> k    φ(k)=6k+1  ψ(k)=6k−1  φ ±prime?  ψ ±prime?  k⊗k irred?  Twin pair
 1       7          5        YES ✓      YES ✓      YES ✓       (5, 7)
 2      13         11        YES ✓      YES ✓      YES ✓       (11, 13)
 3      19         17        YES ✓      YES ✓      YES ✓       (17, 19)
 4      25         23        NO  ✗      YES        NO  ✗       25 = 5²
 5      31         29        YES ✓      YES ✓      YES ✓       (29, 31)
 7      43         41        YES ✓      YES ✓      YES ✓       (41, 43)
10      61         59        YES ✓      YES ✓      YES ✓       (59, 61)
12      73         71        YES ✓      YES ✓      YES ✓       (71, 73)
17     103        101        YES ✓      YES ✓      YES ✓       (101, 103)</div>
</div>
<p>So $|\\mathrm{Irr}_\\otimes(N)|=\\infty$ restricted to diagonal tensors $k\\otimes k$ is <strong>exactly</strong> the Twin Prime Conjecture.</p>`},

{id:"lem-4.3",ch:"§4 Irred",badge:"b-lem",title:"Lemma 4.3 — The Norm Function",lean:`${GH}/TPC/Main.lean#L40`,body:`
<p>Define the <strong>norm</strong> on $N$:</p>
<div class="math-block">$$\\|z \\otimes w\\| = \\phi(z)^2 = (6z+1)^2$$</div>
<p>(where $z$ is the first-component shadow of the element).</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show properties and proofs</button>
<div class="proof-content" style="display:none">
<p><strong>N1. Non-negative:</strong> $\\|z \\otimes w\\|=(6z+1)^2\\geq 0$. Trivial. ✓</p>
<p><strong>N2. Identity:</strong> $\\|e\\| = \\|0 \\otimes 0\\| = (6\\cdot 0+1)^2 = 1$. ✓</p>
<p><strong>N3. Non-degenerate:</strong> $\\|m\\|=1 \\iff (6z+1)^2=1 \\iff 6z+1=\\pm 1 \\iff z=0$ or $z=-1/3$. Since $z\\in\\mathbb{Z}$, we get $z=0$, so $m = e$. ✓</p>
<p><strong>N4. Multiplicative:</strong></p>
<p>$\\|a \\cdot b\\| = \\phi(z_a \\circledast z_b)^2 = (\\phi(z_a)\\phi(z_b))^2 = \\phi(z_a)^2\\cdot\\phi(z_b)^2 = \\|a\\|\\cdot\\|b\\|$. ✓</p>
<p><strong>N5. Proper factors have smaller norm:</strong></p>
<p>If $m = a \\cdot b$ with $a, b \\neq e$, then $\\|a\\| \\geq 25$ (since $|\\phi(z_a)|\\geq 5$ for $z_a\\neq 0$, giving $\\|a\\| \\geq 25$). Similarly $\\|b\\|\\geq 25$. Then:</p>
<p>$\\|a\\| = \\|m\\|/\\|b\\| \\leq \\|m\\|/25 < \\|m\\|$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Norm Values</div>
<div class="code-block" style="margin:0">‖e‖         = 1²  = 1     ← identity
‖1 ⊗ 1‖     = 7²  = 49    ← irreducible (7 prime)
‖2 ⊗ 2‖     = 13² = 169   ← irreducible (13 prime)
‖(1⊗1)(1⊗1)‖ = 49² = 2401  = 49·49 = ‖1⊗1‖²  ← composite!</div>
</div>`},

{id:"lem-4.4",ch:"§4 Irred",badge:"b-cor",title:"Lemma 4.4 + Corollary 4.5 — Irreducible Divisors and Covering",lean:`${GH}/TPC/Main.lean#L55`,body:`
<p><strong>Lemma 4.4 (Every element has an irreducible divisor):</strong></p>
<p>For every $m \\in N \\setminus \\{e\\}$, there exists $\\widehat{q} \\in \\mathrm{Irr}(N)$ with $\\widehat{q} \\mid m$ (i.e., $m = \\widehat{q} \\cdot n$ for some $n \\in N$).</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof of Lemma 4.4</button>
<div class="proof-content" style="display:none">
<p><strong>Strong induction on $\\|m\\|$.</strong></p>
<p><strong>Base:</strong> If $m$ is irreducible, take $\\widehat{q}=m$ and we're done (it divides itself: $m = m \\cdot e$).</p>
<p><strong>Inductive step:</strong> If $m$ is not irreducible, write $m = a \\cdot b$ with $a, b \\neq e$.</p>
<p>By <a class="ilink" onclick="goToCard('lem-4.3')">norm property N5</a>: $\\|a\\| < \\|m\\|$.</p>
<p>By the induction hypothesis (applicable since $\\|a\\|<\\|m\\|$ and $a \\neq e$): there exists $\\widehat{q}\\in\\mathrm{Irr}(N)$ with $\\widehat{q} \\mid a$.</p>
<p>Write $a = \\widehat{q} \\cdot c$. Then $m = \\widehat{q} \\cdot c \\cdot b = \\widehat{q} \\cdot (c \\cdot b)$.</p>
<p>So $\\widehat{q} \\mid m$. ✓</p>
<p><strong>Termination:</strong> The norm $\\|m\\|=(6z+1)^2$ takes values in $\\{1,25,49,121,\\ldots\\}\\subset\\mathbb{N}$, with $\\|m\\|=1\\iff m = e$. So for $m \\neq e$, $\\|m\\|\\geq 25$, and proper factors have strictly smaller norm. The descent terminates by well-ordering of $\\mathbb{N}$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Corollary 4.5 — The Covering:</strong></p>
<div class="math-block">$$N\\setminus\\{e\\}=\\bigcup_{\\widehat{q}\\in\\mathrm{Irr}_\\otimes(N)}\\widehat{q} \\cdot N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof of Cor 4.5</button>
<div class="proof-content" style="display:none">
<p><strong>($\\supseteq$):</strong> Each $\\widehat{q} \\cdot N \\subseteq N\\setminus\\{e\\}$ because $\\widehat{q} \\cdot n = e$ only if $\\widehat{q} = e$ or $n = e$ (no zero divisors), and $\\widehat{q} \\neq e$ since $\\widehat{q}$ is irreducible.</p>
<p><strong>($\\subseteq$):</strong> Let $m \\in N\\setminus\\{e\\}$. By Lemma 4.4, pick $\\widehat{q}\\in\\mathrm{Irr}(N)$ with $m = \\widehat{q} \\cdot n$. Then $m \\in \\widehat{q} \\cdot N$. ✓</p>
<div class="code-block">-- Lean 4: norm descent (Lemma 4.4) produces
-- irreducible divisors within N directly.</div>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Analogy with Furstenberg</div>
<p>This is the exact analogue of $\\mathbb{Z}\\setminus\\{\\pm1\\} = \\bigcup_{p\\text{ prime}} p\\mathbb{Z}$ in Furstenberg's original proof of the infinitude of primes.</p>
</div>`},

{id:"lem-5.1",ch:"§5 Main",badge:"b-lem",title:"Lemma 5.1 — No Singleton is Open in $N$",lean:`${GH}/TPC/Main.lean#L82`,body:`
<p><strong>Statement:</strong> Every nonempty open set in the subspace topology on $N$ is <strong>infinite</strong>. In particular, no singleton $\\{m\\}$ is open in $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>Let $U\\subseteq N$ be nonempty and open in the subspace topology. Then $U = N\\cap V$ for some open $V\\subseteq M$.</p>
<p><span class="step-num">1</span>Pick $m \\in U$ with component shadows $(z_0, w_0)$. Since $V$ is open in the final topology on $M$, $\\beta^{-1}(V)$ is open in $\\mathbb{Z}^2$. Since $(z_0,w_0) \\in \\beta^{-1}(V)$, there exist $b,d>0$ with:</p>
<p>$(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\subseteq \\beta^{-1}(V)$</p>
<p><span class="step-num">2</span>Then $N\\cap\\beta^{-1}\\bigl((z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})\\bigr)\\subseteq N\\cap V = U$.</p>
<p><span class="step-num">3</span>By the <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>, since $m$ is in this intersection, it is <strong>infinite</strong>.</p>
<p><span class="step-num">4</span>Therefore $U$ contains infinitely many elements, so $|U|=\\infty$.</p>
<p><strong>Alternatively</strong> (direct argument without the new theorem): For each $n\\in\\mathbb{Z}$, the element $m \\cdot \\widehat{nbd}\\in N$ has component shadows in $(z_0+b\\mathbb{Z})\\times(w_0+d\\mathbb{Z})$ (as computed in the proof of the emptiness-or-infinitude theorem), giving infinitely many distinct points in $U$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

{id:"thm-5.2",ch:"§5 Main",badge:"b-thm",title:"Theorem 5.2 — $|\\mathrm{Irr}(N)|=\\infty$ (The Furstenberg Argument)",lean:`${GH}/TPC/Main.lean#L88`,body:`
<div class="math-block">$$|\\mathrm{Irr}(N)| = \\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof by contradiction.</strong> Assume $\\mathrm{Irr}(N)$ is finite: $\\mathrm{Irr}(N)=\\{\\widehat{q}_1,\\ldots,\\widehat{q}_m\\}$ where each $\\widehat{q}_i = q_i \\otimes q_i$.</p>
<p><span class="step-num">1</span><strong>Apply the covering (<a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>):</strong></p>
<p>$N\\setminus\\{e\\} = \\bigcup_{i=1}^{m} \\widehat{q}_i \\cdot N$</p>
<p><span class="step-num">2</span><strong>Each coset is clopen (<a class="ilink" onclick="goToCard('cor-shadow-clopen')">Shadow Clopenness</a>):</strong> Each $\\widehat{q}_i \\cdot N = \\sigma^{-1}\\!\\bigl((q_i + \\phi(q_i)\\mathbb{Z}) \\times (q_i + \\psi(q_i)\\mathbb{Z})\\bigr)$ is clopen in the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a> on $N$.</p>
<p><span class="step-num">3</span><strong>Finite union of clopen = clopen:</strong> A finite union of clopen sets is clopen. So $N\\setminus\\{e\\}$ is clopen in $N$.</p>
<p><span class="step-num">4</span><strong>Complement is open:</strong> Since $N\\setminus\\{e\\}$ is closed, $\\{e\\} = N\\setminus(N\\setminus\\{e\\})$ is <strong>open</strong> in $N$.</p>
<p><span class="step-num">5</span><strong>Contradiction:</strong> But $\\{e\\}$ is a singleton, and by <a class="ilink" onclick="goToCard('lem-5.1')">Lemma 5.1</a>, every nonempty open set in $N$ is infinite. A singleton cannot be infinite. <strong>Contradiction!</strong></p>
<p><span class="step-num">6</span><strong>Conclusion:</strong> $\\mathrm{Irr}(N)$ is not finite, i.e., $|\\mathrm{Irr}(N)|=\\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $|\\mathrm{Irr}(N)|=\\infty$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Proof Ingredients</div>
<p>This proof uses exactly four facts:</p>
<p><span class="depends-badge"><a class="ilink" onclick="goToCard('cor-shadow-clopen')">Shadow Clopenness</a>: cosets clopen in $\\sigma$-topology</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>: covering</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('lem-5.1')">Lem 5.1</a>: no singleton open</span> <span class="depends-badge">Finite union of clopen = clopen</span></p>
</div>`},

{id:"cor-5.3",ch:"§5 Main",badge:"b-cor",title:"Corollary 5.3 — Infinitely Many Twin Primes $\\blacksquare$",lean:`${GH}/TPC/Main.lean#L110`,body:`
<div class="math-block">$$\\bigl|\\{k\\in\\mathbb{Z}:6k-1\\in\\pm\\mathbb{P}\\text{ and }6k+1\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>By <a class="ilink" onclick="goToCard('thm-4.2')">Theorem 4.2</a>: $\\mathrm{Irr}(N) = \\{k \\otimes k : 6k+1\\in\\pm\\mathbb{P}\\text{ and }6k-1\\in\\pm\\mathbb{P}\\}$.</p>
<p>By <a class="ilink" onclick="goToCard('thm-5.2')">Theorem 5.2</a>: $|\\mathrm{Irr}(N)|=\\infty$.</p>
<p>Therefore the set $\\{k : 6k\\pm1\\in\\pm\\mathbb{P}\\}$ is infinite.</p>
<p>For each such $k>0$, the pair $(6k-1, 6k+1)$ is a pair of primes differing by $2$ — a <strong>twin prime pair</strong>.</p>
<p>(For $k<0$, we get twin primes via $|6k+1|$ and $|6k-1|$.)</p>
<p>Since there are infinitely many such $k$, there are <strong>infinitely many twin prime pairs</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — Twin Prime Conjecture ∎</div>
</div>
<p><strong>Complete logical chain:</strong></p>
<p style="font-size:.92rem;line-height:2;">
<span class="depends-badge"><a class="ilink" onclick="goToCard('def-1.1')">Def 1.1</a>: $\\circledast,\\star$</span>
<span style="color:var(--purple);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('thm-1.3')">Thm 1.3</a>: $\\phi,\\psi$ isos</span>
<span style="color:var(--purple);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('lem-1.4')">Lem 1.4</a>: No zero divs</span>
<span style="color:var(--blue);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('def-2.1')">Def 2.2</a>: $N=\\langle G\\rangle$</span>
<span style="color:var(--blue);font-weight:bold"> + </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('prop-2.3')">Prop 2.3</a>: Final topology via UMP</span>
<span style="color:var(--green);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('lem-3.1')">Lem 3.1</a>: $\\widehat{a} \\cdot M$ clopen</span>
<span style="color:var(--green);font-weight:bold"> → </span>
<span class="depends-badge" style="background:var(--orange-light);border-color:var(--orange);">★ <a class="ilink" onclick="goToCard('thm-3.2')">Thm 3.2</a>: Coset Identity</span>
<span style="color:var(--orange);font-weight:bold"> → </span>
<span class="depends-badge"><a class="ilink" onclick="goToCard('cor-3.3')">Cor 3.3</a>: clopen in $N$</span>
<span style="color:var(--orange);font-weight:bold"> + </span>

<div class="remark-box">
<div class="remark-title"><i class="bi bi-trophy-fill me-1"></i>The Big Picture</div>
<p>The proof reformulates the Twin Prime Conjecture as a statement about the algebraic structure of $N = \\langle\\{k \\otimes k : k \\in \\mathbb{Z}\\}\\rangle$ inside the monoid tensor product $M = (\\mathbb{Z},\\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z},\\star)$, then uses the final topology (induced by the universal bilinear map $\\beta$) to force infinitely many irreducibles.</p>
</div>
<p><strong>Three pillars of the proof:</strong></p>
<p><span class="step-num">1</span><strong>Algebraic pillar — The Coset Identity (<a class="ilink" onclick="goToCard('thm-3.2')">Thm 3.2</a>):</strong> $\\widehat{q} \\cdot N = N \\cap (\\widehat{q} \\cdot M)$ for $\\widehat{q} = q \\otimes q$ with $\\phi(q)$ prime. This converts the algebraic coset into a topological intersection, bridging the two worlds.</p>
<p><span class="step-num">2</span><strong>Topological pillar — Clopenness (<a class="ilink" onclick="goToCard('cor-shadow-clopen')">Shadow Clopenness</a>):</strong> In the <a class="ilink" onclick="goToCard('def-shadow')">shadow topology</a>, $\\widehat{q} \\cdot N = \\sigma^{-1}\\!\\bigl((q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})\\bigr)$ — the $\\sigma$-preimage of a product of arithmetic progressions, hence clopen. The proof uses primality of $\\phi(q)$ via Euclid's lemma (<a class="ilink" onclick="goToCard('thm-3.2')">Thm 3.2</a>-style argument) to show the set identity.</p>
<p><span class="step-num">3</span><strong>Combinatorial pillar — Covering + No Singletons:</strong> Every nonidentity element has an irreducible divisor (by norm descent), giving the covering. No singleton is open (by the empty-or-infinite theorem). Together: finite $\\mathrm{Irr}(N)$ would force $\\{e\\}$ open — contradiction.</p>
<div class="example-box">
<div class="example-title"><i class="bi bi-key-fill me-1"></i>Novel Contribution</div>
<p>Classical Furstenberg proofs work on $\\mathbb{Z}$ where cosets $p\\mathbb{Z}$ are automatically clopen. The challenge for twin primes is that $N$ is a <em>submonoid</em>, not a subgroup, and lives inside a tensor product rather than a ring. The coset identity (<a class="ilink" onclick="goToCard('thm-3.2')">Thm 3.2</a>) is what makes the Furstenberg technique work in this non-standard setting — it's the key that unlocks the entire proof. The monoid tensor product formulation, with its bilinearity relations and identity-killing property $z \\otimes 0 = 0 \\otimes w = e$, is what makes the irreducibility characterization (<a class="ilink" onclick="goToCard('thm-4.2')">Thm 4.2</a>) clean and prevents trivial splittings.</p>
</div>

let cur=0;
const chapters=[...new Set(cards.map(c=>c.ch))];
function goToCard(id){const i=cards.findIndex(c=>c.id===id);if(i>=0)jump(i);}
function shareCard(){
  const url=window.location.origin+window.location.pathname+"#"+cards[cur].id;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.querySelector(".share-btn");
    btn.classList.add("copied");btn.innerHTML='<i class="bi bi-check-lg"></i>';
    setTimeout(()=>{btn.classList.remove("copied");btn.innerHTML='<i class="bi bi-link-45deg"></i>';},1500);
  }).catch(()=>{prompt("Copy link:",url);});
}
function render(){
  const c=cards[cur];
  const lean=c.lean?`<a href="${c.lean}" target="_blank" class="src-link ms-2"><i class="bi bi-code-slash"></i> Lean4</a>`:"";
  document.getElementById("mc").innerHTML=`
    <div class="card-hdr"><span class="card-badge ${c.badge}">${c.badge.replace("b-","").toUpperCase()}</span>${lean}
    <button class="share-btn" onclick="shareCard()" title="Copy link to this card"><i class="bi bi-link-45deg"></i></button>
    <h2 class="card-title mt-1">${c.title}</h2></div>
    <div class="card-body-inner">${c.body}</div>`;
  history.replaceState(null,"","#"+c.id);
  const pct=Math.round(((cur+1)/cards.length)*100);
  document.getElementById("pb").style.width=pct+"%";
  document.getElementById("pl").textContent=`Card ${cur+1} of ${cards.length}  ·  ${c.ch}`;
  document.getElementById("ctr").innerHTML=`<i class="bi bi-diamond-fill me-1" style="font-size:.5rem"></i>${cur+1} / ${cards.length}<i class="bi bi-diamond-fill ms-1" style="font-size:.5rem"></i>`;
  document.getElementById("bp").disabled=cur===0;
  document.getElementById("bn").disabled=cur===cards.length-1;
  document.getElementById("chn").innerHTML=chapters.map(ch=>
    `<button class="ch-btn${cards[cur].ch===ch?" active":""}" onclick="jumpCh('${ch}')">${ch}</button>`).join("");
  document.getElementById("mm").innerHTML=cards.map((c,i)=>
    `<div class="mm-dot${i===cur?" active":""}" onclick="jump(${i})" title="Card ${i+1}: ${c.title.replace(/\$/g,'').replace(/\\\\/g,'').substring(0,30)}"></div>`).join("");
  if(window.renderMathInElement)
    renderMathInElement(document.getElementById("mc"),{
      delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false});
}
function go(d){cur=Math.max(0,Math.min(cards.length-1,cur+d));
  document.getElementById("mc").style.animation="none";
  requestAnimationFrame(()=>{document.getElementById("mc").style.animation="cardIn .4s cubic-bezier(.34,1.56,.64,1)";render();});
  window.scrollTo({top:0,behavior:"smooth"});}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:"smooth"});}
function jumpCh(ch){const i=cards.findIndex(c=>c.ch===ch);if(i>=0)jump(i);}
function tp(btn){const el=btn.nextElementSibling;const open=el.style.display==="none"||!el.style.display;
  el.style.display=open?"block":"none";btn.innerHTML=open?'<i class="bi bi-eye-slash me-1"></i>Hide proof':'<i class="bi bi-mortarboard me-1"></i>Show proof';}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown")go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")go(-1);});
const _s=sessionStorage.getItem("tpcCard");
if(_s!==null){cur=Math.min(parseInt(_s,10),cards.length-1);sessionStorage.removeItem("tpcCard");}
if(window.location.hash){const h=window.location.hash.slice(1);const hi=cards.findIndex(c=>c.id===h);if(hi>=0)cur=hi;}
window.addEventListener("hashchange",()=>{const h=window.location.hash.slice(1);const hi=cards.findIndex(c=>c.id===h);if(hi>=0&&hi!==cur)jump(hi);});
render();
</script>
