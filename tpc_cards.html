// ═══════════════════════════════════════════════════════════════
// Card 7 — Prop 2.4: Structure of N
// ═══════════════════════════════════════════════════════════════
{id:"prop-2.4",ch:"§2 Monoid",badge:"b-prop",title:"Proposition 2.4 — Structure of $N = \\langle G \\rangle$",lean:`${GH}/TPC/Monoid.lean#L40`,body:`
<p><strong>Prop 2.4.1.</strong> For $a \\neq b$, the product $\\mathfrak{a} \\cdot \\mathfrak{b}$ is a <strong>formal product</strong> — it does NOT simplify to a single pure tensor.</p>
<p><strong>Prop 2.4.3.</strong> $M$ and $N$ are <strong>commutative</strong> (tensor product of commutative monoids is commutative).</p>
<p><strong>Prop 2.4.4.</strong> $k \\mapsto \\mathfrak{r} = (k,k)$ is <strong>injective</strong> on $\\mathbb{Z} \\setminus \\{0\\}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proofs via separating invariants</button>
<div class="proof-content" style="display:none">
<p>All three follow from <a class="ilink" onclick="goToCard('lem-sep-inv')">Lemma 2.3</a>. The family $\\{\\bar{f}_{q,p}: M\\to(\\mathbb{Z},+)\\}$ satisfies $\\bar{f}_{q,p}\\circ\\iota = f_{q,p}$:</p>
<div class="math-block">$$\\begin{CD}
(\\mathbb{Z},\\circledast)\\times(\\mathbb{Z},\\star) @>{f_{q,p}}>> (\\mathbb{Z},+) \\\\
@V{\\iota}VV @| \\\\
M @>{\\bar{f}_{q,p}}>> (\\mathbb{Z},+)
\\end{CD}$$</div>
<p><strong>2.4.1:</strong> If $\\mathfrak{a}\\cdot\\mathfrak{b} = z\\otimes w$ for some $z,w$, apply $\\bar{f}_{q,p}$: the left side gives $\\bar{f}_{q,p}(\\mathfrak{a})+\\bar{f}_{q,p}(\\mathfrak{b})$, the right gives $f_{q,p}(z,w)=v_q|\\phi(z)|\\cdot v_p|\\psi(w)|$. But choosing $(q,p)$ that separates $a$ from $b$ forces an additive split that no single product $v_q(\\cdot)\\cdot v_p(\\cdot)$ can match. Contradiction. ✓</p>
<p><strong>2.4.4:</strong> If $\\mathfrak{r}=\\mathfrak{l}$ then $\\bar{f}_{q,p}(\\mathfrak{r})=\\bar{f}_{q,p}(\\mathfrak{l})$ for all $(q,p)$. By Lemma 2.3 separation, $k=l$. ✓</p>
<p><strong>2.4.3:</strong> Since $\\circledast$ and $\\star$ are commutative, $z\\otimes w = (z\\circledast 0)\\otimes w$, and the bilinearity relations give commutativity on generators; it extends to all of $M$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Prop 2.4.5 (Unique multiset representation).</strong> Different multisets of non-zero generators give different elements: if $\\mathfrak{r}_1\\cdots\\mathfrak{r}_r = \\mathfrak{l}_1\\cdots\\mathfrak{l}_s$ in $M$, then $r=s$ and $\\{k_1,\\ldots,k_r\\} = \\{l_1,\\ldots,l_s\\}$ as multisets.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Proof — choose irreducibles, then UFD</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span><strong>Choose $\\mathfrak{r}_i, \\mathfrak{l}_j$ to be irreducible.</strong> By <a class="ilink" onclick="goToCard('lem-ufd')">Lem 2.4.A</a> (existence), every factor has an irreducible factorization in $N$. Replace each $\\mathfrak{r}_i$ and $\\mathfrak{l}_j$ by its irreducible factorization; the equality is preserved and we may write</p>
<div class="math-block">$$\\mathfrak{q}_1\\cdots\\mathfrak{q}_n \\;=\\; \\mathfrak{\\lambda}_1\\cdots\\mathfrak{\\lambda}_m, \\qquad \\mathfrak{q}_i,\\mathfrak{\\lambda}_j\\in\\mathrm{Irr}(N).$$</div>
<p><span class="step-num">2</span><strong>Apply $\\bar{\\phi}: M\\to(\\mathbb{Z},\\cdot)$.</strong> Since $\\phi:(\\mathbb{Z},\\circledast)\\to(\\mathbb{Z},\\cdot)$, $z\\mapsto 6z+1$ is a monoid homomorphism, it extends via the UMP to $\\bar{\\phi}$ on $M$:</p>
<div class="math-block">$$\\phi(q_1)\\cdots\\phi(q_n) \\;=\\; \\phi(\\lambda_1)\\cdots\\phi(\\lambda_m).$$</div>
<p>Since every factor is irreducible, each $\\phi(q_i)$ and $\\phi(\\lambda_j)$ is <strong>prime</strong>. Both sides are therefore products of primes. By <strong>UFD in $\\mathbb{Z}$</strong>: $n=m$ and $\\{\\phi(q_i)\\}=\\{\\phi(\\lambda_j)\\}$ as multisets. Since $\\phi$ is injective, $\\{q_i\\}=\\{\\lambda_j\\}$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
${mkVerify('prop-2.4')}`},

// ═══════════════════════════════════════════════════════════════
// NEW — Def 2.5: Quotient Monoid M-bar
// ═══════════════════════════════════════════════════════════════
{id:"def-mbar",ch:"§2 Monoid",badge:"b-def",title:"Definition — Quotient Monoid $\\bar{M}$ and $\\bar{N}$",lean:null,body:`
<p>Define the <strong>diagonal collapse congruence</strong> $\\sim$ on $M$ generated by:</p>
<div class="math-block">$$(x\\otimes x)(y\\otimes y)\\;\\sim\\;(x\\circledast y)\\otimes(x\\star y)\\qquad(x,y\\in\\mathbb{Z})$$</div>
<p>The <strong>quotient monoid</strong> is $\\bar{M} = M/\\!\\sim$, and the <strong>collapsed diagonal submonoid</strong> is $\\bar{N} = \\langle \\{\\bar x\\otimes\\bar x : x\\neq 0\\}\\rangle\\subseteq\\bar{M}$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Motivation</div>
<p>In the original $M$, products of diagonal generators stay as formal products (Prop 2.4.1). The congruence forces them to collapse: $(x\\otimes x)(y\\otimes y)=(x\\circledast y)\\otimes(x\\star y)$. In $\\bar{M}$, every element of $\\bar{N}$ <em>is</em> a pure tensor — making $\\bar{N}$ a concrete subset of $\\bar{M}$ rather than an abstract free monoid, and making the topological argument tractable.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-calculator me-1"></i>Example collapses</div>
<div class="code-block" style="margin:0">In M̄:  (1⊗1)((-2)⊗(-2)) = (1⊛(-2)) ⊗ (1⋆(-2)) = (-13)⊗11
        (1⊗1)(2⊗2) = (1⊛2)⊗(1⋆2) = 15⊗(-9)
  Note: 𝔯₁₄₁ = (1⊗1)·((-2)⊗(-2))·((-2)⊗(-2)) = (-13⊗11)·((-2)⊗(-2))
              = ((-13)⊛(-2))⊗(11⋆(-2)) = 141⊗141  ✓</div>
</div>`},

// ═══════════════════════════════════════════════════════════════
// NEW — Prop: Diagonal Collapse is a Congruence
// ═══════════════════════════════════════════════════════════════
{id:"prop-congruence",ch:"§2 Monoid",badge:"b-prop",title:"Proposition — Diagonal Collapse is a Monoid Congruence",lean:null,body:`
<p>The relation $\\sim$ generated by $(x\\otimes x)(y\\otimes y)\\sim(x\\circledast y)\\otimes(x\\star y)$ is a <strong>monoid congruence</strong> on $M$: if $\\alpha\\sim\\alpha'$ then $\\gamma\\alpha\\sim\\gamma\\alpha'$ for all $\\gamma\\in M$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>Let $\\approx$ denote the congruence closure of $\\sim$. We need to show compatibility with the monoid operation, i.e., that $\\approx$ is stable under left and right multiplication.</p>
<p><span class="step-num">1</span><strong>Generator pairs:</strong> The generating relation is $R = \\{((x\\otimes x)(y\\otimes y),\\,(x\\circledast y)\\otimes(x\\star y)) : x,y\\in\\mathbb{Z}\\}$.</p>
<p><span class="step-num">2</span><strong>Left multiplication:</strong> For any $\\gamma\\in M$ and generator pair $(\\alpha, \\alpha')\\in R$: $\\gamma\\alpha = \\gamma(x\\otimes x)(y\\otimes y)$ and $\\gamma\\alpha' = \\gamma(x\\circledast y)\\otimes(x\\star y)$. Since $M$ is a monoid, these are still elements of $M$ and $(\\gamma\\alpha,\\gamma\\alpha')$ is in the congruence closure. ✓</p>
<p><span class="step-num">3</span><strong>Right multiplication:</strong> Similarly $(\\alpha\\gamma, \\alpha'\\gamma)$ is in the closure. ✓</p>
<p><span class="step-num">4</span><strong>Consistency with $M$'s bilinearity:</strong> Key check — does the new relation conflict with the existing bilinearity of $M$? Both sides of the generator satisfy the same image under $\\bar\\varphi$ and $\\bar\\psi$:</p>
<div class="math-block">$$\\bar\\varphi((x\\otimes x)(y\\otimes y)) = \\varphi(x)\\varphi(y) = \\varphi(x\\circledast y) = \\bar\\varphi((x\\circledast y)\\otimes(x\\star y))\\;\\checkmark$$</div>
<div class="math-block">$$\\bar\\psi((x\\otimes x)(y\\otimes y)) = \\psi(x)\\cdot_T\\psi(y) = \\psi(x\\star y) = \\bar\\psi((x\\circledast y)\\otimes(x\\star y))\\;\\checkmark$$</div>
<p>Since $\\bar\\varphi$ and $\\bar\\psi$ are monoid homomorphisms from $M$ that agree on both sides of every generator, the relation is consistent: no contradiction with $M$'s structure. ✓</p>
<p><span class="step-num">5</span><strong>Transitivity/symmetry/reflexivity:</strong> These are automatic for congruence closure. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $\\sim$ is a monoid congruence, so $\\bar{M}=M/\\!\\sim$ is a well-defined monoid.</div>
</div>
${mkVerify('prop-congruence')}`},

// ═══════════════════════════════════════════════════════════════
// NEW — Prop: Structure of N-bar; Lem: N-bar Closed in M-bar
// ═══════════════════════════════════════════════════════════════
{id:"prop-nbar",ch:"§2 Monoid",badge:"b-prop",title:"Proposition — Structure of $\\bar{N}$; Lemma — $\\bar{N}$ Closed in $\\bar{M}$",lean:null,body:`
<p><strong>Proposition (Structure of $\\bar{N}$).</strong></p>
<div class="math-block">$$\\bar{N} = \\{\\, z\\otimes w \\in \\bar{M} : \\exists\\text{ multiset }\\{k_i\\}_{i=1}^r\\subset\\mathbb{Z}\\setminus\\{0\\},\\; z=\\bigcircledast_i k_i,\\; w=\\bigstar_i k_i\\,\\}$$</div>
<p>with product rule $(z_1\\otimes w_1)\\cdot(z_2\\otimes w_2) = (z_1\\circledast z_2)\\otimes(w_1\\star w_2)$. Thus $\\bar{N}\\cong\\mathrm{Im}(\\Delta)$ where $\\Delta:\\mathrm{FreeCommMon}(\\mathbb{Z}\\setminus\\{0\\})\\to(\\mathbb{Z},\\circledast)\\times(\\mathbb{Z},\\star)$, $\\Delta(\\{k_i\\})=(\\circledast k_i,\\star k_i)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p>By induction on multiset size: generators $x\\otimes x$ correspond to $\\{x\\}$. For the product: $(z_1\\otimes w_1)(z_2\\otimes w_2)$ where $z_i = \\circledast_{S_i}$, $w_i = \\star_{S_i}$. By applying the congruence relation repeatedly: the product collapses to $(\\circledast_{S_1\\cup S_2})\\otimes(\\star_{S_1\\cup S_2}) = (z_1\\circledast z_2)\\otimes(w_1\\star w_2)$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<hr style="margin:.8rem 0">
<p><strong>Lemma ($\\bar{N}$ is closed in $\\bar{M}$).</strong> Give $\\bar{M}$ the <strong>initial topology</strong> from $(\\bar\\varphi,\\bar\\psi):\\bar{M}\\to\\mathbb{Z}^2$ with $\\mathbb{Z}^2$ carrying the Furstenberg product topology. Then $\\bar{N}$ is <strong>closed</strong>.</p>
<p>Equivalently: $\\bar{M}\\setminus\\bar{N}$ is open. The key implication is:</p>
<div class="math-block">$$x\\in\\bar{M}\\setminus\\bar{N}\\implies\\exists\\text{ prime }p:\\; p\\mid\\bar\\varphi(x)\\text{ but the }p\\text{-part of }\\bar\\varphi(x)\\text{ has no matching }\\psi\\text{-partner}$$</div>
<p>That is: the prime factorizations of $\\bar\\varphi(x)\\in S$ and $\\bar\\psi(x)\\in T$ cannot be "paired up" via any multiset $\\{k_i\\}$ with $\\varphi(k_i)=6k_i+1$ and $\\psi(k_i)=6k_i-1$. The witness prime $p$ produces the open Furstenberg coset:</p>
<div class="math-block">$$U_p(x) = \\{m\\in\\bar{M}: \\bar\\varphi(m)\\equiv\\bar\\varphi(x)\\pmod{p}\\}\\cap\\{m: \\bar\\psi(m)\\not\\equiv_\\psi \\bar\\varphi(x)\\pmod{p}\\}$$</div>
<p>which is <strong>clopen</strong> (preimage of an arithmetic progression) and contains $x$ while avoiding $\\bar{N}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof sketch</button>
<div class="proof-content" style="display:none">
<p><span class="step-num">1</span><strong>Separation condition.</strong> $x\\notin\\bar{N}$ means: no multiset $\\{k_i\\}$ satisfies $\\prod(6k_i+1)=\\bar\\varphi(x)$ AND $\\prod|6k_i-1|=|\\bar\\psi(x)|$ simultaneously. Equivalently, viewing the prime factorisation of $\\bar\\varphi(x)=\\prod p_j^{a_j}$: for at least one $p_j$, the exponent $a_j$ cannot be matched to any product $\\prod|6k_i-1|$ using the same $k$-multiset.</p>
<p><span class="step-num">2</span><strong>Witness prime.</strong> Pick a prime $p=p_j$ that witnesses the mismatch. The Furstenberg coset $\\{z\\in\\mathbb{Z}: z\\equiv \\bar\\varphi(x)\\pmod{p}\\}$ is clopen in $\\mathbb{Z}$ (Furstenberg topology). Its product with a corresponding coset for $\\bar\\psi$ that avoids $\\bar{N}$ gives a clopen neighbourhood of $x$ disjoint from $\\bar{N}$.</p>
<p><span class="step-num">3</span><strong>Conclusion.</strong> Every $x\\in\\bar{M}\\setminus\\bar{N}$ has a clopen neighbourhood avoiding $\\bar{N}$, so $\\bar{M}\\setminus\\bar{N}$ is open, i.e., $\\bar{N}$ is closed. ✓</p>
<div class="remark-box"><div class="remark-title"><i class="bi bi-exclamation-triangle-fill me-1"></i>Status</div><p>Step 2 requires making the "mismatch witness" explicit for all $x\\notin\\bar{N}$. This is the key lemma to formalise — it reduces to a statement about incompatible prime factorisations in $S$ and $T$.</p></div>
<div class="qed-box"><i class="bi bi-wrench me-1"></i>Proof sketch — Step 2 pending formalisation</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Why this fixes the proof</div>
<p>With $\\bar{N}$ closed in $\\bar{M}$: the Furstenberg argument on $\\bar{M}$ gives $|\\mathrm{Irr}(\\bar{M})|=\\infty$. Restricting to $\\bar{N}$ (closed $\\Rightarrow$ has the subspace topology): the twin-prime generators $\\mathrm{Irr}_M(G)=\\mathrm{Irr}(\\bar{M})\\cap\\bar{N}$ inherit the infinite-open-set property, forcing $|\\mathrm{Irr}_M(G)|=\\infty$ = TPC.</p>
</div>
${mkVerify('prop-nbar')}`},

// ═══════════════════════════════════════════════════════════════
// Card 6 — Def 4.1: Irreducibility
// ═══════════════════════════════════════════════════════════════
{id:"def-4.1",ch:"§3 Irred",badge:"b-def",title:"Definition 4.1 — Irreducibility in $N$",lean:`${GH}/TPC/Main.lean#L5`,body:`
<p>An element $m \\in N \\setminus \\{e\\}$ is <strong>irreducible in $N$</strong> (written $m \\in \\mathrm{Irr}(N)$) if:</p>
<div class="math-block">$$m = a \\cdot b\\text{ with }a,b\\in N \\implies a = e\\text{ or }b = e$$</div>
<p>In other words, $m$ cannot be decomposed as a nontrivial product of two elements of $N$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>N-irreducibility vs. M-irreducibility</div>
<p>By Prop 2.4.5, $N$ is a <strong>free commutative monoid</strong> on $G = \\{k{\\otimes}k : k\\neq 0\\}$. Every generator $k{\\otimes}k$ has multiset $\\{k\\}$ of size 1, which cannot be split into two non-empty sub-multisets. Therefore <strong>every generator is N-irreducible</strong>: $\\mathrm{Irr}(N) = G$, trivially infinite.</p>
<p>The twin prime condition characterises a <em>different</em> notion: <strong>M-irreducibility</strong>. Write $\\mathrm{Irr}_M(G) = \\{\\hat k \\in G : \\hat k \\in \\mathrm{Irr}(M)\\}$. By Thm 4.2, $\\hat k \\in \\mathrm{Irr}_M(G)$ iff $(6k-1,\\,6k+1)$ is a twin prime pair. The TPC is $|\\mathrm{Irr}_M(G)| = \\infty$.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-info-circle me-1"></i>N-irreducible vs. M-reducible generators</div>
<p>A generator $\\hat k = k{\\otimes}k$ (multiset size 1) is <strong>always N-irreducible</strong>. It is M-reducible when $\\phi(k)$ or $|\\psi(k)|$ is composite, because the bilinearity of $M$ then gives a factorisation in $M$ (using non-$N$ factors):</p>
<div class="code-block" style="margin:.4rem 0"> k    φ(k)=6k+1        |ψ(k)|=|6k-1|   N-status       M-status
  4       25 = 5²           23          N-IRREDUCIBLE   M-REDUCIBLE (φ composite)
  6       37              35 = 5·7      N-IRREDUCIBLE   M-REDUCIBLE (ψ composite)
  8       49 = 7²           47          N-IRREDUCIBLE   M-REDUCIBLE (φ composite)
 11       67              65 = 5·13     N-IRREDUCIBLE   M-REDUCIBLE (ψ composite)
141      847 = 7·121      845 = 5·169   N-REDUCIBLE     M-REDUCIBLE (both, multiset {1,-2,-2})</div>
<p>Key: $\\mathfrak{r}_{141}$ is <em>N-reducible</em> because it is a product of <em>three</em> generators in $N$ (multiset $\\{1,-2,-2\\}$, size 3). The single generators $\\mathfrak{r}_4, \\mathfrak{r}_6, \\ldots$ are N-irreducible despite being M-reducible — their M-factorisations use elements <em>outside</em> $N$.</p>
<p><strong>Explicit N-factorisation of $\\mathfrak{r}_{141} = \\mathfrak{r}_1\\cdot\\mathfrak{r}_{-2}\\cdot\\mathfrak{r}_{-2}$</strong> &nbsp;(generator sequence $(1,-2,-2)$)</p>
<p>Both components must equal $141$. Verify with $x\\circledast y=6xy+x+y$ and $x\\star y=-6xy+x+y$:</p>
<div class="code-block" style="margin:.4rem 0">Component 1 (⊛):  1 ⊛ (-2) = 6(1)(-2)+1+(-2) = -13
                 (-13) ⊛ (-2) = 6(-13)(-2)+(-13)+(-2) = 141  ✓
Component 2 (⋆):  1 ⋆ (-2) = -6(1)(-2)+1+(-2) =  11
                  11 ⋆ (-2) = -6(11)(-2)+11+(-2) = 141  ✓</div>
<p>Grouping: $\\mathfrak{r}_{-2}^2 = ((-2)\\circledast(-2),\\,(-2)\\star(-2)) = (20,-28)$. Then:</p>
<div class="math-block">$$\\mathfrak{r}_{141} = \\underbrace{(1,1)}_{\\mathfrak{r}_1}\\cdot\\underbrace{(20,-28)}_{\\mathfrak{r}_{-2}^{\\,2}} = \\mathfrak{r}_1\\cdot\\mathfrak{r}_{-2}\\cdot\\mathfrak{r}_{-2}$$</div>
<p>Each factor is irreducible: $\\phi(1)=7,\\,\\psi(1)=5$ and $\\phi(-2)=-11,\\,\\psi(-2)=-13$ are all $\\pm$prime. So $\\mathfrak{r}_{141}$ is reducible but factors into three irreducibles.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card 7 — Thm 4.2: Irreducibles ⟺ Twin Primes
// ═══════════════════════════════════════════════════════════════
{id:"thm-4.2",ch:"§3 Irred",badge:"b-thm",title:"Theorem 4.2 — Irreducibles $\\Longleftrightarrow$ Twin Primes",lean:`${GH}/TPC/Main.lean#L8`,body:`
<p>A pure tensor $z\\otimes w$ is irreducible in $M$ iff $z$ is $\\circledast$-irreducible and $w$ is $\\star$-irreducible. For diagonal generators $\\hat{k} = k{\\otimes}k \\in G \\subseteq N$:</p>
<div class="math-block">$$\\hat{k} \\in \\mathrm{Irr}(M) \\iff \\phi(k)=6k+1 \\text{ is } \\pm\\text{prime and } |\\psi(k)|=|6k-1| \\text{ is prime}$$</div>
<p>Defining $\\mathrm{Irr}_M(G) = \\{\\hat k \\in G : \\hat k \\in \\mathrm{Irr}(M)\\}$, this says $\\hat k \\in \\mathrm{Irr}_M(G)$ iff $(6k-1, 6k+1)$ is a <strong>twin prime pair</strong>.</p>
<div class="remark-box" style="margin-top:.6rem"><div class="remark-title"><i class="bi bi-exclamation-triangle-fill me-1"></i>Gap — N-irred ≠ M-irred</div>
<p>Since $N$ is the free commutative monoid on $G$ (Prop 2.4.5), <em>every</em> generator is N-irreducible: $\\mathrm{Irr}(N)=G$. The proof below characterises $\\mathrm{Irr}_M(G)\\subsetneq G$. The TPC requires $|\\mathrm{Irr}_M(G)|=\\infty$; the Furstenberg argument on $N$ gives only $|\\mathrm{Irr}(N)|=|G|=\\infty$ (trivially). Bridging these requires applying the topological argument directly to $M$ or $\\mathbb{Z}^2$.</p></div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>($\\Rightarrow$) $z\\otimes w$ irreducible $\\Rightarrow$ both components irreducible:</strong></p>
<p><span class="step-num">1</span>If $z = a\\circledast b$ with $a,b\\neq 0$, then $z\\otimes w = (a\\otimes w)(b\\otimes w)$, a nontrivial factorization. Contradicts irreducibility.</p>
<p><span class="step-num">2</span>Similarly, if $w = c\\star d$ with $c,d\\neq 0$, then $z\\otimes w = (z\\otimes c)(z\\otimes d)$. Contradiction.</p>
<p><strong>($\\Leftarrow$) Both irreducible $\\Rightarrow$ $z\\otimes w$ irreducible:</strong></p>
<p><span class="step-num">3</span><strong>Left-splitting:</strong> $z\\otimes w = (a\\otimes w)(b\\otimes w)$ requires $z = a\\circledast b$. Irreducibility of $z$: $a=0$ or $b=0$. Trivial.</p>
<p><span class="step-num">4</span><strong>Right-splitting:</strong> $z\\otimes w = (z\\otimes c)(z\\otimes d)$ requires $w = c\\star d$. Irreducibility of $w$: $c=0$ or $d=0$. Trivial.</p>
<p><span class="step-num">5</span><strong>Mixed splitting:</strong> If $z\\otimes w = (a\\otimes c)(b\\otimes d)$ with $a,b,c,d \\neq 0$, apply $\\bar{f}_{q,p}$ for any primes $q,p$: the left side gives $v_q|\\phi(z)|\\cdot v_p|\\psi(w)|$; the right gives $v_q|\\phi(a)|\\cdot v_p|\\psi(c)| + v_q|\\phi(b)|\\cdot v_p|\\psi(d)|$. A single product $v_q(\\cdot)\\cdot v_p(\\cdot)$ cannot equal a sum of two such products for all choices of $(q,p)$ unless both summands are zero — but then $v_q|\\phi(a)|=0$ or $v_p|\\psi(c)|=0$ for all $q,p$, implying $|\\phi(a)|=1$ (impossible for $a\\neq 0$ integer) or $|\\psi(c)|=1$ (impossible for $c\\neq 0$ integer). Contradiction.</p>
<p>Therefore $z\\otimes w$ is irreducible. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-table me-1"></i>Twin Prime Table</div>
<div class="code-block" style="margin:0"> k    φ(k)=6k+1  ψ(k)=6k-1  Twin pair?
 1       7          5       YES  (5, 7)
 2      13         11       YES  (11, 13)
 3      19         17       YES  (17, 19)
 4      25         23       NO   25 = 5²
 5      31         29       YES  (29, 31)
 7      43         41       YES  (41, 43)</div>
</div>
<p>So $|\\mathrm{Irr}_M(G)|=\\infty$ is <strong>exactly</strong> the Twin Prime Conjecture. Note: $|\\mathrm{Irr}(N)|=|G|=\\infty$ trivially (all generators are N-irreducible); the non-trivial claim is that infinitely many of those generators are also M-irreducible.</p>
${mkVerify('thm-4.2')}`},

// ═══════════════════════════════════════════════════════════════
// Card 8 — Lem 4.3: Norm
// ═══════════════════════════════════════════════════════════════
{id:"lem-4.3",ch:"§3 Irred",badge:"b-lem",title:"Lemma 4.3 — The Norm Function",lean:`${GH}/TPC/Main.lean#L40`,body:`
<p>Define the <strong>norm</strong> on $N$ (well-defined by <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>):</p>
<div class="math-block">$$\\|\\mathfrak{r}_1 \\cdots \\mathfrak{r}_r\\| = \\prod_{i=1}^r \\phi(k_i)^2 = \\prod_{i=1}^r (6k_i+1)^2$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show properties</button>
<div class="proof-content" style="display:none">
<p><strong>N1. Non-negative:</strong> Product of squares. ✓</p>
<p><strong>N2. Identity:</strong> $\\|e\\| = 1$ (empty product). ✓</p>
<p><strong>N3. Non-degenerate:</strong> $\\|m\\|=1 \\iff$ all $(6k_i+1)^2 = 1 \\iff$ all $k_i=0 \\iff m = e$. ✓</p>
<p><strong>N4. Multiplicative:</strong> $\\|a \\cdot b\\| = \\|a\\|\\cdot\\|b\\|$. ✓</p>
<p><strong>N5. Proper factors have smaller norm:</strong> If $m = a \\cdot b$ with $a, b \\neq e$, then by N4, $\\|a\\|\\cdot\\|b\\|=\\|m\\|$. Each $|\\phi(k_i)|=|6k_i+1|\\geq 5$ for $k_i\\in\\mathbb{Z}\\setminus\\{0\\}$ (since $|6k+1|=1$ requires $k=-1/3\\notin\\mathbb{Z}$), so $\\|b\\|\\geq 25$. Hence $\\|a\\|=\\|m\\|/\\|b\\|\\leq\\|m\\|/25 < \\|m\\|$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
${mkVerify('lem-4.3')}`},

// ═══════════════════════════════════════════════════════════════
// Card 9 — Lem 4.4 + Cor 4.5: Covering
// ═══════════════════════════════════════════════════════════════
{id:"lem-4.4",ch:"§3 Irred",badge:"b-cor",title:"Lemma 4.4 + Corollary 4.5 — Irreducible Divisors and Covering",lean:`${GH}/TPC/Main.lean#L55`,body:`
<p><strong>Lemma 4.4:</strong> For every $m \\in N \\setminus \\{e\\}$, there exists $\\mathfrak{q} \\in \\mathrm{Irr}(N)$ with $\\mathfrak{q} \\mid m$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><strong>Strong induction on $\\|m\\|$.</strong></p>
<p><strong>Base:</strong> If $m$ is irreducible, take $\\mathfrak{q}=m$. ✓</p>
<p><strong>Step:</strong> If $m = a \\cdot b$ with $a, b \\neq e$, then $\\|a\\| < \\|m\\|$ by <a class="ilink" onclick="goToCard('lem-4.3')">N5</a>. By induction, some $\\mathfrak{q}\\in\\mathrm{Irr}(N)$ divides $a$, hence divides $m$. ✓</p>
<p><strong>Termination:</strong> $\\|m\\| \\in \\mathbb{N}$ with $\\|m\\|\\geq 25$ for $m \\neq e$. Well-ordering. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>Corollary 4.5 — The Covering:</strong></p>
<div class="math-block">$$N\\setminus\\{e\\}=\\bigcup_{\\mathfrak{q}\\in\\mathrm{Irr}(N)}\\mathfrak{q} \\cdot N$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><strong>($\\supseteq$):</strong> $\\mathfrak{q} \\cdot n = e$ only if $\\mathfrak{q} = e$ (no zero divisors), but $\\mathfrak{q}$ is irreducible hence $\\neq e$. So each $\\mathfrak{q} \\cdot N \\subseteq N\\setminus\\{e\\}$. ✓</p>
<p><strong>($\\subseteq$):</strong> By Lemma 4.4, every $m \\in N\\setminus\\{e\\}$ has $\\mathfrak{q} \\mid m$, so $m \\in \\mathfrak{q} \\cdot N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Analogy with Furstenberg</div>
<p>This is the exact analogue of $\\mathbb{Z}\\setminus\\{\\pm1\\} = \\bigcup_{p\\text{ prime}} p\\mathbb{Z}$ in Furstenberg's original proof.</p>
</div>
${mkVerify('lem-4.4')}`},

// ═══════════════════════════════════════════════════════════════
// Card 10 — Def: Projected Map π and Topology on N
// ═══════════════════════════════════════════════════════════════
{id:"def-proj",ch:"§4 Topology",badge:"b-def",title:"Definition — Projected Map $\\pi$ and Topology on $N$",lean:null,body:`
<p>By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, every element of $N$ has a <strong>unique multiset representation</strong> $\\mathfrak{r}_1\\cdots\\mathfrak{r}_r$. Define the <strong>projected map</strong>:</p>
<div class="math-block">$$\\pi = (\\pi_1, \\pi_2): N \\to \\mathbb{Z}^2, \\qquad \\pi(\\mathfrak{r}_1\\cdots\\mathfrak{r}_r) = (k_1 \\circledast \\cdots \\circledast k_r,\\; k_1 \\star \\cdots \\star k_r)$$</div>
<p>with $\\pi(e) = (0, 0)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $\\pi$ is well-defined and a homomorphism</button>
<div class="proof-content" style="display:none">
<p><strong>Well-defined:</strong> By <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4.5</a>, the multiset $\\{k_1,\\ldots,k_r\\}$ is unique. Since $\\circledast$ and $\\star$ are commutative, order doesn't matter. ✓</p>
<p><strong>Homomorphism:</strong> $\\pi_1(m \\cdot m') = \\pi_1(m) \\circledast \\pi_1(m')$ (concatenate generator sequences, then $\\circledast$-multiply). Similarly $\\pi_2$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<p><strong>The projected topology on $N$:</strong> Give $N$ the <strong>initial topology</strong> from $\\pi$: a set $U \\subseteq N$ is open iff $U = \\pi^{-1}(V)$ for some open $V \\subseteq \\mathbb{Z}^2$ (Furstenberg product topology). Basic opens are intersections of two coset preimages:</p>
<div class="math-block">$$\\pi^{-1}\\bigl(a + b\\mathbb{Z}\\bigr) \\cap \\pi^{-1}\\bigl(c + d\\mathbb{Z}\\bigr) = \\pi^{-1}\\bigl((a + b\\mathbb{Z}) \\times (c + d\\mathbb{Z})\\bigr) = \\{m \\in N : \\pi_1(m) \\equiv a \\!\\!\\pmod{b},\\; \\pi_2(m) \\equiv c \\!\\!\\pmod{d}\\}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Why this topology?</div>
<p>The final topology from $\\beta: \\mathbb{Z}^2 \\to M$ only "sees" pure tensors. Products of $\\geq 2$ distinct diagonal generators are <strong>not</strong> pure tensors, so they would be isolated in the final topology — breaking the Furstenberg argument. The projected map $\\pi$ gives $N$ a non-trivial topology where every element has infinite neighborhoods.</p>
</div>
<p style="font-size:.85rem;color:var(--gray);">Key: $\\pi$ intertwines left-multiplication by $\\mathfrak{q}$ with $L_q(z,w) = (q \\circledast z,\\, q \\star w)$ on $\\mathbb{Z}^2$.</p>`},

// ═══════════════════════════════════════════════════════════════
// Card — Prop: Clopen Preimage in Initial Topology
// ═══════════════════════════════════════════════════════════════
{id:"prop-clopen-preimage",ch:"§4 Topology",badge:"b-prop",title:"Proposition — Clopen Preimage in the Initial Topology",lean:null,body:`
<p>Let $f: X \\to Y$ be a function and give $X$ the <strong>initial topology</strong> induced by $f$ (the coarsest topology making $f$ continuous). Then:</p>
<div class="math-block">$$C \\subseteq Y \\text{ clopen} \\implies f^{-1}(C) \\text{ clopen in } X.$$</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em></p>
<p><span class="step-num">1</span><strong>$f^{-1}(C)$ is open:</strong> Since $C$ is open in $Y$ and $f$ is continuous (by definition of the initial topology), $f^{-1}(C)$ is open in $X$. ✓</p>
<p><span class="step-num">2</span><strong>$f^{-1}(C)$ is closed:</strong> Since $C$ is closed, $C^c = Y \\setminus C$ is open. So $f^{-1}(C^c) = X \\setminus f^{-1}(C)$ is open, meaning $f^{-1}(C)$ is closed. ✓</p>
<p>Therefore $f^{-1}(C)$ is both open and closed — i.e., <strong>clopen</strong>.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-arrow-right-circle-fill me-1"></i>Application to $N$</div>
<p>Take $f = \\pi: N \\to \\mathbb{Z}^2$ and $C = S_q = (q + \\phi(q)\\mathbb{Z}) \\times (q + \\psi(q)\\mathbb{Z})$. Since $\\mathbb{Z}^2$ carries the Furstenberg product topology in which every arithmetic progression is clopen, $S_q$ is clopen. By this proposition, $\\pi^{-1}(S_q)$ is clopen in $N$ — exactly the clopenness claimed in the <a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a>.</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-diagram-2 me-1"></i>Why the initial topology?</div>
<p>The initial (weak) topology is the <em>minimal</em> topology making $f$ continuous. Its open sets are exactly $\\{f^{-1}(V) : V \\text{ open in } Y\\}$. The proposition is immediate from this: clopen $=$ open $\\cap$ closed, and preimages preserve both under any continuous map.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Proposition: N is a Topological Monoid
// ═══════════════════════════════════════════════════════════════
{id:"prop-top-monoid",ch:"§4 Topology",badge:"b-prop",title:"Proposition — $N$ is a Topological Monoid",lean:null,body:`
<p>Under the <a class="ilink" onclick="goToCard('def-proj')">projected topology</a>, the multiplication $\\mu: N \\times N \\to N$ is <strong>continuous</strong>, making $(N, \\mu)$ a <strong>topological monoid</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Strategy:</strong> The projected topology is the initial topology from $\\pi: N \\to \\mathbb{Z}^2$. A map into $N$ is continuous iff its composition with $\\pi$ is continuous. So we need $\\pi \\circ \\mu: N \\times N \\to \\mathbb{Z}^2$ to be continuous.</p>
<p><span class="step-num">1</span><strong>Factor through $\\pi$:</strong> Since $\\pi$ is a <a class="ilink" onclick="goToCard('def-proj')">homomorphism</a>:</p>
<div class="math-block">$$\\pi(m \\cdot n) = \\bigl(\\pi_1(m) \\circledast \\pi_1(n),\\; \\pi_2(m) \\star \\pi_2(n)\\bigr)$$</div>
<p>So $\\pi \\circ \\mu = (\\circledast,\\, \\star) \\circ ((\\pi_1 \\times \\pi_1),\\, (\\pi_2 \\times \\pi_2))$. It suffices to show $\\circledast$ and $\\star$ are continuous in the Furstenberg topology on $\\mathbb{Z}$.</p>
<p><span class="step-num">2</span><strong>$\\circledast$ is continuous:</strong> Let $x_0 \\circledast y_0 \\in a + b\\mathbb{Z}$ (a basic open). Take $x \\in x_0 + b\\mathbb{Z}$, $y \\in y_0 + b\\mathbb{Z}$, say $x = x_0 + b\\alpha$, $y = y_0 + b\\beta$. Then:</p>
<div class="math-block">$$x \\circledast y = 6(x_0+b\\alpha)(y_0+b\\beta) + (x_0+b\\alpha) + (y_0+b\\beta) = (x_0 \\circledast y_0) + b(\\cdots) \\in a + b\\mathbb{Z}$$</div>
<p>since every cross-term contains a factor of $b$. So $\\circledast^{-1}(a+b\\mathbb{Z}) \\supseteq (x_0+b\\mathbb{Z})\\times(y_0+b\\mathbb{Z})$. ✓</p>
<p><span class="step-num">3</span><strong>$\\star$ is continuous:</strong> Identical argument with $-6$ replacing $6$. ✓</p>
<p><span class="step-num">4</span><strong>Compose:</strong> $\\pi_1, \\pi_2: N \\to \\mathbb{Z}$ are continuous by definition (initial topology). Products and compositions of continuous maps are continuous. Therefore $\\pi \\circ \\mu$ is continuous, hence $\\mu$ is continuous. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Consequence: Left translation is continuous</div>
<p>For each $\\mathfrak{q} \\in N$, the map $L_{\\mathfrak{q}}: N \\to N$, $n \\mapsto \\mathfrak{q} \\cdot n$ is continuous (restrict $\\mu$ to $\\{\\mathfrak{q}\\} \\times N$). Under $\\pi$, this corresponds to $L_q(z,w) = (q \\circledast z,\\, q \\star w)$ on $\\mathbb{Z}^2$, which maps arithmetic progressions to arithmetic progressions.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Why $\\mathfrak{q}N$ is NOT automatically closed</div>
<p>In a topological <strong>group</strong>, left translation is a homeomorphism, so $gH$ is closed for any closed subgroup $H$. But $N$ is a <strong>monoid</strong> — $L_{\\mathfrak{q}}$ is injective but not surjective, so not a homeomorphism. In the projected topology, a set is closed iff it equals $\\pi^{-1}(F)$ for closed $F$. Requiring $\\mathfrak{q}\\cdot N = \\pi^{-1}(\\cdots)$ is equivalent to a false coset identity. Instead, we use the <strong>containment approach</strong>: $\\mathfrak{q}\\cdot N \\subseteq \\pi^{-1}(S_q)$ with $S_q$ clopen and $e \\notin \\pi^{-1}(S_q)$.</p>
</div>
${mkVerify('prop-top-monoid')}`},

// ═══════════════════════════════════════════════════════════════
// Card 12 — Key Lemma: 𝔟·K is closed in K
// ═══════════════════════════════════════════════════════════════
{id:"lem-proj-contain",ch:"§4 Topology",badge:"b-lem",title:"Key Lemma — $\\mathfrak{b}\\cdot K$ is Closed in $K$",lean:null,body:`
<p>For every $\\mathfrak{b}=b\\otimes b\\in B$, the left translate $\\mathfrak{b}\\cdot K$ is <strong>closed in $K$</strong> (subspace initial topology).</p>
<div class="math-block">$$\\mathfrak{b}\\cdot K \\;=\\; f^{-1}\\!\\bigl((b,b)\\cdot f(K)\\bigr)\\cap K \\quad\\text{is closed in }K$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lock-fill me-1"></i>Why the equality holds — injectivity of $f\\!\\restriction_K$</div>
<p>The $\\supseteq$ inclusion is the content. Take $t\\in K$ with $f(t)=(b,b)\\cdot f(k)=f(\\mathfrak{b}\\cdot k)$. By <strong>injectivity</strong> of $f\\!\\restriction_K$ we conclude $t=\\mathfrak{b}\\cdot k\\in\\mathfrak{b}\\cdot K$.</p>
<p><strong>Injectivity via UFD.</strong> Every $k\\in K$ is a product $\\mathfrak{b}_1\\cdots\\mathfrak{b}_n$, $b_i\\in B_0$, so $f(k)=(b_1*\\cdots*b_n,\\,b_1\\star\\cdots\\star b_n)$. The map $x\\mapsto 6x+1$ converts $*$-products to products of $\\pm$primes in $\\mathbb{Z}$. By UFD in $\\mathbb{Z}$, distinct words give distinct products, so $f\\!\\restriction_K$ is injective.</p>
<p><em>Note: surjectivity onto $f(K)$ is a tautology (definition of image). A continuous bijection need not be a homeomorphism — but we only ever use the $({\\Leftarrow})$ direction of the initial topology, never the forward direction.</em></p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Step 1 — Reduction via the initial topology.</strong> The closed sets of $K$ are exactly $f^{-1}(C)\\cap K$ for $C$ closed in $f(K)\\subseteq S$. By the equality (injectivity) it suffices to show $(b,b)\\cdot f(K)$ is <strong>closed in $f(K)$</strong> in the product Furstenberg topology, then apply $(\\Leftarrow)$: closed $\\Rightarrow$ preimage closed.</p>
<p><strong>Step 2 — Explicit affine action in $\\mathbb{Z}^2$.</strong> Left multiplication by $(b,b)$ acts as:</p>
<div class="math-block">$$b*z \\;=\\; (6b{+}1)z+b \\;=:\\; \\phi_1(z) \\qquad b\\star w \\;=\\; (1{-}6b)w+b \\;=:\\; \\phi_2(w)$$</div>
<p>Set $\\alpha:=6b+1$, $\\beta:=1-6b$. Since $b\\in B_0$ both are $\\pm$primes, so $\\alpha,\\beta\\neq 0$. Every element of $(b,b)\\cdot f(K)$ lies in the clopen set $(b+\\alpha\\mathbb{Z})\\times(b+\\beta\\mathbb{Z})$ since $\\phi_1(z)\\equiv b\\pmod{\\alpha}$ and $\\phi_2(w)\\equiv b\\pmod{\\beta}$. In the product Furstenberg topology, basic open sets are $(a+n\\mathbb{Z})\\times(c+m\\mathbb{Z})$, so any point $(x,y)$ with $x\\not\\equiv b\\pmod\\alpha$ or $y\\not\\equiv b\\pmod\\beta$ is already separated from $(b,b)\\cdot f(K)$ by the open neighborhood $(x+\\alpha\\mathbb{Z})\\times(y+\\beta\\mathbb{Z})$.</p>
<p><strong>Step 3 — Affine Lemma (closedness of $\\phi_i(M_i)$).</strong> Let $M_1=\\pi_1(f(K))$, a closed submonoid of $(\\mathbb{Z},*)$. For $x\\in M_1\\setminus\\phi_1(M_1)$:</p>
<p><span class="step-num">1</span><strong>Case $x\\not\\equiv b\\pmod{\\alpha}$:</strong> $x+\\alpha\\mathbb{Z}$ is open and disjoint from $\\phi_1(M_1)\\subseteq b+\\alpha\\mathbb{Z}$. ✓</p>
<p><span class="step-num">2</span><strong>Case $x\\equiv b\\pmod{\\alpha}$, $(x{-}b)/\\alpha\\notin M_1$:</strong> Since $M_1$ is closed in Furstenberg's topology, there is an arithmetic progression $a+d\\mathbb{Z}\\ni(x{-}b)/\\alpha$ disjoint from $M_1$. Then $\\phi_1(a+d\\mathbb{Z})=\\alpha a+b+\\alpha d\\mathbb{Z}$ is open, contains $x$, and is disjoint from $\\phi_1(M_1)$ by injectivity. ✓</p>
<p>Hence $\\phi_1(M_1)$ is closed in $M_1$. Identically $\\phi_2(M_2)$ is closed in $M_2=\\pi_2(f(K))$. Therefore $(b,b)\\cdot f(K)=\\bigl(\\phi_1(M_1)\\times\\phi_2(M_2)\\bigr)\\cap f(K)$ is closed in $f(K)$.</p>
<p><strong>Step 4 — Pull back.</strong> By definition of the initial topology:</p>
<div class="math-block">$$\\mathfrak{b}\\cdot K = f^{-1}\\!\\bigl((b,b)\\cdot f(K)\\bigr)\\cap K \\quad\\text{is closed in }K.$$</div>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $\\mathfrak{b}\\cdot K$ is closed in $K$. $\\blacksquare$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Why only $({\\Leftarrow})$ is needed</div>
<p>The initial topology gives $({\\Leftarrow})$ for free: $C$ closed in $f(K)\\Rightarrow f^{-1}(C)\\cap K$ closed in $K$. The forward direction ($K$-closed $\\Rightarrow$ $f$-image closed) would require $f\\!\\restriction_K$ to be a homeomorphism — far stronger, and not available. We never need it.</p>
</div>
${mkVerify('lem-proj-contain')}`},

// ═══════════════════════════════════════════════════════════════
// Card 13 — Thm: Every Nonempty Open Set in N is Infinite
// ═══════════════════════════════════════════════════════════════
{id:"thm-empty-or-inf",ch:"§4 Topology",badge:"b-thm",title:"Theorem — Every Nonempty Open Set in $N$ is Infinite",lean:null,body:`
<p>In the <a class="ilink" onclick="goToCard('def-proj')">projected topology</a> on $N$:</p>
<div class="math-block">$$\\text{For any }a,b,c,d\\in\\mathbb{Z}\\text{ with }b,d\\neq 0:\\quad \\pi^{-1}\\bigl((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})\\bigr)\\text{ is either }\\emptyset\\text{ or infinite.}$$</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-star-fill me-1"></i>Why this matters</div>
<p>This shows $N$ is "topologically large" — no singleton $\\{m\\}$ can be open. This is the key contradiction target in the Furstenberg argument.</p>
</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em> Suppose the set is nonempty; pick $m_0 \\in N$ with $\\pi(m_0) = (z_0, w_0) \\in (a+b\\mathbb{Z})\\times(c+d\\mathbb{Z})$. Set $D = bd$ (the product of both moduli).</p>
<p><span class="step-num">1</span><strong>Construct infinitely many elements.</strong> For each $n \\in \\mathbb{Z}$ define the generator $\\mathfrak{\\delta}_n := nD \\otimes nD \\in G$ and set $v_n := m_0 \\cdot \\mathfrak{\\delta}_n \\in N$.</p>
<p><span class="step-num">2</span><strong>$\\pi_1(v_n) \\in a + b\\mathbb{Z}$:</strong> Since $\\pi$ is a homomorphism and $b \\mid D$:</p>
<div class="math-block">$$\\pi_1(v_n) = z_0 \\circledast nD = 6z_0(nD)+z_0+nD \\equiv z_0 \\equiv a\\pmod{b}.$$</div>
<p><span class="step-num">3</span><strong>$\\pi_2(v_n) \\in c + d\\mathbb{Z}$:</strong> Since $d \\mid D$:</p>
<div class="math-block">$$\\pi_2(v_n) = w_0 \\star nD = -6w_0(nD)+w_0+nD \\equiv w_0 \\equiv c\\pmod{d}.$$</div>
<p><span class="step-num">4</span><strong>Distinct $n$ give distinct elements.</strong> Apply $\\phi$ to $\\pi_1$:</p>
<div class="math-block">$$\\phi(\\pi_1(v_n)) = \\phi(z_0 \\circledast nD) = \\phi(z_0)\\cdot\\phi(nD) = \\phi(z_0)(6nD+1).$$</div>
<p>Since $\\phi(z_0) = 6z_0+1 \\neq 0$ for all $z_0 \\in \\mathbb{Z}$, distinct $n$ give distinct $\\phi(\\pi_1(v_n))$, hence distinct $v_n \\in N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Logical structure</div>
<p>Uses: <span class="depends-badge">$\\pi$ is a homomorphism</span> <span class="depends-badge">$G \\ni \\mathfrak{(nbd)}$ for all $n$</span> <span class="depends-badge">$\\phi(z_0) \\neq 0$ for injectivity</span></p>
</div>
${mkVerify('thm-empty-or-inf')}`},

// ═══════════════════════════════════════════════════════════════
// Card — Thm: Furstenberg's Irreducible Infinitude Recipe
// ═══════════════════════════════════════════════════════════════
{id:"thm-furstenberg-recipe",ch:"§5 Proof",badge:"b-thm",title:"Theorem — Furstenberg's Irreducible Infinitude Recipe",lean:null,body:`
<p>Let $(M, \\cdot)$ be a <strong>topological monoid</strong> with identity $e$ and unit group $U = M^\\times$. Suppose:</p>
<div class="math-block">$$\\textbf{(R1)}\\quad M\\setminus U = \\bigcup_{q\\,\\in\\,\\mathrm{Irr}(M)} q\\cdot M \\quad\\text{(irreducibles cover non-units; }M\\setminus U\\text{ is nonempty)}$$</div>
<div class="math-block">$$\\textbf{(R2)}\\quad \\forall\\, q\\in\\mathrm{Irr}(M),\\; \\exists\\text{ clopen }C_q\\subseteq M:\\quad q\\cdot M\\subseteq C_q\\text{ and }U\\cap C_q=\\varnothing$$</div>
<div class="math-block">$$\\textbf{(R3)}\\quad \\text{Every nonempty open set in }M\\text{ is infinite.}$$</div>
<p>Then $|\\mathrm{Irr}(M)| = \\infty$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof by contradiction.</em> Assume $\\mathrm{Irr}(M)$ is finite, say $\\mathrm{Irr}(M) = \\{q_1,\\ldots,q_m\\}$.</p>
<p><span class="step-num">1</span>By (R2), each $q_i$ has a clopen $C_{q_i}$ with $q_i\\cdot M \\subseteq C_{q_i}$ and $U\\cap C_{q_i}=\\varnothing$.</p>
<p><span class="step-num">2</span>By (R1): $M\\setminus U \\subseteq \\bigcup_{i=1}^m q_i\\cdot M \\subseteq \\bigcup_{i=1}^m C_{q_i}$.</p>
<p><span class="step-num">3</span>Since $U\\cap C_{q_i}=\\varnothing$ for all $i$, we have $U\\cap\\bigcup C_{q_i}=\\varnothing$. Combined with step 2: $M\\setminus\\bigcup_{i=1}^m C_{q_i} = U$.</p>
<p><span class="step-num">4</span>A finite union of clopen sets is clopen, so $\\bigcup C_{q_i}$ is clopen, hence its complement $U$ is clopen — in particular <strong>open</strong>.</p>
<p><span class="step-num">5</span>But $U$ is finite (by assumption in R1) and nonempty, so $U$ is a finite nonempty open set, <strong>contradicting (R3)</strong>.</p>
<p>Therefore $|\\mathrm{Irr}(M)| = \\infty$. <span class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</span></p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>The abstract Furstenberg pattern</div>
<p>Furstenberg's original 1955 proof of infinitely many primes uses $M = (\\mathbb{Z}, \\cdot)$ with the arithmetic-progression topology. Here $U = \\{\\pm 1\\}$, so (R1) is Euclid's lemma ($M\\setminus U = \\bigcup_{p\\text{ prime}} p\\mathbb{Z}$), (R2) uses $p\\mathbb{Z}$ as the clopen envelope with $\\pm 1\\notin p\\mathbb{Z}$, and (R3) is immediate since $|a + b\\mathbb{Z}| = \\infty$. This recipe extracts the abstract skeleton valid for any topological monoid satisfying the three hypotheses.</p>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Prop: N Satisfies the Recipe
// ═══════════════════════════════════════════════════════════════
{id:"prop-n-satisfies",ch:"§5 Proof",badge:"b-prop",title:"Proposition — $N$ Satisfies Furstenberg's Recipe",lean:null,body:`
<p>The topological monoid $N$ satisfies all three hypotheses of the <a class="ilink" onclick="goToCard('thm-furstenberg-recipe')">Irreducible Infinitude Recipe</a>:</p>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R1) Covering</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('lem-4.4')">Lemma 4.4 + Corollary 4.5</a>.</p>
<p>Every $m\\in N\\setminus\\{e\\}$ has an irreducible divisor $\\mathfrak{q}$, so $m\\in\\mathfrak{q}\\cdot N$. Thus $N\\setminus\\{e\\} = \\bigcup_{\\mathfrak{q}\\in\\mathrm{Irr}(N)} \\mathfrak{q}\\cdot N$. ✓</p>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R2) Clopen Envelopes</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lemma</a> + <a class="ilink" onclick="goToCard('prop-clopen-preimage')">Clopen Preimage Proposition</a>.</p>
<p>For each irreducible $\\mathfrak{q}=(q,q)$, take $C_q = \\pi^{-1}(S_q)$ where $S_q=(q+\\phi(q)\\mathbb{Z})\\times(q+\\psi(q)\\mathbb{Z})$. Then:</p>
<ul style="margin:.4rem 0 0 1rem;line-height:1.9">
<li>$\\mathfrak{q}\\cdot N\\subseteq C_q$ — containment, part (a). ✓</li>
<li>$U\\cap C_q=\\varnothing$ — units excluded from $C_q$ (here $U=\\{e\\}$ since $N$ has only the trivial unit), part (b). ✓</li>
<li>$C_q$ is clopen — $S_q$ is clopen in $\\mathbb{Z}^2$ (arithmetic progressions), so $\\pi^{-1}(S_q)$ is clopen by the clopen preimage proposition. ✓</li>
</ul>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-check2-all me-1"></i>(R3) No Finite Nonempty Open Sets</div>
<p><strong>Proved by:</strong> <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>.</p>
<p>Every nonempty basic open set $\\pi^{-1}((a+b\\mathbb{Z})\\times(c+d\\mathbb{Z}))$ in $N$ is infinite. ✓</p>
</div>
<p><strong>Conclusion:</strong> By the <a class="ilink" onclick="goToCard('thm-furstenberg-recipe')">Irreducible Infinitude Recipe</a>: $|\\mathrm{Irr}(N)| = \\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>All three hypotheses verified — Recipe applies</div>
<div class="remark-box" style="margin-top:.7rem"><div class="remark-title"><i class="bi bi-exclamation-triangle-fill me-1"></i>What this proves vs. what TPC needs</div>
<p>The Recipe gives $|\\mathrm{Irr}(N)|=\\infty$, but $\\mathrm{Irr}(N)=G$ (all generators — trivially infinite). The TPC requires $|\\mathrm{Irr}_M(G)|=\\infty$ (infinitely many <em>M-irreducible</em> generators). The covering (R1) uses all of $\\mathrm{Irr}(N)=G$, including M-reducible generators like $\\hat{\\mathfrak{r}}_4$. Replacing $\\mathrm{Irr}(N)$ by $\\mathrm{Irr}_M(G)$ breaks (R1): $\\hat{\\mathfrak{r}}_4 \\in N\\setminus\\{e\\}$ has no $\\mathrm{Irr}_M(G)$-divisor in $N$. The proof needs to be reformulated — likely by applying the topological argument to $M$ rather than $N$.</p></div>`},

// ═══════════════════════════════════════════════════════════════
// Card — Thm 5.2: |Irr(N)| = ∞ (Corrected Furstenberg Argument)
// ═══════════════════════════════════════════════════════════════
{id:"thm-5.2",ch:"§5 Proof",badge:"b-thm",title:"Theorem 5.2 — $|\\mathrm{Irr}_M(G)|=\\infty$",lean:`${GH}/TPC/Main.lean#L88`,body:`
<div class="math-block">$$|\\mathrm{Irr}_M(G)| = \\infty$$</div>
<p>where $\\mathrm{Irr}_M(G)=\\{b\\otimes b\\in B : b\\in B_0\\}$ are the generators irreducible in both $L$ and $R$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Proof by contradiction.</strong> Assume $\\mathrm{Irr}_M(G)$ is finite: $\\mathrm{Irr}_M(G)=\\{\\mathfrak{b}_1,\\ldots,\\mathfrak{b}_m\\}$.</p>
<p><span class="step-num">1</span><strong>Clopen envelopes (<a class="ilink" onclick="goToCard('lem-proj-contain')">Key Lemma</a>):</strong> For each $i$, $\\mathfrak{b}_i\\cdot K$ is closed in $K$ and is contained in the clopen set $C_i:=f^{-1}\\!\\bigl((b_i+\\alpha_i\\mathbb{Z})\\times(b_i+\\beta_i\\mathbb{Z})\\bigr)\\cap K$, where $\\alpha_i=6b_i+1$ and $\\beta_i=1-6b_i$ are $\\pm$primes.</p>
<p><span class="step-num">2</span><strong>Identity excluded:</strong> $f(e)=(0,0)$. Since $|6b_i+1|>|b_i|$ for all $b_i\\neq 0$, we have $0\\not\\equiv b_i\\pmod{\\alpha_i}$, so $e\\notin C_i$ for any $i$.</p>
<p><span class="step-num">3</span><strong>Covering (<a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>):</strong> $K\\setminus\\{e\\} = \\bigcup_{i=1}^{m} \\mathfrak{b}_i \\cdot K \\subseteq \\bigcup_{i=1}^{m} C_i$.</p>
<p><span class="step-num">4</span><strong>Pinch:</strong> Steps 2–3 give $K\\setminus\\bigcup_{i=1}^m C_i = \\{e\\}$.</p>
<p><span class="step-num">5</span><strong>Finite union of clopen sets is clopen</strong>, so $\\bigcup C_i$ is clopen, hence $\\{e\\}=K\\setminus\\bigcup C_i$ is <strong>open</strong>.</p>
<p><span class="step-num">6</span><strong>Contradiction:</strong> By the <a class="ilink" onclick="goToCard('thm-empty-or-inf')">Empty-or-Infinite Theorem</a>, every nonempty open set in $K$ is infinite. But $\\{e\\}$ is a singleton. <strong>Contradiction.</strong></p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $|\\mathrm{Irr}_M(G)|=\\infty$ $\\blacksquare$</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-diagram-3 me-1"></i>Four ingredients</div>
<p><span class="depends-badge"><a class="ilink" onclick="goToCard('lem-proj-contain')">Key Lemma</a>: $\\mathfrak{b}\\cdot K$ closed, $e\\notin C_i$, $C_i$ clopen</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('lem-4.4')">Cor 4.5</a>: covering</span> <span class="depends-badge"><a class="ilink" onclick="goToCard('thm-empty-or-inf')">Thm ∅/∞</a>: no finite open</span> <span class="depends-badge">Finite union of clopens is clopen</span></p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Key insight: equality not needed</div>
<p>We only need each $\\mathfrak{b}\\cdot K$ to be <em>contained in</em> a clopen set that excludes $e$. The Key Lemma provides exactly this via the initial topology and affine structure of left-multiplication — no coset identity $\\mathfrak{b}\\cdot K=f^{-1}(\\cdots)$ is assumed without proof (injectivity of $f\\!\\restriction_K$ establishes it).</p>
</div>
${mkVerify('thm-5.2')}`},

// ═══════════════════════════════════════════════════════════════
// Card 15 — Cor 5.3: TPC ∎
// ═══════════════════════════════════════════════════════════════
{id:"cor-5.3",ch:"§5 Proof",badge:"b-cor",title:"Corollary 5.3 — Infinitely Many Twin Primes $\\blacksquare$",lean:`${GH}/TPC/Main.lean#L110`,body:`
<div class="math-block">$$\\bigl|\\{b\\in\\mathbb{Z}: 6b+1\\in\\pm\\mathbb{P}\\text{ and }1-6b\\in\\pm\\mathbb{P}\\}\\bigr|=\\infty$$</div>
<p>Equivalently, there are <strong>infinitely many twin prime pairs</strong>.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p>By <a class="ilink" onclick="goToCard('thm-4.2')">Theorem 4.2</a>: $b\\in B_0$ iff $6b+1$ and $1-6b$ are both $\\pm$prime, iff $(|6b-1|,\\,6b+1)$ is a twin prime pair. So $|B_0|=\\infty$ is exactly the Twin Prime Conjecture.</p>
<p>By <a class="ilink" onclick="goToCard('thm-5.2')">Theorem 5.2</a>: $|\\mathrm{Irr}_M(G)|=\\infty$. Since $\\mathrm{Irr}_M(G)=\\{b\\otimes b:b\\in B_0\\}$ bijects with $B_0$, we get $|B_0|=\\infty$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — Twin Prime Conjecture $\\blacksquare$</div>
</div>
<p><strong>Complete logical chain:</strong></p>
<p style="font-size:.92rem;line-height:2;">

function renderPyOut(raw,N){

    else if(l.startsWith('##SUMMARY')){summary=l.replace('##SUMMARY','').replace(/^\n/,'').trim();}
  });
  const shown=rows.slice(0,N);
  const hidden=rows.length-shown.length;
  let html='';
  if(shown.length){

    html+=`<table class="v-table"><thead><tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;

    html+=`<div class="v-summary ${ok?'ok':'fail'}"><i class="bi bi-${ok?'check-circle-fill':'x-circle-fill'}"></i>${summary.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  }

}

from itertools import combinations_with_replacement

def phi(x):     return 6*x + 1
def psi_abs(x): return abs(6*x - 1)
def circ(x, y): return 6*x*y + x + y
def star(x, y): return -6*x*y + x + y

def v(p, n):
    n = abs(n)
    if n == 0: return 999
    c = 0
    while n % p == 0: n //= p; c += 1
    return c

def f(q, p, z, w):
    return v(q, abs(phi(z))) * v(p, psi_abs(w))

def is_prime(n):
    if n < 2: return False
    if n == 2: return True
    if n % 2 == 0: return False
    for i in range(3, int(n**0.5)+1, 2):
        if n % i == 0: return False
    return True

# Use all primes: |phi(k)| and |psi(k)| can have prime factors of any residue class
all_primes = [p for p in range(2, 500) if is_prime(p)]
q_primes = all_primes  # primes dividing |phi(z)| — any residue class
p_primes = all_primes  # primes dividing |psi(w)| — any residue class

# ──── 1. Bilinearity ────────────────────────────────────────
print("1. Bilinearity of f_{q,p}")
print("   f(a*b, w) = f(a,w)+f(b,w)  and  f(z, c*d) = f(z,c)+f(z,d)")
R = range(-5, 6); fails = 0; total = 0
for q in [7, 13]:
    for p in [5, 11]:
        for a in R:
            for b in R:
                for w in R:
                    if f(q,p,circ(a,b),w) != f(q,p,a,w) + f(q,p,b,w): fails += 1
                    total += 1
                for z in R:
                    if f(q,p,z,star(a,b)) != f(q,p,z,a) + f(q,p,z,b): fails += 1
                    total += 1
print(f"   {total} checks | failures: {fails} | {'PASS' if not fails else 'FAIL'}")

# ──── 2. Generator Separation ───────────────────────────────
print()
print("2. Separation of Generators")
print("   For all k != l in [-10,10]\\{0}, exists (q,p): f_{q,p}(k,k) != f_{q,p}(l,l)")
K = [k for k in range(-10, 11) if k != 0]
unsep = []; total = 0
for i, k in enumerate(K):
    for l in K[i+1:]:
        total += 1
        sep = next(((q,p) for q in q_primes for p in p_primes
                    if f(q,p,k,k) != f(q,p,l,l)), None)
        if sep is None:
            unsep.append((k, l))
        elif total <= 5:
            print(f"   k={k:3d}, l={l:3d}  separated by q={sep[0]}, p={sep[1]}  "
                  f"  f(k,k)={f(sep[0],sep[1],k,k)}, f(l,l)={f(sep[0],sep[1],l,l)}")
print(f"   ... ({total} pairs total)")
print(f"   Unseparated: {len(unsep)} | {'ALL SEPARATED' if not unsep else 'GAPS: '+str(unsep)}")

# ──── 3. Unique Multiset Representation ─────────────────────
print()
print("3. Prop 2.4.5 -- Unique Multiset Representation (small cases)")
print("   Distinct multisets of size <= 4 from {1..8} give distinct (circ-prod, star-prod)")

def ms_prod(ms):
    z = w = 0
    for k in ms: z = circ(z, k); w = star(w, k)
    return (z, w)

seen = {}; collisions = []
for size in range(1, 5):
    for ms in combinations_with_replacement(range(1, 9), size):
        prod = ms_prod(ms)
        if prod in seen and seen[prod] != ms:
            collisions.append((seen[prod], ms, prod))
        else:
            seen[prod] = ms
print(f"   {len(seen)} distinct products | collisions: {len(collisions)} | {'PASS' if not collisions else 'COLLISION FOUND'}")
if collisions:
    for a, b, p in collisions[:3]:
        print(f"   !! {a} and {b} both map to {p}")

# ──── 4. UFD Proof: φ maps irreducibles to distinct primes ───
print()
print("4. Irreducible Generators — φ(q) is prime, φ is injective on Irr(N)")
print("   (This is the exact mechanism used in the Prop 2.4.5 proof)")
irreds = [(k, phi(k), psi_abs(k))
          for k in range(-30, 31) if k != 0
          and is_prime(abs(phi(k))) and is_prime(psi_abs(k))]
phi_vals = [abs(p) for k, p, ps in irreds]
distinct = len(phi_vals) == len(set(phi_vals))
print(f"   Irreducibles q in [-30,30]\\{{0}}: {len(irreds)} found")
print(f"   First 6: {[(k, p) for k, p, ps in irreds[:6]]}")
print(f"   φ-values on irreducibles are distinct primes: {'YES' if distinct else 'NO'}")
# Verify: two products of irreducibles equal ⟹ same multiset (UFD in Z)
from functools import reduce
import operator
def prod_list(lst): return reduce(operator.mul, lst, 1)
ufd_ok = True
irr_ks = [k for k, p, ps in irreds[:10]]
for i, a in enumerate(irr_ks):
    for b in irr_ks[i:]:
        for c in irr_ks:
            for d in irr_ks[irr_ks.index(c):]:
                if prod_list([phi(a), phi(b)]) == prod_list([phi(c), phi(d)]):
                    if sorted([a, b]) != sorted([c, d]):
                        ufd_ok = False
                        print(f"   !! UFD failure: phi({a})*phi({b}) = phi({c})*phi({d})")
print(f"   UFD uniqueness (products of 2 irreducibles, first 10): {'PASS' if ufd_ok else 'FAIL'}")

# ──── Summary ────────────────────────────────────────────────
print()
print("Summary")
ok = not fails and not unsep and not collisions and ufd_ok
print(f"   All checks: {'PASS' if ok else 'ISSUES FOUND -- see above'}")
