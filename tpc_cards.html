<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Furstenberg Generalized to Handle Twin Primes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#7c3aed;--purple-light:#ede9fe;--purple-dark:#5b21b6;--purple-glow:rgba(124,58,237,.25);
  --blue:#3b82f6;--blue-light:#dbeafe;--blue-dark:#1d4ed8;--blue-glow:rgba(59,130,246,.2);
  --green:#22c55e;--green-light:#dcfce7;--green-dark:#15803d;
  --orange:#f97316;--orange-light:#ffedd5;--orange-dark:#c2410c;
  --yellow:#eab308;--yellow-light:#fef9c3;--yellow-dark:#a16207;
  --gray:#6b7280;--gray-light:#f3f4f6;--gray-dark:#374151;
  --red:#ef4444;--red-light:#fee2e2;--red-dark:#b91c1c;
  --black:#111827;--white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:linear-gradient(135deg,#ede9fe 0%,#dbeafe 40%,#dcfce7 70%,#ffedd5 100%);color:var(--black);min-height:100vh;}
.site-header{background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark),var(--purple));color:var(--white);padding:1.1rem 1.5rem;border-bottom:4px solid var(--yellow);border-radius:0 0 16px 16px;box-shadow:0 8px 32px var(--purple-glow),0 2px 0 var(--green);}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(1rem,3vw,1.35rem);margin:0;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.site-header .sub{font-size:.72rem;color:var(--yellow-light);font-family:'JetBrains Mono',monospace;margin-top:.2rem;}
.site-header a{color:var(--yellow-light);transition:color .2s;}.site-header a:hover{color:var(--orange);}
.prog-wrap{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);padding:.6rem 1.5rem;border-bottom:1px solid rgba(124,58,237,.15);margin:0 1rem;border-radius:0 0 16px 16px;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.prog{height:8px;border-radius:20px;background:var(--gray-light);overflow:hidden;}.prog-bar{background:linear-gradient(90deg,var(--purple),var(--blue),var(--green));transition:width .5s ease;height:100%;border-radius:20px;box-shadow:0 0 12px var(--purple-glow);}
.prog-lbl{font-size:.72rem;font-family:'JetBrains Mono',monospace;color:var(--gray);margin-top:.3rem;}
.ch-nav{background:rgba(255,255,255,.7);backdrop-filter:blur(8px);padding:.6rem 1.5rem;border-bottom:1px solid rgba(124,58,237,.1);overflow-x:auto;white-space:nowrap;margin:0 1rem;border-radius:0 0 12px 12px;}
.ch-btn{font-size:.7rem;font-family:'JetBrains Mono',monospace;border-radius:20px;margin-right:.4rem;padding:.28rem .7rem;border:2px solid var(--purple-light);background:white;color:var(--purple);cursor:pointer;transition:all .25s;box-shadow:0 2px 6px rgba(124,58,237,.08);}
.ch-btn.active,.ch-btn:hover{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border-color:transparent;box-shadow:0 4px 16px var(--purple-glow);transform:translateY(-1px);}
.card-area{min-height:72vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 1rem;}
.proof-card{background:#f0fdf4;border-radius:18px;box-shadow:0 12px 48px rgba(124,58,237,.18),0 4px 16px rgba(34,197,94,.12),0 1px 4px rgba(0,0,0,.08);max-width:860px;width:100%;overflow:visible;animation:cardIn .4s cubic-bezier(.34,1.56,.64,1);border:2px solid rgba(34,197,94,.35);}
.card-hdr,.card-body-inner{overflow:hidden;border-radius:16px 16px 0 0;}
.card-body-inner{border-radius:0 0 16px 16px;overflow:visible;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.card-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .7rem;border-radius:20px;margin-bottom:.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.b-def{background:linear-gradient(135deg,var(--blue-light),#c7d2fe);color:var(--blue-dark);}
.b-thm{background:linear-gradient(135deg,var(--orange-light),#fed7aa);color:var(--orange-dark);}
.b-prop{background:linear-gradient(135deg,var(--green-light),#bbf7d0);color:var(--green-dark);}
.b-lem{background:linear-gradient(135deg,var(--purple-light),#ddd6fe);color:var(--purple-dark);}
.b-cor{background:linear-gradient(135deg,var(--yellow-light),#fde68a);color:var(--yellow-dark);}
.b-abs{background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark));color:var(--yellow);}
.b-rmk{background:linear-gradient(135deg,var(--gray-light),#e5e7eb);color:var(--gray-dark);}
.b-gap{background:linear-gradient(135deg,var(--red-light),#fecaca);color:var(--red-dark);}
.card-hdr{position:relative;padding:1.5rem 2rem .8rem;border-bottom:3px solid transparent;border-image:linear-gradient(90deg,var(--green),var(--purple),var(--blue),var(--green)) 1;background:linear-gradient(135deg,#ecfdf5,#f0f9ff);box-shadow:0 2px 8px rgba(34,197,94,.1);}
.card-title{font-family:'Playfair Display',serif;font-size:1.35rem;line-height:1.3;color:var(--purple-dark);background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card-title .katex,.card-title .katex *{-webkit-text-fill-color:var(--purple-dark);background:none;-webkit-background-clip:unset;background-clip:unset;}
.card-body-inner{padding:1.5rem 2rem 1.2rem;line-height:1.8;font-size:1.02rem;}.card-body-inner p{margin-bottom:.8rem;}
.math-block{background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(59,130,246,.07));border-left:4px solid;border-image:linear-gradient(180deg,var(--green),var(--blue)) 1;padding:1rem 1.3rem;margin:1rem 0;border-radius:0 12px 12px 0;overflow-x:auto;box-shadow:inset 0 0 20px rgba(34,197,94,.08),0 2px 8px rgba(0,0,0,.06);}
.code-block{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:linear-gradient(135deg,#1e1b4b,#1e293b);color:#c4b5fd;padding:1rem 1.3rem;border-radius:16px;overflow-x:auto;margin:.9rem 0;line-height:1.7;box-shadow:0 4px 16px rgba(0,0,0,.15);border:1px solid rgba(124,58,237,.2);}
.src-link{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--purple);text-decoration:none;border:2px solid var(--purple);border-radius:20px;padding:.15rem .5rem;transition:all .25s;box-shadow:0 2px 8px var(--purple-glow);}
.src-link:hover{background:var(--purple);color:white;transform:translateY(-1px);box-shadow:0 4px 16px var(--purple-glow);}
.proof-card a{color:var(--purple);font-weight:600;}.proof-card a:hover{color:var(--orange);}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.62rem;background:linear-gradient(135deg,var(--purple-light),var(--blue-light));border:1px solid rgba(124,58,237,.2);border-radius:20px;padding:.12rem .55rem;margin:.15rem .08rem;text-decoration:none;color:var(--purple-dark);transition:all .25s;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.tag:hover{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border-color:transparent;transform:translateY(-1px);box-shadow:0 4px 12px var(--purple-glow);}
.proof-toggle{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--white);background:linear-gradient(135deg,var(--purple),var(--blue));border:none;border-radius:20px;padding:.35rem .9rem;cursor:pointer;margin-top:.5rem;transition:all .3s;box-shadow:0 3px 12px var(--purple-glow);}
.proof-toggle:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--purple-glow);background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark));}
.proof-content{border-left:4px solid;border-image:linear-gradient(180deg,var(--green),var(--blue)) 1;padding:1rem 1.2rem;margin-top:.8rem;background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(59,130,246,.06));border-radius:0 10px 10px 0;box-shadow:0 3px 12px rgba(34,197,94,.1),0 1px 4px rgba(0,0,0,.05);}
.proof-content p{margin-bottom:.6rem;}
.qed-box{display:inline-block;background:linear-gradient(135deg,var(--green),var(--blue));color:white;font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:.2rem .6rem;border-radius:12px;margin-top:.4rem;box-shadow:0 2px 8px rgba(34,197,94,.3);}
.remark-box{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(234,179,8,.10));border:2px solid rgba(34,197,94,.5);border-radius:12px;padding:.9rem 1.2rem;margin:.8rem 0;font-size:.92rem;box-shadow:0 2px 10px rgba(34,197,94,.1);}
.remark-box .remark-title{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--orange-dark);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.example-box{background:linear-gradient(135deg,rgba(59,130,246,.10),rgba(34,197,94,.08));border:2px dashed var(--blue);border-radius:12px;padding:.9rem 1.2rem;margin:.8rem 0;box-shadow:0 2px 10px rgba(59,130,246,.08);}
.example-box .example-title{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--blue-dark);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.minimap{position:fixed;right:.8rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;}
.mm-dot{width:10px;height:10px;border-radius:50%;background:rgba(124,58,237,.2);cursor:pointer;border:2px solid rgba(124,58,237,.3);transition:all .25s;}
.mm-dot.active{background:var(--purple);border-color:var(--yellow);transform:scale(1.6);box-shadow:0 0 12px var(--purple-glow);}.mm-dot:hover{background:var(--blue);border-color:var(--blue);transform:scale(1.4);}
@media(max-width:860px){.minimap{display:none;}.sb-toggle{display:none !important;}}
.nav-footer{background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark),var(--purple));padding:1rem 1.5rem;position:sticky;bottom:0;border-top:4px solid var(--yellow);z-index:100;border-radius:18px 18px 0 0;box-shadow:0 -8px 32px var(--purple-glow),0 -2px 0 var(--green);}
.btn-nav{font-family:'JetBrains Mono',monospace;font-size:.8rem;border-radius:14px;padding:.5rem 1.5rem;border:2px solid var(--yellow);background:transparent;color:var(--yellow);cursor:pointer;transition:all .25s;box-shadow:0 3px 12px rgba(234,179,8,.2),0 1px 4px rgba(0,0,0,.15);}
.btn-nav:hover{background:var(--yellow);color:var(--black);transform:translateY(-2px);box-shadow:0 6px 20px rgba(234,179,8,.35),0 2px 6px rgba(0,0,0,.15);}.btn-nav:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
.ctr{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--yellow-light);}
.bubble{position:fixed;border-radius:50%;pointer-events:none;opacity:.06;z-index:0;}
.bubble-1{width:300px;height:300px;background:var(--purple);top:-50px;left:-80px;animation:float1 20s ease-in-out infinite;}
.bubble-2{width:200px;height:200px;background:var(--blue);bottom:100px;right:-60px;animation:float2 25s ease-in-out infinite;}
.bubble-3{width:250px;height:250px;background:var(--green);top:40%;left:60%;animation:float3 30s ease-in-out infinite;}
.bubble-4{width:180px;height:180px;background:var(--orange);top:20%;right:20%;animation:float1 22s ease-in-out infinite reverse;}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,30px) scale(1.1);}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-30px,-40px) scale(1.15);}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-20px,30px) scale(1.05);}}
.card-ribbon{position:absolute;top:18px;right:-28px;background:linear-gradient(135deg,var(--orange),var(--yellow));color:var(--black);font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;padding:.2rem 2.5rem;transform:rotate(45deg);letter-spacing:.06em;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:2;}
.depends-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.58rem;background:var(--gray-light);color:var(--gray-dark);border-radius:20px;padding:.12rem .5rem;margin:.1rem;border:1px solid rgba(107,114,128,.2);}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));color:white;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;margin-right:.5rem;box-shadow:0 2px 8px var(--purple-glow);}
.share-btn{position:absolute;top:1.2rem;right:1.5rem;background:linear-gradient(135deg,var(--purple-light),var(--blue-light));border:2px solid rgba(124,58,237,.2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;color:var(--purple);font-size:.9rem;box-shadow:0 2px 8px rgba(124,58,237,.1);}
.share-btn:hover{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border-color:transparent;transform:scale(1.15);box-shadow:0 4px 16px var(--purple-glow);}
.share-btn.copied{background:var(--green);color:white;border-color:var(--green);}
.ilink{color:var(--purple);font-weight:600;text-decoration:none;border-bottom:2px dashed rgba(124,58,237,.3);cursor:pointer;transition:all .2s;}
.ilink:hover{color:var(--orange);border-bottom-color:var(--orange);}
/* ── Proof Map overlay ── */
.sb-toggle{position:fixed;left:10px;top:10px;z-index:201;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border:1.5px solid var(--yellow);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.72rem;box-shadow:0 2px 8px var(--purple-glow);transition:all .3s;}
.sb-toggle:hover{transform:scale(1.12);box-shadow:0 4px 14px var(--purple-glow);}
.pm-overlay{position:fixed;inset:0;background:rgba(17,24,39,.88);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.pm-panel{background:#fafaff;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.45),0 0 0 2px rgba(34,197,94,.2);width:min(860px,98vw);overflow:hidden;}
.pm-hdr{background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark));color:var(--yellow);padding:.75rem 1.2rem;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;letter-spacing:.05em;}
.pm-body{padding:.8rem 1rem;overflow-x:auto;background:#fafaff;}
.pm-body svg{display:block;margin:0 auto;}
.pm-close{background:none;border:none;color:var(--yellow);font-size:1.3rem;cursor:pointer;line-height:1;padding:.1rem .4rem;border-radius:6px;transition:background .2s;}
.pm-close:hover{background:rgba(255,255,255,.15);}
.pm-legend{display:flex;gap:.9rem;flex-wrap:wrap;padding:.5rem 1rem;border-top:1px solid rgba(124,58,237,.1);background:#fff;font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--gray-dark);}
.pm-leg{display:inline-flex;align-items:center;gap:.3rem;}
.pm-swatch{width:11px;height:11px;border-radius:3px;display:inline-block;}
.gap-box{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.06));border:2px solid var(--red);border-radius:12px;padding:.9rem 1.2rem;margin:.8rem 0;font-size:.92rem;box-shadow:0 2px 10px rgba(239,68,68,.1);}
.gap-box .gap-title{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--red-dark);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
/* ── Verify sections ── */
.verify-section{margin-top:1.1rem;border-top:2px dashed rgba(124,58,237,.15);padding-top:.9rem;}
.vfy-hdr{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--purple);margin-bottom:.5rem;}
.verify-btn{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:white;background:linear-gradient(135deg,#059669,#0284c7);border:none;border-radius:20px;padding:.32rem .9rem;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(5,150,105,.25);}
.verify-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(5,150,105,.3);}
.verify-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.vfy-hint{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--gray);}
.verify-out{margin:.6rem 0 0;}
.v-table{width:100%;border-collapse:collapse;font-size:.7rem;font-family:'JetBrains Mono',monospace;margin:.45rem 0;border-radius:10px;overflow:hidden;}
.v-table th{background:linear-gradient(135deg,var(--purple-dark),var(--blue-dark));color:var(--yellow);padding:.32rem .65rem;text-align:left;font-size:.62rem;letter-spacing:.06em;font-weight:700;}
.v-table td{padding:.26rem .65rem;border-bottom:1px solid rgba(124,58,237,.07);}
.v-table tr:last-child td{border-bottom:none;}
.v-pass td:first-child::before{content:'✓ ';color:var(--green-dark);}
.v-fail td:first-child::before{content:'✗ ';color:var(--red-dark);}
.v-pass td{color:var(--green-dark);}
.v-fail td{color:var(--red-dark);}
.v-pass{background:rgba(34,197,94,.06);}
.v-fail{background:rgba(239,68,68,.06);}
.v-summary{display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;padding:.28rem .8rem;border-radius:14px;margin-top:.4rem;}
.v-summary.ok{background:var(--green-light);color:var(--green-dark);border:2px solid var(--green);}
.v-summary.fail{background:var(--red-light);color:var(--red-dark);border:2px solid var(--red);}
/* Python syntax highlighting */
.py-src{white-space:pre;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.7;max-height:200px;overflow-y:auto;background:linear-gradient(135deg,#1e1b4b,#0f172a);border-radius:14px;padding:.9rem 1rem;border:1px solid rgba(124,58,237,.2);}
.py-kw{color:#c084fc;font-weight:600;}
.py-fn{color:#60a5fa;}
.py-str{color:#86efac;}
.py-num{color:#fb923c;}
.py-cmt{color:#94a3b8;font-style:italic;}
.py-bi{color:#67e8f9;}
</style>
</head>
<body>
<div class="bubble bubble-1"></div>
<div class="bubble bubble-2"></div>
<div class="bubble bubble-3"></div>
<div class="bubble bubble-4"></div>
<!-- Proof map toggle -->
<button class="sb-toggle" id="pmToggle" onclick="togglePM()" title="Proof Dependency Map"><i class="bi bi-diagram-3-fill"></i></button>
<!-- Proof map overlay -->
<div class="pm-overlay" id="pmOverlay" style="display:none" onclick="if(event.target===this)togglePM()">
  <div class="pm-panel">
    <div class="pm-hdr">
      <span><i class="bi bi-diagram-3-fill me-2"></i>Proof Dependency Map — click any node to navigate</span>
      <button class="pm-close" onclick="togglePM()">&times;</button>
    </div>
    <div class="pm-body"><svg id="pm-svg" viewBox="0 0 800 420" width="800" height="420"></svg></div>
    <div class="pm-legend">
      <span class="pm-leg"><span class="pm-swatch" style="background:#dbeafe;border:1.5px solid #1d4ed8"></span>Definition</span>
      <span class="pm-leg"><span class="pm-swatch" style="background:#ffedd5;border:1.5px solid #c2410c"></span>Theorem</span>
      <span class="pm-leg"><span class="pm-swatch" style="background:#ede9fe;border:1.5px solid #5b21b6"></span>Lemma</span>
      <span class="pm-leg"><span class="pm-swatch" style="background:#dcfce7;border:1.5px solid #15803d"></span>Proposition</span>
      <span class="pm-leg"><span class="pm-swatch" style="background:#fef9c3;border:1.5px solid #a16207"></span>Corollary</span>
      <span style="color:var(--purple-dark);font-weight:600">★ highlighted = current card</span>
    </div>
  </div>
</div>
<header class="site-header d-flex justify-content-between align-items-start flex-wrap gap-2">
  <div>
    <h1><i class="bi bi-infinity me-2" style="color:var(--yellow)"></i>Furstenberg Generalized to Handle Twin Primes <i class="bi bi-stars ms-1" style="color:var(--yellow);font-size:.8rem"></i></h1>
    <div class="sub">
      <a href="https://github.com/FruitfulApproach/Lean4TPC" target="_blank"><i class="bi bi-github"></i> FruitfulApproach/Lean4TPC</a>
      &nbsp;<i class="bi bi-dot"></i>&nbsp;

// ── Python syntax highlighter ────────────────────────────────
function syntaxHL(raw){
  let s=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/(#[^\n]*)/g,'<span class="py-cmt">$1</span>');
  s=s.replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|"""[\s\S]*?"""|'''[\s\S]*?''')/g,'<span class="py-str">$1</span>');
  ['def','return','if','elif','else','for','in','not','and','or','True','False','None','import','from','while','break','continue','pass','raise','lambda','class','with','as'].forEach(k=>{s=s.replace(new RegExp('(?<![a-zA-Z0-9_])('+k+')(?![a-zA-Z0-9_])','g'),'<span class="py-kw">$1</span>');});
  ['print','range','len','abs','sum','min','max','int','str','list','set','sorted','all','any','next','zip','enumerate','isinstance','type','eval'].forEach(b=>{s=s.replace(new RegExp('(?<![a-zA-Z0-9_])('+b+')(?=\\s*\\()','g'),'<span class="py-bi">$1</span>');});
  s=s.replace(/\b(\d+\.?\d*)\b/g,'<span class="py-num">$1</span>');
  s=s.replace(/\b([a-z_][a-z0-9_]*)(?=\s*\()/g,'<span class="py-fn">$1</span>');
  return s;
}

def phi(x): return 6*x+1
def psi(x): return 6*x-1
def circ(x,y): return 6*x*y+x+y
def star(x,y): return -6*x*y+x+y
def is_prime(n):
    n=abs(n)
    if n<2: return False
    if n==2: return True
    if n%2==0: return False
    for i in range(3,int(n**.5)+1,2):
        if n%i==0: return False
    return True
def v(p,n):
    n=abs(n)
    if n==0: return 999
    c=0
    while n%p==0: n//=p; c+=1
    return c
def f(q,p,z,w): return v(q,abs(phi(z)))*v(p,abs(psi(w)))
PRIMES=[p for p in range(2,300) if is_prime(p)]
def _rep(name,detail,expected,got,ok):
    s='PASS' if ok else 'FAIL'
    print(f"RESULT\\t{name}\\t{detail}\\t{expected}\\t{got}\\t{s}")
`;

{id:"abstract",ch:"Abstract",badge:"b-abs",title:"Abstract — The Monoid Tensor Product Approach",lean:null,body:`
<p>We prove there are <strong>infinitely many twin prime pairs</strong> via the monoid tensor product $M = (\\mathbb{Z},\\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z},\\star)$ and the submonoid $N = \\langle \\{\\mathfrak{k} = (k,k) : k \\in \\mathbb{Z}\\} \\rangle \\leqslant M$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-lightbulb-fill me-1"></i>Core Strategy</div>
<p>We transfer the twin-prime question into an algebraic/topological setting where Furstenberg's classic proof-technique applies. The map $\\phi(x)=6x+1$ converts $(\\mathbb{Z},\\circledast)$ into ordinary multiplication in $6\\mathbb{Z}+1$. The monoid tensor product $M$ has bilinearity relations $(a \\circledast b) \\otimes w = (a \\otimes w)(b \\otimes w)$ and $z \\otimes (c \\star d) = (z \\otimes c)(z \\otimes d)$, with $z \\otimes 0 = 0 \\otimes w = e$ (identity). Irreducible elements of $N$ correspond exactly to twin prime pairs.</p>
</div>
<p><strong>Key containment:</strong> For each irreducible $\\mathfrak{q} = (q,q) \\in \\mathrm{Irr}(N)$:</p>
<div class="math-block">$$\\mathfrak{q} \\cdot N \\;\\subseteq\\; \\pi^{-1}\\!\\bigl((q+\\phi(q)\\mathbb{Z})\\times(q+\\psi(q)\\mathbb{Z})\\bigr) \\quad\\text{and}\\quad e \\notin \\pi^{-1}(\\cdots)$$</div>
<p>In the <a class="ilink" onclick="goToCard('def-proj')">projected topology</a> on $N$, each $\\pi^{-1}(\\cdots)$ is <strong>clopen</strong>. Combined with the <a class="ilink" onclick="goToCard('lem-4.4')">covering</a> $N\\setminus\\{e\\} = \\bigcup \\mathfrak{q} \\cdot N$, the <a class="ilink" onclick="goToCard('thm-5.2')">Furstenberg argument</a> forces $|\\mathrm{Irr}(N)|=\\infty$.</p>
<div class="d-flex flex-wrap gap-1 mt-3">
<a href="https://en.wikipedia.org/wiki/Twin_prime" target="_blank" class="tag"><i class="bi bi-stars me-1"></i>Twin Primes</a>
<a href="https://en.wikipedia.org/wiki/Furstenberg%27s_proof_of_the_infinitude_of_primes" target="_blank" class="tag"><i class="bi bi-clock-history me-1"></i>Furstenberg 1955</a>

// ═══════════════════════════════════════════════════════════════
// Card 1 — Def 1.1: Operations
// ═══════════════════════════════════════════════════════════════
{id:"def-1.1",ch:"§1 Algebra",badge:"b-def",title:"Definition 1.1 — Operations $\\circledast$ and $\\star$",lean:`${GH}/TPC/Basic.lean#L10`,body:`
<p>Define two binary operations on $\\mathbb{Z}$:</p>
<div class="math-block">$$x\\mathbin{\\circledast}y=6xy+x+y\\qquad x\\mathbin{\\star}y=-6xy+x+y$$</div>
<p>Both have <strong>identity element $0$</strong>: $x\\circledast 0 = x$ and $x\\star 0 = x$.</p>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Why these operations?</div>
<p>They arise from transporting ordinary multiplication through the maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$. Every integer $n\\equiv 1\\pmod{6}$ has the form $\\phi(x)$, and every $n\\equiv -1\\pmod{6}$ has the form $\\psi(x)$. Since all primes $>3$ satisfy $p\\equiv\\pm1\\pmod{6}$, these operations capture the multiplicative structure of primes in the correct residue classes.</p>
</div>
<div class="code-block">def mstar (x y : ℤ) : ℤ := 6 * x * y + x + y
def sstar (x y : ℤ) : ℤ := -6 * x * y + x + y</div>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show associativity proof</button>
<div class="proof-content" style="display:none">
<p><strong>Associativity of $\\circledast$:</strong></p>
<p>$(x\\circledast y)\\circledast z = 36xyz+6xz+6yz+6xy+x+y+z$</p>
<p>$x\\circledast(y\\circledast z) = 36xyz+6xy+6xz+x+6yz+y+z$</p>
<p>Both equal $36xyz+6xy+6xz+6yz+x+y+z$. Commutativity: $x\\circledast y = 6xy+x+y = y\\circledast x$. The $\\star$ case is identical with $-6$ replacing $6$.</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card 2 — Thm 1.3: Isomorphisms
// ═══════════════════════════════════════════════════════════════
{id:"thm-1.3",ch:"§1 Algebra",badge:"b-thm",title:"Theorem 1.3 — Isomorphisms $\\phi$ and $\\psi$",lean:`${GH}/TPC/Basic.lean#L38`,body:`
<p>The maps $\\phi(x)=6x+1$ and $\\psi(x)=6x-1$ are <strong>monoid isomorphisms</strong>:</p>
<div class="math-block">$$\\phi:(\\mathbb{Z},\\circledast)\\xrightarrow{\\sim}(6\\mathbb{Z}+1,\\cdot)\\qquad\\psi:(\\mathbb{Z},\\star)\\xrightarrow{\\sim}(6\\mathbb{Z}-1,\\bullet)$$</div>
<p>where $a\\bullet b = -(ab)$ on $6\\mathbb{Z}-1$. Both are bijections: $\\phi^{-1}(n)=\\frac{n-1}{6}$, $\\psi^{-1}(n)=\\frac{n+1}{6}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>$\\phi$ is multiplicative:</strong></p>
<p>$\\phi(x\\circledast y) = 6(6xy+x+y)+1 = (6x+1)(6y+1) = \\phi(x)\\cdot\\phi(y)$. ✓</p>
<p><strong>$\\phi$ is a bijection onto $6\\mathbb{Z}+1$:</strong></p>
<p>If $n\\in 6\\mathbb{Z}+1$ then $n=6k+1$ for some $k$, so $\\phi(k)=n$. Injectivity: $\\phi(x)=\\phi(y)\\Rightarrow x=y$. ✓</p>
<p><strong>$\\psi$ is multiplicative (with $\\bullet$):</strong></p>
<p>$\\psi(x\\star y)=6(-6xy+x+y)-1=-[(6x-1)(6y-1)] = \\psi(x)\\bullet\\psi(y)$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="example-box">
<div class="example-title"><i class="bi bi-lightning-charge me-1"></i>Key Consequence</div>
<p>$x$ is <strong>$\\circledast$-irreducible</strong> $\\iff$ $\\phi(x)=6x+1$ is <strong>prime</strong> in $\\mathbb{Z}$ (up to sign). Similarly for $\\star$ and $\\psi$.</p>
</div>
<div class="code-block">lemma φ_mul (x y : ℤ) : φ (x ⊛ y) = φ x * φ y := by
  simp [φ, mstar]; ring</div>
${mkVerify('thm-1.3','# φ(x⊛y) = φ(x)·φ(y) — verify isomorphism\nfails = [(x,y) for x in range(-8,9) for y in range(-8,9)\n         if phi(circ(x,y)) != phi(x)*phi(y)]\n# ψ(x⋆y) = −ψ(x)·ψ(y) — bullet operation\nfails2 = [(x,y) for x in range(-8,9) for y in range(-8,9)\n          if psi(star(x,y)) != -psi(x)*psi(y)]')}`},

// ═══════════════════════════════════════════════════════════════
// Card 3 — Lem 1.4: No Zero Divisors
// ═══════════════════════════════════════════════════════════════
{id:"lem-1.4",ch:"§1 Algebra",badge:"b-lem",title:"Lemma 1.4 — No Zero Divisors",lean:`${GH}/TPC/Basic.lean#L62`,body:`
<p><strong>Statement:</strong> If $u,v\\neq 0$ then $u\\circledast v\\neq 0$ and $u\\star v\\neq 0$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em> <strong>For $\\circledast$:</strong> Suppose $u\\circledast v = 0$ with $u,v\\neq 0$. Apply $\\phi$: $\\phi(u\\circledast v)=\\phi(u)\\phi(v)=(6u+1)(6v+1)=\\phi(0)=1$. In $\\mathbb{Z}$, $ab=1$ requires $\\{a,b\\}=\\{1,1\\}$ or $\\{-1,-1\\}$. So $(6u+1,6v+1)\\in\\{(1,1),(-1,-1)\\}$, giving $u=v=0$ (contradicts $u\\neq 0$) or $u=v=-1/3\\notin\\mathbb{Z}$. Contradiction. ✓</p>
<p><strong>For $\\star$:</strong> Suppose $u\\star v=0$ with $u,v\\neq 0$. Apply $\\psi$: $\\psi(u)\\bullet\\psi(v)=-(6u-1)(6v-1)=1$, so $(6u-1)(6v-1)=-1$, giving $\\{6u-1,6v-1\\}=\\{1,-1\\}$. Then $u=1/3$ or $u=0$; both are not nonzero integers. Contradiction. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-exclamation-triangle me-1"></i>Where this is used</div>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i><a class="ilink" onclick="goToCard('lem-proj-contain')">Containment Lem</a></span> The projected map $\\pi$ separates elements</p>
<p><span class="depends-badge"><i class="bi bi-arrow-right me-1"></i><a class="ilink" onclick="goToCard('thm-empty-or-inf')">Thm ∅/∞</a></span> Distinctness of constructed elements</p>
</div>
${mkVerify('lem-1.4','# No zero divisors: u⊛v ≠ 0 for u,v ≠ 0\nzero_divs = [(u,v) for u in range(-12,13)\n             for v in range(-12,13) if u and v\n             and circ(u,v) == 0]  # must be empty\n# Also: ⊛ and ⋆ are commutative with identity 0')}`},

// ═══════════════════════════════════════════════════════════════
// Card 4 — Def 2.1–2.2: M, G, N
// ═══════════════════════════════════════════════════════════════
{id:"def-2.1",ch:"§2 Monoid",badge:"b-def",title:"Definition 2.1–2.2 — Monoid Tensor Product $M$, Generators $G$, Submonoid $N$",lean:`${GH}/TPC/Monoid.lean#L10`,body:`
<p><strong>Definition 2.1.</strong> The <strong>monoid tensor product</strong>:</p>
<div class="math-block">$$M = (\\mathbb{Z}, \\circledast) \\otimes_{\\mathrm{Mon}} (\\mathbb{Z}, \\star)$$</div>
<p>with bilinearity relations:</p>
<div class="math-block">$$(a \\circledast b) \\otimes w = (a \\otimes w)(b \\otimes w), \\qquad z \\otimes (c \\star d) = (z \\otimes c)(z \\otimes d)$$</div>
<div class="math-block">$$z \\otimes 0 = 0 \\otimes w = e \\quad\\text{(identity)}$$</div>
<p><strong>Definition 2.2.</strong> The <strong>generating set</strong> and <strong>diagonal submonoid</strong>:</p>
<div class="math-block">$$G = \\{\\mathfrak{k} = (k,k) := k \\otimes k : k \\in \\mathbb{Z}\\} \\qquad N = \\langle G \\rangle$$</div>
<p>Elements of $N$ are formal products of diagonal tensors $\\mathfrak{k}_1 \\cdots \\mathfrak{k}_r$. A product of distinct generators does <strong>not</strong> simplify to a pure tensor (see <a class="ilink" onclick="goToCard('prop-2.4')">Prop 2.4</a>). The multiset $\\{k_1,\\ldots,k_r\\}$ uniquely determines the element of $N$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show that $N$ is a submonoid</button>
<div class="proof-content" style="display:none">
<p><strong>Identity:</strong> The empty product ($r=0$) gives $e \\in N$. ✓</p>
<p><strong>Closure:</strong> If $\\mathfrak{k}_1\\cdots\\mathfrak{k}_r \\in N$ and $\\mathfrak{l}_1\\cdots\\mathfrak{l}_s \\in N$, their product $\\mathfrak{k}_1\\cdots\\mathfrak{k}_r\\mathfrak{l}_1\\cdots\\mathfrak{l}_s \\in N$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED</div>
</div>`},

// ═══════════════════════════════════════════════════════════════
// Card 5 — Lem 2.3: Separating Invariants
// ═══════════════════════════════════════════════════════════════
{id:"lem-sep-inv",ch:"§2 Monoid",badge:"b-lem",title:"Lemma 2.3 — Separating Invariants via UMP",lean:`${GH}/TPC/Monoid.lean#L30`,body:`
<p>For primes $q\\equiv 1\\pmod{6}$ and $p\\equiv 5\\pmod{6}$, define the <strong>separating bilinear maps</strong>:</p>
<div class="math-block">$$f_{q,p}:\\mathbb{Z}\\times\\mathbb{Z}\\to(\\mathbb{Z},+),\\qquad f_{q,p}(z,w)=v_q(|\\phi(z)|)\\cdot v_p(|\\psi(w)|)$$</div>
<p>where $v_q$ denotes the $q$-adic valuation.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show: $f_{q,p}$ is bilinear</button>
<div class="proof-content" style="display:none">
<p><strong>Left bilinearity (using $\\phi$ is a homomorphism):</strong></p>
<div class="math-block">$$f_{q,p}(a\\circledast b,\\,w)=v_q(|\\phi(a)\\phi(b)|)\\cdot v_p(|\\psi(w)|)=\\bigl(v_q|\\phi(a)|+v_q|\\phi(b)|\\bigr)\\cdot v_p|\\psi(w)|=f_{q,p}(a,w)+f_{q,p}(b,w)$$</div>
<p><strong>Right bilinearity:</strong> $f_{q,p}(z,c\\star d)=v_q|\\phi(z)|\\cdot\\bigl(v_p|\\psi(c)|+v_p|\\psi(d)|\\bigr)=f_{q,p}(z,c)+f_{q,p}(z,d)$. ✓</p>
<p><strong>Zero condition:</strong> $\\phi(0)=1$ so $v_q(1)=0$, hence $f_{q,p}(0,w)=0$. Similarly $f_{q,p}(z,0)=0$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $f_{q,p}$ is bilinear</div>
</div>
<p>By the <strong>Universal Mapping Property</strong> of the monoid tensor product, each bilinear $f_{q,p}$ extends <em>uniquely</em> to a monoid homomorphism $\\bar{f}_{q,p}$:</p>
<div class="math-block">$$\\begin{CD}
(\\mathbb{Z},\\circledast)\\times(\\mathbb{Z},\\star) @>{f_{q,p}}>> (\\mathbb{Z},+) \\\\
@V{\\iota}VV @| \\\\
M @>{\\exists!\\,\\bar{f}_{q,p}}>> (\\mathbb{Z},+)
\\end{CD}$$</div>
<p>The vertical map $\\iota(z,w)=z\\otimes w$ is the universal bilinear map into $M$; the diagram commutes: $\\bar{f}_{q,p}\\circ\\iota = f_{q,p}$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show: generators are separated</button>
<div class="proof-content" style="display:none">
<p><em>Proof.</em> Let $k\\neq l$ in $\\mathbb{Z}\\setminus\\{0\\}$. Since $\\phi$ is injective, $|\\phi(k)|\\neq|\\phi(l)|$, so their prime factorizations differ. Choose a prime $q_0$ with $v_{q_0}(|\\phi(k)|)\\neq v_{q_0}(|\\phi(l)|)$; WLOG $v_{q_0}(|\\phi(k)|) > v_{q_0}(|\\phi(l)|)$.</p>
<p><strong>Case A: $v_{q_0}(|\\phi(l)|)=0$.</strong> Since $|\\psi(k)|=|6k-1|\\geq 2$ for $k\\in\\mathbb{Z}\\setminus\\{0\\}$, choose any prime $p_0\\mid |\\psi(k)|$. Then $\\bar{f}_{q_0,p_0}(\\mathfrak{k}) = v_{q_0}(|\\phi(k)|)\\cdot v_{p_0}(|\\psi(k)|) \\geq 1$, while $\\bar{f}_{q_0,p_0}(\\mathfrak{l}) = 0\\cdot v_{p_0}(|\\psi(l)|) = 0$. ✓</p>
<p><strong>Case B: $v_{q_0}(|\\phi(l)|)\\geq 1$.</strong> Since $|\\psi(k)|=|6k-1|\\neq|6l-1|=|\\psi(l)|$ (injectivity: $|6k-1|=|6l-1|$ and $k,l\\in\\mathbb{Z}$ forces $k=l$), their factorizations differ. Choose a prime $p_0$ with $v_{p_0}(|\\psi(k)|)\\geq 1$ and $v_{p_0}(|\\psi(l)|)=0$ (or vice versa; such $p_0$ exists since otherwise $|\\psi(k)|$ and $|\\psi(l)|$ share all prime factors, forcing $|\\psi(k)|=|\\psi(l)|$ — contradiction). In either sub-case one of $\\bar{f}_{q_0,p_0}(\\mathfrak{k}), \\bar{f}_{q_0,p_0}(\\mathfrak{l})$ is zero and the other is positive. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — $\\{\\bar{f}_{q,p}\\}$ separates generators</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-info-circle-fill me-1"></i>Role in the proof</div>
<p>The UMP guarantees $\\bar{f}_{q,p}$ exists; separation gives the distinctness needed for <a class="ilink" onclick="goToCard('prop-2.4')">Props 2.4.1 and 2.4.4</a>. (Prop 2.4.5 is proved independently via irreducible factorization — see <a class="ilink" onclick="goToCard('lem-ufd')">Lem 2.4.A</a>.)</p>
</div>
${mkVerify('lem-sep-inv','# Bilinearity: f(a⊛b,w) = f(a,w) + f(b,w)\nfails = [... for a,b,w in range(-5,6)\n         if f(q,p,circ(a,b),w) != f(q,p,a,w)+f(q,p,b,w)]\n# Separation: ∀ k≠l ∃(q,p): f(k,k)≠f(l,l)\nunsep = [(k,l) for k≠l\n         if all f(q,p,k,k)==f(q,p,l,l) for all (q,p)]')}`},

// ═══════════════════════════════════════════════════════════════
// Card 6 — Lem 2.4.A: Unique Irreducible Factorization
// ═══════════════════════════════════════════════════════════════
{id:"lem-ufd",ch:"§2 Monoid",badge:"b-lem",title:"Lemma 2.4.A — Unique Irreducible Factorization in $N$",lean:`${GH}/TPC/Monoid.lean#L50`,body:`
<p>Working exclusively with <strong>irreducible generators</strong> reduces Prop 2.4.5 to a one-paragraph argument using UFD in $\\mathbb{Z}$. This closes the main proof gap.</p>
<div class="math-block">$$\\hat{q}=(q,q)\\in\\mathrm{Irr}(N)\\iff \\phi(q)=6q+1\\text{ is prime and }|\\psi(q)|=|6q-1|\\text{ is prime}$$</div>
<p><strong>Lemma.</strong> Every $m\\in N\\setminus\\{e\\}$ has a <em>unique</em> factorization $m = \\hat{q}_1\\cdots\\hat{q}_n$ with all $\\hat{q}_i\\in\\mathrm{Irr}(N)$.</p>
<button class="proof-toggle" onclick="tp(this)"><i class="bi bi-mortarboard me-1"></i>Show full proof</button>
<div class="proof-content" style="display:none">
<p><strong>Part 1 — Existence</strong> (strong induction on norm). For a generator $\\mathfrak{k}=(k,k)$ define its <em>norm</em>:</p>
<div class="math-block">$$\\|\\mathfrak{k}\\| = \\phi(k)^2 = (6k+1)^2 \\geq 25 \\quad\\text{for }k\\neq 0.$$</div>
<p>Extend multiplicatively to $N$: $\\|\\mathfrak{k}_1\\cdots\\mathfrak{k}_r\\|=\\prod_i\\phi(k_i)^2$. (Well-defined without Prop 2.4.5: use it as a function on words, noting it equals $\\phi(\\pi_1(m))^2$ which is intrinsic.) By Lem 4.3 N5, if $m=a\\cdot b$ with $a,b\\neq e$ then $\\|a\\|,\\|b\\|<\\|m\\|$.</p>
<p><em>Induction:</em> If $m$ is irreducible, done. Otherwise $m=a\\cdot b$ with $a,b\\neq e$ and $\\|a\\|,\\|b\\|<\\|m\\|$; by induction each of $a,b$ factors into irreducibles, so $m$ does too. ✓</p>
<p><strong>Part 2 — Uniqueness</strong> (induction + UFD). Suppose</p>
<div class="math-block">$$\\hat{q}_1\\cdots\\hat{q}_n \\;=\\; \\hat{\\lambda}_1\\cdots\\hat{\\lambda}_m \\quad\\text{all factors irreducible, }n\\leq m.$$</div>
<p><span class="step-num">1</span><strong>$n=m$, proved by induction on $n$:</strong></p>
<p>If $n=1$: $\\hat{q}_1 = \\hat{\\lambda}_1\\cdots\\hat{\\lambda}_m$. If $m&gt;1$ then $\\hat{q}_1$ is reducible — contradiction. So $m=1$. ✓</p>
<p>If $n&gt;1$: apply $\\phi$ to both sides (it is a monoid homomorphism $\\phi:(\\mathbb{Z},\\circledast)\\to(\\mathbb{Z},\\cdot)$):</p>
<div class="math-block">$$\\underbrace{\\phi(q_1)\\cdots\\phi(q_n)}_{\\text{product of }n\\text{ primes}} = \\underbrace{\\phi(\\lambda_1)\\cdots\\phi(\\lambda_m)}_{\\text{product of }m\\text{ primes}}$$</div>
<p>In $\\mathbb{Z}$, a product of $n$ primes cannot equal a product of $m\\neq n$ primes (by UFD). Hence $n=m$. ✓</p>
<p><span class="step-num">2</span><strong>Multisets match:</strong> With $n=m$, the two sides are products of $n$ primes (in $\\mathbb{Z}$) that are equal. By <strong>UFD in $\\mathbb{Z}$</strong>: $\\{\\phi(q_i)\\} = \\{\\phi(\\lambda_j)\\}$ as multisets. Since $\\phi(x)=6x+1$ is injective: $\\{q_i\\} = \\{\\lambda_j\\}$. ✓</p>
<div class="qed-box"><i class="bi bi-check-circle me-1"></i>QED — Prop 2.4.5 follows</div>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-stars me-1"></i>Why irreducible generators are the right choice</div>
<p>For a general generator $\\hat{k}$, $\\phi(k) = 6k+1$ may be composite, making the multiset-equality step unclear (one product of composites might equal another). For an <em>irreducible</em> $\\hat{q}$, $\\phi(q)$ is prime by definition — so the $\\phi$-images are already a factorization into primes, and UFD applies instantly. The valuation invariants of <a class="ilink" onclick="goToCard('lem-sep-inv')">Lemma 2.3</a> were simulating UFD for composite images; with irreducibles they are unnecessary.</p>
</div>
<div class="remark-box">
<div class="remark-title"><i class="bi bi-check2-circle me-1"></i>Gap status</div>
<p><strong>Gap 2 (Prop 2.4.5) and Gap 3 (mixed splitting) are now closed</strong> by this lemma. The entire proof reduces to: existence of irreducible factorization (norm) + uniqueness (UFD). See the updated <a class="ilink" onclick="goToCard('critical')">critical assessment</a>.</p>
</div>
${mkVerify('lem-ufd','# Irreducibles: φ(q) and |ψ(q)| both prime\nirreds = [k for k in range(-25,26) if k != 0\n          and is_prime(abs(phi(k)))\n          and is_prime(abs(psi(k)))]\n# UFD: distinct products of φ-images\n# → equal products force equal multisets')}`},

{id:"verify-sep-inv",ch:"§2 Monoid",badge:"b-rmk",title:"Verification — Separating Invariants &amp; Prop 2.4.5 (Live Python)",lean:null,body:`
<div class="card-ribbon">LIVE CODE</div>
<p>Four numerical checks run live in-browser via <strong>Pyodide</strong> (Python ↔ WebAssembly). No server required; the code displayed is exactly what executes.</p>
<div class="example-box" style="font-size:.9rem">
<div class="example-title"><i class="bi bi-list-check me-1"></i>What is checked</div>
<p><span class="step-num">1</span><strong>Bilinearity</strong> — $f_{q,p}(a\\circledast b,w)=f_{q,p}(a,w)+f_{q,p}(b,w)$ and right factor, for $a,b,w\\in[-5,5]$, $(q,p)\\in\\{(7,5),(7,11),(13,5),(13,11)\\}$.</p>
<p><span class="step-num">2</span><strong>Separation</strong> — $\\forall\\,k\\neq l\\in[-10,10]\\setminus\\{0\\}$, $\\exists(q,p)\\colon f_{q,p}(k,k)\\neq f_{q,p}(l,l)$.</p>
<p><span class="step-num">3</span><strong>Prop 2.4.5 (small cases)</strong> — No two distinct multisets from $\\{1,\\ldots,8\\}$ of size $\\leq 4$ give the same $(\\circledast\\text{-product},\\;\\star\\text{-product})$ in $\\mathbb{Z}^2$.</p>
<p><span class="step-num">4</span><strong>UFD mechanism</strong> — Verify that $\\phi$ maps irreducible generators to <em>distinct</em> primes and that equal products of $\\phi$-images force equal multisets (i.e., UFD uniqueness holds in the small-case range used by Prop 2.4.5).</p>
</div>
<div class="code-block" style="max-height:300px;overflow-y:auto;font-size:.72rem;line-height:1.65">def phi(x):    return 6*x + 1          # φ: Z → 6Z+1
def psi_abs(x): return abs(6*x - 1)    # |ψ(x)|
def circ(x, y): return 6*x*y + x + y  # x ⊛ y
def star(x, y): return -6*x*y + x + y # x ⋆ y

def v(p, n):                           # p-adic valuation
    n = abs(n)
    if n == 0: return 999
    c = 0
    while n % p == 0: n //= p; c += 1
    return c

def f(q, p, z, w):                     # f_{q,p}(z,w) = v_q(|φ(z)|)·v_p(|ψ(w)|)
    return v(q, abs(phi(z))) * v(p, psi_abs(w))

# Check 1 — bilinearity over a,b,w ∈ [-5,5], q∈{7,13}, p∈{5,11}
# Check 2 — separation: ∀ k≠l ∃ (q,p) with f(k,k) ≠ f(l,l)  (Props 2.4.1, 2.4.4)
# Check 3 — Prop 2.4.5: distinct multisets → distinct (⊛,⋆)-products (empirical)
# Check 4 — UFD mechanism: φ maps irreducibles to distinct primes (actual proof)</div>

  <button class="proof-toggle" id="btn-run-py" onclick="runVerifyPy()"><i class="bi bi-play-circle-fill me-1"></i>Run Verification</button>
